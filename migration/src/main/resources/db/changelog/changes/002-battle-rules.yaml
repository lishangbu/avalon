- changeSet:
    id: 092-battle-stat-stage-operation-skill-rules
    author: backend
    comment: 新增技能能力阶级特殊操作表和规则数据。
    changes:
    - createTable:
        tableName: battle_skill_stat_stage_operation
        remarks: 战斗技能能力阶级特殊操作表，保存清除、复制、交换和取反等不能用普通阶级加减表达的技能效果。
        columns:
        - column:
            name: id
            type: bigint
            remarks: 技能能力阶级操作主键。
            constraints:
              primaryKey: true
              primaryKeyName: pk_battle_skill_stat_stage_operation
              nullable: false
        - column:
            name: skill_rule_id
            type: bigint
            remarks: 技能规则 ID，引用 battle_skill_rule。
            constraints:
              nullable: false
        - column:
            name: stat_id
            type: bigint
            remarks: 能力项 ID，引用 game_stat；每条记录只处理一个能力项。
            constraints:
              nullable: false
        - column:
            name: operation_kind
            type: varchar(30)
            remarks: 操作类型，CLEAR 表示清除为 0，COPY 表示从来源复制，SWAP 表示来源与目标交换，INVERT 表示取反。
            constraints:
              nullable: false
        - column:
            name: target_scope
            type: varchar(40)
            remarks: 操作目标范围，例如 USER、TARGET 或 ALL_ACTIVE。
            constraints:
              nullable: false
        - column:
            name: source_scope
            type: varchar(40)
            remarks: 操作来源范围；COPY 和 SWAP 必填，CLEAR 和 INVERT 为空。
        - column:
            name: effect_timing
            type: varchar(40)
            remarks: 操作结算时机，当前使用 AFTER_HIT 表示技能命中后结算。
            constraints:
              nullable: false
        - column:
            name: chance_percent
            type: int
            remarks: 操作触发概率百分比，100 表示必定触发。
            constraints:
              nullable: false
        - column:
            name: enabled
            type: boolean
            defaultValueBoolean: true
            remarks: 是否启用该能力阶级操作。
            constraints:
              nullable: false
        - column:
            name: sort_order
            type: int
            remarks: 能力阶级操作展示排序和运行时同类效果顺序。
            constraints:
              nullable: false
    - addUniqueConstraint:
        tableName: battle_skill_stat_stage_operation
        columnNames: skill_rule_id, stat_id, operation_kind, target_scope, source_scope, effect_timing
        constraintName: uk_battle_skill_stat_stage_operation__skill_stat_kind_scope
    - addForeignKeyConstraint:
        baseTableName: battle_skill_stat_stage_operation
        baseColumnNames: skill_rule_id
        referencedTableName: battle_skill_rule
        referencedColumnNames: id
        constraintName: fk_battle_skill_stat_stage_operation__skill_rule_id
        onDelete: CASCADE
    - addForeignKeyConstraint:
        baseTableName: battle_skill_stat_stage_operation
        baseColumnNames: stat_id
        referencedTableName: game_stat
        referencedColumnNames: id
        constraintName: fk_battle_skill_stat_stage_operation__stat_id
    - createIndex:
        tableName: battle_skill_stat_stage_operation
        indexName: idx_battle_skill_stat_stage_operation__stat_id
        columns:
        - column:
            name: stat_id
    - insert:
        tableName: battle_skill_rule
        columns:
        - column: { name: id, valueNumeric: 89 }
