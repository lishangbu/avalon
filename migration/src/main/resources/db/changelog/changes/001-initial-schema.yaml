                    nullable: false
              - column:
                  name: key_id
                  type: varchar(120)
                  constraints:
                    nullable: false
              - column:
                  name: jwk_json
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: oauth2_jwk
            columnNames: key_id
            constraintName: uk_oauth2_jwk__key_id
        - createIndex:
            tableName: oauth2_jwk
            indexName: idx_oauth2_jwk__active
            columns:
              - column:
                  name: active
        - sql:
            sql: |
              create unique index uk_oauth2_jwk__active_true
              on oauth2_jwk (active)
              where active = true;

