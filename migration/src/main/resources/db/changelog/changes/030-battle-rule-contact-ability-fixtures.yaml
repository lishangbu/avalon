databaseChangeLog:
- changeSet:
    id: 030-battle-rule-contact-ability-fixtures
    author: backend
    comment: 新增接触类特性异常状态公开对照 fixture 数据。
    changes:
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 9 }
        - column: { name: code, value: contact-status-ability-applies-paralysis-after-contact }
        - column: { name: name, value: 接触异常特性成功麻痹攻击方 }
        - column: { name: category, value: ABILITY }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证目标在受到接触类技能命中后，可通过结构化特性效果让攻击方获得主要异常状态。 }
        - column: { name: input_summary, value: 攻击方使用接触类物理技能命中目标；目标携带接触后 100% 麻痹攻击方的结构化特性效果。 }
        - column: { name: expected_summary, value: 目标先受到普通伤害；随后攻击方获得麻痹状态，且 100% 概率不额外消费接触特性随机数。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 90 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 10 }
        - column: { name: code, value: contact-status-ability-misses-when-chance-roll-fails }
        - column: { name: name, value: 接触异常特性概率未触发 }
        - column: { name: category, value: ABILITY }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证非 100% 的接触类异常特性会消费独立概率掷点，掷点失败时不附加状态。 }
        - column: { name: input_summary, value: 攻击方使用接触类技能命中目标；目标携带接触后 30% 灼伤攻击方的结构化特性效果，脚本掷点为 81。 }
        - column: { name: expected_summary, value: 目标正常受到伤害；接触特性的概率掷点失败，攻击方不会获得灼伤状态。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 100 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 11 }
        - column: { name: code, value: contact-status-ability-respects-attacker-immunity }
        - column: { name: name, value: 接触异常特性遵守攻击方免疫 }
        - column: { name: category, value: ABILITY }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证接触类异常特性触发后仍复用攻击方主要异常免疫流程，并在事件流记录稳定阻止原因。 }
        - column: { name: input_summary, value: 攻击方使用接触类技能命中目标；目标接触后 100% 麻痹攻击方，但攻击方自身有麻痹免疫特性。 }
        - column: { name: expected_summary, value: 目标受到普通伤害；麻痹附加流程被攻击方特性免疫阻止，事件流记录 ABILITY 阻止原因。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 110 }
