databaseChangeLog:
- changeSet:
    id: 042-battle-rule-skill-effect-fixtures
    author: backend
    comment: 新增技能能力阶级、HP 回复和天气设置公开对照 fixture 数据。
    changes:
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 79 }
        - column: { name: code, value: stat-stage-effect-changes-later-action-damage-in-the-same-turn }
        - column: { name: name, value: 能力阶级变化影响同回合后续伤害 }
        - column: { name: category, value: SKILL }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证技能造成的能力阶级变化会立即写入状态，并影响同一回合后续行动的伤害计算。 }
        - column: { name: input_summary, value: 高速成员先用变化技能降低对手攻击，随后对手在同一回合使用物理攻击。 }
        - column: { name: expected_summary, value: 对手攻击阶级立即降低，本回合后续物理伤害按降低后的攻击阶级计算。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 790 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 80 }
        - column: { name: code, value: status-skill-applies-multiple-user-stat-stage-changes }
        - column: { name: name, value: 变化技能可提升使用者多项能力阶级 }
        - column: { name: category, value: SKILL }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证同一个变化技能可以携带多条使用者能力阶级变化，并按实际变化逐项产生事件。 }
        - column: { name: input_summary, value: 使用者成功使用会提升自身多项能力阶级的变化技能。 }
        - column: { name: expected_summary, value: 使用者自身对应能力阶级逐项改变，并为每一项实际变化产生能力阶级事件。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 800 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 81 }
        - column: { name: code, value: all-opponents-status-skill-applies-stat-stage-change-to-each-active-opponent }
        - column: { name: name, value: 全体对手变化技能逐个降低当前对手能力阶级 }
        - column: { name: category, value: SKILL }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证影响所有相邻对手的变化技能在双打中会逐个应用到对方当前上场成员，不影响己方同伴。 }
        - column: { name: input_summary, value: 双打中使用者成功使用影响所有相邻对手的变化技能。 }
        - column: { name: expected_summary, value: 两个当前对手分别降低对应能力阶级，己方队友不受影响，并为每个实际目标记录事件。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 810 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 82 }
        - column: { name: code, value: draining-damage-skill-heals-user-by-half-damage-dealt }
        - column: { name: name, value: 吸取伤害技能按实际伤害一半回复 }
        - column: { name: category, value: SKILL }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证吸取类伤害技能在目标受到普通伤害后，按本次实际造成伤害的一半回复使用者。 }
        - column: { name: input_summary, value: 使用者未满 HP，使用带有吸取回复效果的伤害技能命中目标。 }
        - column: { name: expected_summary, value: 目标受到普通伤害后，使用者按本次实际伤害的 1/2 回复 HP。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 820 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 83 }
        - column: { name: code, value: draining-damage-skill-honors-configured-drain-fraction }
        - column: { name: name, value: 吸取伤害技能遵循配置回复比例 }
        - column: { name: category, value: SKILL }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证吸取类伤害技能可以使用资料配置的 3/4 等非默认回复比例。 }
        - column: { name: input_summary, value: 使用者未满 HP，使用带有 3/4 吸取比例的伤害技能命中目标。 }
        - column: { name: expected_summary, value: 目标受到普通伤害后，使用者按本次实际伤害的 3/4 回复 HP。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 830 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 84 }
        - column: { name: code, value: self-healing-status-skill-restores-half-max-hp }
        - column: { name: name, value: 自我回复变化技能回复最大 HP 一半 }
        - column: { name: category, value: SKILL }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证固定自我回复类变化技能成功后，会按使用者最大 HP 的一半回复并产生技能回复事件。 }
        - column: { name: input_summary, value: 使用者未满 HP，使用固定回复 1/2 最大 HP 的变化技能。 }
        - column: { name: expected_summary, value: 技能成功后使用者回复最大 HP 的 1/2，并产生技能回复事件。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 840 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 85 }
        - column: { name: code, value: weather-sensitive-self-healing-skill-uses-current-weather-fraction }
        - column: { name: name, value: 天气变量自我回复读取当前天气比例 }
        - column: { name: category, value: SKILL }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证天气变量回复技能会根据当前天气选择不同最大 HP 回复比例。 }
        - column: { name: input_summary, value: 使用者分别在晴天和下雨环境中使用天气变量自我回复技能。 }
        - column: { name: expected_summary, value: 晴天回复最大 HP 的 2/3；下雨回复最大 HP 的 1/4。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 850 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 86 }
        - column: { name: code, value: status-skill-starts-weather-for-five-turns }
        - column: { name: name, value: 变化技能设置五回合天气 }
        - column: { name: category, value: WEATHER }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证设置天气类变化技能成功后会写入全场天气、持续回合，并产生天气开始事件。 }
        - column: { name: input_summary, value: 使用者成功使用设置天气的变化技能，当前场上没有天气。 }
        - column: { name: expected_summary, value: 全场天气变为目标天气，剩余回合为 5，并产生天气开始事件。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 860 }
