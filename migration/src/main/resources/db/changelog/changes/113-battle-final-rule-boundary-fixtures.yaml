databaseChangeLog:
- changeSet:
    id: 113-battle-final-rule-boundary-fixtures
    author: backend
    comment: 新增最终规则边界收口公开对照 fixture 数据。
    changes:
    - sql:
        splitStatements: true
        stripComments: true
        sql: |
          insert into battle_rule_fixture
            (id, code, name, category, fixture_type, description, input_summary, expected_summary, enabled, sort_order)
          values
            (400, 'unprotected-damaging-skill-bypasses-protection-and-still-deals-damage', '不受保护影响的伤害技能穿过保护', 'HIT', 'STATE_MACHINE', '验证保护屏障只阻挡声明受保护影响的技能。', '目标本回合先成功建立保护屏障，较慢对手随后使用声明不受保护影响的伤害技能。', '保护屏障不会阻挡该技能；技能继续消费要害和伤害随机，并对目标本体造成伤害。', true, 4000),
            (401, 'selected-target-fainted-before-later-action-cancels-skill-use', '目标行动前倒下取消后续技能', 'HIT', 'STATE_MACHINE', '验证单体目标在行动前失效时不会继续消耗后续行动者的 PP。', '双打中较快伙伴先击倒一名对手，较慢伙伴原本也把单体技能指向同一上场目标。', '较慢伙伴行动时目标已经无法战斗，技能不宣告、不消耗 PP，也不产生命中或伤害事件。', true, 4010),
            (402, 'all-active-stat-clear-skips-bench-participants', '全场能力清除跳过后备成员', 'SKILL', 'STATE_MACHINE', '验证全场能力阶级清除只作用于当前上场成员。', '全场清除能力阶级效果发动时，双方上场成员和一名后备成员都拥有攻击阶级变化。', '技能只清除当前上场且仍可战斗成员的攻击阶级，后备成员的阶级快照保持不变。', true, 4020),
            (403, 'zero-chance-major-status-effect-consumes-no-random-and-applies-nothing', '零概率主要异常不消费随机', 'SKILL', 'STATE_MACHINE', '验证 0% 主要异常状态效果稳定失败且不会污染随机轨迹。', '技能命中后声明 0% 附加灼伤。', '0% 效果稳定失败且不消费概率随机；目标不会获得主要异常状态。', true, 4030),
            (404, 'zero-chance-volatile-effect-skips-duration-random', '零概率临时状态跳过持续随机', 'SKILL', 'STATE_MACHINE', '验证 0% 临时状态效果不会继续消费状态私有持续时间随机。', '技能命中后声明 0% 附加混乱，混乱成功时本应消费持续时间随机。', '0% 临时状态效果不消费概率随机，也不会继续消费混乱持续时间随机。', true, 4040),
            (405, 'copy-operation-changes-only-declared-stat', '复制操作只改声明能力项', 'SKILL', 'STATE_MACHINE', '验证能力阶级复制操作不会覆盖未声明的其它能力项。', '使用者复制目标速度阶级；双方其它能力阶级也已有变化。', '复制操作只写入声明的速度阶级，不读取或覆盖攻击等其它能力阶级。', true, 4050),
            (406, 'swap-operation-writes-both-participants-in-one-effect', '交换操作一次写回双方能力阶级', 'SKILL', 'STATE_MACHINE', '验证能力阶级交换操作在同一次效果中同步写回双方。', '使用者与目标交换攻击阶级，交换前使用者为 +2，目标为 -3。', '同一次交换效果同时写回双方阶级；使用者变为 -3，目标变为 +2。', true, 4060),
            (407, 'invert-operation-turns-negative-stage-positive', '取反操作把负阶级变为正阶级', 'SKILL', 'STATE_MACHINE', '验证能力阶级取反读取当前阶级并写回相反数。', '目标防御阶级为 -4，使用者命中后执行取反能力阶级操作。', '取反操作按当前阶级写回相反数，目标防御从 -4 变为 +4。', true, 4070),
            (408, 'charge-skip-item-is-consumed-before-protection-blocks-released-skill', '蓄力跳过道具先于保护阻挡消费', 'ITEM', 'STATE_MACHINE', '验证一次性蓄力跳过道具在技能宣告后立即消费。', '携带一次性蓄力跳过道具的成员使用蓄力技能，同回合目标先成功保护。', '道具在技能宣告后立即消费并让技能同回合释放；随后释放出的技能仍会被保护阻挡。', true, 4080),
            (409, 'fatal-survival-item-consumption-prevents-low-hp-heal-on-same-hit', '免死道具消费阻止同击低体力回复', 'ITEM', 'STATE_MACHINE', '验证同一个携带道具触发免死后不会继续触发低体力回复效果。', '目标满 HP 携带同一道具上的免死效果和低体力回复效果，受到足以击倒的直接伤害。', '免死效果先触发并消费携带道具，目标保留 1 HP；同一道具的低体力回复不会在同一击继续触发。', true, 4090),
            (410, 'non-consumable-major-status-cure-keeps-held-item', '非消耗主要异常治愈保留道具', 'ITEM', 'STATE_MACHINE', '验证主要异常状态治愈效果可以声明为不消费携带道具。', '目标获得灼伤后触发配置为不消费的主要异常状态治愈道具效果。', '灼伤先成为事实再被清除；由于效果声明不消费，目标仍保留携带道具。', true, 4100),
            (411, 'non-consumable-volatile-status-cure-keeps-held-item', '非消耗临时状态治愈保留道具', 'ITEM', 'STATE_MACHINE', '验证临时状态治愈效果可以声明为不消费携带道具。', '目标获得混乱后触发配置为不消费的临时状态治愈道具效果。', '混乱先消费持续时间随机并写入运行态，再被治愈效果清除；目标仍保留携带道具。', true, 4110);
          insert into battle_rule_fixture_source
