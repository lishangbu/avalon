databaseChangeLog:
- changeSet:
    id: 107-battle-hit-defense-boundary-fixtures
    author: backend
    comment: 新增命中、防护、替身和免疫边界公开对照 fixture 数据。
    changes:
    - sql:
        splitStatements: true
        stripComments: true
        sql: |
          insert into battle_rule_fixture
            (id, code, name, category, fixture_type, description, input_summary, expected_summary, enabled, sort_order)
          values
            (282, 'sure-hit-skill-skips-accuracy-random-and-proceeds-to-damage', '必中技能跳过命中随机后继续伤害', 'HIT_DEFENSE', 'STATE_MACHINE', '验证命中字段为空的必中技能不会消费命中随机数。', '技能命中字段为空，表示当前规则下必中。', '技能不消费命中随机，直接进入要害和伤害随机流程并造成伤害。', true, 2820),
            (283, 'accuracy-roll-equal-to-modified-accuracy-still-hits', '命中掷点等于有效命中率时命中', 'HIT_DEFENSE', 'STATE_MACHINE', '验证命中判定阈值包含等于边界。', '基础命中 50 的技能掷出命中随机 50。', '命中判定使用小于等于阈值，掷点等于有效命中率时仍命中。', true, 2830),
            (284, 'accuracy-miss-skips-critical-hit-and-damage-random', '未命中跳过要害和伤害随机', 'HIT_DEFENSE', 'STATE_MACHINE', '验证未命中后不会继续消费后续随机数。', '基础命中 50 的技能掷出命中随机 51。', '技能未命中后不再消费要害或伤害随机数，也不造成伤害。', true, 2840),
            (285, 'positive-accuracy-stage-can-make-seventy-five-accuracy-skill-sure-hit', '命中提升可让低命中技能变为必中', 'HIT_DEFENSE', 'STATE_MACHINE', '验证使用者命中阶级提升后有效命中率达到 100 时跳过命中随机。', '使用者命中 +1，技能基础命中 75。', '修正后有效命中率达到 100，不消费命中随机并继续造成伤害。', true, 2850),
            (286, 'positive-evasion-stage-can-make-one-hundred-accuracy-skill-miss', '闪避提升可让满命中技能未命中', 'HIT_DEFENSE', 'STATE_MACHINE', '验证目标闪避阶级提升会降低有效命中率并触发未命中。', '目标闪避 +1，攻击方使用基础命中 100 的技能，命中随机掷出 76。', '有效命中率降为 75，掷点 76 未命中且不继续结算伤害。', true, 2860),
            (287, 'weather-sure-hit-override-skips-accuracy-random', '天气必中覆盖跳过命中随机', 'HIT_DEFENSE', 'STATE_MACHINE', '验证天气把技能命中覆盖为必中时不会消费命中随机。', '当前天气把基础命中 50 的技能覆盖为必中。', '天气覆盖后的命中率为空，不消费命中随机并继续造成伤害。', true, 2870),
            (288, 'first-successful-protection-consumes-no-chance-random', '首次保护成功不消费概率随机', 'HIT_DEFENSE', 'STATE_MACHINE', '验证首次连续保护必定成功且不消费保护概率随机。', '成员首次连续保护计数为 0 时使用保护类技能。', '首次保护必定成功，不消费保护概率随机，并把连续保护计数记为 1。', true, 2880),
            (289, 'second-consecutive-protection-success-consumes-one-third-chance-random', '第二次连续保护按三分之一成功率判定', 'HIT_DEFENSE', 'STATE_MACHINE', '验证第二次连续保护消费概率随机并可成功。', '成员已有一次连续保护成功计数，第二次使用保护类技能并掷出成功值。', '第二次保护消费 1/3 概率随机，掷到 0 成功并把连续保护计数推进到 2。', true, 2890),
            (290, 'failed-consecutive-protection-leaves-user-unprotected-for-later-damage', '连续保护失败后同回合不建立屏障', 'HIT_DEFENSE', 'STATE_MACHINE', '验证连续保护失败后后续攻击可以正常造成伤害。', '成员第二次连续保护掷点失败，较慢对手随后攻击该成员。', '保护失败后不建立屏障，后续攻击不会被阻挡并正常造成伤害。', true, 2900),
            (291, 'protection-blocks-ally-affected-skill-in-double-battle', '保护阻挡同侧伙伴的受保护技能', 'HIT_DEFENSE', 'STATE_MACHINE', '验证保护屏障按技能是否受保护影响判断，不按来源敌我判断。', '双打中同侧伙伴对已经建立保护的成员使用受保护影响的技能。', '保护屏障不区分攻击来源，同侧伙伴的受保护影响技能也被阻挡。', true, 2910),
            (292, 'substitute-fails-at-exact-hp-cost-after-skill-use', '替身在当前 HP 等于费用时失败', 'HIT_DEFENSE', 'STATE_MACHINE', '验证替身技能在 HP 不多于费用时宣告和扣 PP 后失败。', '使用者当前 HP 正好等于替身费用。', '技能已经宣告并消耗 PP，但由于 HP 不多于费用，不建立替身也不扣除 HP。', true, 2920),
            (293, 'substitute-fails-when-user-already-has-substitute-after-skill-use', '已有替身时再次使用替身失败', 'HIT_DEFENSE', 'STATE_MACHINE', '验证已有替身不会被新的替身覆盖。', '使用者已经拥有替身时再次使用替身技能。', '技能已经宣告并消耗 PP，但不覆盖既有替身，也不重复扣除 HP。', true, 2930),
            (294, 'substitute-blocks-opponent-stat-stage-drop', '替身阻止对手能力下降变化技', 'HIT_DEFENSE', 'STATE_MACHINE', '验证替身会阻止来自对手的非声音类能力阶级变化。', '目标已有替身，对手使用非声音类降能力变化技能。', '替身阻止来自对手的能力阶级下降，目标能力阶级不变。', true, 2940),
            (295, 'substitute-allows-ally-stat-stage-effect', '替身允许同侧伙伴能力变化效果', 'HIT_DEFENSE', 'STATE_MACHINE', '验证替身不会阻止同侧伙伴的能力阶级效果。', '目标已有替身，同侧伙伴对其使用能力阶级变化技能。', '替身只阻止对手技能，同侧伙伴的能力阶级效果正常生效。', true, 2950),
            (296, 'substitute-does-not-block-user-self-healing-skill', '替身不阻止使用者自我回复', 'HIT_DEFENSE', 'STATE_MACHINE', '验证替身存在时使用者自己的回复技能仍然作用于本体。', '使用者已有替身并对自己使用回复类变化技能。', '替身不阻止使用者自己的回复技能，本体 HP 回复且替身 HP 保持不变。', true, 2960),
            (297, 'grass-target-blocks-powder-status-skill-before-duration-random', '草属性目标在持续随机前免疫粉末状态技', 'HIT_DEFENSE', 'STATE_MACHINE', '验证粉末类状态技能命中草属性目标时在状态持续随机前被免疫。', '对草属性目标使用粉末类睡眠技能。', '草属性天然免疫粉末类技能，阻挡发生在睡眠持续时间随机之前。', true, 2970),
            (298, 'sound-immunity-ability-blocks-sound-skill-before-damage-random', '声音免疫特性在伤害随机前阻挡声音技能', 'HIT_DEFENSE', 'STATE_MACHINE', '验证声音类免疫特性在伤害流程前短路技能效果。', '目标拥有声音类技能免疫特性，对手使用声音类伤害技能。', '特性在命中后伤害前阻挡技能，不消费要害或伤害随机数。', true, 2980),
            (299, 'type-immunity-blocks-fixed-damage-before-direct-damage', '属性免疫在固定伤害前短路', 'HIT_DEFENSE', 'STATE_MACHINE', '验证固定伤害技能也要先经过属性免疫判定。', '固定伤害技能的属性对目标属性相性为 0。', '属性免疫在固定伤害前短路，目标 HP 不变，事件记录 0 伤害。', true, 2990);
          insert into battle_rule_test_run
