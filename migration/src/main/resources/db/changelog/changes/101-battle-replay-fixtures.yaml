databaseChangeLog:
- changeSet:
    id: 101-battle-replay-fixtures
    author: backend
    comment: 新增确定性随机和严格回放公开对照 fixture 数据。
    changes:
    - sql:
        splitStatements: true
        stripComments: true
        sql: |
          insert into battle_rule_fixture
            (id, code, name, category, fixture_type, description, input_summary, expected_summary, enabled, sort_order)
          values
            (240, 'scripted-random-rejects-extra-consumption', '固定随机脚本拒绝额外消费', 'REPLAY', 'STATE_MACHINE', '验证固定随机脚本会在实现多消费随机数时立即失败。', '固定随机脚本只提供一个随机值，调用方尝试消费第二个随机值。', '随机源立即失败，暴露实现比 fixture 预期多消费了随机数。', true, 2400),
            (241, 'recording-random-preserves-bound-reason-and-value-sequence', '随机 trace 保留上界原因和值', 'REPLAY', 'STATE_MACHINE', '验证录制随机源完整保存每一次随机消费的结构化事实。', '录制随机源包裹固定脚本，依次消费要害随机和伤害随机。', 'trace 按消费顺序保存 sequence、bound、reason 和 value，供 replay 严格复算。', true, 2410),
            (242, 'strict-replay-reproduces-event-fragment-and-final-state', '严格回放复算事件片段和最终状态', 'REPLAY', 'STATE_MACHINE', '验证 replay 使用随机 trace 复算时必须得到同一事件流和最终状态。', '录制一回合普通单体伤害行动，保存提交行动、随机 trace 和本回合新增事件。', '严格 replay 使用 trace 复算后得到完全相同的事件片段和最终战斗状态。', true, 2420),
            (243, 'strict-replay-rejects-tampered-random-trace', '严格回放拒绝被篡改随机 trace', 'REPLAY', 'STATE_MACHINE', '验证 replay 在随机 trace 被篡改或消费顺序偏移时立即失败。', '录制一回合普通伤害行动后，把第一条随机 trace 的 reason 改成另一个阶段。', '严格 replay 在消费随机数时立即失败，避免被篡改 trace 产生看似可用的复盘。', true, 2430);
          insert into battle_rule_test_run
            (id, run_code, fixture_id, run_status, executor, command, started_at, sort_order)
          values
            (240, 'replay-coverage-20260629-1', 240, 'PASSED', 'gradle', './gradlew :battle-engine:test --tests io.github.lishangbu.battleengine.BattleReplayPublicReferenceTests', '2026-06-29T23:30:00+08:00', 2400),
            (241, 'replay-coverage-20260629-2', 241, 'PASSED', 'gradle', './gradlew :battle-engine:test --tests io.github.lishangbu.battleengine.BattleReplayPublicReferenceTests', '2026-06-29T23:30:00+08:00', 2410),
            (242, 'replay-coverage-20260629-3', 242, 'PASSED', 'gradle', './gradlew :battle-engine:test --tests io.github.lishangbu.battleengine.BattleReplayPublicReferenceTests', '2026-06-29T23:30:00+08:00', 2420),
            (243, 'replay-coverage-20260629-4', 243, 'PASSED', 'gradle', './gradlew :battle-engine:test --tests io.github.lishangbu.battleengine.BattleReplayPublicReferenceTests', '2026-06-29T23:30:00+08:00', 2430);
