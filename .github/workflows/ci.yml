name: CI

on:
  push:
    branches:
      - main
    paths: &ci_paths
      - '**/*.kt'
      - '**/*.kts'
      - 'gradle/**'
      - '**/*.yml'
      - '**/*.yaml'
      - 'gradle.properties'
      - 'db/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths: *ci_paths

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: CI / Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: 设置 Java 环境 - 使用Oracle JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'oracle'
          architecture: x64
      - name: 设置 Gradle 环境
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '9.4.1'
      - name: 编译并执行测试
        run: gradle ktlintCheck test
