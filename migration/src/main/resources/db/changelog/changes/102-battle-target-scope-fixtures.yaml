databaseChangeLog:
- changeSet:
    id: 102-battle-target-scope-fixtures
    author: backend
    comment: 新增双打目标范围解析公开对照 fixture 数据。
    changes:
    - sql:
        splitStatements: true
        stripComments: true
        sql: |
          insert into battle_rule_fixture
            (id, code, name, category, fixture_type, description, input_summary, expected_summary, enabled, sort_order)
          values
            (244, 'selected-target-skill-hits-only-chosen-target-in-double-battle', '双打单体技能只命中选中目标', 'TARGET', 'STATE_MACHINE', '验证双打普通单体技能不会扩散到未选择的对手或队友。', '双打中使用普通单体技能，目标选择对方左侧成员。', '技能只对选中目标产生一次伤害事件，同侧伙伴和另一名对手都不受影响。', true, 2440),
            (245, 'all-adjacent-opponents-skill-hits-both-opponents-and-skips-ally', '全体相邻对手技能命中两个对手并跳过队友', 'TARGET', 'STATE_MACHINE', '验证全体相邻对手范围只收集对手侧当前可战斗成员。', '双打中使用目标范围为全体相邻对手的伤害技能，对方两名成员均可战斗。', '技能对两个对手各产生一次伤害事件，不影响使用者同侧伙伴，并使用范围伤害倍率。', true, 2450),
            (246, 'all-adjacent-participants-skill-hits-ally-and-opponents-but-excludes-user', '全体相邻成员技能命中队友和对手但排除自己', 'TARGET', 'STATE_MACHINE', '验证全体相邻成员范围包含使用者伙伴和对手，但不包含使用者自身。', '双打中使用目标范围为全体相邻成员的伤害技能，使用者伙伴和两个对手都可战斗。', '技能命中除使用者外的三个相邻成员，使用者自身不受到该范围技能影响。', true, 2460),
            (247, 'spread-skill-skips-fainted-opponent-and-keeps-full-target-multiplier', '范围技能跳过倒下对手并保持完整倍率', 'TARGET', 'STATE_MACHINE', '验证范围目标列表不包含已经无法战斗的成员，且只剩一个目标时不使用范围伤害倍率。', '双打中使用全体相邻对手范围技能，但其中一个对手已经无法战斗。', '范围目标列表只包含仍可战斗的对手，普通伤害公式使用 1.0 目标倍率。', true, 2470),
            (248, 'spread-skill-recalculates-opponents-after-voluntary-switch', '范围技能在主动替换后重新收集目标', 'TARGET', 'STATE_MACHINE', '验证主动替换先于普通攻击结算，范围技能按替换后的当前站位收集目标。', '双打中对手左侧成员先主动替换，随后另一方使用全体相邻对手范围技能。', '范围技能按替换后的当前站位重新收集目标，命中新上场成员和另一名仍在场对手。', true, 2480),
            (249, 'all-adjacent-participants-skill-skips-fainted-ally', '全体相邻成员技能跳过倒下队友', 'TARGET', 'STATE_MACHINE', '验证全体相邻成员范围同样会跳过同侧已经无法战斗的伙伴。', '双打中使用全体相邻成员范围技能，使用者伙伴已经无法战斗，两个对手仍可战斗。', '范围目标列表跳过已经无法战斗的伙伴，只命中两个仍可战斗的对手。', true, 2490);
          insert into battle_rule_fixture_source
            (id, fixture_id, source_url, source_label, source_note, sort_order)
          values
            (488, 244, 'https://github.com/smogon/pokemon-showdown/blob/master/sim/battle-actions.ts', '公开引擎行动流程', '用于对照单体技能只影响选中目标。', 10),
            (489, 244, 'https://github.com/smogon/pokemon-showdown/blob/master/data/moves.ts', '公开技能资料', '用于对照技能目标范围资料。', 20),
            (490, 245, 'https://github.com/smogon/pokemon-showdown/blob/master/sim/battle-actions.ts', '公开引擎行动流程', '用于对照全体相邻对手范围。', 10),
            (491, 245, 'https://github.com/smogon/pokemon-showdown/blob/master/data/moves.ts', '公开技能资料', '用于对照对手范围技能资料。', 20),
            (492, 246, 'https://github.com/smogon/pokemon-showdown/blob/master/sim/battle-actions.ts', '公开引擎行动流程', '用于对照全体相邻成员范围。', 10),
            (493, 246, 'https://github.com/smogon/pokemon-showdown/blob/master/data/moves.ts', '公开技能资料', '用于对照全场邻近成员技能资料。', 20),
            (494, 247, 'https://github.com/smogon/pokemon-showdown/blob/master/sim/battle-actions.ts', '公开引擎行动流程', '用于对照范围目标跳过倒下成员。', 10),
            (495, 247, 'https://wiki.52poke.com/wiki/招式', '技能公开资料', '用于验证无法战斗成员不会继续作为技能目标。', 20),
            (496, 248, 'https://github.com/smogon/pokemon-showdown/blob/master/sim/battle-actions.ts', '公开引擎行动流程', '用于对照范围目标执行时重新收集。', 10),
            (497, 248, 'https://github.com/smogon/pokemon-showdown/blob/master/sim/battle-queue.ts', '公开引擎行动队列', '用于对照主动替换先于普通技能。', 20),
            (498, 249, 'https://github.com/smogon/pokemon-showdown/blob/master/sim/battle-actions.ts', '公开引擎行动流程', '用于对照同侧倒下伙伴被范围目标跳过。', 10),
            (499, 249, 'https://github.com/smogon/pokemon-showdown/blob/master/data/moves.ts', '公开技能资料', '用于对照全体相邻成员范围资料。', 20);
