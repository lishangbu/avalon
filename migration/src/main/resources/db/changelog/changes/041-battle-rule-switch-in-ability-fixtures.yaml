databaseChangeLog:
- changeSet:
    id: 041-battle-rule-switch-in-ability-fixtures
    author: backend
    comment: 新增出场降攻、出场天气、出场场地和慢速覆盖顺序公开对照 fixture 数据。
    changes:
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 70 }
        - column: { name: code, value: switch-in-attack-drop-triggers-at-battle-start }
        - column: { name: name, value: 出场降攻在战斗开始触发 }
        - column: { name: category, value: ABILITY }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证战斗开始时当前上场成员的出场降攻特性会在战斗开始事件后降低对手攻击阶级。 }
        - column: { name: input_summary, value: 单打战斗开始时，己方当前上场成员拥有出场降攻特性，对手当前上场且可战斗。 }
        - column: { name: expected_summary, value: 战斗开始事件之后，对手攻击能力阶级降低 1 级，并记录通用能力阶级变化事件。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 700 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 71 }
        - column: { name: code, value: switch-in-attack-drop-targets-both-double-battle-opponents }
        - column: { name: name, value: 出场降攻影响双打两个对手 }
        - column: { name: category, value: ABILITY }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证双打中出场降攻特性会作用于对方两个当前上场成员，不影响己方同伴。 }
        - column: { name: input_summary, value: 双打战斗开始时，己方一个当前上场成员拥有出场降攻特性，对方两个当前上场成员均可战斗。 }
        - column: { name: expected_summary, value: 对方两个当前上场成员各降低攻击 1 级；己方同伴不受该出场特性影响。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 710 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 72 }
        - column: { name: code, value: switch-in-attack-drop-triggers-after-voluntary-switch }
        - column: { name: name, value: 主动替换后触发出场降攻 }
        - column: { name: category, value: ABILITY }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证主动替换进场的后备成员也会触发出场降攻，且触发顺序晚于替换事件。 }
        - column: { name: input_summary, value: 单打中己方主动替换到拥有出场降攻特性的后备成员，对手当前上场且可战斗。 }
        - column: { name: expected_summary, value: 替换事件先记录，随后出场特性降低对手攻击 1 级。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 720 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 73 }
        - column: { name: code, value: switch-in-weather-starts-rain-at-battle-start }
        - column: { name: name, value: 出场天气在战斗开始设置下雨 }
        - column: { name: category, value: ABILITY }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证战斗开始时出场设置天气特性会把全场天气写为下雨，并记录 5 回合持续时间。 }
        - column: { name: input_summary, value: 单打战斗开始时，己方当前上场成员拥有出场设置下雨天气的结构化特性。 }
        - column: { name: expected_summary, value: 战斗开始事件之后，天气变为下雨并写入 5 回合持续时间，同时记录天气开始事件。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 730 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 74 }
        - column: { name: code, value: slower-switch-in-weather-overwrites-faster-weather-at-battle-start }
        - column: { name: name, value: 战斗开始慢速出场天气覆盖快速天气 }
        - column: { name: category, value: ABILITY }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证战斗开始多个出场天气特性按有效速度顺序触发，较慢成员后设置的天气成为最终天气。 }
        - column: { name: input_summary, value: 单打战斗开始时，双方当前上场成员分别拥有出场设置天气的特性；己方速度更快，对方速度更慢。 }
        - column: { name: expected_summary, value: 较快成员先设置下雨，较慢成员后设置大晴天，最终保留较慢成员设置的天气。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 740 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 75 }
        - column: { name: code, value: switch-in-weather-triggers-after-voluntary-switch }
        - column: { name: name, value: 主动替换后触发出场天气 }
        - column: { name: category, value: ABILITY }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证主动替换进场的后备成员也会触发出场天气，并在本回合末正常递减持续回合。 }
        - column: { name: input_summary, value: 单打中己方主动替换到拥有出场设置沙暴天气特性的后备成员。 }
        - column: { name: expected_summary, value: 替换事件先记录，随后天气变为沙暴并写入 5 回合持续时间。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 750 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 76 }
        - column: { name: code, value: switch-in-terrain-starts-electric-terrain-at-battle-start }
        - column: { name: name, value: 出场场地在战斗开始设置电气场地 }
        - column: { name: category, value: ABILITY }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证战斗开始时出场设置场地特性会把全场场地写为电气场地，并记录 5 回合持续时间。 }
        - column: { name: input_summary, value: 单打战斗开始时，己方当前上场成员拥有出场设置电气场地的结构化特性。 }
        - column: { name: expected_summary, value: 战斗开始事件之后，场地变为电气场地并写入 5 回合持续时间，同时记录场地开始事件。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 760 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 77 }
        - column: { name: code, value: slower-switch-in-terrain-overwrites-faster-terrain-at-battle-start }
        - column: { name: name, value: 战斗开始慢速出场场地覆盖快速场地 }
        - column: { name: category, value: ABILITY }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证战斗开始多个出场场地特性按有效速度顺序触发，较慢成员后设置的场地成为最终场地。 }
        - column: { name: input_summary, value: 单打战斗开始时，双方当前上场成员分别拥有出场设置场地的特性；己方速度更快，对方速度更慢。 }
        - column: { name: expected_summary, value: 较快成员先设置电气场地，较慢成员后设置精神场地，最终保留较慢成员设置的场地。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 770 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 78 }
        - column: { name: code, value: switch-in-terrain-triggers-after-voluntary-switch }
        - column: { name: name, value: 主动替换后触发出场场地 }
        - column: { name: category, value: ABILITY }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证主动替换进场的后备成员也会触发出场场地，并在本回合末正常递减持续回合。 }
        - column: { name: input_summary, value: 单打中己方主动替换到拥有出场设置薄雾场地特性的后备成员。 }
        - column: { name: expected_summary, value: 替换事件先记录，随后场地变为薄雾场地并写入 5 回合持续时间。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 780 }
