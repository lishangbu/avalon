        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证电气场地只阻止当前上场且接地的成员获得睡眠。 }
        - column: { name: input_summary, value: 电气场地存在时，非接地上场目标被睡眠技能命中。 }
        - column: { name: expected_summary, value: 目标仍会获得睡眠状态，并正常消费睡眠持续随机数。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 260 }
