databaseChangeLog:
- changeSet:
    id: 011-battle-skill-global-field-effects
    author: backend
    comment: 新增技能建立全场持续效果的结构化规则表，并接入戏法空间类速度顺序效果。
    changes:
    - createTable:
        tableName: battle_skill_global_field_effect
        remarks: 战斗技能全场效果表，保存技能命中后建立全场持续效果的结构化规则。
        columns:
        - column:
            name: id
            type: bigint
            remarks: 技能全场效果主键，内置数据使用稳定数字 ID，后台新增数据由 Jimmer 主键生成器生成。
            constraints:
              primaryKey: true
              primaryKeyName: pk_battle_skill_global_field_effect
              nullable: false
        - column:
            name: skill_rule_id
            type: bigint
            remarks: 技能规则 ID，引用 battle_skill_rule。
            constraints:
              nullable: false
        - column:
            name: field_rule_id
            type: bigint
            remarks: 全场效果规则 ID，引用 effect_scope 为 FIELD 的 battle_field_rule。
            constraints:
              nullable: false
        - column:
            name: effect_timing
            type: varchar(40)
            remarks: 效果结算时机，当前支持 AFTER_HIT。
            constraints:
              nullable: false
        - column:
            name: required_weather_rule_id
            type: bigint
            remarks: 要求存在的天气规则 ID，引用 battle_weather_rule；为空表示无天气前置条件。
        - column:
            name: chance_percent
            type: int
            remarks: 触发概率百分比，100 表示必定触发。
            constraints:
              nullable: false
        - column:
            name: enabled
            type: boolean
            defaultValueBoolean: true
            remarks: 是否启用该技能全场效果。
            constraints:
              nullable: false
        - column:
            name: sort_order
            type: int
            remarks: 技能全场效果展示排序，数值越小越靠前。
            constraints:
              nullable: false
    - addUniqueConstraint:
        tableName: battle_skill_global_field_effect
        columnNames: skill_rule_id, field_rule_id, effect_timing
        constraintName: uk_battle_skill_global_field_effect__skill_field_timing
    - addForeignKeyConstraint:
        baseTableName: battle_skill_global_field_effect
        baseColumnNames: skill_rule_id
        referencedTableName: battle_skill_rule
        referencedColumnNames: id
        constraintName: fk_battle_skill_global_field_effect__skill_rule_id
        onDelete: CASCADE
    - addForeignKeyConstraint:
        baseTableName: battle_skill_global_field_effect
        baseColumnNames: field_rule_id
        referencedTableName: battle_field_rule
        referencedColumnNames: id
        constraintName: fk_battle_skill_global_field_effect__field_rule_id
    - addForeignKeyConstraint:
        baseTableName: battle_skill_global_field_effect
        baseColumnNames: required_weather_rule_id
        referencedTableName: battle_weather_rule
        referencedColumnNames: id
        constraintName: fk_battle_skill_global_field_effect__required_weather_rule_id
    - createIndex:
        tableName: battle_skill_global_field_effect
        indexName: idx_battle_skill_global_field_effect__field_rule_id
        columns:
        - column:
            name: field_rule_id
    - createIndex:
        tableName: battle_skill_global_field_effect
        indexName: idx_battle_skill_global_field_effect__required_weather_rule_id
        columns:
        - column:
            name: required_weather_rule_id
    - createIndex:
        tableName: battle_skill_global_field_effect
        indexName: idx_battle_skill_global_field_effect__enabled_sort_order
        columns:
        - column:
            name: enabled
        - column:
            name: sort_order
    - insert:
        tableName: battle_skill_rule
        columns:
        - column: { name: id, valueNumeric: 18 }
        - column: { name: skill_id, valueNumeric: 433 }
        - column: { name: effect_policy, value: field-condition }
        - column: { name: target_policy, value: self }
        - column: { name: hit_policy, value: always-hit }
        - column: { name: damage_policy, value: no-damage }
        - column: { name: min_hits, valueNumeric: 1 }
        - column: { name: max_hits, valueNumeric: 1 }
        - column: { name: critical_hit_stage, valueNumeric: 0 }
        - column: { name: makes_contact, valueBoolean: false }
        - column: { name: affected_by_protect, valueBoolean: false }
        - column: { name: protects_user, valueBoolean: false }
        - column: { name: thaws_user_before_move, valueBoolean: false }
        - column: { name: weakened_by_grassy_terrain, valueBoolean: false }
        - column: { name: sound_based, valueBoolean: false }
        - column: { name: powder_based, valueBoolean: false }
        - column: { name: punch_based, valueBoolean: false }
        - column: { name: slicing_based, valueBoolean: false }
        - column: { name: lock_move_turns_min, valueNumeric: 1 }
        - column: { name: lock_move_turns_max, valueNumeric: 1 }
        - column: { name: confuses_user_after_lock, valueBoolean: false }
        - column: { name: description, value: 建立全场速度顺序效果，使同优先度内速度较低的成员优先行动；再次使用会解除该效果。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 180 }
    - insert:
        tableName: battle_skill_global_field_effect
        columns:
        - column: { name: id, valueNumeric: 1 }
        - column: { name: skill_rule_id, valueNumeric: 18 }
        - column: { name: field_rule_id, valueNumeric: 5 }
        - column: { name: effect_timing, value: AFTER_HIT }
        - column: { name: chance_percent, valueNumeric: 100 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 10 }
    - insert:
        tableName: security_access_node
        columns:
        - column: { name: id, valueNumeric: 846 }
        - column: { name: code, value: battle-rules.skill-global-field-effects }
        - column: { name: name, value: 技能全场效果 }
        - column: { name: type, value: MENU }
        - column: { name: parent_id, valueNumeric: 830 }
        - column: { name: path, value: /battle-rules/skill-global-field-effects }
        - column: { name: component_key, value: battle-rules/skill-global-field-effects }
        - column: { name: icon, value: lucide:rotate-3d }
        - column: { name: sort_order, valueNumeric: 35 }
        - column: { name: visible, valueBoolean: true }
        - column: { name: enabled, valueBoolean: true }
    - insert:
        tableName: security_role_access_node
        columns:
        - column: { name: role_id, valueNumeric: 203 }
        - column: { name: access_node_id, valueNumeric: 846 }
