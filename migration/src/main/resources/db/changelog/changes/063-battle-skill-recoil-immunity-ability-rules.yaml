databaseChangeLog:
- changeSet:
    id: 063-battle-skill-recoil-immunity-ability-rules
    author: backend
    comment: 补齐技能反作用伤害免疫特性规则与公开对照 fixture 数据。
    changes:
    - insert:
        tableName: battle_ability_rule
        columns:
        - column: { name: id, valueNumeric: 37 }
        - column: { name: ability_id, valueNumeric: 69 }
        - column: { name: trigger_timing, value: BEFORE_DAMAGE }
        - column: { name: effect_policy, value: skill-recoil-damage-immunity }
        - column: { name: trigger_order, valueNumeric: 100 }
        - column: { name: description, value: 阻止技能自身造成的反作用伤害，不阻止携带道具反伤。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 370 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 133 }
        - column: { name: code, value: skill-recoil-immunity-blocks-move-recoil-damage }
        - column: { name: name, value: 技能反作用免疫阻止技能自损 }
        - column: { name: category, value: ABILITY }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证拥有技能反作用伤害免疫特性的成员不会承受技能自身反作用伤害。 }
        - column: { name: input_summary, value: 使用者拥有技能反作用伤害免疫特性，并使用按实际伤害 1/3 反作用的物理技能。 }
        - column: { name: expected_summary, value: 目标正常受到直接技能伤害；使用者不会承受技能反作用伤害，也不会产生技能反作用伤害事件。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 1330 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 134 }
        - column: { name: code, value: skill-recoil-immunity-does-not-block-held-item-recoil }
        - column: { name: name, value: 技能反作用免疫不阻止道具反伤 }
        - column: { name: category, value: ABILITY }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证技能反作用伤害免疫特性不会阻止携带道具在造成伤害后产生的固定反伤。 }
        - column: { name: input_summary, value: 使用者拥有技能反作用伤害免疫特性，同时携带造成伤害提升 1.3 倍并反伤最大 HP 1/10 的道具。 }
        - column: { name: expected_summary, value: 目标受到道具倍率提升后的直接技能伤害；使用者仍承受该道具造成的固定反伤。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 1340 }
    - insert:
        tableName: battle_rule_test_run
        columns:
