              - column: { name: creature_id, type: NUMERIC }
              - column: { name: element_id, type: NUMERIC }
              - column: { name: slot_order, type: NUMERIC }
        - loadData:
            tableName: game_creature_stat
            file: db/changelog/data/game-data/game_creature_stat.csv
            encoding: UTF-8
            separator: ","
            quotchar: '"'
            columns:
              - column: { name: id, type: NUMERIC }
              - column: { name: creature_id, type: NUMERIC }
              - column: { name: stat_id, type: NUMERIC }
              - column: { name: base_value, type: NUMERIC }
              - column: { name: effort, type: NUMERIC }
        - loadData:
            tableName: game_creature_ability
            file: db/changelog/data/game-data/game_creature_ability.csv
            encoding: UTF-8
            separator: ","
            quotchar: '"'
            columns:
              - column: { name: id, type: NUMERIC }
              - column: { name: creature_id, type: NUMERIC }
              - column: { name: ability_id, type: NUMERIC }
              - column: { name: slot_order, type: NUMERIC }
              - column: { name: hidden, type: BOOLEAN }
        - sql:
            sql: |
              select setval(pg_get_serial_sequence('game_element', 'id'), coalesce((select max(id) from game_element), 0) + 1, false);
              select setval(pg_get_serial_sequence('game_stat', 'id'), coalesce((select max(id) from game_stat), 0) + 1, false);
              select setval(pg_get_serial_sequence('game_skill_damage_class', 'id'), coalesce((select max(id) from game_skill_damage_class), 0) + 1, false);
              select setval(pg_get_serial_sequence('game_item_category', 'id'), coalesce((select max(id) from game_item_category), 0) + 1, false);
              select setval(pg_get_serial_sequence('game_species_color', 'id'), coalesce((select max(id) from game_species_color), 0) + 1, false);
              select setval(pg_get_serial_sequence('game_species_shape', 'id'), coalesce((select max(id) from game_species_shape), 0) + 1, false);
