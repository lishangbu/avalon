quarkus:
  application:
    name: avalon
  datasource:
    db-kind: postgresql
    username: postgres
    password: postgres
  http:
    root-path: /api
    non-application-root-path: /q
    record-request-start-time: true
    access-log:
      enabled: true
      pattern: '%a "%r" %s %D request.id=%{o,X-Request-ID}'
      exclude-pattern: '^/q/(metrics|health.*|openapi|swagger-ui.*)$'
    auth:
      permission:
        public:
          paths: ${quarkus.http.root-path}/auth/login,${quarkus.http.root-path}/auth/refresh
          policy: permit
        authenticated:
          paths: ${quarkus.http.root-path}/*
          policy: authenticated
  swagger-ui:
    always-include: true
  smallrye-openapi:
    path: /q/openapi
  log:
    console:
      format: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p request.id=%X{request.id} [%c{2.}] (%t) %s%e%n"
  micrometer:
    binder:
      http-server:
        ignore-patterns:
          - /q/metrics
          - /q/health.*
          - /q/openapi
          - /q/swagger-ui.*
  flyway:
    locations: db/migration
    schemas: integration,iam,catalog,player,battle
    default-schema: integration
    migrate-at-start: false
    validate-at-start: false

mp:
  jwt:
    verify:
      issuer: avalon

smallrye:
  jwt:
    sign:
      key:
        location: security/jwt/jwt-secret.jwk
    verify:
      algorithm: HS512
      key:
        location: security/jwt/jwt-secret.jwk
    new-token:
      signature-algorithm: HS512

avalon:
  auth:
    issuer: avalon
    access-token-ttl: PT10M
    refresh-token-ttl: PT720H
    max-admin-sessions: 1
  outbox:
    dispatch-interval: 5s

"%dev":
  quarkus:
    datasource:
      devservices:
        enabled: true
        image-name: postgres:18.3
        db-name: avalon
    flyway:
      migrate-at-start: true
      validate-at-start: false
    redis:
      devservices:
        enabled: true
        image-name: valkey/valkey:9.0.3
        service-name: avalon-redis

"%test":
  quarkus:
    datasource:
      devservices:
        enabled: true
        image-name: postgres:18.3
        db-name: avalon_test
    flyway:
      migrate-at-start: true
      validate-at-start: false
    redis:
      devservices:
        enabled: true
        image-name: valkey/valkey:9.0.3
