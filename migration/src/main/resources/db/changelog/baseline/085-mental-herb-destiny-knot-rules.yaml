databaseChangeLog:
- changeSet:
    id: 174-mental-herb-destiny-knot-rules
    author: codex
    comment: 为心灵香草和红线补充精神类临时状态治愈与着迷反射规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          insert into battle_item_rule (
            id, item_id, trigger_timing, effect_policy, consumable,
            trigger_order, description, enabled, sort_order
          )
          select coalesce((select max(id) from battle_item_rule), 0) + source.row_no,
            item.id, 'AFTER_VOLATILE_STATUS', source.effect_policy, source.consumable,
            100, source.description, true, 1960 + source.row_no
          from (
            values
              (1, 'mental-herb', 'volatile-status-cure-mental-herb', true, '获得回复封锁、挑衅、定身法、无理取闹或着迷后立即解除对应状态并消费道具。'),
              (2, 'destiny-knot', 'infatuation-reflect-to-source', false, '携带者陷入着迷后，让状态来源也对携带者着迷；道具不消费。')
          ) as source(row_no, item_code, effect_policy, consumable, description)
          join game_item item on item.code = source.item_code
          on conflict (item_id, trigger_timing, effect_policy) do update set
            consumable = excluded.consumable,
            trigger_order = excluded.trigger_order,
            description = excluded.description,
            enabled = excluded.enabled,
            sort_order = excluded.sort_order;
