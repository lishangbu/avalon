  - changeSet:
      id: 001-007-create-scheduled-task-management
      author: backend
      changes:
        - createTable:
            tableName: scheduled_task
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_scheduled_task
                    nullable: false
              - column:
                  name: code
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: handler_code
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(120)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(500)
              - column:
                  name: group_name
                  type: varchar(100)
                  defaultValue: default
                  constraints:
                    nullable: false
              - column:
                  name: schedule_type
                  type: varchar(30)
                  constraints:
                    nullable: false
              - column:
                  name: cron_expression
                  type: varchar(120)
              - column:
                  name: interval_seconds
                  type: bigint
              - column:
                  name: run_at
                  type: timestamptz
              - column:
                  name: time_zone
                  type: varchar(80)
                  defaultValue: UTC
                  constraints:
                    nullable: false
              - column:
                  name: payload_json
                  type: text
                  defaultValue: "{}"
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: scheduled_task
            columnNames: code
            constraintName: uk_scheduled_task__code
        - createIndex:
            tableName: scheduled_task
            indexName: idx_scheduled_task__handler_code
            columns:
              - column:
                  name: handler_code
        - createIndex:
            tableName: scheduled_task
            indexName: idx_scheduled_task__enabled
            columns:
              - column:
                  name: enabled
        - sql:
            sql: |
              alter table scheduled_task
              add constraint ck_scheduled_task__schedule_type
              check (schedule_type in ('ONCE', 'FIXED_INTERVAL', 'CRON'));
        - createTable:
            tableName: scheduled_task_execution
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_scheduled_task_execution
                    nullable: false
              - column:
                  name: task_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: task_code
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: handler_code
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: scheduled_fire_time
                  type: timestamptz
              - column:
                  name: actual_fire_time
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: finished_at
                  type: timestamptz
              - column:
                  name: status
                  type: varchar(30)
                  constraints:
                    nullable: false
              - column:
                  name: duration_ms
                  type: bigint
              - column:
                  name: refire_count
                  type: int
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: payload_snapshot_json
                  type: text
                  defaultValue: "{}"
                  constraints:
                    nullable: false
              - column:
                  name: error_message
                  type: varchar(1000)
        - addForeignKeyConstraint:
            baseTableName: scheduled_task_execution
            baseColumnNames: task_id
            referencedTableName: scheduled_task
            referencedColumnNames: id
            constraintName: fk_scheduled_task_execution__task_id
            onDelete: CASCADE
        - createIndex:
            tableName: scheduled_task_execution
            indexName: idx_scheduled_task_execution__task_id_actual_fire_time
            columns:
              - column:
                  name: task_id
              - column:
                  name: actual_fire_time
                  descending: true
        - createIndex:
            tableName: scheduled_task_execution
            indexName: idx_scheduled_task_execution__status
            columns:
              - column:
                  name: status
        - sql:
            sql: |
              alter table scheduled_task_execution
              add constraint ck_scheduled_task_execution__status
              check (status in ('RUNNING', 'SUCCESS', 'FAILED'));

