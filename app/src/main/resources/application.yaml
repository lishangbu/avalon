spring:
  application:
    name: avalon
  datasource:
    url: jdbc:postgresql://localhost:5432/avalon
    username: postgres
    password: postgres
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    scheduler-name: avalon-scheduler
    wait-for-jobs-to-complete-on-shutdown: true
    properties:
      org.quartz.scheduler.instanceId: AUTO
      org.quartz.jobStore.driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
      org.quartz.jobStore.isClustered: true
      org.quartz.jobStore.tablePrefix: QRTZ_
      org.quartz.threadPool.threadCount: 5

jimmer:
  language: kotlin
  dialect: org.babyfish.jimmer.sql.dialect.PostgresDialect

cosid:
  machine:
    enabled: true
    distributor:
      manual:
        machine-id: ${COSID_MACHINE_ID:0}
  snowflake:
    enabled: true
    zone-id: UTC

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        # 生产部署和本地联调只需要健康探活；其它 actuator 端点不在默认 HTTP 面上暴露。
        include: health

backend:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:5174
      - http://127.0.0.1:5174
  security:
    issuer: ${AVALON_SECURITY_ISSUER:http://localhost:8080}
