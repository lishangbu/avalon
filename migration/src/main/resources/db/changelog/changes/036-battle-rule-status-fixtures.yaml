databaseChangeLog:
- changeSet:
    id: 036-battle-rule-status-fixtures
    author: backend
    comment: 新增临时状态、主要异常状态免疫和场地阻止状态公开对照 fixture 数据。
    changes:
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 22 }
        - column: { name: code, value: flinch-prevents-slower-target-before-move }
        - column: { name: name, value: 畏缩阻止尚未行动目标 }
        - column: { name: category, value: VOLATILE_STATUS }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证较快成员附加畏缩后，较慢目标本回合无法行动且不消耗 PP。 }
        - column: { name: input_summary, value: 较快成员先造成伤害并附加畏缩，较慢目标本回合也选择使用普通攻击。 }
        - column: { name: expected_summary, value: 目标本回合无法行动，不消耗 PP；畏缩在阻止行动后立即清除。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 220 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 23 }
        - column: { name: code, value: late-flinch-does-not-carry-to-next-turn }
        - column: { name: name, value: 已行动目标获得畏缩不跨回合 }
        - column: { name: category, value: VOLATILE_STATUS }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证畏缩只影响本回合尚未行动的成员，晚到畏缩会在回合末清理。 }
        - column: { name: input_summary, value: 较快目标已经行动后，较慢成员命中并附加畏缩；下一回合较快目标再次行动。 }
        - column: { name: expected_summary, value: 第一回合晚到的畏缩不会阻止已经行动的目标，也不会保留到下一回合。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 230 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 24 }
        - column: { name: code, value: confusion-self-damage-and-later-clear }
        - column: { name: name, value: 混乱自伤和计数解除 }
        - column: { name: category, value: VOLATILE_STATUS }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证混乱行动前递减计数、可能造成 40 威力物理自伤，并在计数归零时解除。 }
        - column: { name: input_summary, value: 较快成员用变化技能让目标混乱，固定内部计数为 3；目标随后三次尝试行动。 }
        - column: { name: expected_summary, value: 第一次行动前自伤并跳过技能，第二次通过混乱判定并正常攻击，第三次先解除混乱再正常攻击。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 240 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 25 }
        - column: { name: code, value: element-immunities-block-major-statuses }
        - column: { name: name, value: 属性免疫阻止主要异常状态 }
        - column: { name: category, value: STATUS_IMMUNITY }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证火、电、毒、钢、冰等属性对对应主要异常状态的天然免疫。 }
        - column: { name: input_summary, value: 分别尝试给火、电、毒、钢、冰属性目标附加其天然免疫的主要异常状态。 }
        - column: { name: expected_summary, value: 目标不会获得对应状态，事件流以属性免疫作为阻止原因。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 250 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 26 }
