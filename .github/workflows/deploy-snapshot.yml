name: Deploy Snapshot

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: true

jobs:
  deploy-snapshot:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: 设置 Java 环境 - 使用Oracle JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'oracle'
          architecture: x64
      - name: 设置 Gradle 环境
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '9.4.1'
      - name: 提取项目版本
        id: projectVersion
        shell: bash
        run: |
          set -euo pipefail

          version="$(./gradlew -q printVersion)"

          if [[ -z "$version" ]]; then
            echo "无法从 Gradle 构建中解析版本号"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Detected version: $version"

      - name: 使用 Gradle 发布快照到 Maven Central
        if: endsWith(steps.projectVersion.outputs.version, '-SNAPSHOT')
        run: ./gradlew downloadIpData generateRsaKeys -Pforce=true publish -x test
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
