  - changeSet:
      id: 001-006-create-quartz-job-store
      author: backend
      changes:
        - sql:
            splitStatements: true
            sql: |
              create table qrtz_job_details
              (
                sched_name varchar(120) not null,
                job_name varchar(200) not null,
                job_group varchar(200) not null,
                description varchar(250),
                job_class_name varchar(250) not null,
                is_durable boolean not null,
                is_nonconcurrent boolean not null,
                is_update_data boolean not null,
                requests_recovery boolean not null,
                job_data bytea,
                constraint pk_qrtz_job_details primary key (sched_name, job_name, job_group)
              );

              create table qrtz_triggers
              (
                sched_name varchar(120) not null,
                trigger_name varchar(200) not null,
                trigger_group varchar(200) not null,
                job_name varchar(200) not null,
                job_group varchar(200) not null,
                description varchar(250),
                next_fire_time bigint,
                prev_fire_time bigint,
                priority integer,
                trigger_state varchar(16) not null,
                trigger_type varchar(8) not null,
                start_time bigint not null,
                end_time bigint,
                calendar_name varchar(200),
                misfire_instr smallint,
                job_data bytea,
                constraint pk_qrtz_triggers primary key (sched_name, trigger_name, trigger_group),
                constraint fk_qrtz_triggers__job_details foreign key (sched_name, job_name, job_group)
                  references qrtz_job_details (sched_name, job_name, job_group)
              );

              create table qrtz_simple_triggers
              (
                sched_name varchar(120) not null,
                trigger_name varchar(200) not null,
                trigger_group varchar(200) not null,
                repeat_count bigint not null,
                repeat_interval bigint not null,
                times_triggered bigint not null,
                constraint pk_qrtz_simple_triggers primary key (sched_name, trigger_name, trigger_group),
                constraint fk_qrtz_simple_triggers__triggers foreign key (sched_name, trigger_name, trigger_group)
                  references qrtz_triggers (sched_name, trigger_name, trigger_group)
              );

              create table qrtz_cron_triggers
              (
                sched_name varchar(120) not null,
                trigger_name varchar(200) not null,
                trigger_group varchar(200) not null,
                cron_expression varchar(120) not null,
                time_zone_id varchar(80),
                constraint pk_qrtz_cron_triggers primary key (sched_name, trigger_name, trigger_group),
                constraint fk_qrtz_cron_triggers__triggers foreign key (sched_name, trigger_name, trigger_group)
                  references qrtz_triggers (sched_name, trigger_name, trigger_group)
              );

              create table qrtz_simprop_triggers
              (
                sched_name varchar(120) not null,
                trigger_name varchar(200) not null,
                trigger_group varchar(200) not null,
                str_prop_1 varchar(512),
                str_prop_2 varchar(512),
                str_prop_3 varchar(512),
                int_prop_1 integer,
                int_prop_2 integer,
                long_prop_1 bigint,
                long_prop_2 bigint,
                dec_prop_1 numeric(13, 4),
                dec_prop_2 numeric(13, 4),
                bool_prop_1 boolean,
                bool_prop_2 boolean,
                constraint pk_qrtz_simprop_triggers primary key (sched_name, trigger_name, trigger_group),
                constraint fk_qrtz_simprop_triggers__triggers foreign key (sched_name, trigger_name, trigger_group)
                  references qrtz_triggers (sched_name, trigger_name, trigger_group)
              );

              create table qrtz_blob_triggers
              (
                sched_name varchar(120) not null,
                trigger_name varchar(200) not null,
                trigger_group varchar(200) not null,
                blob_data bytea,
                constraint pk_qrtz_blob_triggers primary key (sched_name, trigger_name, trigger_group),
                constraint fk_qrtz_blob_triggers__triggers foreign key (sched_name, trigger_name, trigger_group)
                  references qrtz_triggers (sched_name, trigger_name, trigger_group)
              );

              create table qrtz_calendars
              (
                sched_name varchar(120) not null,
                calendar_name varchar(200) not null,
                calendar bytea not null,
                constraint pk_qrtz_calendars primary key (sched_name, calendar_name)
              );

              create table qrtz_paused_trigger_grps
              (
                sched_name varchar(120) not null,
                trigger_group varchar(200) not null,
                constraint pk_qrtz_paused_trigger_grps primary key (sched_name, trigger_group)
              );

              create table qrtz_fired_triggers
              (
                sched_name varchar(120) not null,
                entry_id varchar(95) not null,
                trigger_name varchar(200) not null,
                trigger_group varchar(200) not null,
                instance_name varchar(200) not null,
                fired_time bigint not null,
                sched_time bigint not null,
                priority integer not null,
                state varchar(16) not null,
                job_name varchar(200),
                job_group varchar(200),
                is_nonconcurrent boolean,
                requests_recovery boolean,
                constraint pk_qrtz_fired_triggers primary key (sched_name, entry_id)
              );

              create table qrtz_scheduler_state
              (
                sched_name varchar(120) not null,
                instance_name varchar(200) not null,
                last_checkin_time bigint not null,
                checkin_interval bigint not null,
                constraint pk_qrtz_scheduler_state primary key (sched_name, instance_name)
              );

              create table qrtz_locks
              (
                sched_name varchar(120) not null,
                lock_name varchar(40) not null,
                constraint pk_qrtz_locks primary key (sched_name, lock_name)
              );

              create index idx_qrtz_j_req_recovery
