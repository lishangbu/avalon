databaseChangeLog:
- changeSet:
    id: 189-skill-shape-damage-ability-rules
    author: codex
    comment: 为连续攻击、低威力技能与反作用力技能的特性补充规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          insert into battle_ability_rule (
            id, ability_id, trigger_timing, effect_policy,
            trigger_order, description, enabled, sort_order
          )
          select coalesce((select max(id) from battle_ability_rule), 0) + source.row_no,
            ability.id, 'BEFORE_DAMAGE', source.effect_policy,
            100, source.description, true, 3400 + source.row_no
          from (
            values
              (1, 'skill-link', 'multi-hit-maximum', '可变连击次数的技能固定命中最大次数。'),
              (2, 'technician', 'base-power-at-most-sixty-damage-one-and-half', '基础威力不超过 60 的伤害技能最终伤害提升至 1.5 倍。'),
              (3, 'reckless', 'recoil-skill-damage-six-fifths', '按实际伤害承受反作用力的技能最终伤害提升至 1.2 倍。')
          ) as source(row_no, ability_code, effect_policy, description)
          join game_ability ability on ability.code = source.ability_code
          on conflict (ability_id, trigger_timing, effect_policy) do update set
            trigger_order = excluded.trigger_order,
            description = excluded.description,
            enabled = excluded.enabled,
            sort_order = excluded.sort_order;
