name: CI

on:
  push:
    branches:
      - main
    paths: &ci_paths
      - "**/*.kt"
      - "**/*.kts"
      - "gradle/**"
      - "buildSrc/**"
      - "apps/**"
      - "modules/**"
      - "**/*.yml"
      - "**/*.yaml"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
    paths: *ci_paths

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: CI / Verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v6

      - name: 授予 Gradle Wrapper 执行权限
        run: chmod +x ./gradlew

      - name: 设置 Java 环境
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: oracle
          architecture: x64

      - name: 设置 Gradle 环境
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "9.4.1"
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: 编译并执行测试
        run: ./gradlew test --build-cache --stacktrace
