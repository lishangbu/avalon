databaseChangeLog:
- changeSet:
    id: 001-initial-version
    author: backend
    changes:
    - createTable:
        tableName: security_user
        columns:
        - column:
            name: id
            type: bigint
            constraints:
              primaryKey: true
              primaryKeyName: pk_security_user
              nullable: false
            remarks: 用户主键。
        - column:
            name: username
            type: varchar(120)
            constraints:
              nullable: false
            remarks: 登录用户名，系统内唯一。
        - column:
            name: password_hash
            type: varchar(255)
            constraints:
              nullable: false
            remarks: 密码哈希，包含密码编码算法前缀。
        - column:
            name: display_name
            type: varchar(120)
            constraints:
              nullable: false
            remarks: 后台展示名称。
        - column:
            name: enabled
            type: boolean
            constraints:
              nullable: false
            remarks: 账号是否启用。
        - column:
            name: account_non_locked
            type: boolean
            constraints:
              nullable: false
            remarks: 账号是否未锁定。
        remarks: 安全用户表，保存可登录后台的账号状态和密码哈希。
    - addUniqueConstraint:
        tableName: security_user
        columnNames: username
        constraintName: uk_security_user__username
    - createTable:
        tableName: security_role
        columns:
        - column:
            name: id
            type: bigint
            constraints:
              primaryKey: true
              primaryKeyName: pk_security_role
              nullable: false
            remarks: 角色主键。
        - column:
            name: code
            type: varchar(120)
            constraints:
              nullable: false
            remarks: 角色稳定编码，用于用户绑定和权限判断。
        - column:
            name: name
            type: varchar(120)
            constraints:
              nullable: false
            remarks: 角色简体中文显示名称。
        remarks: 安全角色表，保存稳定角色编码和展示名称。
    - addUniqueConstraint:
        tableName: security_role
        columnNames: code
        constraintName: uk_security_role__code
    - createTable:
        tableName: security_user_role
        columns:
        - column:
            name: user_id
            type: bigint
            constraints:
              nullable: false
            remarks: 用户 ID，引用 security_user。
        - column:
            name: role_id
            type: bigint
            constraints:
              nullable: false
            remarks: 角色 ID，引用 security_role。
        remarks: 用户角色绑定表，维护用户拥有的角色集合。
    - addPrimaryKey:
        tableName: security_user_role
        columnNames: user_id, role_id
        constraintName: pk_security_user_role
    - addForeignKeyConstraint:
        baseTableName: security_user_role
        baseColumnNames: user_id
        referencedTableName: security_user
        referencedColumnNames: id
        constraintName: fk_security_user_role__user_id
    - addForeignKeyConstraint:
        baseTableName: security_user_role
        baseColumnNames: role_id
        referencedTableName: security_role
        referencedColumnNames: id
        constraintName: fk_security_user_role__role_id
    - createIndex:
        tableName: security_user_role
        indexName: idx_security_user_role__role_id
        columns:
        - column:
            name: role_id
    - createTable:
        tableName: security_access_node
        columns:
        - column:
            name: id
            type: bigint
            constraints:
              primaryKey: true
              primaryKeyName: pk_security_access_node
              nullable: false
            remarks: 访问节点主键。
        - column:
            name: code
            type: varchar(160)
            constraints:
              nullable: false
            remarks: 访问节点稳定编码，是 token authority 和前端权限判断的契约。
        - column:
            name: name
            type: varchar(120)
            constraints:
              nullable: false
            remarks: 访问节点简体中文显示名称。
        - column:
            name: type
            type: varchar(32)
            constraints:
              nullable: false
            remarks: 节点类型，API 表示接口权限，DIRECTORY/ROUTE 表示菜单和路由。
        - column:
            name: parent_id
            type: bigint
            remarks: 父级访问节点 ID，用于菜单树。
        - column:
            name: path
            type: varchar(255)
            remarks: 前端路由路径。
        - column:
            name: icon
            type: varchar(120)
            remarks: 前端图标标识。
        - column:
            name: sort_order
            type: int
            constraints:
              nullable: false
            remarks: 同级排序值，数值越小越靠前。
        - column:
            name: visible
            type: boolean
            constraints:
              nullable: false
            remarks: 节点是否在菜单中可见。
        - column:
            name: enabled
            type: boolean
            constraints:
              nullable: false
            remarks: 节点是否启用。
        - column:
            name: api_method
            type: varchar(16)
            remarks: API 请求方法，星号表示全部方法。
        - column:
            name: api_pattern
            type: varchar(255)
            remarks: API 路径匹配表达式。
        remarks: 访问节点表，同时承载 API 权限、后台菜单和前端路由元数据。
    - addUniqueConstraint:
        tableName: security_access_node
        columnNames: code
        constraintName: uk_security_access_node__code
    - addForeignKeyConstraint:
        baseTableName: security_access_node
        baseColumnNames: parent_id
        referencedTableName: security_access_node
        referencedColumnNames: id
        constraintName: fk_security_access_node__parent_id
    - createIndex:
        tableName: security_access_node
        indexName: idx_security_access_node__parent_id
        columns:
        - column:
            name: parent_id
    - createIndex:
        tableName: security_access_node
        indexName: idx_security_access_node__type
        columns:
        - column:
            name: type
    - createIndex:
        tableName: security_access_node
        indexName: idx_security_access_node__visible_enabled
        columns:
        - column:
            name: visible
        - column:
            name: enabled
    - createTable:
        tableName: security_role_access_node
        columns:
        - column:
            name: role_id
            type: bigint
            constraints:
              nullable: false
            remarks: 角色 ID，引用 security_role。
        - column:
            name: access_node_id
            type: bigint
            constraints:
              nullable: false
            remarks: 访问节点 ID，引用 security_access_node。
        remarks: 角色访问节点绑定表，维护角色拥有的 API 权限和菜单路由。
    - addPrimaryKey:
        tableName: security_role_access_node
        columnNames: role_id, access_node_id
        constraintName: pk_security_role_access_node
    - addForeignKeyConstraint:
        baseTableName: security_role_access_node
        baseColumnNames: role_id
        referencedTableName: security_role
        referencedColumnNames: id
        constraintName: fk_security_role_access_node__role_id
    - addForeignKeyConstraint:
        baseTableName: security_role_access_node
        baseColumnNames: access_node_id
        referencedTableName: security_access_node
        referencedColumnNames: id
        constraintName: fk_security_role_access_node__access_node_id
    - createIndex:
        tableName: security_role_access_node
        indexName: idx_security_role_access_node__access_node_id
        columns:
        - column:
            name: access_node_id
    - loadData:
        tableName: security_role
        file: db/changelog/data/system/security_role.csv
        encoding: UTF-8
        separator: ','
        quotchar: '"'
        columns:
        - column:
            name: id
            type: NUMERIC
        - column:
            name: code
            type: STRING
        - column:
            name: name
            type: STRING
    - loadData:
        tableName: security_user
        file: db/changelog/data/system/security_user.csv
        encoding: UTF-8
        separator: ','
        quotchar: '"'
        columns:
        - column:
            name: id
            type: NUMERIC
        - column:
            name: username
            type: STRING
        - column:
            name: password_hash
            type: STRING
        - column:
            name: display_name
            type: STRING
        - column:
            name: enabled
            type: BOOLEAN
        - column:
            name: account_non_locked
            type: BOOLEAN
    - loadData:
        tableName: security_access_node
        file: db/changelog/data/system/security_access_node.csv
        encoding: UTF-8
        separator: ','
        quotchar: '"'
        columns:
        - column:
            name: id
            type: NUMERIC
        - column:
            name: code
            type: STRING
        - column:
            name: name
            type: STRING
        - column:
            name: type
            type: STRING
        - column:
            name: parent_id
            type: NUMERIC
        - column:
            name: path
            type: STRING
        - column:
            name: icon
            type: STRING
        - column:
            name: sort_order
            type: NUMERIC
        - column:
            name: visible
            type: BOOLEAN
        - column:
            name: enabled
            type: BOOLEAN
        - column:
            name: api_method
            type: STRING
        - column:
            name: api_pattern
            type: STRING
    - loadData:
        tableName: security_user_role
        file: db/changelog/data/system/security_user_role.csv
        encoding: UTF-8
        separator: ','
        quotchar: '"'
        columns:
        - column:
            name: user_id
            type: NUMERIC
        - column:
            name: role_id
            type: NUMERIC
    - loadData:
        tableName: security_role_access_node
        file: db/changelog/data/system/security_role_access_node.csv
        encoding: UTF-8
        separator: ','
        quotchar: '"'
        columns:
        - column:
            name: role_id
            type: NUMERIC
        - column:
            name: access_node_id
            type: NUMERIC
    - createTable:
        tableName: oauth2_authorization
        columns:
        - column:
            name: id
            type: varchar(100)
            constraints:
              primaryKey: true
              primaryKeyName: pk_oauth2_authorization
              nullable: false
            remarks: 授权记录主键，由授权服务器生成。
        - column:
            name: registered_client_id
            type: varchar(100)
            constraints:
              nullable: false
            remarks: 注册客户端 ID。
        - column:
            name: principal_name
            type: varchar(200)
            constraints:
              nullable: false
            remarks: 授权主体名称。
        - column:
            name: authorization_grant_type
            type: varchar(100)
            constraints:
              nullable: false
            remarks: 授权类型。
        - column:
            name: authorized_scopes
            type: varchar(1000)
            remarks: 本次授权允许的 scope 集合。
        - column:
            name: attributes
            type: text
            remarks: 授权上下文扩展属性。
        - column:
            name: state
            type: varchar(500)
            remarks: 授权流程 state 参数。
        - column:
            name: authorization_code_value
            type: text
            remarks: 授权码值。
        - column:
            name: authorization_code_issued_at
            type: timestamptz
            remarks: 授权码签发时间。
        - column:
            name: authorization_code_expires_at
            type: timestamptz
            remarks: 授权码过期时间。
        - column:
            name: authorization_code_metadata
            type: text
            remarks: 授权码元数据。
        - column:
            name: access_token_value
            type: text
            remarks: 访问令牌值。
        - column:
            name: access_token_issued_at
            type: timestamptz
            remarks: 访问令牌签发时间。
        - column:
            name: access_token_expires_at
            type: timestamptz
            remarks: 访问令牌过期时间。
        - column:
            name: access_token_metadata
            type: text
            remarks: 访问令牌元数据和 claims。
        - column:
            name: access_token_type
            type: varchar(100)
            remarks: 访问令牌类型。
        - column:
            name: access_token_scopes
            type: varchar(1000)
            remarks: 访问令牌携带的 scope 集合。
        - column:
            name: oidc_id_token_value
            type: text
            remarks: OIDC ID token 值。
        - column:
            name: oidc_id_token_issued_at
            type: timestamptz
            remarks: OIDC ID token 签发时间。
        - column:
            name: oidc_id_token_expires_at
            type: timestamptz
            remarks: OIDC ID token 过期时间。
        - column:
            name: oidc_id_token_metadata
            type: text
            remarks: OIDC ID token 元数据。
        - column:
            name: refresh_token_value
            type: text
            remarks: 刷新令牌值。
        - column:
            name: refresh_token_issued_at
            type: timestamptz
            remarks: 刷新令牌签发时间。
        - column:
            name: refresh_token_expires_at
            type: timestamptz
            remarks: 刷新令牌过期时间。
        - column:
            name: refresh_token_metadata
            type: text
            remarks: 刷新令牌元数据。
        - column:
            name: user_code_value
            type: text
            remarks: 设备授权 user code 值。
        - column:
            name: user_code_issued_at
            type: timestamptz
            remarks: 设备授权 user code 签发时间。
        - column:
            name: user_code_expires_at
            type: timestamptz
            remarks: 设备授权 user code 过期时间。
        - column:
            name: user_code_metadata
            type: text
            remarks: 设备授权 user code 元数据。
        - column:
            name: device_code_value
            type: text
            remarks: 设备授权 device code 值。
        - column:
            name: device_code_issued_at
            type: timestamptz
            remarks: 设备授权 device code 签发时间。
        - column:
            name: device_code_expires_at
            type: timestamptz
            remarks: 设备授权 device code 过期时间。
        - column:
            name: device_code_metadata
            type: text
            remarks: 设备授权 device code 元数据。
        remarks: OAuth2 授权记录表，保存授权服务器签发 token 及相关元数据。
    - createIndex:
        tableName: oauth2_authorization
        indexName: idx_oauth2_authorization__registered_client_id
        columns:
        - column:
            name: registered_client_id
    - createTable:
        tableName: oauth2_authorization_consent
        columns:
        - column:
            name: registered_client_id
            type: varchar(100)
            constraints:
              nullable: false
            remarks: 注册客户端 ID。
        - column:
            name: principal_name
            type: varchar(200)
            constraints:
              nullable: false
            remarks: 授权主体名称。
        - column:
            name: authorities
            type: varchar(1000)
            constraints:
              nullable: false
            remarks: 已同意授权的 authority 集合。
        remarks: OAuth2 授权同意表，保存主体对客户端授权的 authority 集合。
    - addPrimaryKey:
        tableName: oauth2_authorization_consent
        columnNames: registered_client_id, principal_name
        constraintName: pk_oauth2_authorization_consent
    - createTable:
        tableName: oauth2_client
        columns:
        - column:
            name: id
            type: bigint
            constraints:
              primaryKey: true
              primaryKeyName: pk_oauth2_client
              nullable: false
            remarks: 客户端主键。
        - column:
            name: client_id
            type: varchar(100)
            constraints:
              nullable: false
            remarks: OAuth2 client_id，系统内唯一。
        - column:
            name: client_id_issued_at
            type: timestamptz
            defaultValueComputed: CURRENT_TIMESTAMP
            constraints:
              nullable: false
            remarks: 客户端签发时间。
        - column:
            name: client_secret
            type: varchar(255)
            remarks: 客户端密钥哈希或带编码前缀的密钥。
        - column:
            name: client_secret_expires_at
            type: timestamptz
            remarks: 客户端密钥过期时间。
        - column:
            name: client_name
            type: varchar(200)
            constraints:
              nullable: false
            remarks: 客户端展示名称。
        - column:
            name: client_authentication_methods
            type: varchar(1000)
            constraints:
              nullable: false
            remarks: 客户端认证方式集合。
        - column:
            name: authorization_grant_types
            type: varchar(1000)
            constraints:
              nullable: false
            remarks: 允许的授权类型集合。
        - column:
            name: redirect_uris
            type: varchar(1000)
            remarks: 允许的重定向 URI 集合。
        - column:
            name: post_logout_redirect_uris
            type: varchar(1000)
            remarks: 允许的登出后重定向 URI 集合。
        - column:
            name: scopes
            type: varchar(1000)
            constraints:
              nullable: false
            remarks: 允许请求的 scope 集合。
        - column:
            name: require_proof_key
            type: boolean
            defaultValueBoolean: true
            constraints:
              nullable: false
            remarks: 是否要求 PKCE。
        - column:
            name: require_authorization_consent
            type: boolean
            defaultValueBoolean: false
            constraints:
              nullable: false
            remarks: 是否要求用户授权同意。
        - column:
            name: jwk_set_url
            type: varchar(1000)
            remarks: 客户端 JWK Set 地址。
        - column:
            name: token_endpoint_authentication_signing_algorithm
            type: varchar(120)
            remarks: token endpoint 客户端认证签名算法。
        - column:
            name: x509_certificate_subject_dn
            type: varchar(500)
            remarks: X509 客户端证书主题 DN。
        - column:
            name: authorization_code_ttl_seconds
            type: bigint
            defaultValueNumeric: 300
            constraints:
              nullable: false
            remarks: 授权码有效期，单位秒。
        - column:
            name: access_token_ttl_seconds
            type: bigint
            defaultValueNumeric: 1800
            constraints:
              nullable: false
            remarks: 访问令牌有效期，单位秒。
        - column:
            name: access_token_format
            type: varchar(40)
            defaultValue: self-contained
            constraints:
              nullable: false
            remarks: 访问令牌格式，self-contained 表示 JWT，reference 表示 opaque token。
        - column:
            name: device_code_ttl_seconds
            type: bigint
            defaultValueNumeric: 300
            constraints:
              nullable: false
            remarks: 设备码有效期，单位秒。
        - column:
            name: reuse_refresh_tokens
            type: boolean
            defaultValueBoolean: true
            constraints:
              nullable: false
            remarks: 是否复用刷新令牌。
        - column:
            name: refresh_token_ttl_seconds
            type: bigint
            defaultValueNumeric: 604800
            constraints:
              nullable: false
            remarks: 刷新令牌有效期，单位秒。
        - column:
            name: id_token_signature_algorithm
            type: varchar(40)
            defaultValue: RS256
            constraints:
              nullable: false
            remarks: ID token 签名算法。
        - column:
            name: x509_certificate_bound_access_tokens
            type: boolean
            defaultValueBoolean: false
            constraints:
              nullable: false
            remarks: 访问令牌是否绑定 X509 证书。
        remarks: OAuth2 客户端表，保存授权服务器注册客户端及 token 策略。
    - addUniqueConstraint:
        tableName: oauth2_client
        columnNames: client_id
        constraintName: uk_oauth2_client__client_id
    - createTable:
        tableName: oauth2_jwk
        columns:
        - column:
            name: id
            type: bigint
            constraints:
              primaryKey: true
              primaryKeyName: pk_oauth2_jwk
              nullable: false
            remarks: JWK 主键。
        - column:
            name: key_id
            type: varchar(120)
            constraints:
              nullable: false
            remarks: JWK key id。
        - column:
            name: jwk_json
            type: text
            constraints:
              nullable: false
            remarks: JWK JSON，包含私钥材料，仅服务端使用。
        - column:
            name: active
            type: boolean
            constraints:
              nullable: false
            remarks: 是否为当前活跃签名 key，同一时间只允许一个活跃 key。
        remarks: OAuth2 JWK 表，保存授权服务器签名密钥材料。
    - addUniqueConstraint:
        tableName: oauth2_jwk
        columnNames: key_id
        constraintName: uk_oauth2_jwk__key_id
    - createIndex:
        tableName: oauth2_jwk
        indexName: idx_oauth2_jwk__active
        columns:
        - column:
            name: active
    - sql:
        sql: |
          create unique index uk_oauth2_jwk__active_true
          on oauth2_jwk (active)
          where active = true;
    - loadData:
        tableName: oauth2_client
        file: db/changelog/data/system/oauth2_client.csv
        encoding: UTF-8
        separator: ','
        quotchar: '"'
        columns:
        - column:
            name: id
            type: NUMERIC
        - column:
            name: client_id
            type: STRING
        - column:
            name: client_secret
            type: STRING
        - column:
            name: client_name
            type: STRING
        - column:
            name: client_authentication_methods
            type: STRING
        - column:
            name: authorization_grant_types
            type: STRING
        - column:
            name: scopes
            type: STRING
        - column:
            name: require_proof_key
            type: BOOLEAN
        - column:
            name: require_authorization_consent
            type: BOOLEAN
        - column:
            name: access_token_format
            type: STRING
        - column:
            name: access_token_ttl_seconds
            type: NUMERIC
        - column:
            name: refresh_token_ttl_seconds
            type: NUMERIC
        - column:
            name: reuse_refresh_tokens
            type: BOOLEAN
    - sql:
        splitStatements: true
        sql: |
          create table qrtz_job_details
          (
            sched_name varchar(120) not null,
            job_name varchar(200) not null,
            job_group varchar(200) not null,
            description varchar(250),
            job_class_name varchar(250) not null,
            is_durable boolean not null,
            is_nonconcurrent boolean not null,
            is_update_data boolean not null,
            requests_recovery boolean not null,
            job_data bytea,
            constraint pk_qrtz_job_details primary key (sched_name, job_name, job_group)
          );

          create table qrtz_triggers
          (
            sched_name varchar(120) not null,
            trigger_name varchar(200) not null,
            trigger_group varchar(200) not null,
            job_name varchar(200) not null,
            job_group varchar(200) not null,
            description varchar(250),
            next_fire_time bigint,
            prev_fire_time bigint,
            priority integer,
            trigger_state varchar(16) not null,
            trigger_type varchar(8) not null,
            start_time bigint not null,
            end_time bigint,
            calendar_name varchar(200),
            misfire_instr smallint,
            job_data bytea,
            constraint pk_qrtz_triggers primary key (sched_name, trigger_name, trigger_group),
            constraint fk_qrtz_triggers__job_details foreign key (sched_name, job_name, job_group)
              references qrtz_job_details (sched_name, job_name, job_group)
          );

          create table qrtz_simple_triggers
          (
            sched_name varchar(120) not null,
            trigger_name varchar(200) not null,
            trigger_group varchar(200) not null,
            repeat_count bigint not null,
            repeat_interval bigint not null,
            times_triggered bigint not null,
            constraint pk_qrtz_simple_triggers primary key (sched_name, trigger_name, trigger_group),
            constraint fk_qrtz_simple_triggers__triggers foreign key (sched_name, trigger_name, trigger_group)
              references qrtz_triggers (sched_name, trigger_name, trigger_group)
          );

          create table qrtz_cron_triggers
          (
            sched_name varchar(120) not null,
            trigger_name varchar(200) not null,
            trigger_group varchar(200) not null,
            cron_expression varchar(120) not null,
            time_zone_id varchar(80),
            constraint pk_qrtz_cron_triggers primary key (sched_name, trigger_name, trigger_group),
            constraint fk_qrtz_cron_triggers__triggers foreign key (sched_name, trigger_name, trigger_group)
              references qrtz_triggers (sched_name, trigger_name, trigger_group)
          );

          create table qrtz_simprop_triggers
          (
            sched_name varchar(120) not null,
            trigger_name varchar(200) not null,
            trigger_group varchar(200) not null,
            str_prop_1 varchar(512),
            str_prop_2 varchar(512),
            str_prop_3 varchar(512),
            int_prop_1 integer,
            int_prop_2 integer,
            long_prop_1 bigint,
            long_prop_2 bigint,
            dec_prop_1 numeric(13, 4),
            dec_prop_2 numeric(13, 4),
            bool_prop_1 boolean,
            bool_prop_2 boolean,
            constraint pk_qrtz_simprop_triggers primary key (sched_name, trigger_name, trigger_group),
            constraint fk_qrtz_simprop_triggers__triggers foreign key (sched_name, trigger_name, trigger_group)
              references qrtz_triggers (sched_name, trigger_name, trigger_group)
          );

          create table qrtz_blob_triggers
          (
            sched_name varchar(120) not null,
            trigger_name varchar(200) not null,
            trigger_group varchar(200) not null,
            blob_data bytea,
            constraint pk_qrtz_blob_triggers primary key (sched_name, trigger_name, trigger_group),
            constraint fk_qrtz_blob_triggers__triggers foreign key (sched_name, trigger_name, trigger_group)
              references qrtz_triggers (sched_name, trigger_name, trigger_group)
          );

          create table qrtz_calendars
          (
            sched_name varchar(120) not null,
            calendar_name varchar(200) not null,
            calendar bytea not null,
            constraint pk_qrtz_calendars primary key (sched_name, calendar_name)
          );

          create table qrtz_paused_trigger_grps
          (
            sched_name varchar(120) not null,
            trigger_group varchar(200) not null,
            constraint pk_qrtz_paused_trigger_grps primary key (sched_name, trigger_group)
          );

          create table qrtz_fired_triggers
          (
            sched_name varchar(120) not null,
            entry_id varchar(95) not null,
            trigger_name varchar(200) not null,
            trigger_group varchar(200) not null,
            instance_name varchar(200) not null,
            fired_time bigint not null,
            sched_time bigint not null,
            priority integer not null,
            state varchar(16) not null,
            job_name varchar(200),
            job_group varchar(200),
            is_nonconcurrent boolean,
            requests_recovery boolean,
            constraint pk_qrtz_fired_triggers primary key (sched_name, entry_id)
          );

          create table qrtz_scheduler_state
          (
            sched_name varchar(120) not null,
            instance_name varchar(200) not null,
            last_checkin_time bigint not null,
            checkin_interval bigint not null,
            constraint pk_qrtz_scheduler_state primary key (sched_name, instance_name)
          );

          create table qrtz_locks
          (
            sched_name varchar(120) not null,
            lock_name varchar(40) not null,
            constraint pk_qrtz_locks primary key (sched_name, lock_name)
          );

          create index idx_qrtz_j_req_recovery
            on qrtz_job_details (sched_name, requests_recovery);
          create index idx_qrtz_j_grp
            on qrtz_job_details (sched_name, job_group);

          create index idx_qrtz_t_j
            on qrtz_triggers (sched_name, job_name, job_group);
          create index idx_qrtz_t_jg
            on qrtz_triggers (sched_name, job_group);
          create index idx_qrtz_t_c
            on qrtz_triggers (sched_name, calendar_name);
          create index idx_qrtz_t_g
            on qrtz_triggers (sched_name, trigger_group);
          create index idx_qrtz_t_state
            on qrtz_triggers (sched_name, trigger_state);
          create index idx_qrtz_t_n_state
            on qrtz_triggers (sched_name, trigger_name, trigger_group, trigger_state);
          create index idx_qrtz_t_n_g_state
            on qrtz_triggers (sched_name, trigger_group, trigger_state);
          create index idx_qrtz_t_next_fire_time
            on qrtz_triggers (sched_name, next_fire_time);
          create index idx_qrtz_t_nft_st
            on qrtz_triggers (sched_name, trigger_state, next_fire_time);
          create index idx_qrtz_t_nft_misfire
            on qrtz_triggers (sched_name, misfire_instr, next_fire_time);
          create index idx_qrtz_t_nft_st_misfire
            on qrtz_triggers (sched_name, misfire_instr, next_fire_time, trigger_state);
          create index idx_qrtz_t_nft_st_misfire_grp
            on qrtz_triggers (sched_name, misfire_instr, next_fire_time, trigger_group, trigger_state);

          create index idx_qrtz_ft_trig_inst_name
            on qrtz_fired_triggers (sched_name, instance_name);
          create index idx_qrtz_ft_inst_job_req_rcvry
            on qrtz_fired_triggers (sched_name, instance_name, requests_recovery);
          create index idx_qrtz_ft_j_g
            on qrtz_fired_triggers (sched_name, job_name, job_group);
          create index idx_qrtz_ft_jg
            on qrtz_fired_triggers (sched_name, job_group);
          create index idx_qrtz_ft_t_g
            on qrtz_fired_triggers (sched_name, trigger_name, trigger_group);
          create index idx_qrtz_ft_tg
            on qrtz_fired_triggers (sched_name, trigger_group);
    - createTable:
