databaseChangeLog:
- changeSet:
    id: 063-battle-skill-recoil-immunity-ability-rules
    author: backend
    comment: 补齐技能反作用伤害免疫特性规则。
    changes:
    - insert:
        tableName: battle_ability_rule
        columns:
        - column: { name: id, valueNumeric: 37 }
        - column: { name: ability_id, valueNumeric: 69 }
        - column: { name: trigger_timing, value: BEFORE_DAMAGE }
        - column: { name: effect_policy, value: skill-recoil-damage-immunity }
        - column: { name: trigger_order, valueNumeric: 100 }
        - column: { name: description, value: 阻止技能自身造成的反作用伤害，不阻止携带道具反伤。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 370 }
