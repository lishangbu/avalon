name: Deploy Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "要发布的 tag 名称或 commit SHA"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-release:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - name: 设置 Java 环境
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: oracle
          architecture: x64

      - name: 设置 Gradle 环境
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "9.4.1"
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: true

      - name: 解析并校验 release 上下文
        id: release-context
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          tag="$(git describe --exact-match --tags HEAD 2>/dev/null || true)"
          if [[ -z "$tag" ]]; then
            echo "当前提交没有精确命中的 Git tag，拒绝执行正式发布"
            exit 1
          fi

          version="$(gradle -q printVersion)"
          if [[ -z "$version" ]]; then
            echo "无法从 Gradle 构建中解析版本号"
            exit 1
          fi

          if [[ "$version" == *-SNAPSHOT ]]; then
            echo "正式 release 不能使用 -SNAPSHOT 版本：$version"
            exit 1
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "正式 release 版本必须是稳定语义化版本 x.y.z，当前为：$version"
            exit 1
          fi

          expected_tag="v$version"
          if [[ "$tag" != "$expected_tag" ]]; then
            echo "Git tag 与项目版本不一致，期望 $expected_tag，实际 $tag"
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Detected release: $tag"

      - name: 使用 Gradle 发布正式版到 Maven Central
        run: gradle test nmcpPublishAggregationToCentralPortal --build-cache --stacktrace
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
