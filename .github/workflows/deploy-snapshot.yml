name: Deploy Snapshot

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: true

jobs:
  deploy-snapshot:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: 授予 Gradle Wrapper 执行权限
        run: chmod +x ./gradlew

      - name: 设置 Java 环境
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: oracle
          architecture: x64

      - name: 设置 Gradle 环境
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "9.4.1"
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: true

      - name: 提取项目版本
        id: project-version
        shell: bash
        run: |
          set -euo pipefail
          version="$(./gradlew -q printVersion)"
          if [[ -z "$version" ]]; then
            echo "无法从 Gradle 构建中解析版本号"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Detected version: $version"

      - name: 使用 Gradle 发布快照到 Maven Central
        if: endsWith(steps.project-version.outputs.version, '-SNAPSHOT')
        run: ./gradlew publish -x test --build-cache --stacktrace
        env:
          ORG_GRADLE_PROJECT_centralSnapshotsUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_centralSnapshotsPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
