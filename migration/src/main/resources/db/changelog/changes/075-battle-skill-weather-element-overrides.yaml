        - column: { name: input_summary, value: 水属性使用者在雨天使用基础一般属性但雨天覆盖为水属性的 50 威力技能。 }
        - column: { name: expected_summary, value: 技能按水属性 100 威力结算，获得水属性一致加成和雨天水伤害 1.5 倍，造成 103 点伤害。 }
