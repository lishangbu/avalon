              select setval(pg_get_serial_sequence('game_egg_group', 'id'), coalesce((select max(id) from game_egg_group), 0) + 1, false);
              select setval(pg_get_serial_sequence('game_ability', 'id'), coalesce((select max(id) from game_ability), 0) + 1, false);
              select setval(pg_get_serial_sequence('game_skill', 'id'), coalesce((select max(id) from game_skill), 0) + 1, false);
              select setval(pg_get_serial_sequence('game_item', 'id'), coalesce((select max(id) from game_item), 0) + 1, false);
              select setval(pg_get_serial_sequence('game_species', 'id'), coalesce((select max(id) from game_species), 0) + 1, false);
              select setval(pg_get_serial_sequence('game_creature', 'id'), coalesce((select max(id) from game_creature), 0) + 1, false);
              select setval(pg_get_serial_sequence('game_species_egg_group', 'id'), coalesce((select max(id) from game_species_egg_group), 0) + 1, false);
              select setval(pg_get_serial_sequence('game_creature_element', 'id'), coalesce((select max(id) from game_creature_element), 0) + 1, false);
              select setval(pg_get_serial_sequence('game_creature_stat', 'id'), coalesce((select max(id) from game_creature_stat), 0) + 1, false);
              select setval(pg_get_serial_sequence('game_creature_ability', 'id'), coalesce((select max(id) from game_creature_ability), 0) + 1, false);
