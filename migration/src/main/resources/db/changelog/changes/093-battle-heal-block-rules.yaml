databaseChangeLog:
- changeSet:
    id: 093-battle-heal-block-rules
    author: backend
    comment: 新增回复封锁临时状态、技能规则与公开对照 fixture 数据。
    changes:
    - insert:
        tableName: battle_status_rule
        columns:
        - column: { name: id, valueNumeric: 9 }
        - column: { name: code, value: heal-block }
        - column: { name: name, value: 回复封锁 }
        - column: { name: status_kind, value: VOLATILE }
        - column: { name: effect_policy, value: volatile-heal-block }
        - column: { name: min_turns, valueNumeric: 5 }
        - column: { name: max_turns, valueNumeric: 5 }
        - column: { name: description, value: 临时状态，持续期间阻止成员使用回复类技能，并阻止其通过技能、特性、道具、天气或场地回复 HP。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 90 }
    - insert:
        tableName: battle_skill_rule
        columns:
        - column: { name: id, valueNumeric: 96 }
        - column: { name: skill_id, valueNumeric: 377 }
        - column: { name: effect_policy, value: apply-heal-block }
        - column: { name: target_policy, value: selected-target }
        - column: { name: hit_policy, value: standard-hit }
        - column: { name: damage_policy, value: status-effect }
        - column: { name: min_hits, valueNumeric: 1 }
        - column: { name: max_hits, valueNumeric: 1 }
        - column: { name: critical_hit_stage, valueNumeric: 0 }
        - column: { name: makes_contact, valueBoolean: false }
        - column: { name: affected_by_protect, valueBoolean: true }
        - column: { name: protects_user, valueBoolean: false }
        - column: { name: thaws_user_before_move, valueBoolean: false }
        - column: { name: weakened_by_grassy_terrain, valueBoolean: false }
        - column: { name: sound_based, valueBoolean: false }
        - column: { name: powder_based, valueBoolean: false }
        - column: { name: punch_based, valueBoolean: false }
        - column: { name: slicing_based, valueBoolean: false }
        - column: { name: lock_move_turns_min, valueNumeric: 1 }
        - column: { name: lock_move_turns_max, valueNumeric: 1 }
        - column: { name: confuses_user_after_lock, valueBoolean: false }
        - column: { name: force_target_switch, valueBoolean: false }
        - column: { name: description, value: 命中目标后附加回复封锁临时状态；被替身、保护或临时状态免疫阻止时不写入状态。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 960 }
    - insert:
        tableName: battle_skill_status_effect
        columns:
        - column: { name: id, valueNumeric: 9 }
        - column: { name: skill_rule_id, valueNumeric: 96 }
        - column: { name: status_rule_id, valueNumeric: 9 }
        - column: { name: target_scope, value: TARGET }
        - column: { name: effect_timing, value: AFTER_HIT }
        - column: { name: chance_percent, valueNumeric: 100 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 90 }
    - sql:
        splitStatements: true
        stripComments: true
        sql: |
          insert into battle_rule_fixture
            (id, code, name, category, fixture_type, description, input_summary, expected_summary, enabled, sort_order)
          values
            (195, 'status-skill-applies-heal-block-to-target', '回复封锁技能附加目标临时状态', 'VOLATILE_STATUS', 'STATE_MACHINE', '验证回复封锁类变化技能命中后写入目标临时状态并按回合末递减。', '使用者用回复封锁类变化技能命中目标。', '目标获得回复封锁临时状态；当前回合结束后剩余 4 回合。', true, 1950),
            (196, 'heal-blocked-participant-cannot-use-self-healing-status-skill', '回复封锁阻止自我回复技能', 'VOLATILE_STATUS', 'STATE_MACHINE', '验证处于回复封锁的成员不能使用自我回复类变化技能。', '处于回复封锁且未满 HP 的成员尝试使用自我回复变化技能。', '技能在 PP 消耗前失败，成员 HP 不变，并产生回复封锁阻止事件。', true, 1960),
            (197, 'heal-blocked-participant-cannot-use-draining-damage-skill', '回复封锁阻止吸取回复技能', 'VOLATILE_STATUS', 'STATE_MACHINE', '验证处于回复封锁的成员不能使用吸取回复类伤害技能。', '处于回复封锁且未满 HP 的成员尝试使用吸取回复类伤害技能。', '吸取类技能在 PP 消耗前失败，目标不受伤害，使用者也不会回复 HP。', true, 1970),
            (198, 'heal-block-suppresses-end-turn-held-item-healing', '回复封锁阻止回合末道具回复', 'VOLATILE_STATUS', 'STATE_MACHINE', '验证处于回复封锁的成员不能通过回合末携带道具回复 HP。', '处于回复封锁且未满 HP 的成员携带回合末固定回复道具。', '回合末不会回复 HP，也不会产生通用回复事件；回复封锁持续时间正常递减。', true, 1980),
            (199, 'heal-block-clears-when-end-turn-duration-reaches-zero', '回复封锁持续时间归零解除', 'VOLATILE_STATUS', 'STATE_MACHINE', '验证回复封锁在回合末持续时间递减到 0 时自然解除。', '成员的回复封锁只剩 1 回合，双方本回合没有行动。', '回合末持续时间递减到 0，成员的回复封锁被清除并产生临时状态解除事件。', true, 1990);
          insert into battle_rule_test_run
            (id, run_code, fixture_id, run_status, executor, command, started_at, sort_order)
          values
            (195, 'heal-block-coverage-20260629-1', 195, 'PASSED', 'gradle', './gradlew :battle-engine:test --tests io.github.lishangbu.battleengine.BattleHealBlockTests', '2026-06-29T17:30:00+08:00', 1950),
            (196, 'heal-block-coverage-20260629-2', 196, 'PASSED', 'gradle', './gradlew :battle-engine:test --tests io.github.lishangbu.battleengine.BattleHealBlockTests', '2026-06-29T17:30:00+08:00', 1960),
            (197, 'heal-block-coverage-20260629-3', 197, 'PASSED', 'gradle', './gradlew :battle-engine:test --tests io.github.lishangbu.battleengine.BattleHealBlockTests', '2026-06-29T17:30:00+08:00', 1970),
            (198, 'heal-block-coverage-20260629-4', 198, 'PASSED', 'gradle', './gradlew :battle-engine:test --tests io.github.lishangbu.battleengine.BattleHealBlockTests', '2026-06-29T17:30:00+08:00', 1980),
            (199, 'heal-block-coverage-20260629-5', 199, 'PASSED', 'gradle', './gradlew :battle-engine:test --tests io.github.lishangbu.battleengine.BattleHealBlockTests', '2026-06-29T17:30:00+08:00', 1990);
