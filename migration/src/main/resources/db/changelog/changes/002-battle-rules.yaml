- changeSet:
    id: 098-battle-basic-skill-rules
    author: backend
    comment: 为所有启用技能补齐基础战斗规则，运行时不再需要无规则技能兜底。
    changes:
    - sql:
        splitStatements: false
        stripComments: true
        sql: |
          insert into battle_skill_rule (
            id,
            skill_id,
            effect_policy,
            target_policy,
            hit_policy,
            damage_policy,
            min_hits,
            max_hits,
            critical_hit_stage,
            makes_contact,
            affected_by_protect,
            protects_user,
            thaws_user_before_move,
            weakened_by_grassy_terrain,
            recharges_after_use,
            charges_before_use,
            sound_based,
            powder_based,
            punch_based,
            slicing_based,
            lock_move_turns_min,
            lock_move_turns_max,
            confuses_user_after_lock,
            force_target_switch,
            description,
            enabled,
            sort_order
          )
          select
            100000 + s.id,
            s.id,
            case when dc.code = 'status' then 'status-effect' else 'standard-damage' end,
            'selected-target',
            case when s.accuracy is null then 'always-hit' else 'standard-hit' end,
            case when dc.code = 'status' or s.power is null then 'no-damage' else 'standard-damage' end,
            1,
            1,
            0,
            false,
            true,
            false,
            false,
            false,
            false,
            false,
            false,
            false,
            false,
            false,
            1,
            1,
            false,
            false,
            case when dc.code = 'status'
              then '基础变化技能规则；尚未维护专项效果时，只保留目标、命中、PP 和规则完整性。'
              else '基础伤害技能规则；尚未维护专项效果时，按基础威力和命中进入普通伤害流程。'
            end,
            true,
            2000 + row_number() over (order by s.id)
          from game_skill s
          join game_skill_damage_class dc on dc.id = s.damage_class_id
          where s.enabled = true
            and not exists (
              select 1
              from battle_skill_rule r
              where r.skill_id = s.id
            )
- changeSet:
    id: 099-battle-derived-basic-skill-rule-fields
    author: backend
    comment: 使用技能结构化详情修正自动生成的基础战斗规则字段。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 只同步三范式资料里已经结构化的字段：目标、连续命中和暴击等级。
          -- 技能自然语言效果仍由专项规则维护，避免把翻译文本解析成不可审计的战斗行为。
          update battle_skill_rule r
          set
            target_policy = case t.code
              when 'user' then 'self'
              when 'user-and-allies' then 'user-side-active'
              when 'all-opponents' then 'all-opponents'
              when 'opponents-field' then 'all-opponents'
              when 'all-other-pokemon' then 'all-adjacent-participants'
              when 'random-opponent' then 'random-opponent'
              else r.target_policy
            end,
            min_hits = coalesce(nullif(d.min_hits, 0), r.min_hits),
            max_hits = greatest(
              coalesce(nullif(d.max_hits, 0), r.max_hits),
              coalesce(nullif(d.min_hits, 0), r.min_hits)
            ),
            hit_policy = case
              when greatest(
                coalesce(nullif(d.max_hits, 0), r.max_hits),
                coalesce(nullif(d.min_hits, 0), r.min_hits)
              ) > 1 then 'multi-hit'
              else r.hit_policy
            end,
            critical_hit_stage = case
              when coalesce(d.crit_rate, 0) > 0 then d.crit_rate
              else r.critical_hit_stage
            end,
            affected_by_protect = case
              when t.code = 'user-and-allies' then false
              else r.affected_by_protect
            end,
            sound_based = case
              when s.code = 'howl' then true
              else r.sound_based
            end
          from game_skill_detail d
          join game_skill s on s.id = d.skill_id
          join game_skill_target t on t.id = d.target_id
          where r.skill_id = d.skill_id
            and r.id >= 100000
            and r.enabled = true
- changeSet:
    id: 100-battle-derived-basic-skill-hp-effects
    author: backend
    comment: 使用技能结构化 HP 字段修正自动生成的吸取、反伤和自我回复规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- `drain` 是资料层已经结构化的“按本次伤害吸取/反伤百分比”，可以直接映射成 HP 后效。
          -- `healing` 只自动接入明确以使用者为目标的 1/2 最大 HP 回复；队伍治疗、目标治疗和扣自身 HP 的技能
          -- 需要额外目标与失败条件建模，仍由后续专项规则维护。
          update battle_skill_rule r
          set
            effect_policy = case
              when d.drain = 50 then 'drain-half-damage'
              when d.drain = 75 then 'drain-three-quarter-damage'
              when d.drain = 100 then 'drain-full-damage'
              when d.drain = -25 then 'recoil-quarter-damage'
              when d.drain = -33 then 'recoil-third-damage'
              when d.drain = -50 then 'recoil-half-damage'
              when d.healing = 50 and t.code = 'user' then 'self-heal-half-max-hp'
              else r.effect_policy
            end,
            target_policy = case
              when d.healing = 50 and t.code = 'user' then 'self'
              else r.target_policy
            end,
            damage_policy = case
              when d.healing = 50 and t.code = 'user' then 'no-damage'
              else r.damage_policy
            end
          from game_skill_detail d
          join game_skill_target t on t.id = d.target_id
          where r.skill_id = d.skill_id
            and r.id >= 100000
            and r.enabled = true
            and (
              d.drain in (-50, -33, -25, 50, 75, 100)
              or (d.healing = 50 and t.code = 'user')
            )
- changeSet:
    id: 101-battle-derived-basic-skill-status-effects
    author: backend
    comment: 使用技能结构化异常字段为自动生成规则补充简单状态附加效果。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 只接入资料字段与运行时状态一一对应的简单异常。
          -- poison 在源资料中无法区分普通中毒和剧毒；束缚、挑衅、寄生等还需要持续回合或失败条件，因此继续由专项规则维护。
          insert into battle_skill_status_effect (
            id,
            skill_rule_id,
            status_rule_id,
            target_scope,
            effect_timing,
            chance_percent,
            enabled,
            sort_order
          )
          select
            200000 + s.id,
            r.id,
            sr.id,
            'TARGET',
            'AFTER_HIT',
            case when coalesce(d.ailment_chance, 0) > 0 then d.ailment_chance else 100 end,
            true,
            4000 + row_number() over (order by s.id)
          from game_skill s
          join game_skill_detail d on d.skill_id = s.id
          join game_skill_ailment a on a.id = d.ailment_id
          join battle_skill_rule r on r.skill_id = s.id and r.enabled = true
          join battle_status_rule sr on sr.code = a.code and sr.enabled = true
          where s.enabled = true
            and r.id >= 100000
            and a.code in ('burn', 'paralysis', 'sleep', 'freeze', 'confusion')
            and not exists (
              select 1
              from battle_skill_status_effect e
              where e.skill_rule_id = r.id
                and e.status_rule_id = sr.id
                and e.target_scope = 'TARGET'
                and e.effect_timing = 'AFTER_HIT'
            )
- changeSet:
    id: 104-battle-derived-basic-skill-flinch-effects
    author: backend
    comment: 使用结构化畏缩概率为自动生成规则补充畏缩临时状态。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- flinch_chance 是源资料中已经拆出的百分比字段，运行时将其作为命中后附加到当前目标的临时状态。
          insert into battle_skill_status_effect (
            id,
            skill_rule_id,
            status_rule_id,
            target_scope,
            effect_timing,
            chance_percent,
            enabled,
            sort_order
          )
          select
            220000 + s.id,
            r.id,
            sr.id,
            'TARGET',
            'AFTER_HIT',
            d.flinch_chance,
            true,
            7000 + row_number() over (order by s.id)
          from game_skill s
          join game_skill_detail d on d.skill_id = s.id
          join battle_skill_rule r on r.skill_id = s.id and r.enabled = true
          join battle_status_rule sr on sr.code = 'flinch' and sr.enabled = true
          where s.enabled = true
            and r.id >= 100000
            and coalesce(d.flinch_chance, 0) > 0
            and not exists (
              select 1
              from battle_skill_status_effect e
              where e.skill_rule_id = r.id
                and e.status_rule_id = sr.id
                and e.target_scope = 'TARGET'
                and e.effect_timing = 'AFTER_HIT'
            )
- changeSet:
    id: 102-battle-derived-basic-skill-stat-stage-effects
    author: backend
    comment: 使用技能结构化能力变化字段为自动生成规则补充能力阶级效果。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 只生成当前引擎能准确表达的作用对象：使用者、当前实际目标、全部对手，以及使用者所在侧当前上场成员。
          -- 单个同伴、可选使用者或同伴、全场草属性等条件型加成需要额外目标/筛选模型，不能用 TARGET 硬套。
          insert into battle_skill_stat_stage_effect (
            id,
            skill_rule_id,
            stat_id,
            target_scope,
            stage_delta,
            effect_timing,
            chance_percent,
            enabled,
            sort_order
          )
          select
            300000 + sc.id,
            r.id,
            sc.stat_id,
            case
              when t.code = 'user' then 'USER'
              when t.code = 'all-opponents' then 'ALL_OPPONENTS'
              when t.code = 'user-and-allies' then 'TARGET'
              else 'TARGET'
            end,
            sc.change_value,
            'AFTER_HIT',
            case when coalesce(d.stat_chance, 0) > 0 then d.stat_chance else 100 end,
            true,
            5000 + row_number() over (order by s.id, sc.stat_id)
          from game_skill_stat_change sc
          join game_skill s on s.id = sc.skill_id
          join game_skill_detail d on d.skill_id = s.id
          join game_skill_target t on t.id = d.target_id
          join battle_skill_rule r on r.skill_id = s.id and r.enabled = true
          where s.enabled = true
            and r.id >= 100000
            and t.code in ('user', 'selected-pokemon', 'all-opponents', 'all-other-pokemon', 'random-opponent', 'user-and-allies')
            and not exists (
              select 1
              from battle_skill_stat_stage_effect e
              where e.skill_rule_id = r.id
                and e.stat_id = sc.stat_id
                and e.effect_timing = 'AFTER_HIT'
            )
- changeSet:
    id: 103-battle-derived-basic-skill-poison-effects
    author: backend
    comment: 使用结构化 poison 字段和显式剧毒例外补充中毒状态效果。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 源资料的 ailment=poison 覆盖普通中毒和剧毒；这里用稳定技能 code 保留少量现代规则例外。
          -- 其它 poison 技能按普通中毒处理，避免把所有 poison 批量误判成剧毒。
          insert into battle_skill_status_effect (
            id,
            skill_rule_id,
            status_rule_id,
            target_scope,
            effect_timing,
            chance_percent,
            enabled,
            sort_order
          )
          select
            210000 + s.id,
            r.id,
            sr.id,
            'TARGET',
            'AFTER_HIT',
            case when coalesce(d.ailment_chance, 0) > 0 then d.ailment_chance else 100 end,
            true,
            6000 + row_number() over (order by s.id)
          from game_skill s
          join game_skill_detail d on d.skill_id = s.id
          join game_skill_ailment a on a.id = d.ailment_id
          join battle_skill_rule r on r.skill_id = s.id and r.enabled = true
          join battle_status_rule sr on sr.code = case
            when s.code in ('toxic', 'poison-fang') then 'bad-poison'
            else 'poison'
          end and sr.enabled = true
          where s.enabled = true
            and r.id >= 100000
            and a.code = 'poison'
            and not exists (
              select 1
              from battle_skill_status_effect e
              where e.skill_rule_id = r.id
                and e.status_rule_id = sr.id
                and e.target_scope = 'TARGET'
                and e.effect_timing = 'AFTER_HIT'
            )
- changeSet:
    id: 105-battle-derived-basic-skill-binding-effects
    author: backend
    comment: 使用结构化 trap 字段为自动生成规则补充束缚临时状态。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- trap 是资料层明确标出的束缚类异常；持续回合、结束结算和禁止替换由 binding 状态规则与运行时负责。
          -- 这里只把自动生成的普通攻击规则补上“命中后附加束缚”的最小效果，避免重复维护每个同类技能。
          insert into battle_skill_status_effect (
            id,
            skill_rule_id,
            status_rule_id,
            target_scope,
            effect_timing,
            chance_percent,
            enabled,
            sort_order
          )
          select
            230000 + s.id,
            r.id,
            sr.id,
            'TARGET',
            'AFTER_HIT',
            case when coalesce(d.ailment_chance, 0) > 0 then d.ailment_chance else 100 end,
            true,
            8000 + row_number() over (order by s.id)
          from game_skill s
          join game_skill_detail d on d.skill_id = s.id
          join game_skill_ailment a on a.id = d.ailment_id
          join battle_skill_rule r on r.skill_id = s.id and r.enabled = true
          join battle_status_rule sr on sr.code = 'binding' and sr.enabled = true
          where s.enabled = true
            and r.id >= 100000
            and a.code = 'trap'
            and not exists (
              select 1
              from battle_skill_status_effect e
              where e.skill_rule_id = r.id
                and e.status_rule_id = sr.id
                and e.target_scope = 'TARGET'
                and e.effect_timing = 'AFTER_HIT'
            )
- changeSet:
    id: 106-battle-derived-basic-skill-rampage-locks
    author: backend
    comment: 为暴走类自动生成技能规则补充锁招回合和结束混乱。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 大闹一番、花瓣舞、逆鳞共用现代主系列的暴走锁招规则：首次使用计入总回合，持续 2-3 回合，结束后混乱。
          -- 滚动和冰球虽然也会锁招，但还需要威力递增模型；在该模型接入前不把它们混入这一批，避免产生半截规则。
          update battle_skill_rule r
          set
            lock_move_turns_min = 2,
            lock_move_turns_max = 3,
            confuses_user_after_lock = true
          from game_skill s
          where r.skill_id = s.id
            and r.id >= 100000
            and r.enabled = true
            and s.enabled = true
            and s.code in ('thrash', 'petal-dance', 'outrage')
- changeSet:
    id: 107-battle-derived-basic-skill-one-hit-knockout
    author: backend
    comment: 使用结构化技能分类为自动生成规则补充一击必杀直接伤害。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 一击必杀类技能不进入普通伤害公式：目标等级高于使用者时失败，命中率使用专用等级差公式，
          -- 命中后造成目标当前 HP 等量直接伤害。现代规则中存在一个同属性敏感例外：非同属性使用者基础命中率
          -- 降为 20%，同属性目标天然无效；这里用独立 policy 表达该例外，避免纯引擎硬编码具体技能 ID。
          update battle_skill_rule r
          set
            effect_policy = case
              when s.code = 'sheer-cold' then 'same-element-sensitive-one-hit-knockout-damage'
              else 'one-hit-knockout-damage'
            end,
            damage_policy = 'one-hit-knockout-damage',
            description = case
              when s.code = 'sheer-cold' then '一击必杀直接伤害；命中率使用等级差公式，非同属性使用者基础命中率为 20%，同属性目标无效。'
              else '一击必杀直接伤害；命中率使用等级差公式，目标等级高于使用者时失败。'
            end
          from game_skill s
          join game_skill_detail d on d.skill_id = s.id
          join game_skill_category c on c.id = d.category_id
          where r.skill_id = s.id
            and r.id >= 100000
            and r.enabled = true
            and s.enabled = true
            and c.code = 'ohko'
- changeSet:
    id: 108-battle-derived-basic-skill-target-healing
    author: backend
    comment: 使用结构化治疗字段为自动生成规则补充目标最大 HP 回复效果。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- healing=50 且 category=heal、target=selected-pokemon 表示“回复实际目标最大 HP 的一半”。
          -- 这里刻意不按 healing 字段全量推导：净化等 unique 技能会先治愈目标异常、再回复使用者 HP，目标和失败
          -- 条件都不同，不能混进普通目标治疗。花疗在青草场地回复 2/3，因此使用独立 policy 表达场地变量比例。
          update battle_skill_rule r
          set
            effect_policy = case
              when s.code = 'floral-healing' then 'terrain-target-heal-max-hp'
              else 'target-heal-half-max-hp'
            end,
            target_policy = 'selected-target',
            damage_policy = 'no-damage',
            description = case
              when s.code = 'floral-healing' then '目标治疗技能；默认回复目标最大 HP 的一半，青草场地回复三分之二。'
              else '目标治疗技能；回复目标最大 HP 的一半。'
            end
          from game_skill s
          join game_skill_detail d on d.skill_id = s.id
          join game_skill_category c on c.id = d.category_id
          join game_skill_target t on t.id = d.target_id
          where r.skill_id = s.id
            and r.id >= 100000
            and r.enabled = true
            and s.enabled = true
            and c.code = 'heal'
            and t.code = 'selected-pokemon'
            and d.healing = 50
- changeSet:
    id: 109-battle-derived-basic-skill-sandstorm-healing
    author: backend
    comment: 为沙暴增强自我回复技能补充天气变量回复规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 集沙在普通天气下回复使用者最大 HP 的一半，沙暴下回复三分之二。它已经先被基础 healing=50
          -- 规则推导为普通自我回复；这里只覆盖 effect_policy，保留目标和无伤害策略。
          update battle_skill_rule r
          set
            effect_policy = 'sandstorm-self-heal-max-hp',
            target_policy = 'self',
            damage_policy = 'no-damage',
            description = '天气变量自我回复技能；默认回复最大 HP 的一半，沙暴下回复三分之二。'
          from game_skill s
          where r.skill_id = s.id
            and r.id >= 100000
            and r.enabled = true
            and s.enabled = true
            and s.code = 'shore-up'
- changeSet:
    id: 110-battle-derived-basic-skill-strength-sap
    author: backend
    comment: 为吸取力量补充按目标当前攻击回复并降低目标攻击的特殊规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 吸取力量的回复量读取目标本次降攻前的当前攻击实数；目标攻击阶级已经 -6 时技能失败。
          -- game_skill_stat_change 已经在通用能力阶级派生中插入“目标攻击 -1”，这里只覆盖主规则 policy，
          -- 避免同一条降攻效果被重复维护。
          update battle_skill_rule r
          set
            effect_policy = 'self-heal-by-target-current-attack',
            target_policy = 'selected-target',
            damage_policy = 'no-damage',
            description = '按目标当前攻击实数回复使用者；随后降低目标攻击 1 级，目标攻击阶级已为 -6 时失败。'
          from game_skill s
          where r.skill_id = s.id
            and r.id >= 100000
            and r.enabled = true
            and s.enabled = true
            and s.code = 'strength-sap'
- changeSet:
    id: 111-battle-derived-basic-skill-purify
    author: backend
    comment: 为净化补充治愈目标主要异常后回复使用者的特殊规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 净化不是普通 healing=50 技能：它要求目标已有主要异常，成功后先清除目标主要异常，
          -- 再回复使用者最大 HP 的一半。目标没有主要异常时整招失败，因此必须使用独立 policy。
          update battle_skill_rule r
          set
            effect_policy = 'target-major-status-cure-self-heal-half-max-hp',
            target_policy = 'selected-target',
            damage_policy = 'no-damage',
            description = '目标有主要异常时，先治愈目标主要异常，再回复使用者最大 HP 的一半；目标无主要异常时失败。'
          from game_skill s
          where r.skill_id = s.id
            and r.id >= 100000
            and r.enabled = true
            and s.enabled = true
            and s.code = 'purify'
- changeSet:
    id: 112-battle-derived-basic-skill-conditional-power
    author: backend
    comment: 为基础条件威力技能补充公式前威力倍率规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 这批技能只改变进入普通伤害公式前的有效威力，不改变命中、属性、目标范围或命中后状态。
          -- 硬撑额外要求灼伤时不再应用物理攻击减半，引擎通过同一 policy 的显式字段处理该例外。
          update battle_skill_rule r
          set
            effect_policy = case s.code
              when 'facade' then 'power-double-if-user-burn-poison-paralysis'
              when 'brine' then 'power-double-if-target-half-hp-or-less'
              when 'venoshock' then 'power-double-if-target-poisoned'
              when 'hex' then 'power-double-if-target-major-status'
              when 'acrobatics' then 'power-double-if-user-has-no-held-item'
              else r.effect_policy
            end,
            damage_policy = 'standard-damage',
            description = case s.code
              when 'facade' then '使用者处于灼伤、麻痹、中毒或剧毒时，技能威力翻倍；灼伤时不再降低物理攻击值。'
              when 'brine' then '目标当前 HP 不高于最大 HP 的一半时，技能威力翻倍。'
              when 'venoshock' then '目标处于中毒或剧毒时，技能威力翻倍。'
              when 'hex' then '目标处于任意主要异常状态时，技能威力翻倍。'
              when 'acrobatics' then '使用者当前没有有效携带道具时，技能威力翻倍。'
              else r.description
            end
          from game_skill s
          where r.skill_id = s.id
            and r.id >= 100000
            and r.enabled = true
            and s.enabled = true
            and s.code in ('facade', 'brine', 'venoshock', 'hex', 'acrobatics')
- changeSet:
    id: 113-battle-derived-basic-skill-post-damage-status-cure
    author: backend
    comment: 为伤害后治愈目标主要异常的技能补充规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 清醒和唤醒巴掌在目标处于对应异常时先以双倍威力计算伤害，随后治愈目标异常；
          -- 泡影的咏叹调只在目标因该技能实际受伤后治愈灼伤，不改变威力。
          update battle_skill_rule r
          set
            effect_policy = case s.code
              when 'smelling-salts' then 'power-double-if-target-paralysis-cure-target-paralysis-after-damage'
              when 'wake-up-slap' then 'power-double-if-target-sleep-cure-target-sleep-after-damage'
              when 'sparkling-aria' then 'cure-target-burn-after-damage'
              else r.effect_policy
            end,
            damage_policy = 'standard-damage',
            description = case s.code
              when 'smelling-salts' then '目标处于麻痹时技能威力翻倍；若造成实际伤害，随后治愈目标麻痹。'
              when 'wake-up-slap' then '目标处于睡眠时技能威力翻倍；若造成实际伤害，随后唤醒目标。'
              when 'sparkling-aria' then '若目标因该技能受到实际伤害且处于灼伤，随后治愈目标灼伤。'
              else r.description
            end
          from game_skill s
          where r.skill_id = s.id
            and r.id >= 100000
            and r.enabled = true
            and s.enabled = true
            and s.code in ('smelling-salts', 'wake-up-slap', 'sparkling-aria')
- changeSet:
    id: 114-battle-derived-basic-skill-dynamic-power
    author: backend
    comment: 为按能力阶级动态计算威力的技能补充规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 辅助力量和嚣张按使用者所有正向能力阶级总和增加威力；
          -- 惩罚按目标所有正向能力阶级总和增加威力，并按现代公开规则保留 200 威力上限。
          update battle_skill_rule r
          set
            effect_policy = case s.code
              when 'stored-power' then 'power-by-user-positive-stat-stage-sum'
              when 'power-trip' then 'power-by-user-positive-stat-stage-sum'
              when 'punishment' then 'power-by-target-positive-stat-stage-sum-max-200'
              else r.effect_policy
            end,
            damage_policy = 'standard-damage',
            description = case s.code
              when 'stored-power' then '技能基础威力为 20，每累计 1 级使用者正向能力阶级，威力增加 20。'
              when 'power-trip' then '技能基础威力为 20，每累计 1 级使用者正向能力阶级，威力增加 20。'
              when 'punishment' then '技能基础威力为 60，每累计 1 级目标正向能力阶级，威力增加 20，最高 200。'
              else r.description
            end
          from game_skill s
          where r.skill_id = s.id
            and r.id >= 100000
            and r.enabled = true
            and s.enabled = true
            and s.code in ('stored-power', 'power-trip', 'punishment')
- changeSet:
    id: 115-battle-derived-basic-skill-user-element-removal
    author: backend
    comment: 为成功造成伤害后移除使用者自身属性的技能补充规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 燃尽和电光双击要求使用者当前拥有技能基础属性；成功造成伤害后移除使用者对应属性。
          update battle_skill_rule r
          set
            effect_policy = 'remove-user-element-after-damage',
            damage_policy = 'standard-damage',
            description = case s.code
              when 'burn-up' then '使用者没有火属性时失败；成功造成伤害后，使用者失去火属性。'
              when 'double-shock' then '使用者没有电属性时失败；成功造成伤害后，使用者失去电属性。'
              else r.description
            end
          from game_skill s
          where r.skill_id = s.id
            and r.id >= 100000
            and r.enabled = true
            and s.enabled = true
            and s.code in ('burn-up', 'double-shock')
- changeSet:
    id: 116-battle-derived-basic-skill-speed-ratio-power
    author: backend
    comment: 为按双方有效速度差动态计算威力的技能补充规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 电球按使用者有效速度相对目标有效速度的比例选择威力；
          -- 陀螺球按目标有效速度相对使用者有效速度计算威力，并保留 150 威力上限。
          update battle_skill_rule r
          set
            effect_policy = case s.code
              when 'electro-ball' then 'power-by-user-target-speed-ratio'
              when 'gyro-ball' then 'power-by-target-user-speed-ratio-max-150'
              else r.effect_policy
            end,
            damage_policy = 'standard-damage',
            description = case s.code
              when 'electro-ball' then '按使用者有效速度与目标有效速度的比例决定威力：4 倍及以上为 150，3 倍及以上为 120，2 倍及以上为 80，1 倍及以上为 60，否则为 40。'
              when 'gyro-ball' then '威力为 floor(25 * 目标有效速度 / 使用者有效速度) + 1，最高 150。'
              else r.description
            end
          from game_skill s
          where r.skill_id = s.id
            and r.id >= 100000
            and r.enabled = true
            and s.enabled = true
            and s.code in ('electro-ball', 'gyro-ball')
- changeSet:
    id: 117-battle-derived-basic-skill-weight-power
    author: backend
    comment: 为按体重或体重差动态计算威力的技能补充规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 踢倒和打草结按目标体重选择威力；重磅冲撞和高温重压按使用者相对目标的体重比例选择威力。
          update battle_skill_rule r
          set
            effect_policy = case s.code
              when 'low-kick' then 'power-by-target-weight-threshold'
              when 'grass-knot' then 'power-by-target-weight-threshold'
              when 'heavy-slam' then 'power-by-user-target-weight-ratio'
              when 'heat-crash' then 'power-by-user-target-weight-ratio'
              else r.effect_policy
            end,
            damage_policy = 'standard-damage',
            description = case s.code
              when 'low-kick' then '按目标当前体重决定威力：10kg 及以下为 20，25kg 及以下为 40，50kg 及以下为 60，100kg 及以下为 80，200kg 及以下为 100，否则为 120。'
              when 'grass-knot' then '按目标当前体重决定威力：10kg 及以下为 20，25kg 及以下为 40，50kg 及以下为 60，100kg 及以下为 80，200kg 及以下为 100，否则为 120。'
              when 'heavy-slam' then '按使用者当前体重相对目标当前体重决定威力：5 倍及以上为 120，4 倍及以上为 100，3 倍及以上为 80，2 倍及以上为 60，否则为 40。'
              when 'heat-crash' then '按使用者当前体重相对目标当前体重决定威力：5 倍及以上为 120，4 倍及以上为 100，3 倍及以上为 80，2 倍及以上为 60，否则为 40。'
              else r.description
            end
          from game_skill s
          where r.skill_id = s.id
            and r.id >= 100000
            and r.enabled = true
            and s.enabled = true
            and s.code in ('low-kick', 'grass-knot', 'heavy-slam', 'heat-crash')
- changeSet:
    id: 118-battle-weight-multiplier-rules
    author: backend
    comment: 新增体重动态威力会读取的特性和携带道具体重倍率规则。
    changes:
    - insert:
        tableName: battle_ability_rule
        columns:
        - column: { name: id, valueNumeric: 67 }
        - column: { name: ability_id, valueNumeric: 134 }
        - column: { name: trigger_timing, value: BEFORE_DAMAGE }
        - column: { name: effect_policy, value: weight-double }
        - column: { name: trigger_order, valueNumeric: 80 }
        - column: { name: description, value: 体重相关动态威力读取当前体重时，拥有者体重按 2 倍计算。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 670 }
    - insert:
        tableName: battle_ability_rule
        columns:
        - column: { name: id, valueNumeric: 68 }
        - column: { name: ability_id, valueNumeric: 135 }
        - column: { name: trigger_timing, value: BEFORE_DAMAGE }
        - column: { name: effect_policy, value: weight-half }
        - column: { name: trigger_order, valueNumeric: 80 }
        - column: { name: description, value: 体重相关动态威力读取当前体重时，拥有者体重按 1/2 计算，并保留半个资料刻度的边界精度。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 680 }
    - insert:
        tableName: battle_item_rule
        columns:
        - column: { name: id, valueNumeric: 61 }
        - column: { name: item_id, valueNumeric: 582 }
        - column: { name: trigger_timing, value: BEFORE_DAMAGE }
        - column: { name: effect_policy, value: weight-half }
        - column: { name: consumable, valueBoolean: false }
        - column: { name: trigger_order, valueNumeric: 80 }
        - column: { name: description, value: 体重相关动态威力读取当前体重时，携带者体重按 1/2 计算；该道具不会因参与体重计算而消耗。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 610 }
- changeSet:
    id: 119-battle-derived-basic-skill-weight-reduction
    author: backend
    comment: 为速度成功提升后降低自身当前体重的技能补充规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 身体轻量化的现代规则是在速度阶级成功变化后，将自身当前体重减少 100kg，最低保留 0.1kg。
          update battle_skill_rule r
          set
            effect_policy = 'self-weight-reduction-100kg-after-speed-change',
            target_policy = 'self',
            damage_policy = 'no-damage',
            description = '速度阶级成功提升后，自身当前体重减少 100kg；最低有效体重保留 0.1kg，离场后清除该临时减重。'
          from game_skill s
          where r.skill_id = s.id
            and r.id >= 100000
            and r.enabled = true
            and s.enabled = true
            and s.code = 'autotomize'
- changeSet:
    id: 120-battle-derived-basic-skill-terrain-power
    author: backend
    comment: 为目标受场地影响时改变威力的技能补充规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 电力上升的现代规则读取目标是否处于电气场地：目标接地且当前为电气场地时，技能基础威力翻倍。
          -- 该翻倍发生在威力阶段；使用者若也接地，后续仍会继续获得电气场地对电属性技能的普通伤害加成。
          update battle_skill_rule r
          set
            effect_policy = 'power-double-if-target-grounded-electric-terrain',
            damage_policy = 'standard-damage',
            description = '目标接地且当前为电气场地时，技能威力翻倍；使用者接地时仍继续叠加电气场地电属性伤害加成。'
          from game_skill s
          where r.skill_id = s.id
            and r.id >= 100000
            and r.enabled = true
            and s.enabled = true
            and s.code = 'rising-voltage'
- changeSet:
    id: 121-battle-derived-basic-skill-terrain-priority
    author: backend
    comment: 为接地且处于指定场地时提升先制度的技能补充规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 青草滑梯在青草场地中要求“使用者接地”才获得 +1 优先度；非接地使用者仍按基础优先度行动。
          update battle_skill_rule r
          set
            effect_policy = 'priority-plus-one-if-user-grounded-grassy-terrain',
            damage_policy = 'standard-damage',
            description = '使用者接地且当前为青草场地时，技能行动优先度 +1；非接地使用者保持基础优先度。'
          from game_skill s
          where r.skill_id = s.id
            and r.id >= 100000
            and r.enabled = true
            and s.enabled = true
            and s.code = 'grassy-glide'
- changeSet:
    id: 122-battle-derived-basic-skill-electric-terrain-power
    author: backend
    comment: 为电气场地存在时提升威力的技能补充规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 精神剑只要求当前为电气场地即可获得 1.5 倍威力；公开规则明确不要求使用者接地。
          update battle_skill_rule r
          set
            effect_policy = 'power-one-and-half-if-electric-terrain',
            damage_policy = 'standard-damage',
            description = '当前为电气场地时，技能威力按 1.5 倍计算；该威力加成不要求使用者接地。'
          from game_skill s
          where r.skill_id = s.id
            and r.id >= 100000
            and r.enabled = true
            and s.enabled = true
            and s.code = 'psyblade'
- changeSet:
    id: 123-battle-skill-terrain-modifiers
    author: backend
    comment: 新增技能场地威力倍率和场地属性覆盖资料表，并接入场地脉冲规则数据。
    changes:
    - createTable:
        tableName: battle_skill_terrain_power_modifier
        remarks: 战斗技能场地威力倍率表，保存技能在指定场地下、使用者接地时参与普通伤害公式前的威力倍率。
        columns:
        - column:
            name: id
            type: bigint
            remarks: 技能场地威力倍率主键。
            constraints:
              primaryKey: true
              primaryKeyName: pk_battle_skill_terrain_power_modifier
              nullable: false
        - column:
            name: skill_rule_id
            type: bigint
            remarks: 技能规则 ID，引用 battle_skill_rule。
            constraints:
              nullable: false
        - column:
            name: terrain_rule_id
            type: bigint
            remarks: 场地规则 ID，引用 battle_terrain_rule，表示倍率触发所需的当前场地。
            constraints:
              nullable: false
        - column:
            name: power_multiplier
            type: double precision
            remarks: 威力倍率，必须大于 0，例如 2 表示接地使用者在该场地下技能威力翻倍。
            constraints:
              nullable: false
        - column:
            name: enabled
            type: boolean
            defaultValueBoolean: true
            remarks: 是否启用该场地威力倍率规则。
            constraints:
              nullable: false
        - column:
            name: sort_order
            type: int
            remarks: 场地威力倍率规则展示排序。
            constraints:
              nullable: false
    - addUniqueConstraint:
        tableName: battle_skill_terrain_power_modifier
        columnNames: skill_rule_id, terrain_rule_id
        constraintName: uk_battle_skill_terrain_power_modifier__skill_terrain
    - addForeignKeyConstraint:
        baseTableName: battle_skill_terrain_power_modifier
        baseColumnNames: skill_rule_id
        referencedTableName: battle_skill_rule
        referencedColumnNames: id
        constraintName: fk_battle_skill_terrain_power_modifier__skill_rule_id
        onDelete: CASCADE
    - addForeignKeyConstraint:
        baseTableName: battle_skill_terrain_power_modifier
        baseColumnNames: terrain_rule_id
        referencedTableName: battle_terrain_rule
        referencedColumnNames: id
        constraintName: fk_battle_skill_terrain_power_modifier__terrain_rule_id
    - createIndex:
        tableName: battle_skill_terrain_power_modifier
        indexName: idx_battle_skill_terrain_power_modifier__terrain_rule_id
        columns:
        - column:
            name: terrain_rule_id
    - createTable:
        tableName: battle_skill_terrain_element_override
        remarks: 战斗技能场地属性覆盖表，保存技能在指定场地下改用的结算属性。
        columns:
        - column:
            name: id
            type: bigint
            remarks: 技能场地属性覆盖主键。
            constraints:
              primaryKey: true
              primaryKeyName: pk_battle_skill_terrain_element_override
              nullable: false
        - column:
            name: skill_rule_id
            type: bigint
            remarks: 技能规则 ID，引用 battle_skill_rule。
            constraints:
              nullable: false
        - column:
            name: terrain_rule_id
            type: bigint
            remarks: 场地规则 ID，引用 battle_terrain_rule，表示属性覆盖触发所需的当前场地。
            constraints:
              nullable: false
        - column:
            name: target_element_id
            type: bigint
            remarks: 目标属性 ID，引用 game_element，表示该场地下技能本次结算使用的属性。
            constraints:
              nullable: false
        - column:
            name: enabled
            type: boolean
            defaultValueBoolean: true
            remarks: 是否启用该场地属性覆盖规则。
            constraints:
              nullable: false
        - column:
            name: sort_order
            type: int
            remarks: 场地属性覆盖规则展示排序。
            constraints:
              nullable: false
    - addUniqueConstraint:
        tableName: battle_skill_terrain_element_override
        columnNames: skill_rule_id, terrain_rule_id
        constraintName: uk_battle_skill_terrain_element_override__skill_terrain
    - addForeignKeyConstraint:
        baseTableName: battle_skill_terrain_element_override
        baseColumnNames: skill_rule_id
        referencedTableName: battle_skill_rule
        referencedColumnNames: id
        constraintName: fk_battle_skill_terrain_element_override__skill_rule_id
        onDelete: CASCADE
    - addForeignKeyConstraint:
        baseTableName: battle_skill_terrain_element_override
        baseColumnNames: terrain_rule_id
        referencedTableName: battle_terrain_rule
        referencedColumnNames: id
        constraintName: fk_battle_skill_terrain_element_override__terrain_rule_id
    - addForeignKeyConstraint:
        baseTableName: battle_skill_terrain_element_override
        baseColumnNames: target_element_id
        referencedTableName: game_element
        referencedColumnNames: id
        constraintName: fk_battle_skill_terrain_element_override__target_element_id
    - createIndex:
        tableName: battle_skill_terrain_element_override
        indexName: idx_battle_skill_terrain_element_override__terrain_rule_id
        columns:
        - column:
            name: terrain_rule_id
    - createIndex:
        tableName: battle_skill_terrain_element_override
        indexName: idx_battle_skill_terrain_element_override__target_element_id
        columns:
        - column:
            name: target_element_id
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 场地脉冲的属性会随当前场地变化；威力翻倍则额外要求使用者接地。
          -- 两类事实分别落在场地属性覆盖表和场地威力倍率表，避免把属性与威力塞进同一策略字段。
          update battle_skill_rule r
          set
            damage_policy = 'standard-damage',
            description = '当前存在现代场地时，技能结算属性改为场地对应属性；使用者接地时，技能威力翻倍，并继续叠加场地对应属性伤害加成。'
          from game_skill s
          where r.skill_id = s.id
            and r.id >= 100000
            and r.enabled = true
            and s.enabled = true
            and s.code = 'terrain-pulse'
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 场地脉冲在使用者接地且当前存在现代场地时，威力在公式威力阶段翻倍。
          insert into battle_skill_terrain_power_modifier (
            id,
            skill_rule_id,
            terrain_rule_id,
            power_multiplier,
            enabled,
            sort_order
          )
          select
            v.id,
            r.id,
            t.id,
            2.0,
            true,
            v.sort_order
          from (
            values
              (1, 'electric-terrain', 10),
              (2, 'grassy-terrain', 20),
              (3, 'misty-terrain', 30),
              (4, 'psychic-terrain', 40)
          ) as v(id, terrain_code, sort_order)
          join battle_terrain_rule t on t.code = v.terrain_code and t.enabled = true
          join game_skill s on s.code = 'terrain-pulse' and s.enabled = true
          join battle_skill_rule r on r.skill_id = s.id and r.enabled = true and r.id >= 100000
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 场地脉冲的结算属性按当前场地覆盖；该覆盖不要求使用者接地。
          insert into battle_skill_terrain_element_override (
            id,
            skill_rule_id,
            terrain_rule_id,
            target_element_id,
            enabled,
            sort_order
          )
          select
            v.id,
            r.id,
            t.id,
            e.id,
            true,
            v.sort_order
          from (
            values
              (1, 'electric-terrain', 'electric', 10),
              (2, 'grassy-terrain', 'grass', 20),
              (3, 'misty-terrain', 'fairy', 30),
              (4, 'psychic-terrain', 'psychic', 40)
          ) as v(id, terrain_code, element_code, sort_order)
          join battle_terrain_rule t on t.code = v.terrain_code and t.enabled = true
          join game_element e on e.code = v.element_code and e.enabled = true
          join game_skill s on s.code = 'terrain-pulse' and s.enabled = true
          join battle_skill_rule r on r.skill_id = s.id and r.enabled = true and r.id >= 100000
    - insert:
        tableName: security_access_node
        columns:
        - column: { name: id, valueNumeric: 853 }
        - column: { name: code, value: battle-rules.skill-terrain-power-modifiers }
        - column: { name: name, value: 技能场地威力 }
        - column: { name: type, value: ROUTE }
        - column: { name: parent_id, valueNumeric: 830 }
        - column: { name: path, value: /battle-rules/skill-terrain-power-modifiers }
        - column: { name: icon, value: lucide:map }
        - column: { name: sort_order, valueNumeric: 38 }
        - column: { name: visible, valueBoolean: true }
        - column: { name: enabled, valueBoolean: true }
    - insert:
        tableName: security_access_node
        columns:
        - column: { name: id, valueNumeric: 854 }
        - column: { name: code, value: battle-rules.skill-terrain-element-overrides }
        - column: { name: name, value: 技能场地属性 }
        - column: { name: type, value: ROUTE }
        - column: { name: parent_id, valueNumeric: 830 }
        - column: { name: path, value: /battle-rules/skill-terrain-element-overrides }
        - column: { name: icon, value: lucide:palette }
        - column: { name: sort_order, valueNumeric: 39 }
        - column: { name: visible, valueBoolean: true }
        - column: { name: enabled, valueBoolean: true }
    - insert:
        tableName: security_role_access_node
        columns:
        - column: { name: role_id, valueNumeric: 203 }
        - column: { name: access_node_id, valueNumeric: 853 }
    - insert:
        tableName: security_role_access_node
        columns:
        - column: { name: role_id, valueNumeric: 203 }
        - column: { name: access_node_id, valueNumeric: 854 }
- changeSet:
    id: 002-battle-rules-accuracy-lock-skill-rules
    author: backend
    comment: 将命中锁定类技能从默认变化技能规则修正为可被引擎结算的结构化规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: true
        sql: |
          update battle_skill_rule r
          set
            effect_policy = 'accuracy-lock-on-target',
            target_policy = 'selected-target',
            hit_policy = 'always-hit',
            damage_policy = 'no-damage',
            min_hits = 1,
            max_hits = 1,
            critical_hit_stage = 0,
            makes_contact = false,
            affected_by_protect = true,
            protects_user = false,
            thaws_user_before_move = false,
            weakened_by_grassy_terrain = false,
            recharges_after_use = false,
            charges_before_use = false,
            sound_based = false,
            powder_based = false,
            punch_based = false,
            slicing_based = false,
            lock_move_turns_min = 1,
            lock_move_turns_max = 1,
            confuses_user_after_lock = false,
            force_target_switch = false,
            description = '命中后让使用者到下回合结束前锁定目标；下一次对该目标的命中判定必中，但不绕过保护、属性免疫或一击必杀等级失败。',
            enabled = true
          from game_skill s
          where r.skill_id = s.id
            and s.code in ('mind-reader', 'lock-on')
- changeSet:
    id: 002-battle-rules-received-damage-skill-rules
    author: backend
    comment: 将按已受伤害反打的技能从默认无伤害规则修正为可被引擎结算的直接伤害规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: true
        sql: |
          update battle_skill_rule r
          set
            effect_policy = case s.code
              when 'counter' then 'received-physical-damage-double'
              when 'mirror-coat' then 'received-special-damage-double'
              when 'metal-burst' then 'received-damage-one-and-half'
              else r.effect_policy
            end,
            target_policy = 'selected-target',
            hit_policy = case when s.accuracy is null then 'always-hit' else 'standard-hit' end,
            damage_policy = 'received-damage',
            min_hits = 1,
            max_hits = 1,
            critical_hit_stage = 0,
            makes_contact = false,
            affected_by_protect = true,
            protects_user = false,
            thaws_user_before_move = false,
            weakened_by_grassy_terrain = false,
            recharges_after_use = false,
            charges_before_use = false,
            sound_based = false,
            powder_based = false,
            punch_based = false,
            slicing_based = false,
            lock_move_turns_min = 1,
            lock_move_turns_max = 1,
            confuses_user_after_lock = false,
            force_target_switch = false,
            description = case s.code
              when 'counter' then '读取使用者本回合最后一次承受的物理直接伤害，命中该伤害来源并造成双倍直接伤害；没有合格伤害时失败。'
              when 'mirror-coat' then '读取使用者本回合最后一次承受的特殊直接伤害，命中该伤害来源并造成双倍直接伤害；没有合格伤害时失败。'
              when 'metal-burst' then '读取使用者本回合最后一次承受的物理或特殊直接伤害，命中该伤害来源并造成 1.5 倍直接伤害；没有合格伤害时失败。'
              else r.description
            end,
            enabled = true
          from game_skill s
          where r.skill_id = s.id
            and s.code in ('counter', 'mirror-coat', 'metal-burst')
- changeSet:
    id: 002-battle-rules-target-last-skill-pp-reduction
    author: backend
    comment: 将扣减目标最近技能 PP 的变化技能修正为可执行结构化规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 怨恨读取目标最近一次成功使用的技能，并把该技能剩余 PP 至多扣减 4 点；目标没有最近技能或该技能
          -- 剩余 PP 为 0 时失败。该规则只需要 battle_skill_rule 主行上的 effect_policy，不新增独立表，避免
          -- 为单一固定数值效果引入可维护但暂时没有变化空间的配置表。
          update battle_skill_rule r
          set
            effect_policy = 'target-last-skill-pp-reduction-four',
            target_policy = 'selected-target',
            hit_policy = 'standard-hit',
            damage_policy = 'no-damage',
            min_hits = 1,
            max_hits = 1,
            critical_hit_stage = 0,
            makes_contact = false,
            affected_by_protect = true,
            protects_user = false,
            thaws_user_before_move = false,
            weakened_by_grassy_terrain = false,
            recharges_after_use = false,
            charges_before_use = false,
            sound_based = false,
            powder_based = false,
            punch_based = false,
            slicing_based = false,
            lock_move_turns_min = 1,
            lock_move_turns_max = 1,
            confuses_user_after_lock = false,
            force_target_switch = false,
            description = '命中后使目标最近一次成功使用的技能剩余 PP 最多减少 4；目标没有可扣减 PP 的最近技能时失败。',
            enabled = true
          from game_skill s
          where r.skill_id = s.id
            and s.code = 'spite';

          update game_skill
          set enabled = true
          where code = 'spite';
- changeSet:
    id: 002-battle-rules-direct-status-hp-skill-rules
    author: backend
    comment: 将直接改写 HP 的变化技能从默认占位规则修正为可执行结构化规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 腹鼓和分担痛楚都不是普通治疗：前者支付半数最大 HP 后直接把攻击阶级设为 +6，后者把双方当前 HP
          -- 直接改为平均值且不触发普通伤害/回复语义。这里用 effect_policy 显式标记，避免后续“未建模变化技能”
          -- 清理把它们禁用，也避免战斗引擎通过技能名称硬编码特殊规则。
          update battle_skill_rule r
          set
            effect_policy = case s.code
              when 'belly-drum' then 'maximize-user-attack-half-max-hp-cost'
              when 'pain-split' then 'average-user-target-current-hp'
              else r.effect_policy
            end,
            target_policy = case s.code
              when 'belly-drum' then 'self'
              when 'pain-split' then 'selected-target'
              else r.target_policy
            end,
            hit_policy = case s.code
              when 'belly-drum' then 'always-hit'
              when 'pain-split' then 'always-hit'
              else r.hit_policy
            end,
            damage_policy = 'no-damage',
            min_hits = 1,
            max_hits = 1,
            critical_hit_stage = 0,
            makes_contact = false,
            affected_by_protect = case s.code
              when 'belly-drum' then false
              when 'pain-split' then true
              else r.affected_by_protect
            end,
            protects_user = false,
            thaws_user_before_move = false,
            weakened_by_grassy_terrain = false,
            recharges_after_use = false,
            charges_before_use = false,
            sound_based = false,
            powder_based = false,
            punch_based = false,
            slicing_based = false,
            lock_move_turns_min = 1,
            lock_move_turns_max = 1,
            confuses_user_after_lock = false,
            force_target_switch = false,
            description = case s.code
              when 'belly-drum' then '支付使用者最大 HP 的一半并把攻击阶级直接设为 +6；攻击已满或支付后会倒下时失败。'
              when 'pain-split' then '把使用者和目标当前 HP 设为双方当前 HP 的平均值；不计为普通伤害或回复，目标有替身时失败。'
              else r.description
            end,
            enabled = true
          from game_skill s
          where r.skill_id = s.id
            and s.code in ('belly-drum', 'pain-split');

          update game_skill
          set enabled = true
          where code in ('belly-drum', 'pain-split');
- changeSet:
    id: 002-battle-rules-user-side-active-quarter-heal-skill-rules
    author: backend
    comment: 将同侧当前上场成员回复与回复净化技能修正为可执行结构化规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 生命水滴、丛林治疗和新月祈祷都只作用于使用者同侧“当前上场”的成员，不能复用治愈铃声的整队异常清除。
          -- 这里直接把目标范围、命中、伤害和效果策略落成运行时可识别的稳定 code，使新建环境不需要再依赖后续补丁。
          update battle_skill_rule r
          set
            effect_policy = case s.code
              when 'life-dew' then 'target-heal-quarter-max-hp'
              when 'jungle-healing' then 'target-heal-quarter-max-hp-user-side-active-major-status-cure'
              when 'lunar-blessing' then 'target-heal-quarter-max-hp-user-side-active-major-status-cure'
              else r.effect_policy
            end,
            target_policy = 'user-side-active',
            hit_policy = 'always-hit',
            damage_policy = 'no-damage',
            min_hits = 1,
            max_hits = 1,
            critical_hit_stage = 0,
            makes_contact = false,
            affected_by_protect = false,
            protects_user = false,
            thaws_user_before_move = false,
            weakened_by_grassy_terrain = false,
            recharges_after_use = false,
            charges_before_use = false,
            sound_based = false,
            powder_based = false,
            punch_based = false,
            slicing_based = false,
            lock_move_turns_min = 1,
            lock_move_turns_max = 1,
            confuses_user_after_lock = false,
            force_target_switch = false,
            description = case s.code
              when 'life-dew' then '回复使用者同侧当前上场成员最大 HP 的 1/4。'
              when 'jungle-healing' then '回复使用者同侧当前上场成员最大 HP 的 1/4，并清除这些上场成员的主要异常状态。'
              when 'lunar-blessing' then '回复使用者同侧当前上场成员最大 HP 的 1/4，并清除这些上场成员的主要异常状态。'
              else r.description
            end,
            enabled = true
          from game_skill s
          where r.skill_id = s.id
            and s.code in ('life-dew', 'jungle-healing', 'lunar-blessing');

          update game_skill
          set enabled = true
          where code in ('life-dew', 'jungle-healing', 'lunar-blessing');
- changeSet:
    id: 002-battle-rules-modern-self-stat-and-cure-skill-rules
    author: backend
    comment: 将现代自我强化和自我净化技能修正为可执行结构化规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 胜利之舞、闭关和勇气填充都是现代主系列中可以直接用现有能力阶级管道表达的变化技能。
          -- 勇气填充额外清除使用者自身主要异常，因此使用独立 effect_policy，避免误复用整队或同侧上场净化语义。
          update battle_skill_rule r
          set
            effect_policy = case s.code
              when 'take-heart' then 'self-major-status-cure'
              else 'stat-stage-change'
            end,
            target_policy = 'self',
            hit_policy = 'always-hit',
            damage_policy = 'no-damage',
            min_hits = 1,
            max_hits = 1,
            critical_hit_stage = 0,
            makes_contact = false,
            affected_by_protect = false,
            protects_user = false,
            thaws_user_before_move = false,
            weakened_by_grassy_terrain = false,
            recharges_after_use = false,
            charges_before_use = false,
            sound_based = false,
            powder_based = false,
            punch_based = false,
            slicing_based = false,
            lock_move_turns_min = 1,
            lock_move_turns_max = 1,
            confuses_user_after_lock = false,
            force_target_switch = false,
            description = case s.code
              when 'victory-dance' then '技能成功后提升使用者攻击 1 级、防御 1 级、速度 1 级。'
              when 'shelter' then '技能成功后提升使用者防御 2 级。'
              when 'take-heart' then '技能成功后清除使用者自身主要异常，并提升使用者特攻 1 级、特防 1 级。'
              else r.description
            end,
            enabled = true
          from game_skill s
          where r.skill_id = s.id
            and s.code in ('victory-dance', 'shelter', 'take-heart');

          update game_skill
          set enabled = true
          where code in ('victory-dance', 'shelter', 'take-heart');

          with stage_effects(skill_code, stat_code, stage_delta, sort_offset) as (
            values
              ('victory-dance', 'attack', 1, 1),
              ('victory-dance', 'defense', 1, 2),
              ('victory-dance', 'speed', 1, 3),
              ('shelter', 'defense', 2, 4),
              ('take-heart', 'special-attack', 1, 5),
              ('take-heart', 'special-defense', 1, 6)
          )
          insert into battle_skill_stat_stage_effect (
            id,
            skill_rule_id,
            stat_id,
            target_scope,
            stage_delta,
            effect_timing,
            chance_percent,
            enabled,
            sort_order
          )
          select
            400000 + row_number() over (order by s.id, st.id),
            r.id,
            st.id,
            'USER',
            e.stage_delta,
            'AFTER_HIT',
            100,
            true,
            9000 + e.sort_offset
          from stage_effects e
          join game_skill s on s.code = e.skill_code
          join battle_skill_rule r on r.skill_id = s.id
          join game_stat st on st.code = e.stat_code
          where not exists (
            select 1
            from battle_skill_stat_stage_effect existing
            where existing.skill_rule_id = r.id
              and existing.stat_id = st.id
              and existing.target_scope = 'USER'
              and existing.effect_timing = 'AFTER_HIT'
              and existing.stage_delta = e.stage_delta
          );
- changeSet:
    id: 002-battle-rules-modern-leech-seed-skill-rule
    author: backend
    comment: 将寄生种子修正为按来源站位持续抽取和回复的现代结构化规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 寄生种子不是普通主要异常，也不是带固定持续回合的临时状态；它保存目标身上的来源站位，并在回合末抽取
          -- 目标最大 HP 的 1/8 回复给原使用者所在席位。这里用独立 effect_policy 承载，避免继续停留在基础变化技能
          -- 占位规则里被误判为“命中但没有任何运行态效果”。
          update battle_skill_rule r
          set
            effect_policy = 'apply-leech-seed',
            target_policy = 'selected-target',
            hit_policy = 'standard-hit',
            damage_policy = 'no-damage',
            min_hits = 1,
            max_hits = 1,
            critical_hit_stage = 0,
            makes_contact = false,
            affected_by_protect = true,
            protects_user = false,
            thaws_user_before_move = false,
            weakened_by_grassy_terrain = false,
            recharges_after_use = false,
            charges_before_use = false,
            sound_based = false,
            powder_based = false,
            punch_based = false,
            slicing_based = false,
            lock_move_turns_min = 1,
            lock_move_turns_max = 1,
            confuses_user_after_lock = false,
            force_target_switch = false,
            description = '目标被种下寄生种子；回合末损失最大 HP 的 1/8，并回复到使用者当时所在的一侧上场席位。',
            enabled = true
          from game_skill s
          where r.skill_id = s.id
            and s.code = 'leech-seed';

          update game_skill
          set enabled = true
          where code = 'leech-seed';
- changeSet:
    id: 002-battle-rules-disable-latest-unusable-skills
    author: backend
    comment: 将最新版资料明确标记为无法使用的技能从现代战斗规则入口中禁用。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- game_skill_detail 保存的是当前导入资料对技能可用性的最终中文描述。
          -- 一旦最新版说明写明“无法使用这个技能”，该技能就不应继续作为现代主系列规则的可选动作进入队伍准备或战斗运行态。
          -- 这里保留 game_skill 与 battle_skill_rule 的行，便于管理端审计历史资料和规则推导结果；只关闭 enabled，
          -- 避免接口层、运行态装配层或后续批量派生逻辑把这些旧动作重新当作生产可用技能。
          update battle_skill_rule r
          set
            enabled = false,
            description = '最新版资料明确标记为无法使用；保留规则行仅用于资料审计，现代战斗运行态不可选择。'
          from game_skill_detail d
          where d.skill_id = r.skill_id
            and (
              coalesce(d.flavor_text, '') like '%无法使用这个技能%'
              or coalesce(d.effect, '') like '%无法使用这个技能%'
            );

          update game_skill s
          set enabled = false
          from game_skill_detail d
          where d.skill_id = s.id
            and (
              coalesce(d.flavor_text, '') like '%无法使用这个技能%'
              or coalesce(d.effect, '') like '%无法使用这个技能%'
            );
- changeSet:
    id: 002-battle-rules-disable-unmodeled-status-placeholder-skills
    author: backend
    comment: 禁用仍停留在自动占位且没有任何运行态效果的变化类技能。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 自动派生的基础变化技能如果没有任何状态、能力阶级、场地或全场效果明细，运行时就只会产生 SkillUsed，
          -- 这比直接拒绝更危险：前端和对战准备会以为技能已支持，真实结算却静默空放。
          -- 现代生产入口只保留明确没有战斗结算效果的少数技能，其余仍保留目录和规则行以便后续逐个补实现。
          with unmodeled_status_skills as (
            select s.id as skill_id
            from battle_skill_rule r
            join game_skill s on s.id = r.skill_id
            join game_skill_damage_class dc on dc.id = s.damage_class_id
            where s.enabled = true
              and r.enabled = true
              and dc.code = 'status'
              and r.effect_policy = 'status-effect'
              and r.damage_policy = 'no-damage'
              and r.description like '基础变化技能规则%'
              and s.code not in ('splash', 'celebrate', 'hold-hands', 'happy-hour')
              and not exists (select 1 from battle_skill_status_effect e where e.skill_rule_id = r.id and e.enabled = true)
              and not exists (select 1 from battle_skill_stat_stage_effect e where e.skill_rule_id = r.id and e.enabled = true)
              and not exists (select 1 from battle_skill_stat_stage_operation e where e.skill_rule_id = r.id and e.enabled = true)
              and not exists (select 1 from battle_skill_field_effect e where e.skill_rule_id = r.id and e.enabled = true)
              and not exists (select 1 from battle_skill_global_field_effect e where e.skill_rule_id = r.id and e.enabled = true)
            )
          update game_skill s
          set enabled = false
          from unmodeled_status_skills u
          where s.id = u.skill_id;

          with unmodeled_status_skills as (
            select r.id as rule_id
            from battle_skill_rule r
            join game_skill s on s.id = r.skill_id
            join game_skill_damage_class dc on dc.id = s.damage_class_id
            where r.enabled = true
              and dc.code = 'status'
              and r.effect_policy = 'status-effect'
              and r.damage_policy = 'no-damage'
              and r.description like '基础变化技能规则%'
              and s.code not in ('splash', 'celebrate', 'hold-hands', 'happy-hour')
              and not exists (select 1 from battle_skill_status_effect e where e.skill_rule_id = r.id and e.enabled = true)
              and not exists (select 1 from battle_skill_stat_stage_effect e where e.skill_rule_id = r.id and e.enabled = true)
              and not exists (select 1 from battle_skill_stat_stage_operation e where e.skill_rule_id = r.id and e.enabled = true)
              and not exists (select 1 from battle_skill_field_effect e where e.skill_rule_id = r.id and e.enabled = true)
              and not exists (select 1 from battle_skill_global_field_effect e where e.skill_rule_id = r.id and e.enabled = true)
            )
          update battle_skill_rule r
          set
            enabled = false,
            description = '该变化类技能仍缺少可执行运行态效果；保留规则行仅用于资料审计，现代战斗运行态不可选择。'
          from unmodeled_status_skills u
          where r.id = u.rule_id;

          update battle_skill_rule r
          set description = '现代战斗中没有需要结算的对战效果；允许选择但只产生正常使用事件。'
          from game_skill s
          where s.id = r.skill_id
            and s.code in ('splash', 'celebrate', 'hold-hands', 'happy-hour')
            and r.enabled = true;
- changeSet:
    id: 002-battle-rules-disable-unmodeled-damaging-no-damage-skills
    author: backend
    comment: 禁用伤害分类却仍被占位为无伤害的未建模技能。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 物理/特殊技能如果在现代入口中启用，却因为基础威力为空被派生为 no-damage，会造成“看起来能攻击、实际不掉血”的生产事故。
          -- 这类技能通常依赖 HP 档位、随机分支、队伍成员、蓄力层数或携带物等专项规则；在专项规则落地前必须先退出运行态。
          with unmodeled_damaging_skills as (
            select s.id as skill_id
            from battle_skill_rule r
            join game_skill s on s.id = r.skill_id
            join game_skill_damage_class dc on dc.id = s.damage_class_id
            where s.enabled = true
              and r.enabled = true
              and dc.code in ('physical', 'special')
              and r.effect_policy = 'standard-damage'
              and r.damage_policy = 'no-damage'
          )
          update game_skill s
          set enabled = false
          from unmodeled_damaging_skills u
          where s.id = u.skill_id;

          with unmodeled_damaging_skills as (
            select r.id as rule_id
            from battle_skill_rule r
            join game_skill s on s.id = r.skill_id
            join game_skill_damage_class dc on dc.id = s.damage_class_id
            where r.enabled = true
              and dc.code in ('physical', 'special')
              and r.effect_policy = 'standard-damage'
              and r.damage_policy = 'no-damage'
          )
          update battle_skill_rule r
          set
            enabled = false,
            description = '该伤害类技能仍缺少专项威力或直接伤害规则；保留规则行仅用于资料审计，现代战斗运行态不可选择。'
          from unmodeled_damaging_skills u
          where r.id = u.rule_id;
- changeSet:
    id: 002-battle-rules-disable-unmodeled-basic-damage-placeholder-skills
    author: backend
    comment: 禁用文案含特殊效果但仍只有普通伤害占位的技能。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 基础普通伤害规则可以承载“造成普通伤害且无额外效果”的技能，也可以和主行结构字段一起承载多段、必中、
          -- 高要害、蓄力、休整、锁招等已经模型化的通用行为。除此之外，如果资料文案仍显示有特殊效果，而规则行没有
          -- 任何子表效果或主行结构字段承载，就必须先从现代运行态禁用，避免真实战斗把特殊技能当白板伤害结算。
          with unmodeled_basic_damage_skills as (
            select s.id as skill_id
            from battle_skill_rule r
            join game_skill s on s.id = r.skill_id
            join game_skill_damage_class dc on dc.id = s.damage_class_id
            join game_skill_detail d on d.skill_id = s.id
            where s.enabled = true
              and r.enabled = true
              and dc.code in ('physical', 'special')
              and r.effect_policy = 'standard-damage'
              and r.damage_policy = 'standard-damage'
              and r.description like '基础伤害技能规则%'
              and r.target_policy = 'selected-target'
              and r.hit_policy = 'standard-hit'
              and r.min_hits = 1
              and r.max_hits = 1
              and r.critical_hit_stage = 0
              and r.charges_before_use = false
              and r.recharges_after_use = false
              and r.lock_move_turns_min = 1
              and r.lock_move_turns_max = 1
              and r.confuses_user_after_lock = false
              and r.force_target_switch = false
              and coalesce(d.short_effect, '') not like '%没有额外效果%'
              and coalesce(d.short_effect, '') not like '%造成常规伤害%'
              and not exists (select 1 from battle_skill_status_effect e where e.skill_rule_id = r.id and e.enabled = true)
              and not exists (select 1 from battle_skill_stat_stage_effect e where e.skill_rule_id = r.id and e.enabled = true)
              and not exists (select 1 from battle_skill_stat_stage_operation e where e.skill_rule_id = r.id and e.enabled = true)
              and not exists (select 1 from battle_skill_field_effect e where e.skill_rule_id = r.id and e.enabled = true)
              and not exists (select 1 from battle_skill_global_field_effect e where e.skill_rule_id = r.id and e.enabled = true)
          )
          update game_skill s
          set enabled = false
          from unmodeled_basic_damage_skills u
          where s.id = u.skill_id;

          with unmodeled_basic_damage_skills as (
            select r.id as rule_id
            from battle_skill_rule r
            join game_skill s on s.id = r.skill_id
            join game_skill_damage_class dc on dc.id = s.damage_class_id
            join game_skill_detail d on d.skill_id = s.id
            where r.enabled = true
              and dc.code in ('physical', 'special')
              and r.effect_policy = 'standard-damage'
              and r.damage_policy = 'standard-damage'
              and r.description like '基础伤害技能规则%'
              and r.target_policy = 'selected-target'
              and r.hit_policy = 'standard-hit'
              and r.min_hits = 1
              and r.max_hits = 1
              and r.critical_hit_stage = 0
              and r.charges_before_use = false
              and r.recharges_after_use = false
              and r.lock_move_turns_min = 1
              and r.lock_move_turns_max = 1
              and r.confuses_user_after_lock = false
              and r.force_target_switch = false
              and coalesce(d.short_effect, '') not like '%没有额外效果%'
              and coalesce(d.short_effect, '') not like '%造成常规伤害%'
              and not exists (select 1 from battle_skill_status_effect e where e.skill_rule_id = r.id and e.enabled = true)
              and not exists (select 1 from battle_skill_stat_stage_effect e where e.skill_rule_id = r.id and e.enabled = true)
              and not exists (select 1 from battle_skill_stat_stage_operation e where e.skill_rule_id = r.id and e.enabled = true)
              and not exists (select 1 from battle_skill_field_effect e where e.skill_rule_id = r.id and e.enabled = true)
              and not exists (select 1 from battle_skill_global_field_effect e where e.skill_rule_id = r.id and e.enabled = true)
          )
          update battle_skill_rule r
          set
            enabled = false,
            description = '该伤害类技能文案包含未结构化的特殊效果；保留规则行仅用于资料审计，现代战斗运行态不可选择。'
          from unmodeled_basic_damage_skills u
          where r.id = u.rule_id;
- changeSet:
    id: 002-battle-rules-clean-enabled-placeholder-descriptions
    author: backend
    comment: 清理启用规则中仍显示未维护的自动占位说明。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 前面的禁用变更已经把无法安全结算的占位规则移出运行态。剩余仍启用的基础规则要么是明确无额外效果，
          -- 要么已经通过主行字段或子表承载了可执行行为；继续保留“尚未维护专项效果”会误导管理端和排障人员。
          update battle_skill_rule r
          set description = '基础变化技能规则；按已结构化的目标、命中、PP、状态、能力阶级、场地或全场效果字段进入运行态。'
          from game_skill s
          join game_skill_damage_class dc on dc.id = s.damage_class_id
          where s.id = r.skill_id
            and r.enabled = true
            and dc.code = 'status'
            and r.description like '基础变化技能规则%尚未维护专项效果%';

          update battle_skill_rule r
          set description = '基础伤害技能规则；按已结构化的目标、命中、威力、属性、接触、命中次数和附加效果字段进入普通伤害流程。'
          from game_skill s
          join game_skill_damage_class dc on dc.id = s.damage_class_id
          where s.id = r.skill_id
            and r.enabled = true
            and dc.code in ('physical', 'special')
            and r.description like '基础伤害技能规则%尚未维护专项效果%';
- changeSet:
    id: 002-game-data-normalize-creature-display-term
    author: backend
    comment: 统一资料展示术语为精灵。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 早期导入数据已经在已有环境落库，单纯修正 CSV 不能修复这些库中的展示文案。
          -- 这里只更新面向管理端和接口返回的中文文本列，不触碰 code、权限标识、外键或运行态规则字段。
          -- 第一层先把已经半修正的“精灵 + 旧术语”压成“精灵”，避免后续通用替换产生重复词。
          do $$
          declare
            term_column record;
          begin
            for term_column in
              select *
              from (
                values
                  ('game_ability_detail', 'effect'),
                  ('game_ability_detail', 'flavor_text'),
                  ('game_ability_detail', 'short_effect'),
                  ('game_advanced_contest_effect', 'flavor_text'),
                  ('game_catalog', 'description'),
                  ('game_contest_effect', 'effect'),
                  ('game_contest_effect', 'flavor_text'),
                  ('game_encounter_condition', 'name'),
                  ('game_encounter_condition_value', 'name'),
                  ('game_encounter_method', 'name'),
                  ('game_item', 'name'),
                  ('game_item_attribute', 'description'),
                  ('game_item_detail', 'effect'),
                  ('game_item_detail', 'flavor_text'),
                  ('game_item_detail', 'short_effect'),
                  ('game_location', 'name'),
                  ('game_location_area', 'name'),
                  ('game_skill_detail', 'effect'),
                  ('game_skill_detail', 'flavor_text'),
                  ('game_skill_detail', 'short_effect'),
                  ('game_skill_learn_method', 'description'),
                  ('game_skill_target', 'description'),
                  ('game_skill_target', 'name'),
                  ('game_species_detail', 'flavor_text'),
                  ('game_species_detail', 'genus'),
                  ('security_access_node', 'name')
              ) as columns_to_normalize(table_name, column_name)
            loop
              execute format(
                'update %I set %I = replace(replace(%I, %L, %L), %L, %L) where %I like %L',
                term_column.table_name,
                term_column.column_name,
                term_column.column_name,
                '精灵' || '生' || '物',
                '精灵',
                '生' || '物',
                '精灵',
                term_column.column_name,
                '%' || '生' || '物' || '%'
              );
            end loop;
          end $$;
- changeSet:
    id: 002-battle-rules-enable-recharge-damage-skills
    author: backend
    comment: 启用已经可由休整字段承载的成功后休整伤害技能。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 这些技能的共同规则是：成功造成实际伤害后，使用者下一次技能行动会被休整阻止。
          -- battle-engine 已经通过 recharges_after_use 字段支持该通用机制；旧导入只缺少字段标记，所以不需要新增 policy。
          with recharge_skills(code) as (
            values
              ('blast-burn'),
              ('hydro-cannon'),
              ('frenzy-plant'),
              ('giga-impact'),
              ('rock-wrecker'),
              ('roar-of-time'),
              ('prismatic-laser'),
              ('meteor-assault'),
              ('eternabeam')
          )
          update game_skill s
          set enabled = true
          from recharge_skills rs
          where s.code = rs.code;

          with recharge_skills(code) as (
            values
              ('blast-burn'),
              ('hydro-cannon'),
              ('frenzy-plant'),
              ('giga-impact'),
              ('rock-wrecker'),
              ('roar-of-time'),
              ('prismatic-laser'),
              ('meteor-assault'),
              ('eternabeam')
          )
          update battle_skill_rule r
          set
            enabled = true,
            recharges_after_use = true,
            description = '基础伤害技能规则；命中造成普通伤害，成功造成实际伤害后使用者下一次行动进入休整。'
          from game_skill s
          join recharge_skills rs on rs.code = s.code
          where r.skill_id = s.id;
- changeSet:
    id: 002-battle-rules-enable-special-damage-target-defense-skills
    author: backend
    comment: 启用按目标防御计算的特殊伤害技能。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 精神冲击、精神击破和神秘之剑仍是特殊分类技能：攻击侧读取特攻，属性、道具、特性和要害流程也按特殊技能走。
          -- 它们唯一的公式差异是防守侧读取目标防御；运行态用 special-damage-target-defense policy 显式传给伤害公式。
          with target_defense_skills(code) as (
            values
              ('psyshock'),
              ('psystrike'),
              ('secret-sword')
          )
          update game_skill s
          set enabled = true
          from target_defense_skills tds
          where s.code = tds.code;

          with target_defense_skills(code) as (
            values
              ('psyshock'),
              ('psystrike'),
              ('secret-sword')
          )
          update battle_skill_rule r
          set
            enabled = true,
            effect_policy = 'special-damage-target-defense',
            damage_policy = 'standard-damage',
            description = '特殊伤害技能规则；攻击侧读取使用者特攻，防守侧读取目标防御后进入普通伤害公式。'
          from game_skill s
          join target_defense_skills tds on tds.code = s.code
          where r.skill_id = s.id;
- changeSet:
    id: 002-battle-rules-enable-non-fainting-damage-skills
    author: backend
    comment: 启用保留目标一血的普通伤害技能。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 点到为止和手下留情使用普通物理伤害公式；唯一差异是目标本体 HP 写入时不能低于 1。
          -- 替身不受该限制，因此运行态只把效果表达为 leave-target-at-one-hp，由伤害写入阶段处理目标本体。
          with non_fainting_skills(code) as (
            values
              ('false-swipe'),
              ('hold-back')
          )
          update game_skill s
          set enabled = true
          from non_fainting_skills nfs
          where s.code = nfs.code;

          with non_fainting_skills(code) as (
            values
              ('false-swipe'),
              ('hold-back')
          )
          update battle_skill_rule r
          set
            enabled = true,
            effect_policy = 'leave-target-at-one-hp',
            damage_policy = 'standard-damage',
            description = '普通伤害技能规则；命中造成普通伤害，但目标本体 HP 写入时最低保留 1 点。'
          from game_skill s
          join non_fainting_skills nfs on nfs.code = s.code
          where r.skill_id = s.id;
- changeSet:
    id: 002-battle-rules-enable-screen-breaking-damage-skills
    author: backend
    comment: 启用伤害计算前击破目标侧屏障的普通伤害技能。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 这批技能在命中且目标没有属性免疫后，先清除目标侧物理/特殊/全伤害屏障，再进入普通伤害公式。
          -- 这样本次伤害不会被刚刚清除的屏障减半；未命中、被保护或属性免疫时仍不会清除屏障。
          with screen_breaking_skills(code) as (
            values
              ('brick-break'),
              ('psychic-fangs')
          )
          update game_skill s
          set enabled = true
          from screen_breaking_skills sbs
          where s.code = sbs.code;

          with screen_breaking_skills(code) as (
            values
              ('brick-break'),
              ('psychic-fangs')
          )
          update battle_skill_rule r
          set
            enabled = true,
            effect_policy = 'break-target-side-damage-reductions',
            damage_policy = 'standard-damage',
            description = '普通伤害技能规则；命中且目标没有属性免疫时，先清除目标侧屏障，再进入普通伤害公式。'
          from game_skill s
          join screen_breaking_skills sbs on sbs.code = s.code
          where r.skill_id = s.id;
- changeSet:
    id: 002-battle-rules-enable-user-hp-dynamic-power-skills
    author: backend
    comment: 启用按使用者当前体力分档的动态威力技能。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 抓狂和起死回生没有固定基础威力；运行态按 floor(48 * 当前 HP / 最大 HP) 分档选择 20/40/80/100/150/200 威力。
          -- 它们进入普通物理伤害公式，命中、属性一致加成、属性克制、天气、道具和要害仍走标准伤害流程。
          with user_hp_power_skills(code) as (
            values
              ('flail'),
              ('reversal')
          )
          update game_skill s
          set enabled = true
          from user_hp_power_skills uhps
          where s.code = uhps.code;

          with user_hp_power_skills(code) as (
            values
              ('flail'),
              ('reversal')
          )
          update battle_skill_rule r
          set
            enabled = true,
            effect_policy = 'power-by-user-current-hp-ratio',
            damage_policy = 'standard-damage',
            description = '动态威力伤害技能规则；按使用者当前 HP 与最大 HP 的 48 倍整数分档决定基础威力后进入普通伤害公式。'
          from game_skill s
          join user_hp_power_skills uhps on uhps.code = s.code
          where r.skill_id = s.id;
- changeSet:
    id: 002-battle-rules-enable-focus-mist-safeguard-skills
    author: backend
    comment: 启用聚气、白雾和神秘守护规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 白雾和神秘守护是一侧持续防护效果，复用 battle_field_rule 与 battle_skill_field_effect，不新增表结构。
          -- 聚气是成员在场期间的要害等级加成，随离场清除，因此直接用 battle_skill_rule.effect_policy 表达。
          insert into battle_field_rule (
            id,
            code,
            name,
            effect_scope,
            effect_policy,
            min_turns,
            max_turns,
            max_layers,
            enabled,
            sort_order,
            description
          ) values
            (
              10,
              'mist',
              '白雾',
              'SIDE',
              'side-stat-stage-reduction-protection',
              5,
              5,
              null,
              true,
              10,
              '防止己方成员被其它成员降低能力阶级。'
            ),
            (
              11,
              'safeguard',
              '神秘守护',
              'SIDE',
              'side-status-condition-protection',
              5,
              5,
              null,
              true,
              11,
              '防止己方成员被其它成员附加主要异常状态或混乱。'
            )
          on conflict (id) do update set
            code = excluded.code,
            name = excluded.name,
            effect_scope = excluded.effect_scope,
            effect_policy = excluded.effect_policy,
            min_turns = excluded.min_turns,
            max_turns = excluded.max_turns,
            max_layers = excluded.max_layers,
            enabled = excluded.enabled,
            sort_order = excluded.sort_order,
            description = excluded.description;

          with enabled_skills(code) as (
            values
              ('mist'),
              ('focus-energy'),
              ('safeguard')
          )
          update game_skill s
          set enabled = true
          from enabled_skills es
          where s.code = es.code;

          update battle_skill_rule r
          set
            enabled = true,
            effect_policy = 'side-condition',
            target_policy = 'self',
            hit_policy = 'always-hit',
            damage_policy = 'no-damage',
            description = '一侧防护变化技能规则；命中后在使用者侧建立 5 回合防护效果。'
          from game_skill s
          where r.skill_id = s.id
            and s.code in ('mist', 'safeguard');

          update battle_skill_rule r
          set
            enabled = true,
            effect_policy = 'self-critical-hit-stage-plus-two',
            target_policy = 'self',
            hit_policy = 'always-hit',
            damage_policy = 'no-damage',
            description = '自我强化变化技能规则；命中后使用者在场期间要害等级 +2，离场时清除。'
          from game_skill s
          where r.skill_id = s.id
            and s.code = 'focus-energy';

          insert into battle_skill_field_effect (
            id,
            skill_rule_id,
            field_rule_id,
            target_side,
            chance_percent,
            effect_timing,
            required_weather_rule_id,
            enabled,
            sort_order
          )
          select
            effect_seed.id,
            r.id,
            fr.id,
            'USER_SIDE',
            100,
            'AFTER_HIT',
            null,
            true,
            effect_seed.sort_order
          from (
            values
              (9, 'mist', 'mist', 9),
              (10, 'safeguard', 'safeguard', 10)
          ) as effect_seed(id, skill_code, field_code, sort_order)
          join game_skill s on s.code = effect_seed.skill_code
          join battle_skill_rule r on r.skill_id = s.id
          join battle_field_rule fr on fr.code = effect_seed.field_code
          on conflict (id) do update set
            skill_rule_id = excluded.skill_rule_id,
            field_rule_id = excluded.field_rule_id,
            target_side = excluded.target_side,
            chance_percent = excluded.chance_percent,
            effect_timing = excluded.effect_timing,
            required_weather_rule_id = excluded.required_weather_rule_id,
            enabled = excluded.enabled,
            sort_order = excluded.sort_order;
- changeSet:
    id: 002-battle-rules-enable-rest-heal-bell-skills
    author: backend
    comment: 启用睡觉和治愈铃声规则，并标记最新版不可用的芳香治疗。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 睡觉是固定睡眠 + 满 HP 回复的组合规则，不能按普通随机睡眠或普通自我回复拆开。
          -- 治愈铃声清除使用者整侧主要异常状态；混乱等临时状态不属于现代主要异常槽位。
          with enabled_skills(code) as (
            values
              ('rest'),
              ('heal-bell')
          )
          update game_skill s
          set enabled = true
          from enabled_skills es
          where s.code = es.code;

          update battle_skill_rule r
          set
            enabled = true,
            effect_policy = 'self-rest-full-heal',
            target_policy = 'self',
            hit_policy = 'always-hit',
            damage_policy = 'no-damage',
            affected_by_protect = false,
            description = '自我回复变化技能规则；HP 不满且可以入睡时，清除原主要异常，进入固定 2 次行动阻止的睡眠并回满 HP。'
          from game_skill s
          where r.skill_id = s.id
            and s.code = 'rest';

          update battle_skill_rule r
          set
            enabled = true,
            effect_policy = 'user-side-major-status-cure',
            target_policy = 'self',
            hit_policy = 'always-hit',
            damage_policy = 'no-damage',
            affected_by_protect = false,
            sound_based = true,
            description = '队伍治疗变化技能规则；清除使用者所属侧全部成员的主要异常状态，不清除混乱等临时状态。'
          from game_skill s
          where r.skill_id = s.id
            and s.code = 'heal-bell';

          update game_skill
          set enabled = false
          where code = 'aromatherapy';

          update battle_skill_rule r
          set
            enabled = false,
            description = '最新版资料明确标记为无法使用，保留规则行仅用于资料审计。'
          from game_skill s
          where r.skill_id = s.id
            and s.code = 'aromatherapy';
- changeSet:
    id: 002-battle-rules-enable-detect-endure-skills
    author: backend
    comment: 启用看穿和挺住规则，并补充挺住致命技能伤害保留 1 HP 标记。
    changes:
    - addColumn:
        tableName: battle_skill_rule
        columns:
        - column:
            name: endures_fatal_damage
            type: boolean
            defaultValueBoolean: false
            remarks: 技能是否在本回合让使用者承受致命技能伤害时至少保留 1 HP。
            constraints:
              nullable: false
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 看穿与守住在现代规则下共享保护屏障和连续成功率；只需要把资料行配置成同一类保护行动。
          -- 挺住也共享连续保护成功率，但成功后不阻挡命中，只在本回合技能伤害会导致倒下时把使用者保留到 1 HP。
          with enabled_skills(code) as (
            values
              ('detect'),
              ('endure')
          )
          update game_skill s
          set enabled = true
          from enabled_skills es
          where s.code = es.code;

          update battle_skill_rule r
          set
            enabled = true,
            effect_policy = 'protect-self',
            target_policy = 'self',
            hit_policy = 'protect-hit',
            damage_policy = 'no-damage',
            affected_by_protect = false,
            protects_user = true,
            endures_fatal_damage = false,
            description = '保护类变化技能规则；本回合保护自己免受多数技能影响，并与守住、挺住共享连续成功率。'
          from game_skill s
          where r.skill_id = s.id
            and s.code = 'detect';

          update battle_skill_rule r
          set
            enabled = true,
            effect_policy = 'endure-fatal-damage',
            target_policy = 'self',
            hit_policy = 'protect-hit',
            damage_policy = 'no-damage',
            affected_by_protect = false,
            protects_user = false,
            endures_fatal_damage = true,
            description = '保护类变化技能规则；本回合不阻挡技能命中，但承受致命技能伤害时至少保留 1 HP，并共享连续成功率。'
          from game_skill s
          where r.skill_id = s.id
            and s.code = 'endure';
- changeSet:
    id: 002-battle-rules-enable-spin-cleanup-effects
    author: backend
    comment: 启用高速旋转和晶光转转的己方清场规则，并补充晶光转转中毒效果。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          -- 高速旋转和晶光转转都是伤害成功连接后才清理使用者侧持续限制的规则：
          -- 解除使用者身上的束缚和寄生种子，并移除使用者一侧所有入场陷阱。该效果不是普通附加状态，
          -- 因此由主技能规则 effect_policy 映射为运行时布尔语义；晶光转转的中毒仍保存在状态效果子表。
          with enabled_skills(code) as (
            values
              ('rapid-spin'),
              ('mortal-spin')
          )
          update game_skill s
          set enabled = true
          from enabled_skills es
          where s.code = es.code;

          update battle_skill_rule r
          set
            enabled = true,
            effect_policy = 'clear-user-side-hazards-and-traps',
            target_policy = case when s.code = 'mortal-spin' then 'all-opponents' else 'selected-target' end,
            damage_policy = 'standard-damage',
            description = '伤害清场技能规则；成功连接后解除使用者身上的束缚和寄生种子，并移除使用者一侧全部入场陷阱。'
          from game_skill s
          where r.skill_id = s.id
            and s.code in ('rapid-spin', 'mortal-spin');

          update battle_skill_stat_stage_effect e
          set
            target_scope = 'USER',
            chance_percent = 100,
            enabled = true
          from battle_skill_rule r
          join game_skill s on s.id = r.skill_id
          join game_stat st on st.code = 'speed'
          where e.skill_rule_id = r.id
            and e.stat_id = st.id
            and s.code = 'rapid-spin';

          insert into battle_skill_status_effect (
            id,
            skill_rule_id,
            status_rule_id,
            target_scope,
            effect_timing,
            chance_percent,
            enabled,
            sort_order
          )
          select
            coalesce((select max(id) from battle_skill_status_effect), 0) + 1,
            r.id,
            sr.id,
            'TARGET',
            'AFTER_HIT',
            100,
            true,
            10
          from game_skill s
          join battle_skill_rule r on r.skill_id = s.id
          join battle_status_rule sr on sr.code = 'poison'
          where s.code = 'mortal-spin'
          on conflict (skill_rule_id, status_rule_id, target_scope, effect_timing) do update set
            chance_percent = excluded.chance_percent,
            enabled = excluded.enabled,
            sort_order = excluded.sort_order;
