databaseChangeLog:
- changeSet:
    id: 035-battle-rule-weather-fixtures
    author: backend
    comment: 新增天气伤害、天气回复、天气速度和天气命中公开对照 fixture 数据。
    changes:
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 17 }
        - column: { name: code, value: sandstorm-damages-only-non-immune-active-participants }
        - column: { name: name, value: 沙暴只伤害非免疫上场成员 }
        - column: { name: category, value: WEATHER }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证沙暴回合末固定伤害只影响非岩、非地面、非钢属性的当前上场成员。 }
        - column: { name: input_summary, value: 沙暴环境下，普通属性和岩属性当前上场成员都保持可战斗。 }
        - column: { name: expected_summary, value: 只有普通属性成员受到最大 HP 1/16 的沙暴伤害，岩属性成员不受影响。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 170 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 18 }
        - column: { name: code, value: weather-healing-ability-heals-active-participant-at-end-turn }
        - column: { name: name, value: 天气回复特性在匹配天气下回复 }
        - column: { name: category, value: WEATHER }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证指定天气下的回合末回复特性只在天气匹配且成员当前上场时生效。 }
        - column: { name: input_summary, value: 下雨环境下，当前上场成员未满 HP，且拥有雨天回合末回复特性；另一成员拥有雪天回复特性。 }
        - column: { name: expected_summary, value: 雨天回复特性按最大 HP 1/16 回复并产生天气回复事件；雪天回复特性不触发。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 180 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 19 }
        - column: { name: code, value: weather-speed-ability-changes-skill-action-order }
        - column: { name: name, value: 天气速度特性改变行动顺序 }
        - column: { name: category, value: WEATHER }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证指定天气下的速度倍率特性参与行动排序，并可让低速成员先行动。 }
        - column: { name: input_summary, value: 下雨环境下，速度 60 的成员拥有雨天速度翻倍特性，速度 100 的成员没有天气速度特性。 }
        - column: { name: expected_summary, value: 速度 60 成员的有效速度变为 120，因此先于速度 100 的对手行动。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 190 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 20 }
        - column: { name: code, value: weather-accuracy-overrides-support-sure-hit-and-lowered-accuracy }
        - column: { name: name, value: 天气命中覆盖支持必中和低命中 }
        - column: { name: category, value: WEATHER }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证天气命中覆盖可以把技能改为必中，也可以把本来必中或无命中的技能改为固定低命中。 }
        - column: { name: input_summary, value: 同一类天气命中覆盖分别表达雨天下必中、晴天下固定低命中。 }
        - column: { name: expected_summary, value: 必中覆盖不消费命中随机数；固定低命中覆盖会消费命中随机数并可导致技能未命中。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 200 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 21 }
        - column: { name: code, value: ability-and-item-immunities-block-sandstorm-damage }
        - column: { name: name, value: 特性和道具免疫沙暴伤害 }
        - column: { name: category, value: WEATHER }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证天气伤害免疫特性和天气伤害免疫道具都会阻止沙暴回合末固定伤害。 }
        - column: { name: input_summary, value: 沙暴环境下，普通属性双方当前上场成员分别拥有天气伤害免疫特性和道具。 }
        - column: { name: expected_summary, value: 双方都不会受到沙暴回合末固定伤害，也不会产生天气伤害事件。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 210 }
