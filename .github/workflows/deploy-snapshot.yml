name: Deploy Snapshot

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  actions: read
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: true

jobs:
  deploy-snapshot:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: 准备构建环境
        uses: ./.github/actions/setup-build-env
        with:
          github-token: ${{ github.token }}
          ip2location-source-run-id: ${{ github.event.workflow_run.id }}
          upload-ip2location-artifact: 'true'
      - name: 提取项目版本
        id: projectVersion
        shell: bash
        run: |
          set -euo pipefail

          version="$(gradle -q printVersion)"

          if [[ -z "$version" ]]; then
            echo "无法从 Gradle 构建中解析版本号"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Detected version: $version"

      - name: 使用 Gradle 发布快照到 Maven Central
        if: endsWith(steps.projectVersion.outputs.version, '-SNAPSHOT')
        run: gradle generateRsaKeys -Pforce=true publish -x test
        env:
          ORG_GRADLE_PROJECT_centralSnapshotsUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_centralSnapshotsPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
