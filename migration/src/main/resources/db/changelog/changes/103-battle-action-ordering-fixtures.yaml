            (id, fixture_id, source_url, source_label, source_note, sort_order)
          values
            (500, 250, 'https://github.com/smogon/pokemon-showdown/blob/master/sim/battle-queue.ts', '公开引擎行动队列', '用于对照优先度先于速度比较。', 10),
            (501, 250, 'https://github.com/smogon/pokemon-showdown/blob/master/data/moves.ts', '公开技能资料', '用于对照技能优先度字段。', 20),
            (502, 251, 'https://github.com/smogon/pokemon-showdown/blob/master/sim/battle-queue.ts', '公开引擎行动队列', '用于对照负优先度排序。', 10),
            (503, 251, 'https://github.com/smogon/pokemon-showdown/blob/master/data/moves.ts', '公开技能资料', '用于对照后制技能优先度。', 20),
            (504, 252, 'https://github.com/smogon/pokemon-showdown/blob/master/sim/battle-queue.ts', '公开引擎行动队列', '用于对照同优先度速度排序。', 10),
            (505, 252, 'https://wiki.52poke.com/wiki/速度', '速度公开规则说明', '用于验证速度决定同优先度行动顺序。', 20),
            (506, 253, 'https://github.com/smogon/pokemon-showdown/blob/master/sim/battle-queue.ts', '公开引擎行动队列', '用于对照同速随机排序。', 10),
            (507, 253, 'https://wiki.52poke.com/wiki/速度', '速度公开规则说明', '用于验证同速需要随机决定顺序。', 20),
            (508, 254, 'https://github.com/smogon/pokemon-showdown/blob/master/sim/battle-queue.ts', '公开引擎行动队列', '用于对照相同正优先度内继续比较速度。', 10),
            (509, 254, 'https://github.com/smogon/pokemon-showdown/blob/master/data/moves.ts', '公开技能资料', '用于对照先制技能优先度。', 20),
            (510, 255, 'https://github.com/smogon/pokemon-showdown/blob/master/data/items.ts', '公开道具资料', '用于对照讲究类速度倍率道具。', 10),
            (511, 255, 'https://github.com/smogon/pokemon-showdown/blob/master/sim/battle-queue.ts', '公开引擎行动队列', '用于对照道具速度倍率参与排序。', 20),
            (512, 256, 'https://github.com/smogon/pokemon-showdown/blob/master/data/conditions.ts', '公开状态资料', '用于对照麻痹速度下降。', 10),
            (513, 256, 'https://wiki.52poke.com/wiki/麻痹（状态）', '麻痹公开规则说明', '用于验证麻痹影响速度。', 20),
            (514, 257, 'https://github.com/smogon/pokemon-showdown/blob/master/data/conditions.ts', '公开场上状态资料', '用于对照一侧速度修正。', 10),
            (515, 257, 'https://wiki.52poke.com/wiki/顺风（招式）', '顺风公开规则说明', '用于验证顺风类一侧速度倍率。', 20),
            (516, 258, 'https://github.com/smogon/pokemon-showdown/blob/master/data/conditions.ts', '公开全场状态资料', '用于对照全场速度顺序反转。', 10),
            (517, 258, 'https://wiki.52poke.com/wiki/戏法空间（招式）', '戏法空间公开规则说明', '用于验证速度顺序反转只影响同优先度。', 20),
            (518, 259, 'https://github.com/smogon/pokemon-showdown/blob/master/data/abilities.ts', '公开特性资料', '用于对照变化技能优先度提升。', 10),
            (519, 259, 'https://github.com/smogon/pokemon-showdown/blob/master/sim/battle-queue.ts', '公开引擎行动队列', '用于对照特性修正后的优先度参与统一排序。', 20);
