databaseChangeLog:
- changeSet:
    id: 223-flower-veil-ability-rules
    author: codex
    comment: 为花幕补充保护草属性上场成员的异常与降阶免疫规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          insert into battle_ability_rule (
            id, ability_id, trigger_timing, effect_policy,
            trigger_order, description, enabled, sort_order
          )
          select coalesce((select max(id) from battle_ability_rule), 0) + source.row_no,
            ability.id, source.trigger_timing, source.effect_policy,
            100, source.description, true, 6800 + source.row_no
          from (
            values
              (1, 'BEFORE_STATUS', 'side-grass-major-status-immunity', '保护自身一侧当前上场的草属性成员免受主要异常状态。'),
              (2, 'STAT_STAGE_CHANGE', 'side-grass-stat-drop-immunity', '保护自身一侧当前上场的草属性成员免受对手造成的能力下降。')
          ) as source(row_no, trigger_timing, effect_policy, description)
          join game_ability ability on ability.code = 'flower-veil'
          on conflict (ability_id, trigger_timing, effect_policy) do update set
            trigger_order = excluded.trigger_order,
            description = excluded.description,
            enabled = excluded.enabled,
            sort_order = excluded.sort_order;
