databaseChangeLog:
- changeSet:
    id: 040-battle-rule-field-turn-fixtures
    author: backend
    comment: 新增顺风、戏法空间、入场陷阱、目标槽位、回合上限和保护公开对照 fixture 数据。
    changes:
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 58 }
        - column: { name: code, value: tailwind-doubles-user-side-speed-for-later-action-order }
        - column: { name: name, value: 顺风让己方后续行动速度翻倍 }
        - column: { name: category, value: FIELD }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证顺风建立在使用者一侧后，后续行动排序按 2 倍速度参与比较并在回合末递减。 }
        - column: { name: input_summary, value: 使用者速度 40，对手速度 70；使用者一侧建立顺风后，后续行动排序按 2 倍速度参与比较。 }
        - column: { name: expected_summary, value: 顺风建立事件记录 2 倍速度修正和 4 回合初始持续；下一回合使用者有效速度 80，先于速度 70 的对手行动。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 580 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 59 }
        - column: { name: code, value: trick-room-reverses-speed-order-inside-same-priority-bracket }
        - column: { name: name, value: 戏法空间反转同优先度速度顺序 }
        - column: { name: category, value: FIELD }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证戏法空间建立后，同优先度行动按低速优先排序。 }
        - column: { name: input_summary, value: 使用者建立戏法空间；后续同优先度行动中，速度 50 的成员和速度 100 的成员同时使用普通攻击。 }
        - column: { name: expected_summary, value: 戏法空间建立事件记录 5 回合初始持续；下一回合同优先度行动按低速优先，速度 50 的成员先行动。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 590 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 60 }
        - column: { name: code, value: trick-room-used-while-active-ends-the-field-speed-order-effect }
        - column: { name: name, value: 戏法空间生效中再次使用会解除 }
        - column: { name: category, value: FIELD }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证戏法空间已经存在时再次成功使用同类全场速度顺序技能，会结束当前全场速度顺序效果。 }
        - column: { name: input_summary, value: 全场已有剩余 4 回合的戏法空间，使用者再次成功使用戏法空间技能。 }
        - column: { name: expected_summary, value: 引擎产生戏法空间结束事件并清空全场速度顺序效果，不重新写入新的持续回合。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 600 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 61 }
        - column: { name: code, value: spikes-establishes-target-side-and-stacks-to-three-layers }
        - column: { name: name, value: 撒菱建立目标侧并最多叠三层 }
        - column: { name: category, value: FIELD }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证一侧入场陷阱技能会放置在目标所在侧，撒菱层数按公开最大三层封顶。 }
        - column: { name: input_summary, value: 一名成员连续三次成功使用一侧入场陷阱技能，目标为对手当前上场成员所在侧。 }
        - column: { name: expected_summary, value: 目标侧陷阱层数依次变为 1、2、3；达到公开规则最大三层后再次使用不继续增加层数。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 610 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 62 }
        - column: { name: code, value: stealth-rock-damage-uses-rock-effectiveness-after-switch }
        - column: { name: name, value: 隐形岩按岩属性相性造成入场伤害 }
        - column: { name: category, value: FIELD }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证隐形岩类入场陷阱在成员换入后，按岩属性对目标属性相性计算最大 HP 比例伤害。 }
        - column: { name: input_summary, value: 目标侧已有隐形岩类入场陷阱，火属性后备成员主动换入，规则快照声明岩属性打火属性为 2 倍。 }
        - column: { name: expected_summary, value: 换入事件先发生，随后按最大 HP * 2 / 8 扣除 25 点伤害，并记录入场陷阱专用伤害事件。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 620 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 63 }
        - column: { name: code, value: spikes-third-layer-damages-grounded-switch-in-only }
        - column: { name: name, value: 三层撒菱只伤害接地换入成员 }
        - column: { name: category, value: FIELD }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证撒菱伤害按层数结算，并只影响接地换入成员。 }
        - column: { name: input_summary, value: 目标侧已有三层撒菱类入场陷阱；一个接地成员换入，另一个非接地成员在独立场景换入。 }
        - column: { name: expected_summary, value: 接地成员受到最大 HP 1/4 的入场伤害，非接地成员不触发撒菱伤害事件。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 630 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 64 }
        - column: { name: code, value: toxic-spikes-two-layers-badly-poisons-and-poison-element-absorbs }
        - column: { name: name, value: 两层毒菱使接地换入成员剧毒且毒属性吸收 }
        - column: { name: category, value: FIELD }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证两层毒菱会让普通接地换入成员陷入剧毒，接地毒属性换入成员会吸收并移除毒菱。 }
        - column: { name: input_summary, value: 目标侧已有两层毒菱类入场陷阱；普通接地成员换入，另一个接地毒属性成员在独立场景换入。 }
        - column: { name: expected_summary, value: 普通接地成员获得剧毒；接地毒属性成员不获得异常状态，并移除该侧毒菱。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 640 }
    - insert:
        tableName: battle_rule_fixture
