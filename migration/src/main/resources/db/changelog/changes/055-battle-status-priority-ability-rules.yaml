databaseChangeLog:
- changeSet:
    id: 055-battle-status-priority-ability-rules
    author: backend
    comment: 新增提升变化技能先制度的特性规则与公开对照 fixture 数据。
    changes:
    - insert:
        tableName: battle_ability_rule
        columns:
        - column: { name: id, valueNumeric: 26 }
        - column: { name: ability_id, valueNumeric: 158 }
        - column: { name: trigger_timing, value: BEFORE_MOVE }
        - column: { name: effect_policy, value: status-skill-priority-boost }
        - column: { name: trigger_order, valueNumeric: 60 }
        - column: { name: description, value: 当前上场时让变化类技能获得额外先制度；该提升会让对手恶属性目标免疫。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 260 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 113 }
        - column: { name: code, value: status-priority-ability-moves-status-skill-before-faster-opponent }
        - column: { name: name, value: 变化技能先制度特性先于高速对手行动 }
        - column: { name: category, value: ABILITY }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证变化技能先制度特性会提升基础优先度为 0 的变化技能行动顺序。 }
        - column: { name: input_summary, value: 低速成员拥有让变化技能获得额外优先度的结构化特性，对手速度更高，双方都使用基础优先度为 0 的变化技能。 }
        - column: { name: expected_summary, value: 拥有特性的成员先行动，事件流中的技能使用顺序先于高速对手。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 1130 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 114 }
        - column: { name: code, value: dark-target-blocks-opponent-status-skill-boosted-by-status-priority-ability }
        - column: { name: name, value: 恶属性目标免疫被特性提升先制度的对手变化技能 }
        - column: { name: category, value: ABILITY }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证由特性提升先制度的对手变化技能不会影响恶属性目标。 }
        - column: { name: input_summary, value: 拥有变化技能先制度特性的成员对对手恶属性目标使用基础优先度为 0 的变化技能。 }
        - column: { name: expected_summary, value: 技能消耗 PP 后被目标恶属性免疫，不产生能力阶级变化或其它附加效果。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 1140 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 115 }
        - column: { name: code, value: status-priority-ability-does-not-make-ally-dark-target-immune }
        - column: { name: name, value: 变化技能先制度特性不让同侧恶属性伙伴免疫 }
        - column: { name: category, value: ABILITY }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证恶属性免疫只针对对手目标，不阻止同侧辅助目标。 }
        - column: { name: input_summary, value: 双打中拥有变化技能先制度特性的成员对同侧恶属性伙伴使用变化技能。 }
        - column: { name: expected_summary, value: 恶属性免疫只针对对手目标；同侧伙伴不会阻挡该技能，附加效果正常结算。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 1150 }
