databaseChangeLog:
- changeSet:
    id: 053-battle-fatal-damage-survival-rules
    author: backend
    comment: 新增满 HP 致命伤害保留 1 HP 的特性和道具规则。
    changes:
    - insert:
        tableName: battle_ability_rule
        columns:
        - column: { name: id, valueNumeric: 22 }
        - column: { name: ability_id, valueNumeric: 5 }
        - column: { name: trigger_timing, value: BEFORE_FAINT }
        - column: { name: effect_policy, value: full-hp-fatal-damage-survival }
        - column: { name: trigger_order, valueNumeric: 80 }
        - column: { name: description, value: 满 HP 承受会导致倒下的技能直接伤害时保留 1 HP。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 220 }
    - insert:
        tableName: battle_item_rule
        columns:
        - column: { name: id, valueNumeric: 13 }
        - column: { name: item_id, valueNumeric: 252 }
        - column: { name: trigger_timing, value: BEFORE_FAINT }
        - column: { name: effect_policy, value: consumable-full-hp-fatal-damage-survival }
        - column: { name: consumable, valueBoolean: true }
        - column: { name: trigger_order, valueNumeric: 80 }
        - column: { name: description, value: 满 HP 承受会导致倒下的技能直接伤害时保留 1 HP，并在触发后消费携带道具。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 130 }
