            type: bigint
            remarks: 状态规则 ID，引用 battle_status_rule。
            constraints:
              nullable: false
        - column:
            name: target_scope
            type: varchar(40)
            remarks: 附加状态作用目标范围，例如 TARGET、USER 或 ALL_TARGETS。
            constraints:
              nullable: false
        - column:
            name: effect_timing
            type: varchar(40)
            remarks: 状态附加结算时机，例如 AFTER_HIT 或 END_TURN。
            constraints:
              nullable: false
        - column:
            name: chance_percent
            type: int
            remarks: 状态附加概率百分比，100 表示必定触发。
            constraints:
              nullable: false
        - column:
            name: enabled
            type: boolean
            defaultValueBoolean: true
            remarks: 是否启用该状态附加效果。
            constraints:
              nullable: false
        - column:
            name: sort_order
            type: int
            remarks: 状态附加效果展示排序。
            constraints:
              nullable: false
    - addUniqueConstraint:
        tableName: battle_skill_status_effect
        columnNames: skill_rule_id, status_rule_id, target_scope, effect_timing
        constraintName: uk_battle_skill_status_effect__skill_status_scope_timing
    - addForeignKeyConstraint:
        baseTableName: battle_skill_status_effect
        baseColumnNames: skill_rule_id
        referencedTableName: battle_skill_rule
