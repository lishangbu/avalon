databaseChangeLog:
  - changeSet:
      id: 001-001-create-security-rbac
      author: backend
      changes:
        - createTable:
            tableName: security_user
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_security_user
                    nullable: false
              - column:
                  name: username
                  type: varchar(120)
                  constraints:
                    nullable: false
              - column:
                  name: password_hash
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: display_name
                  type: varchar(120)
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: account_non_locked
                  type: boolean
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: security_user
            columnNames: username
            constraintName: uk_security_user__username
        - createTable:
            tableName: security_role
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_security_role
                    nullable: false
              - column:
                  name: code
                  type: varchar(120)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(120)
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: security_role
            columnNames: code
            constraintName: uk_security_role__code
        - createTable:
            tableName: security_user_role
            columns:
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: role_id
                  type: bigint
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: security_user_role
            columnNames: user_id, role_id
            constraintName: pk_security_user_role
        - addForeignKeyConstraint:
            baseTableName: security_user_role
            baseColumnNames: user_id
            referencedTableName: security_user
            referencedColumnNames: id
            constraintName: fk_security_user_role__user_id
        - addForeignKeyConstraint:
            baseTableName: security_user_role
            baseColumnNames: role_id
            referencedTableName: security_role
            referencedColumnNames: id
            constraintName: fk_security_user_role__role_id
        - createIndex:
            tableName: security_user_role
            indexName: idx_security_user_role__role_id
            columns:
              - column:
                  name: role_id
        - createTable:
            tableName: security_access_node
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_security_access_node
                    nullable: false
              - column:
                  name: code
                  type: varchar(160)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(120)
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: varchar(32)
                  constraints:
                    nullable: false
              - column:
                  name: parent_id
                  type: bigint
              - column:
                  name: path
                  type: varchar(255)
              - column:
                  name: component_key
                  type: varchar(255)
              - column:
                  name: icon
                  type: varchar(120)
              - column:
                  name: sort_order
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: visible
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: api_method
                  type: varchar(16)
              - column:
                  name: api_pattern
                  type: varchar(255)
        - addUniqueConstraint:
            tableName: security_access_node
            columnNames: code
            constraintName: uk_security_access_node__code
        - addForeignKeyConstraint:
            baseTableName: security_access_node
            baseColumnNames: parent_id
            referencedTableName: security_access_node
            referencedColumnNames: id
            constraintName: fk_security_access_node__parent_id
        - createIndex:
            tableName: security_access_node
            indexName: idx_security_access_node__parent_id
            columns:
              - column:
                  name: parent_id
        - createIndex:
            tableName: security_access_node
            indexName: idx_security_access_node__type
            columns:
              - column:
                  name: type
        - createIndex:
            tableName: security_access_node
            indexName: idx_security_access_node__visible_enabled
            columns:
              - column:
                  name: visible
              - column:
                  name: enabled
        - createTable:
            tableName: security_role_access_node
            columns:
              - column:
                  name: role_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: access_node_id
                  type: bigint
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: security_role_access_node
            columnNames: role_id, access_node_id
            constraintName: pk_security_role_access_node
        - addForeignKeyConstraint:
            baseTableName: security_role_access_node
            baseColumnNames: role_id
            referencedTableName: security_role
            referencedColumnNames: id
            constraintName: fk_security_role_access_node__role_id
        - addForeignKeyConstraint:
            baseTableName: security_role_access_node
            baseColumnNames: access_node_id
            referencedTableName: security_access_node
            referencedColumnNames: id
            constraintName: fk_security_role_access_node__access_node_id
        - createIndex:
            tableName: security_role_access_node
            indexName: idx_security_role_access_node__access_node_id
            columns:
              - column:
                  name: access_node_id

  - changeSet:
      id: 001-002-seed-security-rbac
      author: backend
      changes:
        - insert:
            tableName: security_role
            columns:
              - column: { name: id, valueNumeric: 201 }
              - column: { name: code, value: "system-admin" }
              - column: { name: name, value: "系统管理员" }
        - insert:
            tableName: security_user
            columns:
              - column: { name: id, valueNumeric: 301 }
              - column: { name: username, value: "admin" }
              - column: { name: password_hash, value: "{noop}secret" }
              - column: { name: display_name, value: "系统管理员" }
              - column: { name: enabled, valueBoolean: true }
              - column: { name: account_non_locked, valueBoolean: true }
        - insert:
            tableName: security_user_role
            columns:
              - column: { name: user_id, valueNumeric: 301 }
              - column: { name: role_id, valueNumeric: 201 }
        - sql:
            sql: |
              insert into security_access_node (
                id, code, name, type, parent_id, path, component_key, icon,
                sort_order, visible, enabled, api_method, api_pattern
              ) values
                (301, 'security:admin', '系统管理 API', 'API', null, null, null, null, 1000, false, true, '*', '/api/system/**'),
                (310, 'system', '系统管理', 'DIRECTORY', null, '/system', null, 'lucide:settings', 10, true, true, null, null),
                (311, 'system.rbac', '访问控制', 'DIRECTORY', 310, '/system/rbac', null, 'lucide:shield-check', 10, true, true, null, null),
                (312, 'system.rbac.users', '用户管理', 'ROUTE', 311, '/system/rbac/users', 'system/rbac/users', 'lucide:users', 10, true, true, null, null),
                (313, 'system.rbac.roles', '角色管理', 'ROUTE', 311, '/system/rbac/roles', 'system/rbac/roles', 'lucide:shield-user', 20, true, true, null, null),
                (314, 'system.rbac.access-nodes', '访问节点', 'ROUTE', 311, '/system/rbac/access-nodes', 'system/rbac/access-nodes', 'lucide:network', 30, true, true, null, null),
                (320, 'system.oauth', 'OAuth 管理', 'DIRECTORY', 310, '/system/oauth', null, 'lucide:key-round', 20, true, true, null, null),
                (321, 'system.oauth.clients', 'OAuth 客户端', 'ROUTE', 320, '/system/oauth/clients', 'system/oauth/clients', 'lucide:plug', 10, true, true, null, null),
                (322, 'system.oauth.jwks', 'JWK 管理', 'ROUTE', 320, '/system/oauth/jwks', 'system/oauth/jwks', 'lucide:key', 20, true, true, null, null),
                (330, 'system.scheduler', '任务调度', 'DIRECTORY', 310, '/system/scheduler', null, 'lucide:calendar-clock', 30, true, true, null, null),
                (331, 'system.scheduler.tasks', '定时任务', 'ROUTE', 330, '/system/scheduler/tasks', 'system/scheduler/tasks', 'lucide:clock', 10, true, true, null, null);
        - sql:
            sql: |
              insert into security_role_access_node (role_id, access_node_id)
              select 201, id
              from security_access_node
              where code in (
                'security:admin',
                'system',
                'system.rbac',
                'system.rbac.users',
                'system.rbac.roles',
                'system.rbac.access-nodes',
                'system.oauth',
                'system.oauth.clients',
                'system.oauth.jwks',
                'system.scheduler',
                'system.scheduler.tasks'
              );

