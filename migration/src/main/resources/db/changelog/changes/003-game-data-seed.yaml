databaseChangeLog:
  - changeSet:
      id: 003-001-seed-game-data-rbac
      author: backend
      changes:
        - update:
            tableName: oauth2_client
            columns:
              - column: { name: scopes, value: "game-data:admin security:admin" }
        - insert:
            tableName: security_role
            columns:
              - column: { name: id, valueNumeric: 202 }
              - column: { name: code, value: "game-data-admin" }
              - column: { name: name, value: "游戏资料管理员" }
        - insert:
            tableName: security_user_role
            columns:
              - column: { name: user_id, valueNumeric: 301 }
              - column: { name: role_id, valueNumeric: 202 }
        - sql:
            sql: |
              insert into security_access_node (
                id, code, name, type, parent_id, path, component_key, icon,
                sort_order, visible, enabled, api_method, api_pattern
              ) values
                (401, 'game-data:admin', '游戏资料 API', 'API', null, null, null, null, 2000, false, true, '*', '/api/game-data/**'),
                (410, 'game-data', '游戏资料', 'DIRECTORY', null, '/game-data', null, 'lucide:database', 20, true, true, null, null),
                (420, 'game-data.core', '核心资料', 'DIRECTORY', 410, '/game-data/core', null, 'lucide:boxes', 10, true, true, null, null),
                (421, 'game-data.creatures', '生物资料', 'ROUTE', 420, '/game-data/creatures', 'game-data/creatures', 'lucide:badge', 10, true, true, null, null),
                (422, 'game-data.species', '种类资料', 'ROUTE', 420, '/game-data/species', 'game-data/species', 'lucide:tags', 20, true, true, null, null),
                (423, 'game-data.skills', '技能资料', 'ROUTE', 420, '/game-data/skills', 'game-data/skills', 'lucide:sparkles', 30, true, true, null, null),
                (424, 'game-data.abilities', '特性资料', 'ROUTE', 420, '/game-data/abilities', 'game-data/abilities', 'lucide:badge-check', 40, true, true, null, null),
                (425, 'game-data.items', '道具资料', 'ROUTE', 420, '/game-data/items', 'game-data/items', 'lucide:package', 50, true, true, null, null),
                (430, 'game-data.dictionary', '字典资料', 'DIRECTORY', 410, '/game-data/dictionary', null, 'lucide:list-tree', 20, true, true, null, null),
                (431, 'game-data.elements', '属性资料', 'ROUTE', 430, '/game-data/elements', 'game-data/elements', 'lucide:flame', 10, true, true, null, null),
                (432, 'game-data.stats', '数值项', 'ROUTE', 430, '/game-data/stats', 'game-data/stats', 'lucide:chart-no-axes-column', 20, true, true, null, null),
                (433, 'game-data.skill-damage-classes', '技能分类', 'ROUTE', 430, '/game-data/skill-damage-classes', 'game-data/skill-damage-classes', 'lucide:split', 30, true, true, null, null),
                (434, 'game-data.item-categories', '道具分类', 'ROUTE', 430, '/game-data/item-categories', 'game-data/item-categories', 'lucide:folder-tree', 40, true, true, null, null),
                (435, 'game-data.species-colors', '种类颜色', 'ROUTE', 430, '/game-data/species-colors', 'game-data/species-colors', 'lucide:palette', 50, true, true, null, null),
                (436, 'game-data.species-shapes', '种类形态', 'ROUTE', 430, '/game-data/species-shapes', 'game-data/species-shapes', 'lucide:shapes', 60, true, true, null, null),
                (437, 'game-data.habitats', '栖息地', 'ROUTE', 430, '/game-data/habitats', 'game-data/habitats', 'lucide:map', 70, true, true, null, null),
                (438, 'game-data.egg-groups', '种类分组', 'ROUTE', 430, '/game-data/egg-groups', 'game-data/egg-groups', 'lucide:layers-3', 80, true, true, null, null),
                (440, 'game-data.relations', '关系资料', 'DIRECTORY', 410, '/game-data/relations', null, 'lucide:network', 30, true, true, null, null),
                (441, 'game-data.species-egg-groups', '种类分组绑定', 'ROUTE', 440, '/game-data/species-egg-groups', 'game-data/species-egg-groups', 'lucide:git-branch', 10, true, true, null, null),
                (442, 'game-data.creature-elements', '生物属性绑定', 'ROUTE', 440, '/game-data/creature-elements', 'game-data/creature-elements', 'lucide:git-branch', 20, true, true, null, null),
                (443, 'game-data.creature-stats', '生物数值绑定', 'ROUTE', 440, '/game-data/creature-stats', 'game-data/creature-stats', 'lucide:git-branch', 30, true, true, null, null),
                (444, 'game-data.creature-abilities', '生物特性绑定', 'ROUTE', 440, '/game-data/creature-abilities', 'game-data/creature-abilities', 'lucide:git-branch', 40, true, true, null, null);
        - sql:
            sql: |
              insert into security_role_access_node (role_id, access_node_id)
              select 202, id
              from security_access_node
              where code like 'game-data%';

  - changeSet:
