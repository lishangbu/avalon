services:
  frontend:
    image: "${AVALON_FRONTEND_IMAGE:-docker.io/slf4j/avalon-admin-ui:latest}"
    depends_on:
      app:
        condition: service_healthy
    environment:
      NGINX_API_PROXY_PASS: http://app:8080
    ports:
      - "${AVALON_FRONTEND_PORT:-4000}:80"
    restart: unless-stopped

  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_DB: avalon
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${AVALON_DB_PORT:-5432}:5432"
    volumes:
      - avalon-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d avalon"]
      interval: 5s
      timeout: 5s
      retries: 20

  valkey:
    image: valkey/valkey:9.0.3
    ports:
      - "${AVALON_VALKEY_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  prometheus:
    image: prom/prometheus:latest
    depends_on:
      app:
        condition: service_healthy
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - avalon-prometheus-data:/prometheus
    restart: unless-stopped

  grafana:
    image: "${AVALON_GRAFANA_IMAGE:-grafana/grafana:latest}"
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: "${AVALON_GRAFANA_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${AVALON_GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${AVALON_GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./ops/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./ops/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - avalon-grafana-data:/var/lib/grafana
    restart: unless-stopped

  app:
    image: "${AVALON_IMAGE:-docker.io/slf4j/avalon:latest}"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    ports:
      - "${AVALON_HTTP_PORT:-8080}:8080"
    environment:
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/avalon
      QUARKUS_DATASOURCE_REACTIVE_URL: postgresql://postgres:5432/avalon
      QUARKUS_REDIS_HOSTS: redis://valkey:6379
      QUARKUS_FLYWAY_MIGRATE_AT_START: "true"
      QUARKUS_FLYWAY_VALIDATE_AT_START: "false"
    healthcheck:
      test: >-
        bash -lc "exec 3<>/dev/tcp/127.0.0.1/8080; printf 'GET
        /q/health/ready HTTP/1.1\r\nHost: localhost\r\nConnection:
        close\r\n\r\n' >&3; grep -q '200 OK' <&3"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

volumes:
  avalon-postgres-data:
  avalon-prometheus-data:
  avalon-grafana-data:
