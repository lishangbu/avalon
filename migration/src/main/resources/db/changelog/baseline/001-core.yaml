- changeSet:
    id: 003-battle-effect-rules-schema
    author: backend
    changes:
    - createTable:
        tableName: battle_skill_rule
        remarks: 战斗技能规则表，保存技能在现代战斗引擎中的命中、伤害、目标和标签策略。
        columns:
        - column:
            name: id
            type: bigint
            remarks: 技能规则主键，内置数据使用稳定数字 ID，后台新增数据由 Jimmer 主键生成器生成。
            constraints:
              primaryKey: true
              primaryKeyName: pk_battle_skill_rule
              nullable: false
        - column:
            name: skill_id
            type: bigint
            remarks: 技能 ID，引用 game_skill。
            constraints:
              nullable: false
        - column:
            name: effect_policy
            type: varchar(80)
            remarks: 技能主效果策略编码，指向战斗引擎中的技能执行实现。
            constraints:
              nullable: false
        - column:
            name: target_policy
            type: varchar(80)
            remarks: 技能目标选择策略编码，用于校验可选目标和实际命中对象。
            constraints:
              nullable: false
        - column:
            name: hit_policy
            type: varchar(80)
            remarks: 技能命中策略编码，描述普通命中、必中、多段或保护类判定。
            constraints:
              nullable: false
        - column:
            name: damage_policy
            type: varchar(80)
            remarks: 技能伤害策略编码，描述常规伤害、固定伤害、无伤害或特殊公式。
            constraints:
              nullable: false
        - column:
            name: min_hits
            type: int
            defaultValueNumeric: 1
            remarks: 技能单次使用的最小连续命中段数，单段技能为 1。
            constraints:
              nullable: false
        - column:
            name: max_hits
            type: int
            defaultValueNumeric: 1
            remarks: 技能单次使用的最大连续命中段数，单段技能为 1。
            constraints:
              nullable: false
        - column:
            name: critical_hit_stage
            type: int
            defaultValueNumeric: 0
            remarks: 技能基础击中要害等级，0 为普通技能，3 及以上按现代规则视为必定要害。
            constraints:
              nullable: false
        - column:
            name: makes_contact
            type: boolean
            defaultValueBoolean: false
            remarks: 技能是否接触目标，用于触发接触类特性、道具或场地效果。
            constraints:
              nullable: false
        - column:
            name: affected_by_protect
            type: boolean
            defaultValueBoolean: true
            remarks: 技能是否会被保护类行动阻挡。
            constraints:
              nullable: false
        - column:
            name: protects_user
            type: boolean
            defaultValueBoolean: false
            remarks: 技能是否在本回合为使用者建立保护屏障。
            constraints:
              nullable: false
        - column:
            name: thaws_user_before_move
            type: boolean
            defaultValueBoolean: false
            remarks: 技能是否允许冰冻中的使用者发动并在行动前解除自身冰冻。
            constraints:
              nullable: false
        - column:
            name: weakened_by_grassy_terrain
            type: boolean
            defaultValueBoolean: false
            remarks: 技能是否属于会被青草场地削弱的地面震动类技能。
            constraints:
              nullable: false
        - column:
            name: recharges_after_use
            type: boolean
            defaultValueBoolean: false
            remarks: 成功造成实际伤害后，使用者下一次技能行动前是否必须休整。
            constraints:
              nullable: false
        - column:
            name: charges_before_use
            type: boolean
            defaultValueBoolean: false
            remarks: 首次使用时是否需要先蓄力，下一次行动才释放技能效果。
            constraints:
              nullable: false
        - column:
            name: sound_based
            type: boolean
            defaultValueBoolean: false
            remarks: 技能是否属于声音类效果。
            constraints:
              nullable: false
        - column:
            name: powder_based
            type: boolean
            defaultValueBoolean: false
            remarks: 技能是否属于粉末或孢子类效果。
            constraints:
              nullable: false
        - column:
            name: punch_based
            type: boolean
            defaultValueBoolean: false
            remarks: 技能是否属于拳击类效果。
            constraints:
              nullable: false
        - column:
            name: slicing_based
            type: boolean
            defaultValueBoolean: false
            remarks: 技能是否属于切割类效果。
            constraints:
              nullable: false
        - column:
            name: lock_move_turns_min
            type: int
            defaultValueNumeric: 1
            remarks: 锁定连续使用该技能的最小总回合数，包含首次使用回合。
            constraints:
              nullable: false
        - column:
            name: lock_move_turns_max
            type: int
            defaultValueNumeric: 1
            remarks: 锁定连续使用该技能的最大总回合数，包含首次使用回合。
            constraints:
              nullable: false
        - column:
            name: confuses_user_after_lock
            type: boolean
            defaultValueBoolean: false
            remarks: 锁招结束后使用者是否进入混乱状态。
            constraints:
              nullable: false
        - column:
            name: force_target_switch
            type: boolean
            defaultValueBoolean: false
            remarks: 技能成功命中并完成伤害或普通附加效果后，是否强制目标所属方随机换入一个可战斗后备成员。
            constraints:
              nullable: false
        - column:
            name: description
            type: varchar(800)
            remarks: 技能规则说明，描述策略覆盖的现代规则边界。
        - column:
            name: enabled
            type: boolean
            defaultValueBoolean: true
            remarks: 是否启用该技能规则。
            constraints:
              nullable: false
        - column:
            name: sort_order
            type: int
            remarks: 技能规则展示排序，数值越小越靠前。
            constraints:
              nullable: false
    - addUniqueConstraint:
        tableName: battle_skill_rule
        columnNames: skill_id
        constraintName: uk_battle_skill_rule__skill_id
    - addForeignKeyConstraint:
        baseTableName: battle_skill_rule
