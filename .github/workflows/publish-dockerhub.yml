name: Publish DockerHub

on:
  workflow_run:
    workflows:
      - Deploy Snapshot With Maven
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: true

jobs:
  publish-dockerhub:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # 使用矩阵策略并行构建多个服务,避免重复代码,提高构建效率
    strategy:
      fail-fast: false
      matrix:
        service: [ avalon-admin-server, avalon-standalone-server ]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: 设置 Java 环境 - 使用Oracle JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'oracle'
          architecture: x64
          cache: 'maven'
          cache-dependency-path: '**/pom.xml'

      - name: 提取maven版本
        id: projectVersion
        shell: bash
        run: |
          set -euo pipefail

          version="$(awk '
            /<parent>/ { in_parent=1; next }
            /<\/parent>/ { in_parent=0; next }
            !in_parent && match($0, /<version>[^<]+<\/version>/) {
              v=substr($0, RSTART+9, RLENGTH-19)
              gsub(/[[:space:]]/, "", v)
              print v
              exit
            }
          ' avalon-parent/pom.xml)"

          if [[ -z "$version" ]]; then
            echo "无法从 avalon-parent/pom.xml 解析版本号"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Detected version: $version"

      - name: Docker 登录
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 编译依赖与应用
        run: |
          ./mvnw -B -pl avalon-application/${{ matrix.service }} -am compile -DskipTests -Ddocker.image.prefix=${{ secrets.DOCKER_USERNAME }} --no-transfer-progress

      - name: 构建镜像
        run: |
          ./mvnw -B -f avalon-application/${{ matrix.service }}/pom.xml spring-boot:build-image -DskipTests -Ddocker.image.prefix=${{ secrets.DOCKER_USERNAME }} --no-transfer-progress

      - name: 推送 latest 镜像
        run: |
          docker push docker.io/${{secrets.DOCKER_USERNAME}}/${{ matrix.service }}:latest

      - name: 推送版本镜像
        run: |
          docker tag docker.io/${{secrets.DOCKER_USERNAME}}/${{ matrix.service }}:latest docker.io/${{secrets.DOCKER_USERNAME}}/${{ matrix.service }}:${{ steps.projectVersion.outputs.version }}
          docker push docker.io/${{secrets.DOCKER_USERNAME}}/${{ matrix.service }}:${{ steps.projectVersion.outputs.version }}
          echo "✅ 镜像构建并推送完成: ${{ matrix.service }}"
