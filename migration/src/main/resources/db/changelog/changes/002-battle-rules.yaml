            name: status_rule_id
    - createTable:
        tableName: battle_skill_stat_stage_effect
        remarks: 战斗技能能力阶级效果表，保存技能造成的能力阶级变化和概率。
        columns:
        - column:
            name: id
            type: bigint
            remarks: 技能能力阶级效果主键。
            constraints:
              primaryKey: true
              primaryKeyName: pk_battle_skill_stat_stage_effect
              nullable: false
        - column:
            name: skill_rule_id
            type: bigint
