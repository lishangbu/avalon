spring:
  application:
    name: avalon
  datasource:
    url: jdbc:postgresql://localhost:5432/avalon
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 12
      minimum-idle: 2
      connection-timeout: 3000
      validation-timeout: 1000
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    scheduler-name: avalon-scheduler
    wait-for-jobs-to-complete-on-shutdown: true
    properties:
      org.quartz.scheduler.instanceId: AUTO
      org.quartz.jobStore.driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
      org.quartz.jobStore.isClustered: true
      org.quartz.jobStore.tablePrefix: QRTZ_
      org.quartz.threadPool.threadCount: 5
  lifecycle:
    timeout-per-shutdown-phase: 30s

jimmer:
  language: kotlin
  dialect: org.babyfish.jimmer.sql.dialect.PostgresDialect

cosid:
  machine:
    enabled: true
    distributor:
      manual:
        machine-id: ${COSID_MACHINE_ID:0}
  snowflake:
    enabled: true
    zone-id: UTC

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        # 健康探活公开；metrics 由生产安全链限制为 security:admin，供受信监控采集。
        include: health,metrics

backend:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:5174
      - http://127.0.0.1:5174
sa-token:
  token-name: avalon-token
  timeout: 604800
  active-timeout: 1800
  is-read-cookie: false
  is-read-body: false
  auto-renew: true
  max-login-count: 5

logging:
  structured:
    format:
      console: logstash
