databaseChangeLog:
- changeSet:
    id: 055-battle-status-priority-ability-rules
    author: backend
    comment: 新增提升变化技能先制度的特性规则。
    changes:
    - insert:
        tableName: battle_ability_rule
        columns:
        - column: { name: id, valueNumeric: 26 }
        - column: { name: ability_id, valueNumeric: 158 }
        - column: { name: trigger_timing, value: BEFORE_MOVE }
        - column: { name: effect_policy, value: status-skill-priority-boost }
        - column: { name: trigger_order, valueNumeric: 60 }
        - column: { name: description, value: 当前上场时让变化类技能获得额外先制度；该提升会让对手恶属性目标免疫。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 260 }
