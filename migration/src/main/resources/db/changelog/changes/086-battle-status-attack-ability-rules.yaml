databaseChangeLog:
- changeSet:
    id: 086-battle-status-attack-ability-rules
    author: backend
    comment: 新增主要异常状态下强化攻击并跳过灼伤减半的特性规则与公开对照 fixture 数据。
    changes:
    - insert:
        tableName: battle_ability_rule
        columns:
        - column: { name: id, valueNumeric: 65 }
        - column: { name: ability_id, valueNumeric: 62 }
        - column: { name: trigger_timing, value: BEFORE_DAMAGE }
        - column: { name: effect_policy, value: major-status-attack-stat-boost-ignore-burn-drop }
        - column: { name: trigger_order, valueNumeric: 90 }
        - column: { name: description, value: 拥有主要异常状态时，使用直接物理技能造成伤害的攻击能力值按 1.5 倍进入普通伤害公式，并跳过灼伤物理伤害减半。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 650 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 177 }
        - column: { name: code, value: major-status-attack-ability-boosts-attack-and-skips-burn-drop }
        - column: { name: name, value: 异常状态物攻强化特性跳过灼伤减半 }
        - column: { name: category, value: ABILITY }
        - column: { name: fixture_type, value: DAMAGE_FORMULA }
        - column: { name: description, value: 验证主要异常状态下攻击能力值修正特性会提升攻击，并阻止灼伤对物理伤害的减半。 }
        - column: { name: input_summary, value: 使用者拥有异常状态物攻强化特性，分别在灼伤、中毒和无异常状态下使用中性一般物理技能。 }
        - column: { name: expected_summary, value: 有主要异常状态时攻击值按 1.5 倍进入基础伤害公式；灼伤不会再把物理伤害减半，无异常状态时不触发强化。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 1770 }
    - insert:
        tableName: battle_rule_fixture_source
        columns:
        - column: { name: id, valueNumeric: 360 }
        - column: { name: fixture_id, valueNumeric: 177 }
        - column: { name: source_url, value: https://github.com/smogon/pokemon-showdown/blob/master/data/abilities.ts }
        - column: { name: source_label, value: 公开引擎特性资料 }
        - column: { name: source_note, value: 用于对照主要异常状态存在时攻击能力值按 1.5 倍参与普通伤害公式。 }
        - column: { name: sort_order, valueNumeric: 10 }
    - insert:
        tableName: battle_rule_fixture_source
        columns:
        - column: { name: id, valueNumeric: 361 }
        - column: { name: fixture_id, valueNumeric: 177 }
        - column: { name: source_url, value: https://github.com/smogon/pokemon-showdown/blob/master/sim/battle-actions.ts }
        - column: { name: source_label, value: 公开引擎伤害流程 }
        - column: { name: source_note, value: 用于对照灼伤物理伤害减半时会排除该类异常状态攻击强化特性。 }
        - column: { name: sort_order, valueNumeric: 20 }
    - insert:
        tableName: battle_rule_test_run
        columns:
        - column: { name: id, valueNumeric: 177 }
        - column: { name: run_code, value: status-attack-ability-coverage-20260629-1 }
        - column: { name: fixture_id, valueNumeric: 177 }
        - column: { name: run_status, value: PASSED }
        - column: { name: executor, value: gradle }
        - column: { name: command, value: ./gradlew :battle-engine:test :battle-rules:test :migration:test }
        - column: { name: started_at, value: "2026-06-29T14:30:00+08:00" }
        - column: { name: sort_order, valueNumeric: 1770 }
