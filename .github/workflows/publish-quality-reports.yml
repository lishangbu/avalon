name: Publish Quality Reports

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  actions: read
  contents: read

concurrency:
  group: avalon-site-publish-${{ github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: true

jobs:
  publish-quality-reports:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: 准备构建环境
        uses: ./.github/actions/setup-build-env
        with:
          github-token: ${{ github.token }}
          ip2location-source-run-id: ${{ github.event.workflow_run.id }}

      - name: 生成聚合测试与覆盖率站点
        run: gradle aggregateReportsSite

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAT }}
          publish_dir: build/reports/github-pages/quality
          external_repository: lishangbu/avalon-site
          publish_branch: main
          destination_dir: quality
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
