                710
              )
          ),
          numbered_ability_rules as (
            select
              coalesce((select max(id) from battle_ability_rule), 0) + row_number() over (order by sort_order) as id,
              a.id as ability_id,
              nr.trigger_timing,
              nr.effect_policy,
              nr.trigger_order,
              nr.description,
              nr.sort_order
            from new_ability_rules nr
            join game_ability a on a.code = nr.ability_code
          )
          insert into battle_ability_rule (
            id,
            ability_id,
            trigger_timing,
            effect_policy,
            trigger_order,
            description,
            enabled,
            sort_order
          )
          select
            id,
            ability_id,
            trigger_timing,
            effect_policy,
            trigger_order,
            description,
            true,
            sort_order
          from numbered_ability_rules
          on conflict (ability_id, trigger_timing, effect_policy) do update set
            trigger_order = excluded.trigger_order,
            description = excluded.description,
            enabled = excluded.enabled,
            sort_order = excluded.sort_order;

          with new_item_rules(item_code, trigger_timing, effect_policy, consumable, trigger_order, description, sort_order) as (
            values
              (
                'rocky-helmet',
                'AFTER_DAMAGE',
                'contact-damage-to-attacker-sixth',
                false,
                80,
                '持有者被接触类技能成功命中后，攻击方按自身最大 HP 的 1/6 受到间接伤害；该道具不会因此消耗。',
                640
              )
          ),
          numbered_item_rules as (
            select
              coalesce((select max(id) from battle_item_rule), 0) + row_number() over (order by sort_order) as id,
              i.id as item_id,
              nr.trigger_timing,
              nr.effect_policy,
              nr.consumable,
              nr.trigger_order,
              nr.description,
              nr.sort_order
            from new_item_rules nr
            join game_item i on i.code = nr.item_code
          )
          insert into battle_item_rule (
            id,
            item_id,
            trigger_timing,
            effect_policy,
            consumable,
            trigger_order,
            description,
            enabled,
            sort_order
          )
          select
            id,
            item_id,
            trigger_timing,
            effect_policy,
            consumable,
            trigger_order,
            description,
            true,
            sort_order
          from numbered_item_rules
          on conflict (item_id, trigger_timing, effect_policy) do update set
            consumable = excluded.consumable,
            trigger_order = excluded.trigger_order,
            description = excluded.description,
            enabled = excluded.enabled,
            sort_order = excluded.sort_order;
