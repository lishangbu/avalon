databaseChangeLog:
  - changeSet:
      id: 002-001-create-game-data-dictionaries
      author: backend
      changes:
        - createTable:
            tableName: game_element
            remarks: 游戏资料属性字典，保存中性属性名称和排序。
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  remarks: 属性主键，内置数据使用稳定数字 ID，后台新增数据由数据库生成。
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_game_element
                    nullable: false
              - column:
                  name: code
                  type: varchar(80)
                  remarks: 属性稳定编码，用于 API、前端和关系表之外的人工识别。
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(80)
                  remarks: 属性简体中文显示名称。
                  constraints:
                    nullable: false
              - column:
                  name: sort_order
                  type: int
                  remarks: 属性列表排序值，数值越小越靠前。
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: boolean
                  defaultValueBoolean: true
                  remarks: 是否启用该属性，禁用后仍保留历史关系。
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: game_element
            columnNames: code
            constraintName: uk_game_element__code
        - createTable:
            tableName: game_stat
            remarks: 游戏资料数值项字典，保存生命、攻击等基础数值定义。
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  remarks: 数值项主键，内置数据使用稳定数字 ID，后台新增数据由数据库生成。
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_game_stat
                    nullable: false
              - column:
                  name: code
                  type: varchar(80)
                  remarks: 数值项稳定编码。
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(80)
                  remarks: 数值项简体中文显示名称。
                  constraints:
                    nullable: false
              - column:
                  name: sort_order
                  type: int
                  remarks: 数值项展示排序值。
                  constraints:
                    nullable: false
              - column:
                  name: battle_only
                  type: boolean
                  defaultValueBoolean: false
                  remarks: 是否只在对战或运行时计算中使用。
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: boolean
                  defaultValueBoolean: true
                  remarks: 是否启用该数值项。
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: game_stat
            columnNames: code
            constraintName: uk_game_stat__code
        - createTable:
            tableName: game_skill_damage_class
            remarks: 技能分类字典，描述技能的结算分类。
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  remarks: 技能分类主键。
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_game_skill_damage_class
                    nullable: false
              - column:
                  name: code
                  type: varchar(80)
                  remarks: 技能分类稳定编码。
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(80)
                  remarks: 技能分类简体中文显示名称。
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(500)
                  remarks: 技能分类说明，供后台详情展示。
              - column:
                  name: sort_order
                  type: int
                  remarks: 技能分类展示排序值。
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: boolean
                  defaultValueBoolean: true
                  remarks: 是否启用该技能分类。
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: game_skill_damage_class
            columnNames: code
            constraintName: uk_game_skill_damage_class__code
        - createTable:
            tableName: game_item_category
            remarks: 道具分类字典，保存中性道具分类。
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  remarks: 道具分类主键。
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_game_item_category
                    nullable: false
              - column:
                  name: code
                  type: varchar(80)
                  remarks: 道具分类稳定编码。
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(120)
                  remarks: 道具分类简体中文显示名称。
                  constraints:
                    nullable: false
              - column:
                  name: sort_order
                  type: int
                  remarks: 道具分类展示排序值。
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: boolean
                  defaultValueBoolean: true
                  remarks: 是否启用该道具分类。
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: game_item_category
            columnNames: code
            constraintName: uk_game_item_category__code

  - changeSet:
      id: 002-002-create-game-data-species-dictionaries
      author: backend
      changes:
        - createTable:
            tableName: game_species_color
            remarks: 种类颜色字典，用于描述种类的主色倾向。
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, remarks: 颜色主键。, constraints: { primaryKey: true, primaryKeyName: pk_game_species_color, nullable: false } }
              - column: { name: code, type: varchar(80), remarks: 颜色稳定编码。, constraints: { nullable: false } }
              - column: { name: name, type: varchar(80), remarks: 颜色简体中文显示名称。, constraints: { nullable: false } }
              - column: { name: sort_order, type: int, remarks: 颜色展示排序值。, constraints: { nullable: false } }
              - column: { name: enabled, type: boolean, defaultValueBoolean: true, remarks: 是否启用该颜色。, constraints: { nullable: false } }
        - addUniqueConstraint:
            tableName: game_species_color
            columnNames: code
            constraintName: uk_game_species_color__code
        - createTable:
            tableName: game_species_shape
            remarks: 种类形态字典，用于描述种类的外形轮廓。
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, remarks: 形态主键。, constraints: { primaryKey: true, primaryKeyName: pk_game_species_shape, nullable: false } }
              - column: { name: code, type: varchar(80), remarks: 形态稳定编码。, constraints: { nullable: false } }
              - column: { name: name, type: varchar(80), remarks: 形态简体中文显示名称。, constraints: { nullable: false } }
              - column: { name: sort_order, type: int, remarks: 形态展示排序值。, constraints: { nullable: false } }
              - column: { name: enabled, type: boolean, defaultValueBoolean: true, remarks: 是否启用该形态。, constraints: { nullable: false } }
        - addUniqueConstraint:
            tableName: game_species_shape
            columnNames: code
            constraintName: uk_game_species_shape__code
        - createTable:
            tableName: game_habitat
            remarks: 栖息地字典，用于描述种类常见环境。
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, remarks: 栖息地主键。, constraints: { primaryKey: true, primaryKeyName: pk_game_habitat, nullable: false } }
              - column: { name: code, type: varchar(80), remarks: 栖息地稳定编码。, constraints: { nullable: false } }
              - column: { name: name, type: varchar(80), remarks: 栖息地简体中文显示名称。, constraints: { nullable: false } }
              - column: { name: sort_order, type: int, remarks: 栖息地展示排序值。, constraints: { nullable: false } }
              - column: { name: enabled, type: boolean, defaultValueBoolean: true, remarks: 是否启用该栖息地。, constraints: { nullable: false } }
        - addUniqueConstraint:
            tableName: game_habitat
            columnNames: code
            constraintName: uk_game_habitat__code
        - createTable:
            tableName: game_egg_group
            remarks: 种类分组字典，用于维护种类的繁育或生态分组。
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, remarks: 分组主键。, constraints: { primaryKey: true, primaryKeyName: pk_game_egg_group, nullable: false } }
              - column: { name: code, type: varchar(80), remarks: 分组稳定编码。, constraints: { nullable: false } }
              - column: { name: name, type: varchar(80), remarks: 分组简体中文显示名称。, constraints: { nullable: false } }
              - column: { name: sort_order, type: int, remarks: 分组展示排序值。, constraints: { nullable: false } }
              - column: { name: enabled, type: boolean, defaultValueBoolean: true, remarks: 是否启用该分组。, constraints: { nullable: false } }
        - addUniqueConstraint:
            tableName: game_egg_group
            columnNames: code
            constraintName: uk_game_egg_group__code

  - changeSet:
      id: 002-003-create-game-data-main-tables
      author: backend
      changes:
        - createTable:
            tableName: game_ability
            remarks: 特性资料表，保存可被生物引用的被动能力定义。
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, remarks: 特性主键。, constraints: { primaryKey: true, primaryKeyName: pk_game_ability, nullable: false } }
              - column: { name: code, type: varchar(80), remarks: 特性稳定编码。, constraints: { nullable: false } }
              - column: { name: name, type: varchar(120), remarks: 特性简体中文显示名称。, constraints: { nullable: false } }
              - column: { name: main_series, type: boolean, defaultValueBoolean: true, remarks: 是否属于主体资料体系。, constraints: { nullable: false } }
              - column: { name: enabled, type: boolean, defaultValueBoolean: true, remarks: 是否启用该特性。, constraints: { nullable: false } }
        - addUniqueConstraint: { tableName: game_ability, columnNames: code, constraintName: uk_game_ability__code }
        - createTable:
            tableName: game_skill
            remarks: 技能资料表，保存技能基础数值和分类引用。
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, remarks: 技能主键。, constraints: { primaryKey: true, primaryKeyName: pk_game_skill, nullable: false } }
              - column: { name: code, type: varchar(80), remarks: 技能稳定编码。, constraints: { nullable: false } }
              - column: { name: name, type: varchar(120), remarks: 技能简体中文显示名称。, constraints: { nullable: false } }
              - column: { name: element_id, type: bigint, remarks: 技能所属属性 ID，引用 game_element。 }
              - column: { name: damage_class_id, type: bigint, remarks: 技能结算分类 ID，引用 game_skill_damage_class。 }
              - column: { name: accuracy, type: int, remarks: 命中数值，空值表示不使用命中判定。 }
              - column: { name: power, type: int, remarks: 威力数值，空值表示不造成直接威力。 }
              - column: { name: pp, type: int, remarks: 默认可使用次数。 }
              - column: { name: priority, type: int, defaultValueNumeric: 0, remarks: 行动优先级，数值越大越优先。, constraints: { nullable: false } }
              - column: { name: effect_chance, type: int, remarks: 附加效果概率，空值表示无概率效果。 }
              - column: { name: enabled, type: boolean, defaultValueBoolean: true, remarks: 是否启用该技能。, constraints: { nullable: false } }
        - addUniqueConstraint: { tableName: game_skill, columnNames: code, constraintName: uk_game_skill__code }
        - addForeignKeyConstraint: { baseTableName: game_skill, baseColumnNames: element_id, referencedTableName: game_element, referencedColumnNames: id, constraintName: fk_game_skill__element_id }
        - addForeignKeyConstraint: { baseTableName: game_skill, baseColumnNames: damage_class_id, referencedTableName: game_skill_damage_class, referencedColumnNames: id, constraintName: fk_game_skill__damage_class_id }
        - createIndex: { tableName: game_skill, indexName: idx_game_skill__element_id, columns: [ { column: { name: element_id } } ] }
        - createIndex: { tableName: game_skill, indexName: idx_game_skill__damage_class_id, columns: [ { column: { name: damage_class_id } } ] }
        - createTable:
            tableName: game_item
            remarks: 道具资料表，保存道具基础价格和分类引用。
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, remarks: 道具主键。, constraints: { primaryKey: true, primaryKeyName: pk_game_item, nullable: false } }
              - column: { name: code, type: varchar(80), remarks: 道具稳定编码。, constraints: { nullable: false } }
              - column: { name: name, type: varchar(120), remarks: 道具简体中文显示名称。, constraints: { nullable: false } }
              - column: { name: category_id, type: bigint, remarks: 道具分类 ID，引用 game_item_category。 }
              - column: { name: cost, type: int, defaultValueNumeric: 0, remarks: 道具基础价格或价值。, constraints: { nullable: false } }
              - column: { name: fling_power, type: int, remarks: 投掷或抛出相关威力，空值表示不适用。 }
              - column: { name: enabled, type: boolean, defaultValueBoolean: true, remarks: 是否启用该道具。, constraints: { nullable: false } }
        - addUniqueConstraint: { tableName: game_item, columnNames: code, constraintName: uk_game_item__code }
        - addForeignKeyConstraint: { baseTableName: game_item, baseColumnNames: category_id, referencedTableName: game_item_category, referencedColumnNames: id, constraintName: fk_game_item__category_id }
        - createIndex: { tableName: game_item, indexName: idx_game_item__category_id, columns: [ { column: { name: category_id } } ] }
        - createTable:
            tableName: game_species
            remarks: 种类资料表，保存生物种类层面的生态和基础配置。
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, remarks: 种类主键。, constraints: { primaryKey: true, primaryKeyName: pk_game_species, nullable: false } }
              - column: { name: code, type: varchar(80), remarks: 种类稳定编码。, constraints: { nullable: false } }
              - column: { name: name, type: varchar(120), remarks: 种类简体中文显示名称。, constraints: { nullable: false } }
              - column: { name: color_id, type: bigint, remarks: 主色 ID，引用 game_species_color。 }
              - column: { name: shape_id, type: bigint, remarks: 形态 ID，引用 game_species_shape。 }
              - column: { name: habitat_id, type: bigint, remarks: 栖息地 ID，引用 game_habitat。 }
              - column: { name: gender_rate, type: int, remarks: 性别比例编码，空值表示未设置。 }
              - column: { name: capture_rate, type: int, remarks: 捕获或获取难度数值。 }
              - column: { name: base_happiness, type: int, remarks: 初始亲和度数值。 }
              - column: { name: hatch_counter, type: int, remarks: 孵化或成长计数。 }
              - column: { name: baby, type: boolean, defaultValueBoolean: false, remarks: 是否为幼体种类。, constraints: { nullable: false } }
              - column: { name: legendary, type: boolean, defaultValueBoolean: false, remarks: 是否为传说级种类。, constraints: { nullable: false } }
              - column: { name: mythical, type: boolean, defaultValueBoolean: false, remarks: 是否为幻级稀有种类。, constraints: { nullable: false } }
              - column: { name: enabled, type: boolean, defaultValueBoolean: true, remarks: 是否启用该种类。, constraints: { nullable: false } }
        - addUniqueConstraint: { tableName: game_species, columnNames: code, constraintName: uk_game_species__code }
        - addForeignKeyConstraint: { baseTableName: game_species, baseColumnNames: color_id, referencedTableName: game_species_color, referencedColumnNames: id, constraintName: fk_game_species__color_id }
        - addForeignKeyConstraint: { baseTableName: game_species, baseColumnNames: shape_id, referencedTableName: game_species_shape, referencedColumnNames: id, constraintName: fk_game_species__shape_id }
        - addForeignKeyConstraint: { baseTableName: game_species, baseColumnNames: habitat_id, referencedTableName: game_habitat, referencedColumnNames: id, constraintName: fk_game_species__habitat_id }
        - createIndex: { tableName: game_species, indexName: idx_game_species__color_id, columns: [ { column: { name: color_id } } ] }
        - createIndex: { tableName: game_species, indexName: idx_game_species__shape_id, columns: [ { column: { name: shape_id } } ] }
        - createIndex: { tableName: game_species, indexName: idx_game_species__habitat_id, columns: [ { column: { name: habitat_id } } ] }
        - createTable:
            tableName: game_creature
            remarks: 生物资料表，保存生物个体条目的基础尺寸和经验数值。
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, remarks: 生物主键。, constraints: { primaryKey: true, primaryKeyName: pk_game_creature, nullable: false } }
              - column: { name: code, type: varchar(80), remarks: 生物稳定编码。, constraints: { nullable: false } }
              - column: { name: name, type: varchar(120), remarks: 生物简体中文显示名称。, constraints: { nullable: false } }
              - column: { name: species_id, type: bigint, remarks: 所属种类 ID，引用 game_species。 }
              - column: { name: height, type: int, remarks: 高度数值，单位沿用资料源的整数刻度。 }
              - column: { name: weight, type: int, remarks: 重量数值，单位沿用资料源的整数刻度。 }
              - column: { name: base_experience, type: int, remarks: 基础经验或成长收益数值。 }
              - column: { name: sort_order, type: int, remarks: 生物展示排序值。 }
              - column: { name: default_form, type: boolean, defaultValueBoolean: true, remarks: 是否为默认形态条目。, constraints: { nullable: false } }
              - column: { name: enabled, type: boolean, defaultValueBoolean: true, remarks: 是否启用该生物条目。, constraints: { nullable: false } }
        - addUniqueConstraint: { tableName: game_creature, columnNames: code, constraintName: uk_game_creature__code }
        - addForeignKeyConstraint: { baseTableName: game_creature, baseColumnNames: species_id, referencedTableName: game_species, referencedColumnNames: id, constraintName: fk_game_creature__species_id }
        - createIndex: { tableName: game_creature, indexName: idx_game_creature__species_id, columns: [ { column: { name: species_id } } ] }

  - changeSet:
      id: 002-004-create-game-data-relations
      author: backend
      changes:
        - createTable:
            tableName: game_species_egg_group
            remarks: 种类与分组绑定表，维护一个种类可属于的多个分组。
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, remarks: 种类分组绑定主键。, constraints: { primaryKey: true, primaryKeyName: pk_game_species_egg_group, nullable: false } }
              - column: { name: species_id, type: bigint, remarks: 种类 ID，引用 game_species。, constraints: { nullable: false } }
              - column: { name: egg_group_id, type: bigint, remarks: 分组 ID，引用 game_egg_group。, constraints: { nullable: false } }
              - column: { name: slot_order, type: int, remarks: 分组槽位排序值。, constraints: { nullable: false } }
        - addUniqueConstraint: { tableName: game_species_egg_group, columnNames: "species_id, egg_group_id", constraintName: uk_game_species_egg_group__species_group }
        - addForeignKeyConstraint: { baseTableName: game_species_egg_group, baseColumnNames: species_id, referencedTableName: game_species, referencedColumnNames: id, constraintName: fk_game_species_egg_group__species_id, onDelete: CASCADE }
        - addForeignKeyConstraint: { baseTableName: game_species_egg_group, baseColumnNames: egg_group_id, referencedTableName: game_egg_group, referencedColumnNames: id, constraintName: fk_game_species_egg_group__egg_group_id }
        - createIndex: { tableName: game_species_egg_group, indexName: idx_game_species_egg_group__egg_group_id, columns: [ { column: { name: egg_group_id } } ] }
        - createTable:
            tableName: game_creature_element
            remarks: 生物与属性绑定表，维护一个生物条目的属性槽位。
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, remarks: 生物属性绑定主键。, constraints: { primaryKey: true, primaryKeyName: pk_game_creature_element, nullable: false } }
              - column: { name: creature_id, type: bigint, remarks: 生物 ID，引用 game_creature。, constraints: { nullable: false } }
              - column: { name: element_id, type: bigint, remarks: 属性 ID，引用 game_element。, constraints: { nullable: false } }
              - column: { name: slot_order, type: int, remarks: 属性槽位排序值。, constraints: { nullable: false } }
        - addUniqueConstraint: { tableName: game_creature_element, columnNames: "creature_id, slot_order", constraintName: uk_game_creature_element__creature_slot }
        - addForeignKeyConstraint: { baseTableName: game_creature_element, baseColumnNames: creature_id, referencedTableName: game_creature, referencedColumnNames: id, constraintName: fk_game_creature_element__creature_id, onDelete: CASCADE }
        - addForeignKeyConstraint: { baseTableName: game_creature_element, baseColumnNames: element_id, referencedTableName: game_element, referencedColumnNames: id, constraintName: fk_game_creature_element__element_id }
        - createIndex: { tableName: game_creature_element, indexName: idx_game_creature_element__element_id, columns: [ { column: { name: element_id } } ] }
        - createTable:
            tableName: game_creature_stat
            remarks: 生物数值绑定表，维护生物各项基础数值和努力值。
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, remarks: 生物数值绑定主键。, constraints: { primaryKey: true, primaryKeyName: pk_game_creature_stat, nullable: false } }
              - column: { name: creature_id, type: bigint, remarks: 生物 ID，引用 game_creature。, constraints: { nullable: false } }
              - column: { name: stat_id, type: bigint, remarks: 数值项 ID，引用 game_stat。, constraints: { nullable: false } }
              - column: { name: base_value, type: int, remarks: 基础数值。, constraints: { nullable: false } }
              - column: { name: effort, type: int, defaultValueNumeric: 0, remarks: 该数值项对应的努力收益。, constraints: { nullable: false } }
        - addUniqueConstraint: { tableName: game_creature_stat, columnNames: "creature_id, stat_id", constraintName: uk_game_creature_stat__creature_stat }
        - addForeignKeyConstraint: { baseTableName: game_creature_stat, baseColumnNames: creature_id, referencedTableName: game_creature, referencedColumnNames: id, constraintName: fk_game_creature_stat__creature_id, onDelete: CASCADE }
        - addForeignKeyConstraint: { baseTableName: game_creature_stat, baseColumnNames: stat_id, referencedTableName: game_stat, referencedColumnNames: id, constraintName: fk_game_creature_stat__stat_id }
        - createIndex: { tableName: game_creature_stat, indexName: idx_game_creature_stat__stat_id, columns: [ { column: { name: stat_id } } ] }
        - createTable:
            tableName: game_creature_ability
            remarks: 生物与特性绑定表，维护生物可拥有的特性槽位。
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, remarks: 生物特性绑定主键。, constraints: { primaryKey: true, primaryKeyName: pk_game_creature_ability, nullable: false } }
              - column: { name: creature_id, type: bigint, remarks: 生物 ID，引用 game_creature。, constraints: { nullable: false } }
              - column: { name: ability_id, type: bigint, remarks: 特性 ID，引用 game_ability。, constraints: { nullable: false } }
