name: CI

on:
  push:
    branches:
      - main
    paths: &ci_paths
      - '**/*.kt'
      - '**/*.kts'
      - 'gradle/**'
      - '**/*.yml'
      - '**/*.yaml'
      - 'gradle.properties'
      - 'db/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths: *ci_paths

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: CI / Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: 准备构建环境
        uses: ./.github/actions/setup-build-env
        with:
          ip2location-download-token: ${{ secrets.IP2LOCATION_DOWNLOAD_TOKEN }}
          upload-ip2location-artifact: 'true'
      - name: 编译并执行测试
        run: gradle ktlintCheck test
