name: Deploy Snapshot With Maven

on:
  push:
    branches:
      - main
    paths:
      - '**/*.java'
      - '**/pom.xml'
      - '.mvn/**'
      - 'db/**'
      - 'mvnw'
      - 'mvnw.cmd'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths:
      - '**/*.java'
      - '**/pom.xml'
      - '.mvn/**'
      - 'db/**'
      - 'mvnw'
      - 'mvnw.cmd'
      - '.github/workflows/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: 设置 Java 环境 - 使用Oracle JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'oracle'
          architecture: x64
          cache: 'maven'
          cache-dependency-path: '**/pom.xml'
      - name: 编译并执行测试
        run: ./mvnw -B test --no-transfer-progress

  deploy-snapshot:
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: 设置 Java 环境 - 使用Oracle JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'oracle'
          architecture: x64
          cache: 'maven'
          cache-dependency-path: '**/pom.xml'
      - name: 导入 GPG 密钥
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - name: 提取maven版本
        id: projectVersion
        shell: bash
        run: |
          set -euo pipefail

          version="$(awk '
            /<parent>/ { in_parent=1; next }
            /<\/parent>/ { in_parent=0; next }
            !in_parent && match($0, /<version>[^<]+<\/version>/) {
              v=substr($0, RSTART+9, RLENGTH-19)
              gsub(/[[:space:]]/, "", v)
              print v
              exit
            }
          ' avalon-parent/pom.xml)"

          if [[ -z "$version" ]]; then
            echo "无法从 avalon-parent/pom.xml 解析版本号"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Detected version: $version"

      - name: 使用Maven发布快照到Maven Central
        if: endsWith(steps.projectVersion.outputs.version, '-SNAPSHOT')
        run: |
          mkdir -p ~/.m2
          cat <<EOF > ~/.m2/settings.xml
          <settings>
            <servers>
              <server>
                <id>central</id>
                <username>\${env.MAVEN_CENTRAL_USERNAME}</username>
                <password>\${env.MAVEN_CENTRAL_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF
          ./mvnw -B clean deploy -P release -DskipTests --no-transfer-progress
          echo "✅ maven发布完成"
        env:
          MAVEN_GPG_PASSPHRASE: ${{secrets.GPG_PASSPHRASE}}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
