- changeSet:
    id: 002-battle-rules-schema
    author: backend
    changes:
    - createTable:
        tableName: battle_format
        remarks: 战斗赛制表，保存现代规则下可选的对战模式和默认队伍配置。
        columns:
        - column:
            name: id
            type: bigint
            remarks: 赛制主键，内置数据使用稳定数字 ID，后台新增数据由 Jimmer 主键生成器生成。
            constraints:
              primaryKey: true
              primaryKeyName: pk_battle_format
              nullable: false
        - column:
            name: code
            type: varchar(80)
            remarks: 赛制稳定编码，用于规则加载、接口筛选和对照测试夹具引用。
            constraints:
              nullable: false
        - column:
            name: name
            type: varchar(80)
            remarks: 赛制简体中文显示名称。
            constraints:
              nullable: false
        - column:
            name: description
            type: varchar(600)
            remarks: 赛制说明，描述适用场景和主要限制。
        - column:
            name: battle_mode
            type: varchar(32)
            remarks: 对战站位模式，例如 SINGLE 或 DOUBLE。
            constraints:
              nullable: false
        - column:
            name: player_count
            type: int
