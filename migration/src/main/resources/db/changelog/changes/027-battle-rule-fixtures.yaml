databaseChangeLog:
- changeSet:
    id: 027-battle-rule-fixtures
    author: backend
    comment: 新增战斗规则公开对照 fixture 和测试运行结果维护表。
    changes:
    - createTable:
        tableName: battle_rule_fixture
        remarks: 战斗规则公开对照 fixture 主表，保存可维护的规则场景元数据和期望摘要。
        columns:
        - column:
            name: id
            type: bigint
            remarks: Fixture 主键，内置数据使用稳定数字 ID，后台新增数据由 Jimmer 主键生成器生成。
            constraints:
              primaryKey: true
              primaryKeyName: pk_battle_rule_fixture
              nullable: false
        - column:
            name: code
            type: varchar(120)
            remarks: Fixture 稳定编码，必须与自动化测试中的公开 fixture 名称保持一致。
            constraints:
              nullable: false
        - column:
            name: name
            type: varchar(120)
            remarks: Fixture 简体中文显示名称。
            constraints:
              nullable: false
        - column:
            name: category
            type: varchar(60)
            remarks: Fixture 所属规则分类，例如 DAMAGE、STATUS、FIELD 或 TURN。
            constraints:
              nullable: false
        - column:
            name: fixture_type
            type: varchar(40)
            remarks: Fixture 类型，例如 FORMULA 表示公式级，STATE_MACHINE 表示状态机级。
            constraints:
              nullable: false
        - column:
            name: format_code
            type: varchar(80)
            remarks: 关联赛制 code；公式级 fixture 可为空，表示不依赖具体赛制。
        - column:
            name: description
            type: varchar(800)
            remarks: Fixture 场景说明，描述要验证的公开规则边界。
        - column:
            name: input_summary
            type: varchar(1000)
            remarks: Fixture 输入摘要，不保存原始 JSON，避免把运行态快照当作非结构化事实源。
            constraints:
              nullable: false
        - column:
            name: expected_summary
            type: varchar(1000)
            remarks: Fixture 期望摘要，说明关键事件、随机消费或终局状态。
            constraints:
              nullable: false
        - column:
            name: enabled
            type: boolean
            defaultValueBoolean: true
            remarks: 是否启用该 Fixture，禁用后仍保留历史运行结果。
            constraints:
              nullable: false
        - column:
            name: sort_order
            type: int
            remarks: Fixture 展示排序，数值越小越靠前。
            constraints:
              nullable: false
    - addUniqueConstraint:
        tableName: battle_rule_fixture
        columnNames: code
        constraintName: uk_battle_rule_fixture__code
    - createIndex:
        tableName: battle_rule_fixture
        indexName: idx_battle_rule_fixture__category_enabled
        columns:
        - column: { name: category }
        - column: { name: enabled }
        - column: { name: sort_order }
    - createTable:
        tableName: battle_rule_test_run
        remarks: 战斗规则 fixture 测试运行结果表，保存一次自动化或人工对照执行的结构化结果。
        columns:
        - column:
            name: id
            type: bigint
            remarks: 测试运行主键，后台新增数据由 Jimmer 主键生成器生成。
            constraints:
              primaryKey: true
              primaryKeyName: pk_battle_rule_test_run
              nullable: false
        - column:
            name: run_code
            type: varchar(120)
            remarks: 测试运行稳定编码，用于幂等写入和管理端定位单次运行。
            constraints:
              nullable: false
        - column:
            name: fixture_id
            type: bigint
            remarks: 被执行的 Fixture ID，引用 battle_rule_fixture。
            constraints:
              nullable: false
        - column:
            name: run_status
            type: varchar(30)
            remarks: 运行状态，例如 PASSED、FAILED、SKIPPED 或 RUNNING。
            constraints:
              nullable: false
        - column:
            name: executor
            type: varchar(80)
            remarks: 执行器名称，例如 gradle、manual 或 ci。
            constraints:
              nullable: false
        - column:
            name: command
            type: varchar(300)
            remarks: 执行命令摘要，不保存完整控制台日志。
        - column:
            name: engine_commit
            type: varchar(80)
            remarks: 对应后端代码提交或构建号。
        - column:
            name: started_at
            type: timestamp with time zone
            remarks: 测试运行开始时间，统一按带时区时间保存。
            constraints:
              nullable: false
        - column:
            name: finished_at
            type: timestamp with time zone
            remarks: 测试运行结束时间，RUNNING 状态可为空。
        - column:
            name: duration_ms
            type: bigint
            remarks: 测试运行耗时毫秒数，可由执行器写入。
        - column:
            name: assertion_count
            type: int
            remarks: 本次运行覆盖的断言数量，可为空。
        - column:
            name: failure_message
            type: varchar(1000)
            remarks: 失败摘要，只保存可展示的结构化结论，不保存原始控制台输出。
        - column:
            name: sort_order
            type: int
            remarks: 运行记录展示排序，默认可使用时间倒序辅助值。
            constraints:
              nullable: false
    - addForeignKeyConstraint:
        baseTableName: battle_rule_test_run
        baseColumnNames: fixture_id
        referencedTableName: battle_rule_fixture
        referencedColumnNames: id
        constraintName: fk_battle_rule_test_run__fixture_id
        onDelete: CASCADE
    - addUniqueConstraint:
        tableName: battle_rule_test_run
        columnNames: run_code
        constraintName: uk_battle_rule_test_run__run_code
    - createIndex:
        tableName: battle_rule_test_run
        indexName: idx_battle_rule_test_run__fixture_status
        columns:
        - column: { name: fixture_id }
        - column: { name: run_status }
        - column: { name: started_at }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 1 }
        - column: { name: code, value: target-evasion-stage-lowers-effective-accuracy }
        - column: { name: name, value: 目标闪避阶级降低有效命中 }
        - column: { name: category, value: TURN }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证目标闪避 +1 时，基础 100 命中的技能会按 75 有效命中判定。 }
        - column: { name: input_summary, value: 使用者使用基础命中 100 的技能，目标闪避阶级为 +1，固定命中随机数为 76。 }
        - column: { name: expected_summary, value: 目标 +1 闪避把有效命中降为 75；随机数 76 大于有效命中，因此技能未命中且不造成伤害。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 10 }
    - insert:
        tableName: battle_rule_fixture
