databaseChangeLog:
- changeSet:
    id: 001-initial-version
    author: backend
    changes:
    - createTable:
        tableName: security_user
        columns:
        - column:
            name: id
            type: bigint
            constraints:
              primaryKey: true
              primaryKeyName: pk_security_user
              nullable: false
            remarks: 用户主键。
        - column:
            name: username
            type: varchar(120)
            constraints:
              nullable: false
            remarks: 登录用户名，系统内唯一。
        - column:
            name: password_hash
            type: varchar(255)
            constraints:
              nullable: false
            remarks: 密码哈希，包含密码编码算法前缀。
        - column:
            name: display_name
            type: varchar(120)
            constraints:
              nullable: false
            remarks: 后台展示名称。
        - column:
            name: enabled
            type: boolean
            constraints:
              nullable: false
            remarks: 账号是否启用。
        - column:
            name: account_non_locked
            type: boolean
            constraints:
              nullable: false
            remarks: 账号是否未锁定。
        remarks: 安全用户表，保存可登录后台的账号状态和密码哈希。
    - addUniqueConstraint:
        tableName: security_user
        columnNames: username
        constraintName: uk_security_user__username
    - createTable:
        tableName: security_role
        columns:
        - column:
            name: id
            type: bigint
            constraints:
              primaryKey: true
              primaryKeyName: pk_security_role
              nullable: false
            remarks: 角色主键。
        - column:
            name: code
            type: varchar(120)
            constraints:
              nullable: false
            remarks: 角色稳定编码，用于用户绑定和权限判断。
        - column:
            name: name
            type: varchar(120)
            constraints:
              nullable: false
            remarks: 角色简体中文显示名称。
        remarks: 安全角色表，保存稳定角色编码和展示名称。
    - addUniqueConstraint:
        tableName: security_role
        columnNames: code
        constraintName: uk_security_role__code
    - createTable:
        tableName: security_user_role
        columns:
        - column:
            name: user_id
            type: bigint
            constraints:
              nullable: false
            remarks: 用户 ID，引用 security_user。
        - column:
            name: role_id
            type: bigint
            constraints:
              nullable: false
            remarks: 角色 ID，引用 security_role。
        remarks: 用户角色绑定表，维护用户拥有的角色集合。
    - addPrimaryKey:
        tableName: security_user_role
        columnNames: user_id, role_id
        constraintName: pk_security_user_role
    - addForeignKeyConstraint:
        baseTableName: security_user_role
        baseColumnNames: user_id
        referencedTableName: security_user
        referencedColumnNames: id
        constraintName: fk_security_user_role__user_id
    - addForeignKeyConstraint:
        baseTableName: security_user_role
        baseColumnNames: role_id
        referencedTableName: security_role
        referencedColumnNames: id
        constraintName: fk_security_user_role__role_id
    - createIndex:
        tableName: security_user_role
        indexName: idx_security_user_role__role_id
        columns:
        - column:
            name: role_id
    - createTable:
        tableName: security_access_node
        columns:
        - column:
            name: id
            type: bigint
            constraints:
              primaryKey: true
              primaryKeyName: pk_security_access_node
              nullable: false
            remarks: 访问节点主键。
        - column:
            name: code
            type: varchar(160)
            constraints:
              nullable: false
            remarks: 访问节点稳定编码，是 token authority 和前端权限判断的契约。
        - column:
            name: name
            type: varchar(120)
            constraints:
              nullable: false
            remarks: 访问节点简体中文显示名称。
        - column:
            name: type
            type: varchar(32)
            constraints:
              nullable: false
            remarks: 节点类型，API 表示接口权限，DIRECTORY/ROUTE 表示菜单和路由。
        - column:
            name: parent_id
            type: bigint
            remarks: 父级访问节点 ID，用于菜单树。
        - column:
            name: path
            type: varchar(255)
            remarks: 前端路由路径。
        - column:
            name: icon
            type: varchar(120)
            remarks: 前端图标标识。
        - column:
            name: sort_order
            type: int
            constraints:
              nullable: false
            remarks: 同级排序值，数值越小越靠前。
        - column:
            name: visible
            type: boolean
            constraints:
              nullable: false
            remarks: 节点是否在菜单中可见。
        - column:
            name: enabled
            type: boolean
            constraints:
              nullable: false
            remarks: 节点是否启用。
        - column:
            name: api_method
            type: varchar(16)
            remarks: API 请求方法，星号表示全部方法。
        - column:
            name: api_pattern
            type: varchar(255)
            remarks: API 路径匹配表达式。
        remarks: 访问节点表，同时承载 API 权限、后台菜单和前端路由元数据。
    - addUniqueConstraint:
        tableName: security_access_node
        columnNames: code
        constraintName: uk_security_access_node__code
    - addForeignKeyConstraint:
        baseTableName: security_access_node
        baseColumnNames: parent_id
        referencedTableName: security_access_node
        referencedColumnNames: id
        constraintName: fk_security_access_node__parent_id
    - createIndex:
        tableName: security_access_node
        indexName: idx_security_access_node__parent_id
        columns:
        - column:
            name: parent_id
    - createIndex:
        tableName: security_access_node
        indexName: idx_security_access_node__type
        columns:
        - column:
            name: type
    - createIndex:
        tableName: security_access_node
        indexName: idx_security_access_node__visible_enabled
        columns:
        - column:
            name: visible
        - column:
            name: enabled
    - createTable:
        tableName: security_role_access_node
        columns:
        - column:
            name: role_id
            type: bigint
            constraints:
              nullable: false
            remarks: 角色 ID，引用 security_role。
        - column:
            name: access_node_id
            type: bigint
            constraints:
              nullable: false
            remarks: 访问节点 ID，引用 security_access_node。
        remarks: 角色访问节点绑定表，维护角色拥有的 API 权限和菜单路由。
    - addPrimaryKey:
        tableName: security_role_access_node
        columnNames: role_id, access_node_id
        constraintName: pk_security_role_access_node
    - addForeignKeyConstraint:
        baseTableName: security_role_access_node
        baseColumnNames: role_id
        referencedTableName: security_role
        referencedColumnNames: id
        constraintName: fk_security_role_access_node__role_id
    - addForeignKeyConstraint:
        baseTableName: security_role_access_node
        baseColumnNames: access_node_id
        referencedTableName: security_access_node
        referencedColumnNames: id
        constraintName: fk_security_role_access_node__access_node_id
    - createIndex:
        tableName: security_role_access_node
        indexName: idx_security_role_access_node__access_node_id
        columns:
        - column:
            name: access_node_id
    - loadData:
        tableName: security_role
        file: db/changelog/data/system/security_role.csv
        encoding: UTF-8
        separator: ','
        quotchar: '"'
        columns:
        - column:
            name: id
            type: NUMERIC
        - column:
            name: code
            type: STRING
        - column:
            name: name
            type: STRING
    - loadData:
        tableName: security_user
        file: db/changelog/data/system/security_user.csv
        encoding: UTF-8
        separator: ','
        quotchar: '"'
        columns:
        - column:
            name: id
            type: NUMERIC
        - column:
            name: username
            type: STRING
        - column:
            name: password_hash
            type: STRING
        - column:
            name: display_name
            type: STRING
        - column:
            name: enabled
            type: BOOLEAN
        - column:
            name: account_non_locked
            type: BOOLEAN
    - loadData:
        tableName: security_access_node
        file: db/changelog/data/system/security_access_node.csv
        encoding: UTF-8
        separator: ','
        quotchar: '"'
        columns:
        - column:
            name: id
            type: NUMERIC
        - column:
            name: code
            type: STRING
        - column:
            name: name
            type: STRING
        - column:
            name: type
            type: STRING
        - column:
            name: parent_id
            type: NUMERIC
        - column:
            name: path
            type: STRING
        - column:
            name: icon
            type: STRING
        - column:
            name: sort_order
            type: NUMERIC
        - column:
            name: visible
            type: BOOLEAN
        - column:
            name: enabled
            type: BOOLEAN
        - column:
            name: api_method
            type: STRING
        - column:
            name: api_pattern
            type: STRING
    - loadData:
        tableName: security_user_role
        file: db/changelog/data/system/security_user_role.csv
        encoding: UTF-8
        separator: ','
        quotchar: '"'
        columns:
        - column:
            name: user_id
            type: NUMERIC
        - column:
            name: role_id
            type: NUMERIC
    - loadData:
        tableName: security_role_access_node
        file: db/changelog/data/system/security_role_access_node.csv
        encoding: UTF-8
        separator: ','
        quotchar: '"'
        columns:
        - column:
            name: role_id
            type: NUMERIC
        - column:
            name: access_node_id
            type: NUMERIC
    - sql:
        splitStatements: true
        sql: |
          create table qrtz_job_details
          (
            sched_name varchar(120) not null,
            job_name varchar(200) not null,
            job_group varchar(200) not null,
            description varchar(250),
            job_class_name varchar(250) not null,
            is_durable boolean not null,
            is_nonconcurrent boolean not null,
            is_update_data boolean not null,
            requests_recovery boolean not null,
            job_data bytea,
            constraint pk_qrtz_job_details primary key (sched_name, job_name, job_group)
          );

          create table qrtz_triggers
          (
            sched_name varchar(120) not null,
            trigger_name varchar(200) not null,
            trigger_group varchar(200) not null,
            job_name varchar(200) not null,
            job_group varchar(200) not null,
            description varchar(250),
            next_fire_time bigint,
            prev_fire_time bigint,
            priority integer,
            trigger_state varchar(16) not null,
            trigger_type varchar(8) not null,
            start_time bigint not null,
            end_time bigint,
            calendar_name varchar(200),
            misfire_instr smallint,
            job_data bytea,
            constraint pk_qrtz_triggers primary key (sched_name, trigger_name, trigger_group),
            constraint fk_qrtz_triggers__job_details foreign key (sched_name, job_name, job_group)
              references qrtz_job_details (sched_name, job_name, job_group)
          );

          create table qrtz_simple_triggers
          (
            sched_name varchar(120) not null,
            trigger_name varchar(200) not null,
            trigger_group varchar(200) not null,
            repeat_count bigint not null,
            repeat_interval bigint not null,
            times_triggered bigint not null,
            constraint pk_qrtz_simple_triggers primary key (sched_name, trigger_name, trigger_group),
            constraint fk_qrtz_simple_triggers__triggers foreign key (sched_name, trigger_name, trigger_group)
              references qrtz_triggers (sched_name, trigger_name, trigger_group)
          );

          create table qrtz_cron_triggers
          (
            sched_name varchar(120) not null,
            trigger_name varchar(200) not null,
            trigger_group varchar(200) not null,
            cron_expression varchar(120) not null,
            time_zone_id varchar(80),
            constraint pk_qrtz_cron_triggers primary key (sched_name, trigger_name, trigger_group),
            constraint fk_qrtz_cron_triggers__triggers foreign key (sched_name, trigger_name, trigger_group)
              references qrtz_triggers (sched_name, trigger_name, trigger_group)
          );

          create table qrtz_simprop_triggers
          (
            sched_name varchar(120) not null,
            trigger_name varchar(200) not null,
            trigger_group varchar(200) not null,
            str_prop_1 varchar(512),
            str_prop_2 varchar(512),
            str_prop_3 varchar(512),
            int_prop_1 integer,
            int_prop_2 integer,
            long_prop_1 bigint,
            long_prop_2 bigint,
            dec_prop_1 numeric(13, 4),
            dec_prop_2 numeric(13, 4),
            bool_prop_1 boolean,
            bool_prop_2 boolean,
            constraint pk_qrtz_simprop_triggers primary key (sched_name, trigger_name, trigger_group),
            constraint fk_qrtz_simprop_triggers__triggers foreign key (sched_name, trigger_name, trigger_group)
              references qrtz_triggers (sched_name, trigger_name, trigger_group)
          );

          create table qrtz_blob_triggers
          (
            sched_name varchar(120) not null,
            trigger_name varchar(200) not null,
            trigger_group varchar(200) not null,
            blob_data bytea,
            constraint pk_qrtz_blob_triggers primary key (sched_name, trigger_name, trigger_group),
            constraint fk_qrtz_blob_triggers__triggers foreign key (sched_name, trigger_name, trigger_group)
              references qrtz_triggers (sched_name, trigger_name, trigger_group)
          );

          create table qrtz_calendars
          (
            sched_name varchar(120) not null,
            calendar_name varchar(200) not null,
            calendar bytea not null,
            constraint pk_qrtz_calendars primary key (sched_name, calendar_name)
          );

          create table qrtz_paused_trigger_grps
          (
            sched_name varchar(120) not null,
            trigger_group varchar(200) not null,
            constraint pk_qrtz_paused_trigger_grps primary key (sched_name, trigger_group)
          );

          create table qrtz_fired_triggers
          (
            sched_name varchar(120) not null,
            entry_id varchar(95) not null,
            trigger_name varchar(200) not null,
            trigger_group varchar(200) not null,
            instance_name varchar(200) not null,
            fired_time bigint not null,
            sched_time bigint not null,
            priority integer not null,
            state varchar(16) not null,
            job_name varchar(200),
            job_group varchar(200),
            is_nonconcurrent boolean,
            requests_recovery boolean,
            constraint pk_qrtz_fired_triggers primary key (sched_name, entry_id)
          );

          create table qrtz_scheduler_state
          (
            sched_name varchar(120) not null,
            instance_name varchar(200) not null,
            last_checkin_time bigint not null,
            checkin_interval bigint not null,
            constraint pk_qrtz_scheduler_state primary key (sched_name, instance_name)
          );

          create table qrtz_locks
          (
            sched_name varchar(120) not null,
            lock_name varchar(40) not null,
            constraint pk_qrtz_locks primary key (sched_name, lock_name)
          );

          create index idx_qrtz_j_req_recovery
            on qrtz_job_details (sched_name, requests_recovery);
          create index idx_qrtz_j_grp
            on qrtz_job_details (sched_name, job_group);

          create index idx_qrtz_t_j
            on qrtz_triggers (sched_name, job_name, job_group);
          create index idx_qrtz_t_jg
            on qrtz_triggers (sched_name, job_group);
          create index idx_qrtz_t_c
            on qrtz_triggers (sched_name, calendar_name);
          create index idx_qrtz_t_g
            on qrtz_triggers (sched_name, trigger_group);
          create index idx_qrtz_t_state
            on qrtz_triggers (sched_name, trigger_state);
          create index idx_qrtz_t_n_state
            on qrtz_triggers (sched_name, trigger_name, trigger_group, trigger_state);
          create index idx_qrtz_t_n_g_state
            on qrtz_triggers (sched_name, trigger_group, trigger_state);
          create index idx_qrtz_t_next_fire_time
            on qrtz_triggers (sched_name, next_fire_time);
          create index idx_qrtz_t_nft_st
            on qrtz_triggers (sched_name, trigger_state, next_fire_time);
          create index idx_qrtz_t_nft_misfire
            on qrtz_triggers (sched_name, misfire_instr, next_fire_time);
          create index idx_qrtz_t_nft_st_misfire
            on qrtz_triggers (sched_name, misfire_instr, next_fire_time, trigger_state);
          create index idx_qrtz_t_nft_st_misfire_grp
            on qrtz_triggers (sched_name, misfire_instr, next_fire_time, trigger_group, trigger_state);

          create index idx_qrtz_ft_trig_inst_name
            on qrtz_fired_triggers (sched_name, instance_name);
          create index idx_qrtz_ft_inst_job_req_rcvry
            on qrtz_fired_triggers (sched_name, instance_name, requests_recovery);
          create index idx_qrtz_ft_j_g
            on qrtz_fired_triggers (sched_name, job_name, job_group);
          create index idx_qrtz_ft_jg
            on qrtz_fired_triggers (sched_name, job_group);
          create index idx_qrtz_ft_t_g
            on qrtz_fired_triggers (sched_name, trigger_name, trigger_group);
          create index idx_qrtz_ft_tg
            on qrtz_fired_triggers (sched_name, trigger_group);
    - createTable:
        tableName: scheduled_task
        columns:
        - column:
            name: id
            type: bigint
            constraints:
              primaryKey: true
              primaryKeyName: pk_scheduled_task
              nullable: false
            remarks: 定时任务主键。
        - column:
            name: code
            type: varchar(100)
            constraints:
              nullable: false
            remarks: 定时任务稳定编码。
        - column:
            name: handler_code
            type: varchar(100)
            constraints:
              nullable: false
            remarks: 任务处理器编码。
        - column:
            name: name
            type: varchar(120)
            constraints:
              nullable: false
            remarks: 任务简体中文名称。
        - column:
            name: description
            type: varchar(500)
            remarks: 任务说明。
        - column:
            name: group_name
            type: varchar(100)
            defaultValue: default
            constraints:
              nullable: false
            remarks: 任务分组名称。
        - column:
            name: schedule_type
            type: varchar(30)
            constraints:
              nullable: false
            remarks: 调度类型，支持 ONCE、FIXED_INTERVAL、CRON。
        - column:
            name: cron_expression
            type: varchar(120)
            remarks: Cron 表达式。
        - column:
            name: interval_seconds
            type: bigint
            remarks: 固定间隔秒数。
        - column:
            name: run_at
            type: timestamptz
            remarks: 一次性任务运行时间。
        - column:
            name: time_zone
            type: varchar(80)
            defaultValue: UTC
            constraints:
              nullable: false
            remarks: 调度时区。
        - column:
            name: payload_json
            type: text
            defaultValue: '{}'
            constraints:
              nullable: false
            remarks: 默认任务 JSON 负载。
        - column:
            name: enabled
            type: boolean
            defaultValueBoolean: false
            constraints:
              nullable: false
            remarks: 任务是否启用。
        remarks: 后台定时任务管理表，保存管理端维护的任务定义。
    - addUniqueConstraint:
        tableName: scheduled_task
        columnNames: code
        constraintName: uk_scheduled_task__code
    - createIndex:
        tableName: scheduled_task
        indexName: idx_scheduled_task__handler_code
        columns:
        - column:
            name: handler_code
    - createIndex:
        tableName: scheduled_task
        indexName: idx_scheduled_task__enabled
        columns:
        - column:
            name: enabled
    - sql:
        sql: |
          alter table scheduled_task
          add constraint ck_scheduled_task__schedule_type
          check (schedule_type in ('ONCE', 'FIXED_INTERVAL', 'CRON'));
    - createTable:
        tableName: scheduled_task_execution
        columns:
        - column:
            name: id
            type: bigint
            constraints:
              primaryKey: true
              primaryKeyName: pk_scheduled_task_execution
              nullable: false
            remarks: 执行记录主键。
        - column:
            name: task_id
            type: bigint
            constraints:
              nullable: false
            remarks: 定时任务 ID，引用 scheduled_task。
        - column:
            name: task_code
            type: varchar(100)
            constraints:
              nullable: false
            remarks: 执行时的任务编码快照。
        - column:
            name: handler_code
            type: varchar(100)
            constraints:
              nullable: false
            remarks: 执行时的处理器编码快照。
        - column:
            name: scheduled_fire_time
            type: timestamptz
            remarks: 计划触发时间。
        - column:
            name: actual_fire_time
            type: timestamptz
            constraints:
              nullable: false
            remarks: 实际触发时间。
        - column:
            name: finished_at
            type: timestamptz
            remarks: 执行结束时间。
        - column:
            name: status
            type: varchar(30)
            constraints:
              nullable: false
            remarks: 执行状态，支持 RUNNING、SUCCESS、FAILED。
        - column:
            name: duration_ms
            type: bigint
            remarks: 执行耗时毫秒数。
        - column:
            name: refire_count
            type: int
            defaultValueNumeric: 0
            constraints:
              nullable: false
            remarks: 重试或重新触发次数。
        - column:
            name: payload_snapshot_json
            type: text
            defaultValue: '{}'
            constraints:
              nullable: false
            remarks: 执行时使用的 JSON 负载快照。
        - column:
            name: error_message
            type: varchar(1000)
            remarks: 失败时的安全错误摘要。
        remarks: 后台定时任务执行记录表，保存每次触发和执行结果。
    - addForeignKeyConstraint:
        baseTableName: scheduled_task_execution
        baseColumnNames: task_id
        referencedTableName: scheduled_task
        referencedColumnNames: id
        constraintName: fk_scheduled_task_execution__task_id
        onDelete: CASCADE
    - createIndex:
        tableName: scheduled_task_execution
        indexName: idx_scheduled_task_execution__task_id_actual_fire_time
        columns:
        - column:
            name: task_id
        - column:
            name: actual_fire_time
            descending: true
    - createIndex:
        tableName: scheduled_task_execution
        indexName: idx_scheduled_task_execution__status
        columns:
        - column:
            name: status
    - sql:
        sql: |
          alter table scheduled_task_execution
          add constraint ck_scheduled_task_execution__status
          check (status in ('RUNNING', 'SUCCESS', 'FAILED'));
    - sql:
        sql: |
          comment on table qrtz_job_details is 'Quartz 任务定义表，保存调度引擎任务元数据。';
          comment on column qrtz_job_details.sched_name is '调度器名称。';
          comment on column qrtz_job_details.job_name is '任务名称。';
          comment on column qrtz_job_details.job_group is '任务分组。';
          comment on column qrtz_job_details.description is '任务描述。';
          comment on column qrtz_job_details.job_class_name is '任务实现类名。';
          comment on column qrtz_job_details.is_durable is '任务是否持久化。';
          comment on column qrtz_job_details.is_nonconcurrent is '任务是否禁止并发执行。';
          comment on column qrtz_job_details.is_update_data is '任务执行后是否更新数据。';
