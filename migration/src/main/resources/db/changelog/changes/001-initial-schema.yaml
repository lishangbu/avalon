  - changeSet:
      id: 001-004-create-oauth2-client-and-jwk
      author: backend
      changes:
        - createTable:
            tableName: oauth2_client
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_oauth2_client
                    nullable: false
              - column:
                  name: client_id
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: client_id_issued_at
                  type: timestamptz
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: client_secret
                  type: varchar(255)
              - column:
                  name: client_secret_expires_at
                  type: timestamptz
              - column:
                  name: client_name
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: client_authentication_methods
                  type: varchar(1000)
                  constraints:
                    nullable: false
              - column:
                  name: authorization_grant_types
                  type: varchar(1000)
                  constraints:
                    nullable: false
              - column:
                  name: redirect_uris
                  type: varchar(1000)
              - column:
                  name: post_logout_redirect_uris
                  type: varchar(1000)
              - column:
                  name: scopes
                  type: varchar(1000)
                  constraints:
                    nullable: false
              - column:
                  name: require_proof_key
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: require_authorization_consent
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: jwk_set_url
                  type: varchar(1000)
              - column:
                  name: token_endpoint_authentication_signing_algorithm
                  type: varchar(120)
              - column:
                  name: x509_certificate_subject_dn
                  type: varchar(500)
              - column:
                  name: authorization_code_ttl_seconds
                  type: bigint
                  defaultValueNumeric: 300
                  constraints:
                    nullable: false
              - column:
                  name: access_token_ttl_seconds
                  type: bigint
                  defaultValueNumeric: 1800
                  constraints:
                    nullable: false
              - column:
                  name: access_token_format
                  type: varchar(40)
                  defaultValue: self-contained
                  constraints:
                    nullable: false
              - column:
                  name: device_code_ttl_seconds
                  type: bigint
                  defaultValueNumeric: 300
                  constraints:
                    nullable: false
              - column:
                  name: reuse_refresh_tokens
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: refresh_token_ttl_seconds
                  type: bigint
                  defaultValueNumeric: 604800
                  constraints:
                    nullable: false
              - column:
                  name: id_token_signature_algorithm
                  type: varchar(40)
                  defaultValue: RS256
                  constraints:
                    nullable: false
              - column:
                  name: x509_certificate_bound_access_tokens
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: oauth2_client
            columnNames: client_id
            constraintName: uk_oauth2_client__client_id
        - createTable:
            tableName: oauth2_jwk
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_oauth2_jwk
                    nullable: false
              - column:
                  name: key_id
                  type: varchar(120)
                  constraints:
                    nullable: false
              - column:
                  name: jwk_json
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: boolean
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: oauth2_jwk
            columnNames: key_id
            constraintName: uk_oauth2_jwk__key_id
        - createIndex:
            tableName: oauth2_jwk
            indexName: idx_oauth2_jwk__active
            columns:
              - column:
                  name: active
        - sql:
            sql: |
              create unique index uk_oauth2_jwk__active_true
              on oauth2_jwk (active)
              where active = true;

