databaseChangeLog:
- changeSet:
    id: 072-battle-element-damage-boost-item-fixture-corrections
    author: backend
    comment: 修正属性强化道具对照 fixture 文案，明确该类道具属于威力阶段修正。
    changes:
    - update:
        tableName: battle_rule_fixture
        columns:
        - column: { name: description, value: 验证稳定属性增伤道具只在技能属性匹配时把有效威力提高 20%。 }
        - column: { name: expected_summary, value: 技能有效威力按 1.2 倍从 40 提升到 48，普通伤害从 19 提升到 23，且道具不会消费或反伤。 }
        where: code = 'element-damage-boost-item-multiplies-matching-damage'
    - update:
        tableName: battle_rule_fixture_source
        columns:
        - column: { name: source_note, value: 用于对照属性强化道具的 1.2 倍威力修正。 }
        where: fixture_id = 148 and source_url = 'https://github.com/smogon/pokemon-showdown/blob/master/data/items.ts'
