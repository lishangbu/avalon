databaseChangeLog:
- changeSet:
    id: 046-battle-skill-recharge-rules
    author: backend
    comment: 新增成功后休整技能规则字段和公开对照 fixture 数据。
    changes:
    - addColumn:
        tableName: battle_skill_rule
        columns:
        - column:
            name: recharges_after_use
            type: boolean
            defaultValueBoolean: false
            remarks: 成功造成实际伤害后，使用者下一次技能行动前是否必须休整。
            constraints:
              nullable: false
    - insert:
        tableName: battle_skill_rule
        columns:
        - column: { name: id, valueNumeric: 68 }
        - column: { name: skill_id, valueNumeric: 63 }
        - column: { name: effect_policy, value: standard-damage }
        - column: { name: target_policy, value: selected-target }
        - column: { name: hit_policy, value: standard-hit }
        - column: { name: damage_policy, value: standard-damage }
        - column: { name: min_hits, valueNumeric: 1 }
        - column: { name: max_hits, valueNumeric: 1 }
        - column: { name: critical_hit_stage, valueNumeric: 0 }
        - column: { name: makes_contact, valueBoolean: false }
        - column: { name: affected_by_protect, valueBoolean: true }
        - column: { name: protects_user, valueBoolean: false }
        - column: { name: thaws_user_before_move, valueBoolean: false }
        - column: { name: weakened_by_grassy_terrain, valueBoolean: false }
        - column: { name: recharges_after_use, valueBoolean: true }
        - column: { name: sound_based, valueBoolean: false }
        - column: { name: powder_based, valueBoolean: false }
        - column: { name: punch_based, valueBoolean: false }
        - column: { name: slicing_based, valueBoolean: false }
        - column: { name: lock_move_turns_min, valueNumeric: 1 }
        - column: { name: lock_move_turns_max, valueNumeric: 1 }
        - column: { name: confuses_user_after_lock, valueBoolean: false }
        - column: { name: description, value: 成功造成实际伤害后，使用者下一次技能行动前必须休整。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 680 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 94 }
        - column: { name: code, value: recharge-skill-prevents-next-turn-action-without-pp-loss }
        - column: { name: name, value: 成功后休整技能阻止下一次行动且不扣 PP }
        - column: { name: category, value: SKILL }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证成功后休整技能在造成实际伤害后写入休整，并在下一次技能行动前阻止行动且不消耗 PP。 }
        - column: { name: input_summary, value: 使用者用成功后休整技能命中目标，下一回合再次提交技能行动。 }
        - column: { name: expected_summary, value: 首次命中造成实际伤害并写入一次休整；下一次技能行动被休整阻止，不消耗 PP，也不再次造成伤害。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 940 }
    - insert:
