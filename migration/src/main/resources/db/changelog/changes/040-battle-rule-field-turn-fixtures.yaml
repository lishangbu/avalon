        - column: { name: input_summary, value: 目标侧已有黏黏网类入场陷阱；一个接地成员换入，另一个非接地成员在独立场景换入。 }
        - column: { name: expected_summary, value: 接地成员速度能力阶级降低 1 级，非接地成员不触发能力阶级变化事件。 }
