spring:
  main:
    banner-mode: off
  autoconfigure:
    exclude:
      - io.github.lishangbu.avalon.oauth2.authorizationserver.autoconfiguration.AuthorizationServerAutoConfiguration
      - io.github.lishangbu.avalon.oauth2.authorizationserver.autoconfiguration.AuthenticationHandlerAutoConfiguration
      - io.github.lishangbu.avalon.oauth2.resourceserver.autoconfiguration.ResourceServerAutoConfiguration
  data:
    jpa:
      repositories:
        enabled: false
    jimmer:
      repositories:
        enabled: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
jimmer:
  language: kotlin
