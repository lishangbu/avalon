databaseChangeLog:
- changeSet:
    id: 179-element-damage-ability-rules
    author: codex
    comment: 为属性光环、属性减伤与克制条件增伤特性补充规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          insert into battle_ability_rule (
            id, ability_id, trigger_timing, effect_policy,
            trigger_order, description, enabled, sort_order
          )
          select coalesce((select max(id) from battle_ability_rule), 0) + source.row_no,
            ability.id, 'BEFORE_DAMAGE', source.effect_policy,
            100, source.description, true, 2400 + source.row_no
          from (
            values
              (1, 'dark-aura', 'element-dark-damage-boost-four-thirds', '恶属性技能伤害提升至 4/3 倍。'),
              (2, 'fairy-aura', 'element-fairy-damage-boost-four-thirds', '妖精属性技能伤害提升至 4/3 倍。'),
              (3, 'steely-spirit', 'element-steel-damage-boost-one-and-half', '钢属性技能伤害提升至 1.5 倍。'),
              (4, 'water-bubble', 'element-water-damage-boost-double', '水属性技能伤害提升至 2 倍。'),
              (5, 'water-bubble', 'received-fire-damage-half', '承受的火属性技能伤害减半。'),
              (6, 'heatproof', 'received-fire-damage-half', '承受的火属性技能伤害减半。'),
              (7, 'thick-fat', 'received-fire-ice-damage-half', '承受的火与冰属性技能伤害减半。'),
              (8, 'purifying-salt', 'received-ghost-damage-half', '承受的幽灵属性技能伤害减半。'),
              (9, 'neuroforce', 'super-effective-damage-boost-quarter', '效果绝佳的技能伤害提升至 1.25 倍。'),
              (10, 'tinted-lens', 'not-very-effective-damage-boost-double', '效果不佳的技能伤害提升至 2 倍。'),
              (11, 'sniper', 'critical-hit-damage-boost-one-and-half', '击中要害时伤害额外提升至 1.5 倍。')
          ) as source(row_no, ability_code, effect_policy, description)
          join game_ability ability on ability.code = source.ability_code
          on conflict (ability_id, trigger_timing, effect_policy) do update set
            trigger_order = excluded.trigger_order,
            description = excluded.description,
            enabled = excluded.enabled,
            sort_order = excluded.sort_order;
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          insert into battle_ability_rule (
            id, ability_id, trigger_timing, effect_policy,
            trigger_order, description, enabled, sort_order
          )
          select coalesce((select max(id) from battle_ability_rule), 0) + 1,
            ability.id, 'BEFORE_STATUS', 'major-status-immunity-burn',
            100, '免疫灼伤。', true, 2412
          from game_ability ability where ability.code = 'water-bubble'
          on conflict (ability_id, trigger_timing, effect_policy) do update set
            description = excluded.description,
            enabled = excluded.enabled,
            sort_order = excluded.sort_order;
