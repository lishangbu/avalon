databaseChangeLog:
- changeSet:
    id: 003-battle-effect-rules-schema
    author: backend
    changes:
    - createTable:
        tableName: battle_skill_rule
        remarks: 战斗技能规则表，保存技能在现代战斗引擎中的命中、伤害、目标和标签策略。
        columns:
        - column:
            name: id
            type: bigint
            remarks: 技能规则主键，内置数据使用稳定数字 ID，后台新增数据由 Jimmer 主键生成器生成。
            constraints:
              primaryKey: true
              primaryKeyName: pk_battle_skill_rule
              nullable: false
        - column:
            name: skill_id
            type: bigint
            remarks: 技能 ID，引用 game_skill。
            constraints:
              nullable: false
        - column:
            name: effect_policy
            type: varchar(80)
            remarks: 技能主效果策略编码，指向战斗引擎中的技能执行实现。
            constraints:
              nullable: false
        - column:
            name: target_policy
            type: varchar(80)
            remarks: 技能目标选择策略编码，用于校验可选目标和实际命中对象。
            constraints:
              nullable: false
        - column:
            name: hit_policy
            type: varchar(80)
            remarks: 技能命中策略编码，描述普通命中、必中、多段或保护类判定。
            constraints:
              nullable: false
        - column:
            name: damage_policy
            type: varchar(80)
            remarks: 技能伤害策略编码，描述常规伤害、固定伤害、无伤害或特殊公式。
            constraints:
              nullable: false
        - column:
            name: makes_contact
            type: boolean
            defaultValueBoolean: false
            remarks: 技能是否接触目标，用于触发接触类特性、道具或场地效果。
            constraints:
              nullable: false
        - column:
            name: affected_by_protect
            type: boolean
            defaultValueBoolean: true
            remarks: 技能是否会被保护类行动阻挡。
            constraints:
              nullable: false
        - column:
            name: sound_based
            type: boolean
            defaultValueBoolean: false
            remarks: 技能是否属于声音类效果。
            constraints:
              nullable: false
        - column:
            name: powder_based
            type: boolean
            defaultValueBoolean: false
            remarks: 技能是否属于粉末或孢子类效果。
            constraints:
              nullable: false
        - column:
            name: punch_based
            type: boolean
            defaultValueBoolean: false
            remarks: 技能是否属于拳击类效果。
            constraints:
              nullable: false
        - column:
            name: slicing_based
            type: boolean
            defaultValueBoolean: false
            remarks: 技能是否属于切割类效果。
            constraints:
              nullable: false
        - column:
            name: description
            type: varchar(800)
            remarks: 技能规则说明，描述策略覆盖的现代规则边界。
        - column:
            name: enabled
            type: boolean
            defaultValueBoolean: true
            remarks: 是否启用该技能规则。
            constraints:
              nullable: false
        - column:
            name: sort_order
            type: int
            remarks: 技能规则展示排序，数值越小越靠前。
            constraints:
              nullable: false
    - addUniqueConstraint:
        tableName: battle_skill_rule
        columnNames: skill_id
        constraintName: uk_battle_skill_rule__skill_id
    - addForeignKeyConstraint:
        baseTableName: battle_skill_rule
        baseColumnNames: skill_id
        referencedTableName: game_skill
        referencedColumnNames: id
        constraintName: fk_battle_skill_rule__skill_id
    - createTable:
        tableName: battle_skill_status_effect
        remarks: 战斗技能状态附加效果表，保存技能可能施加的状态和概率。
        columns:
        - column:
            name: id
            type: bigint
            remarks: 技能状态效果主键。
            constraints:
              primaryKey: true
              primaryKeyName: pk_battle_skill_status_effect
              nullable: false
        - column:
            name: skill_rule_id
            type: bigint
            remarks: 技能规则 ID，引用 battle_skill_rule。
            constraints:
              nullable: false
        - column:
            name: status_rule_id
            type: bigint
            remarks: 状态规则 ID，引用 battle_status_rule。
            constraints:
              nullable: false
        - column:
            name: target_scope
            type: varchar(40)
            remarks: 附加状态作用目标范围，例如 TARGET、USER 或 ALL_TARGETS。
            constraints:
              nullable: false
        - column:
            name: effect_timing
            type: varchar(40)
            remarks: 状态附加结算时机，例如 AFTER_HIT 或 END_TURN。
            constraints:
              nullable: false
        - column:
            name: chance_percent
            type: int
            remarks: 状态附加概率百分比，100 表示必定触发。
            constraints:
              nullable: false
        - column:
            name: enabled
            type: boolean
            defaultValueBoolean: true
            remarks: 是否启用该状态附加效果。
            constraints:
              nullable: false
        - column:
            name: sort_order
            type: int
            remarks: 状态附加效果展示排序。
            constraints:
              nullable: false
    - addUniqueConstraint:
        tableName: battle_skill_status_effect
        columnNames: skill_rule_id, status_rule_id, target_scope, effect_timing
        constraintName: uk_battle_skill_status_effect__skill_status_scope_timing
    - addForeignKeyConstraint:
        baseTableName: battle_skill_status_effect
        baseColumnNames: skill_rule_id
        referencedTableName: battle_skill_rule
        referencedColumnNames: id
        constraintName: fk_battle_skill_status_effect__skill_rule_id
        onDelete: CASCADE
    - addForeignKeyConstraint:
        baseTableName: battle_skill_status_effect
        baseColumnNames: status_rule_id
        referencedTableName: battle_status_rule
        referencedColumnNames: id
        constraintName: fk_battle_skill_status_effect__status_rule_id
    - createIndex:
        tableName: battle_skill_status_effect
        indexName: idx_battle_skill_status_effect__status_rule_id
        columns:
        - column:
            name: status_rule_id
    - createTable:
        tableName: battle_skill_stat_stage_effect
        remarks: 战斗技能能力阶级效果表，保存技能造成的能力阶级变化和概率。
        columns:
        - column:
            name: id
            type: bigint
            remarks: 技能能力阶级效果主键。
            constraints:
              primaryKey: true
              primaryKeyName: pk_battle_skill_stat_stage_effect
              nullable: false
        - column:
            name: skill_rule_id
            type: bigint
            remarks: 技能规则 ID，引用 battle_skill_rule。
            constraints:
              nullable: false
        - column:
            name: stat_id
            type: bigint
            remarks: 能力项 ID，引用 game_stat。
            constraints:
              nullable: false
        - column:
            name: target_scope
            type: varchar(40)
            remarks: 阶级变化作用目标范围，例如 TARGET、USER 或 ALL_TARGETS。
            constraints:
              nullable: false
        - column:
            name: effect_timing
            type: varchar(40)
            remarks: 阶级变化结算时机，例如 AFTER_HIT 或 BEFORE_DAMAGE。
            constraints:
              nullable: false
        - column:
            name: stage_delta
            type: int
            remarks: 阶级变化值，正数提升，负数降低。
            constraints:
              nullable: false
        - column:
            name: chance_percent
            type: int
            remarks: 阶级变化概率百分比，100 表示必定触发。
            constraints:
              nullable: false
        - column:
            name: enabled
            type: boolean
            defaultValueBoolean: true
            remarks: 是否启用该能力阶级效果。
            constraints:
              nullable: false
        - column:
            name: sort_order
            type: int
            remarks: 能力阶级效果展示排序。
            constraints:
              nullable: false
    - addUniqueConstraint:
        tableName: battle_skill_stat_stage_effect
        columnNames: skill_rule_id, stat_id, target_scope, effect_timing, stage_delta
        constraintName: uk_battle_skill_stat_stage_effect__skill_stat_scope_timing_delta
    - addForeignKeyConstraint:
        baseTableName: battle_skill_stat_stage_effect
        baseColumnNames: skill_rule_id
        referencedTableName: battle_skill_rule
        referencedColumnNames: id
        constraintName: fk_battle_skill_stat_stage_effect__skill_rule_id
        onDelete: CASCADE
    - addForeignKeyConstraint:
        baseTableName: battle_skill_stat_stage_effect
        baseColumnNames: stat_id
        referencedTableName: game_stat
        referencedColumnNames: id
        constraintName: fk_battle_skill_stat_stage_effect__stat_id
    - createIndex:
        tableName: battle_skill_stat_stage_effect
        indexName: idx_battle_skill_stat_stage_effect__stat_id
        columns:
        - column:
            name: stat_id
    - createTable:
        tableName: battle_ability_rule
        remarks: 战斗特性规则表，保存特性触发时机、顺序和效果策略。
        columns:
        - column:
            name: id
            type: bigint
            remarks: 特性规则主键。
            constraints:
              primaryKey: true
              primaryKeyName: pk_battle_ability_rule
              nullable: false
        - column:
            name: ability_id
            type: bigint
            remarks: 特性 ID，引用 game_ability。
            constraints:
              nullable: false
        - column:
            name: trigger_timing
            type: varchar(60)
            remarks: 特性触发时机，例如 SWITCH_IN、BEFORE_DAMAGE 或 END_TURN。
            constraints:
              nullable: false
        - column:
            name: effect_policy
            type: varchar(80)
            remarks: 特性效果策略编码，指向战斗引擎中的特性实现。
            constraints:
              nullable: false
        - column:
            name: trigger_order
            type: int
            remarks: 同一触发时机内的结算顺序，数值越小越早结算。
            constraints:
              nullable: false
        - column:
            name: description
            type: varchar(800)
            remarks: 特性规则说明，描述现代规则下的触发边界。
        - column:
            name: enabled
            type: boolean
            defaultValueBoolean: true
            remarks: 是否启用该特性规则。
            constraints:
              nullable: false
        - column:
            name: sort_order
            type: int
            remarks: 特性规则展示排序。
            constraints:
              nullable: false
    - addUniqueConstraint:
        tableName: battle_ability_rule
        columnNames: ability_id, trigger_timing, effect_policy
        constraintName: uk_battle_ability_rule__ability_timing_policy
    - addForeignKeyConstraint:
        baseTableName: battle_ability_rule
        baseColumnNames: ability_id
        referencedTableName: game_ability
        referencedColumnNames: id
        constraintName: fk_battle_ability_rule__ability_id
    - createIndex:
        tableName: battle_ability_rule
        indexName: idx_battle_ability_rule__trigger_timing
        columns:
        - column:
            name: trigger_timing
    - createTable:
        tableName: battle_item_rule
        remarks: 战斗道具规则表，保存道具触发时机、是否消耗和效果策略。
        columns:
        - column:
            name: id
            type: bigint
            remarks: 道具规则主键。
            constraints:
              primaryKey: true
              primaryKeyName: pk_battle_item_rule
              nullable: false
        - column:
            name: item_id
            type: bigint
            remarks: 道具 ID，引用 game_item。
            constraints:
              nullable: false
        - column:
            name: trigger_timing
            type: varchar(60)
            remarks: 道具触发时机，例如 HELD_END_TURN、BEFORE_DAMAGE 或 ON_DAMAGE_TAKEN。
            constraints:
              nullable: false
        - column:
            name: effect_policy
            type: varchar(80)
            remarks: 道具效果策略编码，指向战斗引擎中的道具实现。
            constraints:
              nullable: false
        - column:
            name: consumable
            type: boolean
            defaultValueBoolean: false
            remarks: 触发后是否消耗该道具。
            constraints:
              nullable: false
        - column:
            name: trigger_order
            type: int
            remarks: 同一触发时机内的结算顺序，数值越小越早结算。
            constraints:
              nullable: false
        - column:
            name: description
            type: varchar(800)
            remarks: 道具规则说明，描述现代规则下的触发边界。
        - column:
            name: enabled
            type: boolean
            defaultValueBoolean: true
            remarks: 是否启用该道具规则。
            constraints:
              nullable: false
        - column:
            name: sort_order
            type: int
            remarks: 道具规则展示排序。
            constraints:
              nullable: false
    - addUniqueConstraint:
        tableName: battle_item_rule
        columnNames: item_id, trigger_timing, effect_policy
        constraintName: uk_battle_item_rule__item_timing_policy
    - addForeignKeyConstraint:
        baseTableName: battle_item_rule
        baseColumnNames: item_id
        referencedTableName: game_item
        referencedColumnNames: id
        constraintName: fk_battle_item_rule__item_id
    - createIndex:
        tableName: battle_item_rule
        indexName: idx_battle_item_rule__trigger_timing
        columns:
        - column:
            name: trigger_timing
    - loadData:
        tableName: battle_skill_rule
        file: db/changelog/data/battle-effect-rules/battle_skill_rule.csv
        encoding: UTF-8
        separator: ','
        quotchar: '"'
        columns:
        - column: { name: id, type: NUMERIC }
        - column: { name: skill_id, type: NUMERIC }
        - column: { name: effect_policy, type: STRING }
        - column: { name: target_policy, type: STRING }
        - column: { name: hit_policy, type: STRING }
        - column: { name: damage_policy, type: STRING }
        - column: { name: makes_contact, type: BOOLEAN }
        - column: { name: affected_by_protect, type: BOOLEAN }
        - column: { name: sound_based, type: BOOLEAN }
        - column: { name: powder_based, type: BOOLEAN }
        - column: { name: punch_based, type: BOOLEAN }
        - column: { name: slicing_based, type: BOOLEAN }
        - column: { name: description, type: STRING }
        - column: { name: enabled, type: BOOLEAN }
        - column: { name: sort_order, type: NUMERIC }
    - loadData:
        tableName: battle_skill_status_effect
        file: db/changelog/data/battle-effect-rules/battle_skill_status_effect.csv
        encoding: UTF-8
        separator: ','
        quotchar: '"'
        columns:
        - column: { name: id, type: NUMERIC }
        - column: { name: skill_rule_id, type: NUMERIC }
        - column: { name: status_rule_id, type: NUMERIC }
        - column: { name: target_scope, type: STRING }
        - column: { name: effect_timing, type: STRING }
        - column: { name: chance_percent, type: NUMERIC }
        - column: { name: enabled, type: BOOLEAN }
        - column: { name: sort_order, type: NUMERIC }
    - loadData:
        tableName: battle_skill_stat_stage_effect
        file: db/changelog/data/battle-effect-rules/battle_skill_stat_stage_effect.csv
        encoding: UTF-8
        separator: ','
        quotchar: '"'
        columns:
        - column: { name: id, type: NUMERIC }
        - column: { name: skill_rule_id, type: NUMERIC }
        - column: { name: stat_id, type: NUMERIC }
        - column: { name: target_scope, type: STRING }
        - column: { name: effect_timing, type: STRING }
        - column: { name: stage_delta, type: NUMERIC }
        - column: { name: chance_percent, type: NUMERIC }
        - column: { name: enabled, type: BOOLEAN }
        - column: { name: sort_order, type: NUMERIC }
    - loadData:
        tableName: battle_ability_rule
        file: db/changelog/data/battle-effect-rules/battle_ability_rule.csv
        encoding: UTF-8
        separator: ','
        quotchar: '"'
        columns:
        - column: { name: id, type: NUMERIC }
        - column: { name: ability_id, type: NUMERIC }
        - column: { name: trigger_timing, type: STRING }
        - column: { name: effect_policy, type: STRING }
        - column: { name: trigger_order, type: NUMERIC }
        - column: { name: description, type: STRING }
        - column: { name: enabled, type: BOOLEAN }
        - column: { name: sort_order, type: NUMERIC }
    - loadData:
        tableName: battle_item_rule
        file: db/changelog/data/battle-effect-rules/battle_item_rule.csv
        encoding: UTF-8
        separator: ','
        quotchar: '"'
        columns:
        - column: { name: id, type: NUMERIC }
        - column: { name: item_id, type: NUMERIC }
        - column: { name: trigger_timing, type: STRING }
        - column: { name: effect_policy, type: STRING }
        - column: { name: consumable, type: BOOLEAN }
        - column: { name: trigger_order, type: NUMERIC }
        - column: { name: description, type: STRING }
        - column: { name: enabled, type: BOOLEAN }
        - column: { name: sort_order, type: NUMERIC }
    - loadData:
        tableName: security_access_node
        file: db/changelog/data/battle-effect-rules/security_access_node.csv
        encoding: UTF-8
        separator: ','
        quotchar: '"'
        columns:
        - column: { name: id, type: NUMERIC }
        - column: { name: code, type: STRING }
        - column: { name: name, type: STRING }
        - column: { name: type, type: STRING }
        - column: { name: parent_id, type: NUMERIC }
        - column: { name: path, type: STRING }
        - column: { name: component_key, type: STRING }
        - column: { name: icon, type: STRING }
        - column: { name: sort_order, type: NUMERIC }
        - column: { name: visible, type: BOOLEAN }
        - column: { name: enabled, type: BOOLEAN }
        - column: { name: api_method, type: STRING }
        - column: { name: api_pattern, type: STRING }
    - loadData:
        tableName: security_role_access_node
        file: db/changelog/data/battle-effect-rules/security_role_access_node.csv
        encoding: UTF-8
        separator: ','
        quotchar: '"'
        columns:
        - column: { name: role_id, type: NUMERIC }
        - column: { name: access_node_id, type: NUMERIC }
