databaseChangeLog:
- changeSet:
    id: 087-battle-same-element-bonus-ability-rules
    author: backend
    comment: 新增属性一致加成覆盖类特性规则。
    changes:
    - insert:
        tableName: battle_ability_rule
        columns:
        - column: { name: id, valueNumeric: 66 }
        - column: { name: ability_id, valueNumeric: 91 }
        - column: { name: trigger_timing, value: BEFORE_DAMAGE }
        - column: { name: effect_policy, value: same-element-bonus-double }
        - column: { name: trigger_order, valueNumeric: 90 }
        - column: { name: description, value: 使用与自身属性一致的直接技能造成伤害时，属性一致加成倍率由默认 1.5 倍改为 2 倍。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 660 }
