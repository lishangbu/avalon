databaseChangeLog:
- changeSet:
    id: 043-battle-rule-move-flow-fixtures
    author: backend
    comment: 新增天气持续、多段技能和锁招流程公开对照 fixture 数据。
    changes:
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 87 }
        - column: { name: code, value: weather-duration-decrements-and-ends }
        - column: { name: name, value: 天气持续回合递减并在耗尽时结束 }
        - column: { name: category, value: WEATHER }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证非永久天气在回合末递减持续回合，耗尽时恢复为无天气并产生结束事件。 }
        - column: { name: input_summary, value: 初始晴天剩余 2 回合，连续结算两个空回合。 }
        - column: { name: expected_summary, value: 第一回合后剩余 1 回合且不产生结束事件；第二回合后天气恢复为无并产生结束事件。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 870 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 88 }
        - column: { name: code, value: multi-hit-skill-consumes-pp-once-and-applies-scripted-hit-count }
        - column: { name: name, value: 多段技能只消耗一次 PP 并按抽中段数结算 }
        - column: { name: category, value: TURN }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证现代 2 到 5 段技能命中后只扣一次 PP，再按段数随机结果逐段独立结算伤害随机数。 }
        - column: { name: input_summary, value: 2..5 段技能命中目标，固定段数随机数落入 3 段区间。 }
        - column: { name: expected_summary, value: 技能只消耗 1 点 PP，产生 3 段伤害事件，每段独立消费要害和伤害浮动随机数。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 880 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 89 }
        - column: { name: code, value: multi-hit-skill-stops-after-target-faints }
        - column: { name: name, value: 多段技能在目标倒下后停止后续段结算 }
        - column: { name: category, value: TURN }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证多段技能即使抽中较高段数，也会在目标提前倒下后停止后续段并停止消费随机数。 }
        - column: { name: input_summary, value: 2..5 段技能抽到 5 段，但目标在第 2 段后倒下。 }
        - column: { name: expected_summary, value: 事件记录抽到 5 段，但只实际结算 2 段伤害，不再消费第 3 段之后的随机数。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 890 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 90 }
        - column: { name: code, value: locked-move-overrides-submitted-skill-follows-target-slot-and-confuses }
        - column: { name: name, value: 锁招续回合覆盖提交技能并跟随目标槽位 }
        - column: { name: category, value: TURN }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证锁招后续回合会强制使用锁定技能、跟随原目标席位的新成员，并在最终回合后疲劳混乱。 }
        - column: { name: input_summary, value: 锁招技能固定持续 2 回合；第 2 回合玩家提交其它技能，同时原目标主动换到同侧后备。 }
        - column: { name: expected_summary, value: 使用者仍强制使用锁定技能命中新上场的同一目标席位，后续回合不额外扣 PP，结束后进入混乱。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 900 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 91 }
        - column: { name: code, value: locked-move-prevents-voluntary-switch-and-executes-continuation }
        - column: { name: name, value: 锁招阻止主动替换并继续强制行动 }
        - column: { name: category, value: TURN }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证锁招持续期间使用者不能主动换下，替换请求会被拒绝且仍执行锁定技能续回合。 }
        - column: { name: input_summary, value: 锁招技能固定持续 2 回合；第 2 回合使用者提交主动替换。 }
        - column: { name: expected_summary, value: 主动替换被拒绝并记录事件，使用者仍留在场上执行锁定技能，结束后疲劳混乱。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 910 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 92 }
        - column: { name: code, value: locked-move-disruption-before-final-turn-clears-lock-without-fatigue-confusion }
        - column: { name: name, value: 锁招非最终回合中断不会触发疲劳混乱 }
        - column: { name: category, value: TURN }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证锁招在最终疲劳回合前因未命中等原因中断时，会清除锁招状态但不会附加疲劳混乱。 }
        - column: { name: input_summary, value: 锁招技能固定持续 3 回合；第 2 回合强制续用时未命中。 }
        - column: { name: expected_summary, value: 未命中会立即中断锁招；由于不是最终疲劳回合，使用者不会获得疲劳混乱。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 920 }
