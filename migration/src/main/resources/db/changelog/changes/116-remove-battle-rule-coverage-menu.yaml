databaseChangeLog:
- changeSet:
    id: 116-remove-battle-rule-coverage-menu
    author: backend
    comment: 移除战斗规则覆盖报表菜单，规则覆盖证明统一保留在 battle-engine 单元测试账本中。
    changes:
    - sql:
        splitStatements: true
        sql: |
          delete from security_role_access_node
          where access_node_id in (
            select id
            from security_access_node
            where code = 'battle-rules.coverage'
          );
          delete from security_access_node
          where code = 'battle-rules.coverage';
