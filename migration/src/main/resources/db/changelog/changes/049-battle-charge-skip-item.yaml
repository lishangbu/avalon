databaseChangeLog:
- changeSet:
    id: 049-battle-charge-skip-item
    author: backend
    comment: 新增一次性跳过蓄力道具规则。
    changes:
    - insert:
        tableName: battle_item_rule
        columns:
        - column: { name: id, valueNumeric: 6 }
        - column: { name: item_id, valueNumeric: 248 }
        - column: { name: trigger_timing, value: BEFORE_MOVE }
        - column: { name: effect_policy, value: charge-skip-once }
        - column: { name: consumable, valueBoolean: true }
        - column: { name: trigger_order, valueNumeric: 50 }
        - column: { name: description, value: 首次宣告蓄力技能时消耗该道具，并让技能同回合进入命中和伤害流程。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 60 }
