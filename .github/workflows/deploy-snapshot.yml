name: Deploy Snapshot

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: true

jobs:
  deploy-snapshot:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: 设置 Java 环境
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: oracle
          architecture: x64
      - name: 设置 Gradle 环境
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '9.4.1'
          cache-read-only: true
      - name: 计算 IP 数据缓存周期
        id: ip-db-cache-epoch
        shell: bash
        run: echo "value=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"
      - name: 恢复 IP2Location 数据缓存
        id: ip-db-cache
        uses: actions/cache/restore@v4
        with:
          path: avalon-platform/avalon-ip2location-spring-boot-starter/src/main/resources/IP2LOCATION-LITE-DB11.IPV6.BIN
          key: ${{ runner.os }}-ip2location-db11ipv6-${{ steps.ip-db-cache-epoch.outputs.value }}
          restore-keys: |
            ${{ runner.os }}-ip2location-db11ipv6-
      - name: 校验 IP2Location 数据已就绪
        shell: bash
        run: |
          test -f avalon-platform/avalon-ip2location-spring-boot-starter/src/main/resources/IP2LOCATION-LITE-DB11.IPV6.BIN || {
            echo "IP2Location database is missing. Restore the Actions cache or configure the IP2LOCATION_DOWNLOAD_TOKEN secret."
            exit 1
          }
      - name: 提取项目版本
        id: projectVersion
        shell: bash
        run: |
          set -euo pipefail

          version="$(gradle -q printVersion)"

          if [[ -z "$version" ]]; then
            echo "无法从 Gradle 构建中解析版本号"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Detected version: $version"

      - name: 使用 Gradle 发布快照到 Maven Central
        if: endsWith(steps.projectVersion.outputs.version, '-SNAPSHOT')
        run: gradle generateRsaKeys -Pforce=true publish -x test
        env:
          ORG_GRADLE_PROJECT_centralSnapshotsUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_centralSnapshotsPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
