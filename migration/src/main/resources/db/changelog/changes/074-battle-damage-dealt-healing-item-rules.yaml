databaseChangeLog:
- changeSet:
    id: 074-battle-damage-dealt-healing-item-rules
    author: backend
    comment: 新增按整次技能实际伤害回复 HP 的携带道具规则与公开对照 fixture 数据。
    changes:
    - insert:
        tableName: battle_item_rule
        columns:
        - column: { name: id, valueNumeric: 60 }
        - column: { name: item_id, valueNumeric: 230 }
        - column: { name: trigger_timing, value: AFTER_DAMAGE }
        - column: { name: effect_policy, value: damage-dealt-heal-eighth }
        - column: { name: consumable, valueBoolean: false }
        - column: { name: trigger_order, valueNumeric: 100 }
        - column: { name: description, value: 携带者使用技能成功造成实际伤害后，按本次技能总伤害的 1/8 回复 HP。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 600 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 158 }
        - column: { name: code, value: damage-dealt-healing-item-restores-eighth-actual-damage }
        - column: { name: name, value: 造成伤害回复道具按本体实际伤害回复 }
        - column: { name: category, value: ITEM }
        - column: { name: fixture_type, value: ITEM_TRIGGER }
        - column: { name: description, value: 验证造成伤害后回复类道具按本次技能对本体造成的实际伤害回复。 }
        - column: { name: input_summary, value: 使用者当前 HP 50，携带按造成伤害八分之一回复的道具，以 40 威力物理技能命中本体。 }
        - column: { name: expected_summary, value: 技能实际造成 19 点伤害，使用者在整次技能结束后回复 2 点 HP，道具不会消费。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 1580 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 159 }
        - column: { name: code, value: damage-dealt-healing-item-counts-substitute-damage }
        - column: { name: name, value: 造成伤害回复道具计入替身实际伤害 }
        - column: { name: category, value: ITEM }
        - column: { name: fixture_type, value: ITEM_TRIGGER }
        - column: { name: description, value: 验证技能命中替身时，替身实际损失 HP 也计入造成伤害后回复道具。 }
        - column: { name: input_summary, value: 使用者当前 HP 50，目标拥有 25 HP 替身，使用者携带按造成伤害八分之一回复的道具攻击替身。 }
        - column: { name: expected_summary, value: 技能对替身实际造成 19 点伤害，目标本体 HP 不变；使用者在整次技能结束后回复 2 点 HP。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 1590 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 160 }
        - column: { name: code, value: damage-dealt-healing-item-uses-total-multi-hit-damage }
        - column: { name: name, value: 造成伤害回复道具按多段总伤害回复一次 }
        - column: { name: category, value: ITEM }
        - column: { name: fixture_type, value: ITEM_TRIGGER }
        - column: { name: description, value: 验证多段技能只在整次技能结束后按总实际伤害触发一次造成伤害回复道具。 }
        - column: { name: input_summary, value: 使用者当前 HP 50，携带按造成伤害八分之一回复的道具，使用固定三段物理技能。 }
        - column: { name: expected_summary, value: 三段技能各造成 19 点伤害，总伤害 57；使用者只回复一次，回复 7 点 HP。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 1600 }
    - insert:
        tableName: battle_rule_test_run
        columns:
        - column: { name: id, valueNumeric: 158 }
        - column: { name: run_code, value: damage-dealt-healing-item-coverage-20260629-1 }
        - column: { name: fixture_id, valueNumeric: 158 }
        - column: { name: run_status, value: PASSED }
        - column: { name: executor, value: gradle }
        - column: { name: command, value: ./gradlew :battle-engine:test :battle-rules:test :migration:test }
