databaseChangeLog:
- changeSet:
    id: 103-battle-action-ordering-fixtures
    author: backend
    comment: 新增行动排序公开对照 fixture 数据。
    changes:
    - sql:
        splitStatements: true
        stripComments: true
        sql: |
          insert into battle_rule_fixture
            (id, code, name, category, fixture_type, description, input_summary, expected_summary, enabled, sort_order)
          values
            (250, 'positive-priority-acts-before-faster-normal-priority-skill', '正优先度先于更快普通优先度行动', 'TURN', 'STATE_MACHINE', '验证行动排序先比较优先度，再比较速度。', '速度较低成员使用优先度 +1 技能，速度较高成员使用普通优先度技能。', '优先度 +1 行动先于普通优先度行动执行，速度只在同优先度内比较。', true, 2500),
            (251, 'negative-priority-acts-after-slower-normal-priority-skill', '负优先度晚于更慢普通优先度行动', 'TURN', 'STATE_MACHINE', '验证负优先度行动会排在普通优先度之后。', '速度较高成员使用优先度 -1 技能，速度较低成员使用普通优先度技能。', '普通优先度行动先执行，负优先度行动即使速度更高也会后执行。', true, 2510),
            (252, 'higher-speed-acts-first-inside-same-priority-bracket', '同优先度内高速先动', 'TURN', 'STATE_MACHINE', '验证同一优先度分组内按有效速度排序。', '双方都使用普通优先度技能，其中一方有效速度更高。', '同优先度内有效速度更高的成员先产生技能使用事件。', true, 2520),
            (253, 'same-speed-tie-consumes-random-order-keys', '同速使用随机键决定行动顺序', 'TURN', 'STATE_MACHINE', '验证同优先度同速时消费可复盘随机数决定顺序。', '双方同优先度且有效速度完全相同，固定同速随机键让第二个提交者先行动。', '引擎为同速双方各消费一个排序随机数，并按随机键决定技能使用事件顺序。', true, 2530),
            (254, 'same-positive-priority-bracket-still-orders-by-speed', '同正优先度内仍按速度排序', 'TURN', 'STATE_MACHINE', '验证相同正优先度分组仍然按有效速度决定先后。', '双方都使用优先度 +1 技能，其中一方速度更高。', '同为 +1 优先度时，仍按有效速度决定行动先后。', true, 2540),
            (255, 'choice-speed-item-changes-action-order', '讲究速度道具改变行动顺序', 'TURN', 'STATE_MACHINE', '验证速度倍率道具只在行动排序时改变有效速度。', '速度 70 的成员持有讲究类速度道具，对手速度 100，双方同优先度行动。', '持有者有效速度按 1.5 倍变为 105，因此先于速度 100 的对手行动。', true, 2550),
            (256, 'paralysis-speed-drop-changes-action-order', '麻痹速度下降改变行动顺序', 'TURN', 'STATE_MACHINE', '验证麻痹主要状态的速度下降参与行动排序。', '速度 120 的成员处于麻痹状态，对手速度 80，双方同优先度行动。', '麻痹成员有效速度减半为 60，因此速度 80 的对手先行动。', true, 2560),
            (257, 'side-speed-modifier-changes-action-order', '一侧速度修正改变行动顺序', 'TURN', 'STATE_MACHINE', '验证一侧场上速度倍率参与行动排序但不改写成员面板速度。', '速度 60 的成员所在一侧已有 2 倍速度修正，对手速度 100，双方同优先度行动。', '一侧速度修正让速度 60 成员按有效速度 120 参与排序，因此先于对手行动。', true, 2570),
            (258, 'field-speed-order-reversal-changes-same-priority-action-order', '全场速度反转改变同优先度顺序', 'TURN', 'STATE_MACHINE', '验证全场速度顺序效果只反转同优先度内的速度比较。', '全场速度顺序处于反转状态，速度 40 与速度 100 的成员同优先度行动。', '同优先度内速度较低的成员先行动；优先度比较本身不被反转。', true, 2580),
            (259, 'status-priority-ability-changes-action-order-before-faster-opponent', '变化技能优先度特性改变行动顺序', 'TURN', 'STATE_MACHINE', '验证特性为变化技能增加优先度后参与统一行动排序。', '速度较低成员拥有变化技能优先度提升特性，并选择变化技能；速度较高对手使用普通攻击。', '变化技能获得额外优先度，先于速度更高的普通攻击执行。', true, 2590);
