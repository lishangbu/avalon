            (800, 400, 'https://github.com/smogon/pokemon-showdown/blob/master/data/moves.ts', '公开技能资料', '用于对照部分技能声明不受保护影响。', 10),
            (801, 400, 'https://github.com/smogon/pokemon-showdown/blob/master/sim/battle-actions.ts', '公开行动结算实现', '用于验证保护阻挡读取技能保护交互标记。', 20),
            (802, 401, 'https://github.com/smogon/pokemon-showdown/blob/master/sim/battle-actions.ts', '公开行动结算实现', '用于对照目标在行动前失效时取消技能。', 10),
            (803, 401, 'https://github.com/smogon/pokemon-showdown/blob/master/sim/battle-queue.ts', '公开行动队列实现', '用于验证后续行动按执行时目标状态重新判断。', 20),
            (804, 402, 'https://github.com/smogon/pokemon-showdown/blob/master/data/moves.ts', '公开技能资料', '用于对照全场能力阶级清除类技能。', 10),
            (805, 402, 'https://bulbapedia.bulbagarden.net/wiki/Stat_modifier', '能力阶级公开规则说明', '用于验证后备成员不属于当前场上清除范围。', 20),
            (806, 403, 'https://github.com/smogon/pokemon-showdown/blob/master/data/moves.ts', '公开技能资料', '用于对照附加主要异常状态的概率效果。', 10),
            (807, 403, 'https://github.com/smogon/pokemon-showdown/blob/master/sim/battle-actions.ts', '公开行动结算实现', '用于验证 0% 概率不消费随机。', 20),
            (808, 404, 'https://github.com/smogon/pokemon-showdown/blob/master/data/conditions.ts', '公开状态资料', '用于对照混乱持续时间在成功附加后才确定。', 10),
            (809, 404, 'https://github.com/smogon/pokemon-showdown/blob/master/sim/battle-actions.ts', '公开行动结算实现', '用于验证 0% 临时状态效果不会进入持续时间随机。', 20),
            (810, 405, 'https://github.com/smogon/pokemon-showdown/blob/master/data/moves.ts', '公开技能资料', '用于对照复制能力阶级类技能。', 10),
            (811, 405, 'https://bulbapedia.bulbagarden.net/wiki/Psych_Up_(move)', '复制能力阶级公开规则说明', '用于验证复制只处理声明能力项。', 20),
            (812, 406, 'https://github.com/smogon/pokemon-showdown/blob/master/data/moves.ts', '公开技能资料', '用于对照交换能力阶级类技能。', 10),
            (813, 406, 'https://bulbapedia.bulbagarden.net/wiki/Power_Swap_(move)', '交换能力阶级公开规则说明', '用于验证双方阶级同时交换。', 20),
            (814, 407, 'https://github.com/smogon/pokemon-showdown/blob/master/data/moves.ts', '公开技能资料', '用于对照取反能力阶级类技能。', 10),
            (815, 407, 'https://bulbapedia.bulbagarden.net/wiki/Topsy-Turvy_(move)', '取反能力阶级公开规则说明', '用于验证负阶级取反为正阶级。', 20),
            (816, 408, 'https://github.com/smogon/pokemon-showdown/blob/master/data/items.ts', '公开道具资料', '用于对照一次性跳过蓄力的携带道具。', 10),
            (817, 408, 'https://github.com/smogon/pokemon-showdown/blob/master/sim/battle-actions.ts', '公开行动结算实现', '用于验证道具触发先于保护阻挡。', 20),
            (818, 409, 'https://github.com/smogon/pokemon-showdown/blob/master/data/items.ts', '公开道具资料', '用于对照满 HP 免死类一次性道具。', 10),
            (819, 409, 'https://github.com/smogon/pokemon-showdown/blob/master/sim/battle-actions.ts', '公开行动结算实现', '用于验证同道具消费后不再触发其它效果。', 20),
            (820, 410, 'https://github.com/smogon/pokemon-showdown/blob/master/data/items.ts', '公开道具资料', '用于对照主要异常状态治愈道具。', 10),
            (821, 410, 'https://github.com/smogon/pokemon-showdown/blob/master/data/conditions.ts', '公开状态资料', '用于验证治愈发生在状态写入之后。', 20),
            (822, 411, 'https://github.com/smogon/pokemon-showdown/blob/master/data/items.ts', '公开道具资料', '用于对照临时状态治愈道具。', 10),
            (823, 411, 'https://github.com/smogon/pokemon-showdown/blob/master/data/conditions.ts', '公开状态资料', '用于验证混乱持续时间先写入再被治愈清除。', 20);
