            (248, 'target-scope-coverage-20260629-5', 248, 'PASSED', 'gradle', './gradlew :battle-engine:test --tests io.github.lishangbu.battleengine.BattleTargetScopePublicReferenceTests', '2026-06-29T23:45:00+08:00', 2480),
