        - column: { name: description, value: 验证精神场地只阻止对手针对接地成员的先制技能，不阻止同侧目标。 }
        - column: { name: input_summary, value: 双打中精神场地存在时，使用者对同侧接地成员使用先制攻击。 }
        - column: { name: expected_summary, value: 精神场地不阻止同侧目标；技能消耗 PP 并按普通伤害流程命中同侧成员。 }
