        - column: { name: started_at, value: "2026-06-28T22:58:59+08:00" }
        - column: { name: finished_at, value: "2026-06-28T23:01:36+08:00" }
        - column: { name: duration_ms, valueNumeric: 157000 }
        - column: { name: assertion_count, valueNumeric: 6 }
        - column: { name: sort_order, valueNumeric: 150 }
