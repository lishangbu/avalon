name: CI

on:
  push:
    branches:
      - main
    paths: &ci_paths
      - '**/*.kt'
      - '**/*.kts'
      - '**/*.yml'
      - '**/*.yaml'
      - 'gradle.properties'
      - 'db/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths: *ci_paths

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: 设置 Java 环境 - 使用Oracle JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'oracle'
          architecture: x64
      - name: 设置 Gradle 环境
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'
      - name: 编译并执行测试
        run: gradle ktlintCheck test

  deploy-snapshot:
    name: Deploy Snapshot
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/deploy-snapshot.yml
    secrets: inherit

  publish-dockerhub:
    name: Publish DockerHub
    needs: deploy-snapshot
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/publish-dockerhub.yml
    secrets: inherit

  publish-javadoc:
    name: Publish Javadoc
    needs: deploy-snapshot
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/publish-javadoc.yml
    secrets: inherit
