databaseChangeLog:
- changeSet:
    id: 067-battle-status-cure-item-rules
    author: backend
    comment: 新增主要异常状态解除道具规则与公开对照 fixture 数据。
    changes:
    - insert:
        tableName: battle_item_rule
        columns:
        - column: { name: id, valueNumeric: 14 }
        - column: { name: item_id, valueNumeric: 134 }
        - column: { name: trigger_timing, value: AFTER_STATUS_APPLIED }
        - column: { name: effect_policy, value: major-status-cure-all }
        - column: { name: consumable, valueBoolean: true }
        - column: { name: trigger_order, valueNumeric: 100 }
        - column: { name: description, value: 获得任意主要异常状态后立即解除该状态，并在触发后消费携带道具。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 140 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 144 }
        - column: { name: code, value: major-status-cure-item-clears-status-after-application }
        - column: { name: name, value: 状态解除道具在状态写入后触发 }
        - column: { name: category, value: ITEM }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证目标获得主要异常状态后，携带道具会立即解除该状态并被消费。 }
        - column: { name: input_summary, value: 目标携带可解除任意主要异常状态的一次性道具，对手使用 100% 附加灼伤的变化技能。 }
        - column: { name: expected_summary, value: 灼伤先写入目标运行态，随后携带道具立即解除灼伤并被消费。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 1440 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 145 }
        - column: { name: code, value: major-status-cure-item-clears-contact-ability-status }
        - column: { name: name, value: 状态解除道具处理接触特性返还状态 }
        - column: { name: category, value: ITEM }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证攻击方因目标接触类特性获得主要异常状态后，攻击方自身携带道具会立即解除该状态。 }
        - column: { name: input_summary, value: 攻击方携带主要异常状态解除道具，使用接触类技能命中拥有接触后麻痹攻击方特性的目标。 }
        - column: { name: expected_summary, value: 攻击方先因目标特性获得麻痹，随后自身携带道具立即解除麻痹并被消费。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 1450 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 146 }
        - column: { name: code, value: specific-status-cure-item-keeps-unmatched-status }
        - column: { name: name, value: 指定状态解除道具不处理非匹配状态 }
        - column: { name: category, value: ITEM }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证只解除指定主要异常状态的道具不会消费在非匹配状态上。 }
        - column: { name: input_summary, value: 目标携带只解除睡眠的一次性道具，对手使用 100% 附加灼伤的变化技能。 }
        - column: { name: expected_summary, value: 灼伤不是该道具声明的解除状态，因此状态保留，道具也不被消费。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 1460 }
