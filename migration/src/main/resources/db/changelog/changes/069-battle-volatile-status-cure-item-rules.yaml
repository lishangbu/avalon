databaseChangeLog:
- changeSet:
    id: 069-battle-volatile-status-cure-item-rules
    author: backend
    comment: 新增临时状态解除道具规则。
    changes:
    - insert:
        tableName: battle_item_rule
        columns:
        - column: { name: id, valueNumeric: 20 }
        - column: { name: item_id, valueNumeric: 133 }
        - column: { name: trigger_timing, value: AFTER_VOLATILE_STATUS_APPLIED }
        - column: { name: effect_policy, value: volatile-status-cure-confusion }
        - column: { name: consumable, valueBoolean: true }
        - column: { name: trigger_order, valueNumeric: 100 }
        - column: { name: description, value: 获得混乱状态后立即解除该状态，并在触发后消费携带道具。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 200 }
