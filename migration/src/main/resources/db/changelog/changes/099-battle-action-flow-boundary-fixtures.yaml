databaseChangeLog:
- changeSet:
    id: 099-battle-action-flow-boundary-fixtures
    author: backend
    comment: 新增行动流程边界公开对照 fixture 数据。
    changes:
    - sql:
        splitStatements: true
        stripComments: true
        sql: |
          insert into battle_rule_fixture
            (id, code, name, category, fixture_type, description, input_summary, expected_summary, enabled, sort_order)
          values
            (225, 'protection-bypass-skill-damages-protected-target', '保护绕过技能命中受保护目标', 'TURN', 'STATE_MACHINE', '验证声明为不受保护影响的技能不会被本回合保护屏障阻挡。', '目标本回合先建立保护屏障，攻击方随后使用声明为不受保护影响的物理技能。', '技能不会产生保护阻挡事件，会继续进入要害和伤害随机流程并对受保护目标造成伤害。', true, 2250),
            (226, 'protection-blocks-before-accuracy-random', '保护阻挡发生在命中随机之前', 'TURN', 'STATE_MACHINE', '验证普通受保护影响技能在命中判定前被保护阻挡，保持随机轨迹稳定。', '目标本回合先建立保护屏障，攻击方随后使用基础命中 50 且受保护影响的技能。', '攻击方技能消耗 PP 后被保护阻挡，不再消费命中随机数，也不会造成伤害。', true, 2260),
            (227, 'protection-bypass-still-performs-accuracy-check', '保护绕过后仍执行命中判定', 'TURN', 'STATE_MACHINE', '验证不受保护影响的技能只是跳过保护屏障，后续仍按普通命中流程结算。', '目标本回合先建立保护屏障，攻击方随后使用不受保护影响但基础命中 50 的技能，命中掷点失败。', '技能绕过保护后仍执行命中判定；未命中时不造成伤害，也不进入要害和伤害随机流程。', true, 2270),
            (228, 'fainted-queued-actor-cannot-execute-later-action', '排队成员倒下后不能继续行动', 'TURN', 'STATE_MACHINE', '验证已经排队的成员如果在自己的行动前倒下，本回合不会继续使用技能。', '双打中高速成员先击倒一个低速目标，该目标本回合原本也提交了技能行动。', '低速目标倒下后，其排队行动在执行入口取消；事件流中不会出现该成员的技能使用事件。', true, 2280),
            (229, 'action-with-no-battle-capable-selected-target-consumes-no-pp', '没有可战斗目标时不消耗 PP', 'TURN', 'STATE_MACHINE', '验证单体技能在使用前找不到可战斗目标时直接取消，不产生技能使用事件。', '双打目标槽位当前成员已经无法战斗，行动方仍提交了指向该成员的单体技能。', '技能阶段找不到可战斗目标时，本次行动在使用前取消，不产生技能使用事件，也不消耗 PP。', true, 2290);
          insert into battle_rule_test_run
            (id, run_code, fixture_id, run_status, executor, command, started_at, sort_order)
          values
            (225, 'action-flow-boundary-coverage-20260629-1', 225, 'PASSED', 'gradle', './gradlew :battle-engine:test --tests io.github.lishangbu.battleengine.BattleActionFlowBoundaryTests', '2026-06-29T22:00:00+08:00', 2250),
            (226, 'action-flow-boundary-coverage-20260629-2', 226, 'PASSED', 'gradle', './gradlew :battle-engine:test --tests io.github.lishangbu.battleengine.BattleActionFlowBoundaryTests', '2026-06-29T22:00:00+08:00', 2260),
            (227, 'action-flow-boundary-coverage-20260629-3', 227, 'PASSED', 'gradle', './gradlew :battle-engine:test --tests io.github.lishangbu.battleengine.BattleActionFlowBoundaryTests', '2026-06-29T22:00:00+08:00', 2270),
            (228, 'action-flow-boundary-coverage-20260629-4', 228, 'PASSED', 'gradle', './gradlew :battle-engine:test --tests io.github.lishangbu.battleengine.BattleActionFlowBoundaryTests', '2026-06-29T22:00:00+08:00', 2280),
            (229, 'action-flow-boundary-coverage-20260629-5', 229, 'PASSED', 'gradle', './gradlew :battle-engine:test --tests io.github.lishangbu.battleengine.BattleActionFlowBoundaryTests', '2026-06-29T22:00:00+08:00', 2290);
