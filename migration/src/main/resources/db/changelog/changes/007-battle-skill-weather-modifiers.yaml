databaseChangeLog:
- changeSet:
    id: 007-battle-skill-weather-modifiers
    author: backend
    changes:
    - createTable:
        tableName: battle_skill_weather_accuracy_override
        remarks: 战斗技能天气命中覆盖表，保存技能在指定天气下的命中覆盖规则。
        columns:
        - column:
            name: id
            type: bigint
            remarks: 技能天气命中覆盖主键。
            constraints:
              primaryKey: true
              primaryKeyName: pk_battle_skill_weather_accuracy_override
              nullable: false
        - column:
            name: skill_rule_id
            type: bigint
            remarks: 技能规则 ID，引用 battle_skill_rule。
            constraints:
              nullable: false
        - column:
            name: weather_rule_id
            type: bigint
            remarks: 天气规则 ID，引用 battle_weather_rule，不能引用无天气。
            constraints:
              nullable: false
        - column:
            name: accuracy_percent
            type: int
            remarks: 命中覆盖百分比，1 到 100；为空表示该天气下必中。
        - column:
            name: enabled
            type: boolean
            defaultValueBoolean: true
            remarks: 是否启用该命中覆盖规则。
            constraints:
              nullable: false
        - column:
            name: sort_order
            type: int
            remarks: 命中覆盖规则展示排序。
            constraints:
              nullable: false
    - addUniqueConstraint:
        tableName: battle_skill_weather_accuracy_override
        columnNames: skill_rule_id, weather_rule_id
        constraintName: uk_battle_skill_weather_accuracy_override__skill_weather
    - addForeignKeyConstraint:
        baseTableName: battle_skill_weather_accuracy_override
        baseColumnNames: skill_rule_id
        referencedTableName: battle_skill_rule
        referencedColumnNames: id
        constraintName: fk_battle_skill_weather_accuracy_override__skill_rule_id
        onDelete: CASCADE
    - addForeignKeyConstraint:
        baseTableName: battle_skill_weather_accuracy_override
        baseColumnNames: weather_rule_id
        referencedTableName: battle_weather_rule
        referencedColumnNames: id
        constraintName: fk_battle_skill_weather_accuracy_override__weather_rule_id
    - createIndex:
        tableName: battle_skill_weather_accuracy_override
        indexName: idx_battle_skill_weather_accuracy_override__weather_rule_id
        columns:
        - column:
            name: weather_rule_id
    - createTable:
        tableName: battle_skill_weather_power_modifier
        remarks: 战斗技能天气威力倍率表，保存技能在指定天气下参与普通伤害公式前的威力倍率。
        columns:
        - column:
            name: id
            type: bigint
            remarks: 技能天气威力倍率主键。
            constraints:
              primaryKey: true
              primaryKeyName: pk_battle_skill_weather_power_modifier
              nullable: false
        - column:
            name: skill_rule_id
            type: bigint
            remarks: 技能规则 ID，引用 battle_skill_rule。
            constraints:
              nullable: false
        - column:
            name: weather_rule_id
            type: bigint
            remarks: 天气规则 ID，引用 battle_weather_rule，不能引用无天气。
            constraints:
              nullable: false
        - column:
            name: power_multiplier
            type: double precision
            remarks: 威力倍率，必须大于 0，例如 0.5 表示威力减半，2 表示威力翻倍。
            constraints:
              nullable: false
        - column:
            name: enabled
            type: boolean
            defaultValueBoolean: true
            remarks: 是否启用该威力倍率规则。
            constraints:
              nullable: false
        - column:
            name: sort_order
            type: int
            remarks: 威力倍率规则展示排序。
            constraints:
              nullable: false
    - addUniqueConstraint:
        tableName: battle_skill_weather_power_modifier
        columnNames: skill_rule_id, weather_rule_id
        constraintName: uk_battle_skill_weather_power_modifier__skill_weather
    - addForeignKeyConstraint:
        baseTableName: battle_skill_weather_power_modifier
        baseColumnNames: skill_rule_id
        referencedTableName: battle_skill_rule
        referencedColumnNames: id
        constraintName: fk_battle_skill_weather_power_modifier__skill_rule_id
        onDelete: CASCADE
    - addForeignKeyConstraint:
        baseTableName: battle_skill_weather_power_modifier
        baseColumnNames: weather_rule_id
        referencedTableName: battle_weather_rule
        referencedColumnNames: id
        constraintName: fk_battle_skill_weather_power_modifier__weather_rule_id
    - createIndex:
