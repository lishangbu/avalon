databaseChangeLog:
- changeSet:
    id: 281-desolate-land-ability-rule
    author: codex
    comment: 为终结之地补充强日照入场规则。
    changes:
    - sql:
        sql: |
          insert into battle_ability_rule (id, ability_id, trigger_timing, effect_policy, trigger_order, description, enabled, sort_order)
          select coalesce((select max(id) from battle_ability_rule), 0) + 1, ability.id,
            'SWITCH_IN', 'switch-in-strong-weather-harsh-sunlight', 100,
            '出场时建立强日照，直到最后一个天气来源离场。', true, 7780
          from game_ability ability where ability.code = 'desolate-land'
          on conflict (ability_id, trigger_timing, effect_policy) do update set
            trigger_order = excluded.trigger_order, description = excluded.description, enabled = excluded.enabled, sort_order = excluded.sort_order;
          update game_ability set enabled = true where code = 'desolate-land';
