databaseChangeLog:
- changeSet:
    id: 010-battle-skill-speed-field-effects
    author: backend
    comment: 接入顺风类一侧速度修正技能规则种子数据。
    changes:
    - insert:
        tableName: battle_skill_rule
        columns:
        - column: { name: id, valueNumeric: 17 }
        - column: { name: skill_id, valueNumeric: 366 }
        - column: { name: effect_policy, value: side-condition }
        - column: { name: target_policy, value: self }
        - column: { name: hit_policy, value: always-hit }
        - column: { name: damage_policy, value: no-damage }
        - column: { name: min_hits, valueNumeric: 1 }
        - column: { name: max_hits, valueNumeric: 1 }
        - column: { name: critical_hit_stage, valueNumeric: 0 }
        - column: { name: makes_contact, valueBoolean: false }
        - column: { name: affected_by_protect, valueBoolean: false }
        - column: { name: protects_user, valueBoolean: false }
        - column: { name: thaws_user_before_move, valueBoolean: false }
        - column: { name: weakened_by_grassy_terrain, valueBoolean: false }
        - column: { name: sound_based, valueBoolean: false }
        - column: { name: powder_based, valueBoolean: false }
        - column: { name: punch_based, valueBoolean: false }
        - column: { name: slicing_based, valueBoolean: false }
        - column: { name: lock_move_turns_min, valueNumeric: 1 }
        - column: { name: lock_move_turns_max, valueNumeric: 1 }
        - column: { name: confuses_user_after_lock, valueBoolean: false }
        - column: { name: description, value: 在使用者一侧建立速度结算修正，使该侧成员按更高速度参与后续行动排序。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 170 }
    - insert:
        tableName: battle_skill_field_effect
        columns:
        - column: { name: id, valueNumeric: 4 }
        - column: { name: skill_rule_id, valueNumeric: 17 }
        - column: { name: field_rule_id, valueNumeric: 4 }
        - column: { name: target_side, value: USER_SIDE }
        - column: { name: effect_timing, value: AFTER_HIT }
        - column: { name: chance_percent, valueNumeric: 100 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 40 }
