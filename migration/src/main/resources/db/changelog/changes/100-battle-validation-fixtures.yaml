databaseChangeLog:
- changeSet:
    id: 100-battle-validation-fixtures
    author: backend
    comment: 新增准备阶段和行动提交校验公开对照 fixture 数据。
    changes:
    - sql:
        splitStatements: true
        stripComments: true
        sql: |
          insert into battle_rule_fixture
            (id, code, name, category, fixture_type, description, input_summary, expected_summary, enabled, sort_order)
          values
            (230, 'level-cap-rejects-over-level-participant', '等级上限拒绝超级别成员', 'FORMAT', 'VALIDATION', '验证准备阶段会按格式规则拒绝超过等级上限的成员。', '规则快照声明等级上限 50，队伍中一名成员等级为 60。', '准备阶段校验返回 level-too-high，违规定位到该成员并记录其成员种类 ID。', true, 2300),
            (231, 'banned-creature-rule-rejects-restricted-creature', '禁用成员规则拒绝受限种类', 'FORMAT', 'VALIDATION', '验证准备阶段会按格式规则拒绝被禁用的成员种类。', '规则快照禁用成员种类 150，队伍中一名成员的种类 ID 为 150。', '准备阶段校验返回 banned-creature，并把资源 ID 记录为被禁用的成员种类 ID。', true, 2310),
            (232, 'banned-skill-rule-rejects-restricted-skill', '禁用技能规则拒绝受限技能', 'FORMAT', 'VALIDATION', '验证准备阶段会按格式规则拒绝被禁用的技能。', '规则快照禁用技能 99，队伍成员携带技能 99。', '准备阶段校验返回 banned-skill，并把资源 ID 记录为被禁用技能 ID。', true, 2320),
            (233, 'banned-ability-rule-rejects-restricted-ability', '禁用特性规则拒绝受限特性', 'FORMAT', 'VALIDATION', '验证准备阶段会按格式规则拒绝被禁用的特性。', '规则快照禁用特性 88，队伍成员当前特性 ID 为 88。', '准备阶段校验返回 banned-ability，并把资源 ID 记录为被禁用特性 ID。', true, 2330),
            (234, 'banned-item-rule-rejects-restricted-held-item', '禁用道具规则拒绝受限携带道具', 'FORMAT', 'VALIDATION', '验证准备阶段会按格式规则拒绝被禁用的携带道具。', '规则快照禁用道具 77，队伍成员携带道具 ID 为 77。', '准备阶段校验返回 banned-item，并把资源 ID 记录为被禁用道具 ID。', true, 2340),
            (235, 'unique-creature-clause-rejects-duplicates-only-inside-one-side', '同方种类唯一条款拒绝队内重复', 'FORMAT', 'VALIDATION', '验证同方队伍内成员种类唯一条款只约束单方队伍，不跨阵营比较。', '规则快照要求同队成员种类唯一，一方队伍内两名成员种类相同，对手也有同种类成员。', '准备阶段只报告同一方内部的 duplicate-creature；不同阵营之间的相同种类不违规。', true, 2350),
            (236, 'unique-item-clause-rejects-duplicate-held-items-only-inside-one-side', '同方道具唯一条款拒绝队内重复', 'FORMAT', 'VALIDATION', '验证同方队伍内携带道具唯一条款只约束单方队伍，不跨阵营比较。', '规则快照要求同队携带道具唯一，一方队伍内两名成员携带同一道具，对手也携带同一道具。', '准备阶段只报告同一方内部的 duplicate-item；不同阵营之间的相同道具不违规。', true, 2360),
            (237, 'duplicate-action-submission-reports-every-duplicated-actor-action', '重复行动提交逐条报告', 'TURN', 'VALIDATION', '验证同一成员同回合重复提交行动时，校验器为每条重复行动返回稳定 code。', '同一成员在同一回合提交两条技能行动，两条行动本身都指向有效目标。', '行动提交校验为这两条行动都返回 duplicate-action，调用方可以定位重复提交来源。', true, 2370),
            (238, 'skill-with-no-pp-is-rejected-before-engine-resolution', 'PP 耗尽技能在结算前被拒绝', 'TURN', 'VALIDATION', '验证技能 PP 耗尽属于提交阶段非法选择，不进入正式战斗状态机。', '当前上场成员选择剩余 PP 为 0 的技能，目标成员有效且仍可战斗。', '行动提交校验返回 skill-no-pp；该行动不应进入正式回合状态机。', true, 2380),
            (239, 'choice-locked-participant-cannot-submit-a-different-skill', '讲究锁定成员不能提交不同技能', 'TURN', 'VALIDATION', '验证讲究类技能锁定会在提交阶段阻止选择其它技能。', '成员已经被讲究类效果锁定到技能 2，本回合尝试选择技能 1。', '行动提交校验返回 choice-locked，并把资源 ID 记录为当前锁定的技能 ID。', true, 2390);
          insert into battle_rule_fixture_source
            (id, fixture_id, source_url, source_label, source_note, sort_order)
          values
            (460, 230, 'https://github.com/smogon/pokemon-showdown/blob/master/config/formats.ts', '公开规则集配置', '用于对照格式规则中的等级限制。', 10),
            (461, 230, 'https://wiki.52poke.com/wiki/对战设施', '对战设施公开规则说明', '用于对照常见等级统一或等级限制条款。', 20),
            (462, 231, 'https://github.com/smogon/pokemon-showdown/blob/master/config/formats.ts', '公开规则集配置', '用于对照格式规则中的成员禁用列表。', 10),
            (463, 231, 'https://wiki.52poke.com/wiki/规则', '公开规则说明', '用于对照规则可限制可用成员。', 20),
            (464, 232, 'https://github.com/smogon/pokemon-showdown/blob/master/config/formats.ts', '公开规则集配置', '用于对照格式规则中的技能禁用列表。', 10),
            (465, 232, 'https://wiki.52poke.com/wiki/招式', '技能公开资料', '用于对照技能作为可被规则限制的队伍资源。', 20),
            (466, 233, 'https://github.com/smogon/pokemon-showdown/blob/master/config/formats.ts', '公开规则集配置', '用于对照格式规则中的特性禁用列表。', 10),
            (467, 233, 'https://wiki.52poke.com/wiki/特性', '特性公开资料', '用于对照特性作为可被规则限制的队伍资源。', 20),
            (468, 234, 'https://github.com/smogon/pokemon-showdown/blob/master/config/formats.ts', '公开规则集配置', '用于对照格式规则中的道具禁用列表。', 10),
            (469, 234, 'https://wiki.52poke.com/wiki/道具', '道具公开资料', '用于对照携带道具作为可被规则限制的队伍资源。', 20),
            (470, 235, 'https://github.com/smogon/pokemon-showdown/blob/master/config/formats.ts', '公开规则集配置', '用于对照同队成员种类唯一条款。', 10),
            (471, 235, 'https://wiki.52poke.com/wiki/规则', '公开规则说明', '用于对照重复限制只约束同一方队伍。', 20),
            (472, 236, 'https://github.com/smogon/pokemon-showdown/blob/master/config/formats.ts', '公开规则集配置', '用于对照同队携带道具唯一条款。', 10),
            (473, 236, 'https://wiki.52poke.com/wiki/道具', '道具公开资料', '用于对照携带道具唯一限制。', 20),
            (474, 237, 'https://github.com/smogon/pokemon-showdown/blob/master/sim/battle-queue.ts', '公开引擎行动队列', '用于对照同一成员同回合只能有一个行动选择。', 10),
            (475, 237, 'https://wiki.52poke.com/wiki/对战', '对战公开规则说明', '用于对照回合行动选择阶段。', 20),
            (476, 238, 'https://github.com/smogon/pokemon-showdown/blob/master/sim/battle-actions.ts', '公开引擎行动流程', '用于对照 PP 耗尽技能不能作为合法行动提交。', 10),
            (477, 238, 'https://wiki.52poke.com/wiki/PP', 'PP 公开规则说明', '用于验证技能 PP 是可用性约束。', 20),
            (478, 239, 'https://github.com/smogon/pokemon-showdown/blob/master/data/items.ts', '公开道具资料', '用于对照讲究类道具锁定技能选择。', 10),
            (479, 239, 'https://github.com/smogon/pokemon-showdown/blob/master/sim/battle-actions.ts', '公开引擎行动流程', '用于对照讲究类锁定在行动选择阶段被检查。', 20);
