databaseChangeLog:
- changeSet:
    id: 203-skill-element-override-ability-rules
    author: codex
    comment: 为属性皮肤、一般化与湿润之声补充统一的技能属性转换规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          insert into battle_ability_rule (
            id, ability_id, trigger_timing, effect_policy,
            trigger_order, description, enabled, sort_order
          )
          select coalesce((select max(id) from battle_ability_rule), 0) + source.row_no,
            ability.id, 'DAMAGE_CALCULATION', source.effect_policy,
            100, source.description, true, 4800 + source.row_no
          from (
            values
              (1, 'aerilate', 'normal-to-flying-damage-boost', '把一般属性技能转为飞行属性，并使其伤害提高至一点二倍。'),
              (2, 'galvanize', 'normal-to-electric-damage-boost', '把一般属性技能转为电属性，并使其伤害提高至一点二倍。'),
              (3, 'pixilate', 'normal-to-fairy-damage-boost', '把一般属性技能转为妖精属性，并使其伤害提高至一点二倍。'),
              (4, 'refrigerate', 'normal-to-ice-damage-boost', '把一般属性技能转为冰属性，并使其伤害提高至一点二倍。'),
              (5, 'normalize', 'all-to-normal-damage-boost', '把有属性的技能转为一般属性，并使其伤害提高至一点二倍。'),
              (6, 'liquid-voice', 'sound-to-water', '把声音类技能转为水属性。')
          ) as source(row_no, ability_code, effect_policy, description)
          join game_ability ability on ability.code = source.ability_code
          on conflict (ability_id, trigger_timing, effect_policy) do update set
            trigger_order = excluded.trigger_order,
            description = excluded.description,
            enabled = excluded.enabled,
            sort_order = excluded.sort_order;
