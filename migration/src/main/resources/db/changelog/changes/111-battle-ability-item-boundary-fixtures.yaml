databaseChangeLog:
- changeSet:
    id: 111-battle-ability-item-boundary-fixtures
    author: backend
    comment: 新增特性和道具效果边界公开对照 fixture 数据。
    changes:
    - sql:
        splitStatements: true
        stripComments: true
        sql: |
          insert into battle_rule_fixture
            (id, code, name, category, fixture_type, description, input_summary, expected_summary, enabled, sort_order)
          values
            (360, 'element-absorb-heal-ignores-non-matching-element', '属性吸收回复忽略非匹配属性', 'ABILITY', 'STATE_MACHINE', '验证属性吸收回复特性只在技能有效属性匹配时触发。', '目标拥有吸收电属性技能并回复的结构化特性，对手使用草属性物理攻击。', '技能属性不匹配，目标特性不触发；技能进入普通伤害流程并造成直接伤害。', true, 3600),
            (361, 'element-absorb-heal-waits-for-hit-and-skips-on-miss', '属性吸收回复等待命中后触发', 'ABILITY', 'STATE_MACHINE', '验证未命中的技能不会进入属性吸收特性阶段。', '目标拥有吸收电属性技能并回复的结构化特性，对手使用带命中判定的电属性技能但命中失败。', '技能未命中时不会进入吸收特性阶段，目标 HP 不变，也不产生吸收事件。', true, 3610),
            (362, 'element-absorb-stat-at-upper-bound-absorbs-without-stage-event', '属性吸收提阶上限不产生提阶事件', 'ABILITY', 'STATE_MACHINE', '验证属性吸收提阶达到上限时仍阻止技能但不产生误导性提阶事件。', '目标速度阶级已经为 +6，并拥有吸收电属性技能后提升速度的结构化特性。', '技能仍被目标特性吸收并阻止伤害，但速度阶级已达上限，因此不产生能力阶级变化事件。', true, 3620),
            (363, 'target-ability-ignore-does-not-bypass-held-damage-reduction-item', '无视目标特性不绕过携带减伤道具', 'ABILITY', 'STATE_MACHINE', '验证无视目标特性不会扩散到目标携带道具。', '攻击方拥有无视目标特性效果，目标携带火属性抗性减伤道具并受到效果绝佳火属性技能。', '无视目标特性不会影响目标携带道具，抗性减伤仍按 0.5 倍触发并消费道具。', true, 3630),
            (364, 'target-ability-ignore-keeps-same-side-target-ability-active', '无视目标特性不影响同侧目标', 'ABILITY', 'STATE_MACHINE', '验证无视目标特性只作用于敌对目标关系。', '双打中攻击方拥有无视目标特性效果，却把匹配属性技能指向同侧伙伴；伙伴拥有属性吸收回复特性。', '无视目标特性只作用于敌对目标，同侧伙伴的吸收特性仍触发并阻止技能继续结算。', true, 3640),
            (365, 'sound-immunity-does-not-block-user-own-sound-skill', '声音免疫不阻止自身声音技能', 'ABILITY', 'STATE_MACHINE', '验证声音类技能免疫不会阻止拥有者自己使用声音类技能。', '成员拥有声音类技能免疫特性，并把一个声音类变化技能指向自己。', '声音免疫只阻止其它成员的声音类技能，不阻止拥有者自己使用声音类技能。', true, 3650),
            (366, 'sound-immunity-ignores-non-sound-skill', '声音免疫忽略非声音技能', 'ABILITY', 'STATE_MACHINE', '验证声音类技能免疫只读取声音标签。', '目标拥有声音类技能免疫特性，对手使用没有声音标签的普通物理技能。', '技能标签不匹配，声音免疫不触发；技能进入普通伤害流程。', true, 3660),
            (367, 'priority-side-immunity-ignores-same-side-priority-support', '先制侧防护忽略同侧辅助', 'ABILITY', 'STATE_MACHINE', '验证先制技能侧防护只阻止敌对先制技能。', '双打中一侧成员拥有先制技能侧防护特性，同侧伙伴使用先制变化技能指向它。', '先制侧防护只阻止敌对成员的先制技能，同侧辅助不会被该特性阻挡。', true, 3670),
            (368, 'priority-side-immunity-ignores-non-priority-skill', '先制侧防护忽略普通优先度技能', 'ABILITY', 'STATE_MACHINE', '验证先制侧防护只对有效优先度大于 0 的技能触发。', '目标侧当前上场成员拥有先制技能侧防护特性，对手使用普通优先度物理技能。', '技能没有先制优先度，侧防护特性不触发；目标正常受到伤害。', true, 3680),
            (369, 'priority-side-immunity-can-be-bypassed-by-target-ability-ignore', '无视目标特性绕过先制侧防护', 'ABILITY', 'STATE_MACHINE', '验证攻击方无视目标特性效果可以绕过目标侧防守型先制防护。', '攻击方拥有无视目标特性效果，使用先制物理技能攻击拥有先制侧防护特性的目标。', '目标侧防护特性被本次技能绕过，先制技能继续进入普通伤害流程。', true, 3690),
            (370, 'weather-damage-immunity-requires-matching-weather', '天气伤害免疫要求天气匹配', 'ABILITY', 'STATE_MACHINE', '验证天气伤害免疫只阻止声明匹配的天气。', '成员只有雪景伤害免疫特性，但当前天气是沙暴。', '免疫天气不匹配时不会阻止沙暴回合末伤害。', true, 3700),
            (371, 'weather-healing-ability-requires-matching-weather', '天气回复特性要求天气匹配', 'ABILITY', 'STATE_MACHINE', '验证天气回复特性只在当前天气匹配时触发。', '成员拥有下雨时回合末回复的结构化特性，但当前天气是晴天。', '天气不匹配时不会触发天气回复事件，成员 HP 保持不变。', true, 3710),
            (372, 'weather-speed-multiplier-requires-matching-weather', '天气速度特性要求天气匹配', 'ABILITY', 'STATE_MACHINE', '验证天气速度倍率只在当前天气匹配时参与行动排序。', '较慢成员拥有下雨时速度翻倍的结构化特性，但当前天气是晴天；较快对手同优先度行动。', '天气不匹配时速度倍率不生效，较快对手先行动。', true, 3720),
            (373, 'terrain-speed-multiplier-requires-matching-terrain', '场地速度特性要求场地匹配', 'ABILITY', 'STATE_MACHINE', '验证场地速度倍率只在当前场地匹配时参与行动排序。', '较慢成员拥有电气场地下速度翻倍的结构化特性，但当前场地是青草场地；较快对手同优先度行动。', '场地不匹配时速度倍率不生效，较快对手先行动。', true, 3730),
            (374, 'damage-dealt-healing-item-clamps-to-missing-hp', '造成伤害后回复道具夹取到缺失 HP', 'ITEM', 'STATE_MACHINE', '验证造成伤害后回复道具不会超过使用者缺失 HP。', '使用者只缺失 1 HP，携带按造成伤害八分之一回复的道具并造成 28 点实际伤害。', '理论回复为 3 点，但实际回复夹取到缺失的 1 点 HP。', true, 3740),
            (375, 'damage-dealt-healing-item-skips-full-hp-user', '造成伤害后回复道具满 HP 不触发', 'ITEM', 'STATE_MACHINE', '验证满 HP 使用者不会产生无意义的造成伤害后回复事件。', '满 HP 使用者携带按造成伤害回复的道具并成功造成直接伤害。', '使用者没有缺失 HP，因此道具不产生回复事件。', true, 3750),
            (376, 'low-hp-healing-item-clamps-to-missing-hp-and-consumes', '低体力回复道具夹取并消费', 'ITEM', 'STATE_MACHINE', '验证低体力回复道具回复量夹取到缺失 HP 且触发后消费。', '目标携带高触发线低体力回复道具，受伤后达到触发线且理论回复超过缺失 HP。', '道具回复夹取到缺失 HP，使目标回到满 HP，并在触发后被消费。', true, 3760),
            (377, 'low-hp-healing-item-skips-fainted-holder', '低体力回复道具不救已经倒下成员', 'ITEM', 'STATE_MACHINE', '验证成员已经被伤害扣到 0 时不会触发低体力回复道具。', '目标携带低体力回复道具，但本次直接伤害把目标 HP 扣到 0。', '已经倒下的成员不会触发低体力回复，道具不消费，也不产生回复事件。', true, 3770),
            (378, 'held-end-turn-healing-item-clamps-to-missing-hp', '回合末回复道具夹取到缺失 HP', 'ITEM', 'STATE_MACHINE', '验证回合末固定比例回复道具不会超过成员最大 HP。', '成员只缺失 2 HP，并携带回合末回复最大 HP 1/16 的道具。', '理论回复为 6 点，但实际回合末回复夹取为缺失的 2 点 HP。', true, 3780),
            (379, 'non-consumable-element-damage-reduction-keeps-held-item', '非消耗属性减伤保留道具', 'ITEM', 'STATE_MACHINE', '验证属性减伤效果可以配置为触发后不消费道具。', '目标携带不消费的火属性减伤效果，受到效果绝佳火属性物理技能。', '减伤按 0.5 倍生效，但道具不会被消费，目标仍保留携带道具和效果。', true, 3790);
          insert into battle_rule_test_run
            (id, run_code, fixture_id, run_status, executor, command, started_at, sort_order)
          values
