name: Publish API Docs

on:
  workflow_run:
    workflows:
      - Deploy Snapshot
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: avalon-site-publish-${{ github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: true

jobs:
  publish-api-docs:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: 准备构建环境
        uses: ./.github/actions/setup-build-env
        with:
          prepare-ip2location-db: 'false'

      - name: 生成聚合 API 文档站点（Dokka）
        run: gradle dokkaGeneratePublicationHtml -x test

      - name: 设置 Node 环境
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAT }}
          publish_dir: build/dokka/html
          external_repository: lishangbu/avalon-site
          publish_branch: main
          destination_dir: api-docs
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
