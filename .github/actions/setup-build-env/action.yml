name: Setup Build Environment
description: Setup Java, Gradle, and optionally restore the IP2Location database for CI jobs.

inputs:
  java-version:
    description: Java version for actions/setup-java.
    required: false
    default: '25'
  java-distribution:
    description: Java distribution for actions/setup-java.
    required: false
    default: oracle
  java-architecture:
    description: Java architecture for actions/setup-java.
    required: false
    default: x64
  gradle-version:
    description: Gradle version for gradle/actions/setup-gradle.
    required: false
    default: '9.4.1'
  prepare-ip2location-db:
    description: Whether to restore or download the IP2Location database.
    required: false
    default: 'true'
  ip2location-source-run-id:
    description: Workflow run id used to download a previously prepared IP2Location database artifact.
    required: false
    default: ''
  github-token:
    description: GitHub token used when downloading artifacts from another workflow run.
    required: false
    default: ''
  ip2location-download-token:
    description: Token used to download the official IP2Location archive when cache is missing.
    required: false
    default: ''
  upload-ip2location-artifact:
    description: Whether to upload the prepared IP2Location database as a workflow artifact.
    required: false
    default: 'false'
  ip2location-artifact-name:
    description: Artifact name used to share the prepared IP2Location database between workflows.
    required: false
    default: ip2location-db11ipv6
  ip2location-artifact-retention-days:
    description: Artifact retention period in days.
    required: false
    default: '7'

runs:
  using: composite
  steps:
    - name: 设置 Java 环境 - 使用 Oracle JDK
      uses: actions/setup-java@v5
      with:
        java-version: ${{ inputs.java-version }}
        distribution: ${{ inputs.java-distribution }}
        architecture: ${{ inputs.java-architecture }}

    - name: 设置 Gradle 环境
      uses: gradle/actions/setup-gradle@v5
      with:
        gradle-version: ${{ inputs.gradle-version }}

    - name: 下载上游 IP2Location 数据制品
      if: inputs.prepare-ip2location-db == 'true' && inputs.ip2location-source-run-id != ''
      uses: actions/download-artifact@v8
      with:
        name: ${{ inputs.ip2location-artifact-name }}
        path: avalon-platform/avalon-ip2location-spring-boot-starter/src/main/resources
        github-token: ${{ inputs.github-token }}
        repository: ${{ github.repository }}
        run-id: ${{ inputs.ip2location-source-run-id }}

    - name: 计算 IP 数据缓存周期
      if: inputs.prepare-ip2location-db == 'true' && inputs.ip2location-source-run-id == ''
      id: ip-db-cache-epoch
      shell: bash
      run: echo "value=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"

    - name: 恢复 IP2Location 数据缓存
      if: inputs.prepare-ip2location-db == 'true' && inputs.ip2location-source-run-id == ''
      id: ip-db-cache
      uses: actions/cache@v4
      with:
        path: avalon-platform/avalon-ip2location-spring-boot-starter/src/main/resources/IP2LOCATION-LITE-DB11.IPV6.BIN
        key: ${{ runner.os }}-ip2location-db11ipv6-${{ steps.ip-db-cache-epoch.outputs.value }}
        restore-keys: |
          ${{ runner.os }}-ip2location-db11ipv6-

    - name: 下载或刷新 IP2Location 数据
      if: inputs.prepare-ip2location-db == 'true' && inputs.ip2location-source-run-id == '' && steps.ip-db-cache.outputs.cache-hit != 'true' && inputs.ip2location-download-token != ''
      shell: bash
      env:
        IP2LOCATION_DOWNLOAD_TOKEN: ${{ inputs.ip2location-download-token }}
      run: gradle downloadIpData -PrefreshIpDb=true

    - name: 校验 IP2Location 数据已就绪
      if: inputs.prepare-ip2location-db == 'true'
      shell: bash
      run: |
        test -f avalon-platform/avalon-ip2location-spring-boot-starter/src/main/resources/IP2LOCATION-LITE-DB11.IPV6.BIN || {
          echo "IP2Location database is missing. Restore the Actions cache or configure the IP2LOCATION_DOWNLOAD_TOKEN secret."
          exit 1
        }

    - name: 上传 IP2Location 数据制品
      if: inputs.prepare-ip2location-db == 'true' && inputs.upload-ip2location-artifact == 'true'
      uses: actions/upload-artifact@v6
      with:
        name: ${{ inputs.ip2location-artifact-name }}
        path: avalon-platform/avalon-ip2location-spring-boot-starter/src/main/resources/IP2LOCATION-LITE-DB11.IPV6.BIN
        if-no-files-found: error
        retention-days: ${{ inputs.ip2location-artifact-retention-days }}
