databaseChangeLog:
- changeSet:
    id: 039-battle-rule-terrain-fixtures
    author: backend
    comment: 新增青草场地、精神场地、地形持续、地形设置和地形速度公开对照 fixture 数据。
    changes:
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 49 }
        - column: { name: code, value: grassy-terrain-heals-active-participants-at-end-turn }
        - column: { name: name, value: 青草场地回合末回复上场成员 }
        - column: { name: category, value: TERRAIN }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证青草场地在回合末按最大 HP 1/16 回复当前上场且可回复的成员。 }
        - column: { name: input_summary, value: 青草场地存在时，当前上场成员损失 HP，本回合没有其它行动。 }
        - column: { name: expected_summary, value: 回合末成员获得 floor(最大 HP / 16) 的青草场地回复，并产生地形回复事件。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 490 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 50 }
        - column: { name: code, value: grassy-terrain-heals-only-grounded-active-participants }
        - column: { name: name, value: 青草场地只回复接地上场成员 }
        - column: { name: category, value: TERRAIN }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证青草场地回合末回复只影响当前上场且接地的成员。 }
        - column: { name: input_summary, value: 青草场地存在时，双方当前上场成员都损失 HP，其中一方不接地。 }
        - column: { name: expected_summary, value: 只有接地成员在回合末获得青草场地回复。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 500 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 51 }
        - column: { name: code, value: grassy-terrain-boosts-grounded-grass-damage }
        - column: { name: name, value: 青草场地增强接地草属性伤害 }
        - column: { name: category, value: TERRAIN }
        - column: { name: fixture_type, value: FORMULA }
        - column: { name: description, value: 验证青草场地会让接地成员使用草属性技能时获得 1.3 倍场地伤害倍率。 }
        - column: { name: input_summary, value: 青草场地中，接地草属性成员使用草属性技能。 }
        - column: { name: expected_summary, value: 伤害公式额外应用 1.3 倍场地倍率；非接地使用者不会获得该倍率。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 510 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 52 }
        - column: { name: code, value: grassy-terrain-weakens-tagged-ground-shaking-moves-against-grounded-targets }
        - column: { name: name, value: 青草场地削弱接地目标受到的震动技能 }
        - column: { name: category, value: TERRAIN }
        - column: { name: fixture_type, value: FORMULA }
        - column: { name: description, value: 验证青草场地会削弱带震动削弱标签的地面技能对接地目标造成的伤害。 }
        - column: { name: input_summary, value: 青草场地中，带震动削弱标签的地面物理技能分别命中接地和非接地目标。 }
        - column: { name: expected_summary, value: 接地目标受到 0.5 倍场地倍率伤害，非接地目标不受该削弱影响。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 520 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 53 }
        - column: { name: code, value: psychic-terrain-blocks-priority-move-against-grounded-opponent }
        - column: { name: name, value: 精神场地阻止对接地对手的先制技能 }
        - column: { name: category, value: TERRAIN }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证精神场地会保护接地成员免受对手先制技能影响，但技能本身仍消耗 PP。 }
        - column: { name: input_summary, value: 精神场地存在时，使用者对接地对手使用先制攻击。 }
        - column: { name: expected_summary, value: 技能消耗 PP 后被场地阻挡，不造成伤害。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 530 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 54 }
        - column: { name: code, value: psychic-terrain-does-not-block-priority-move-against-ungrounded-opponent }
        - column: { name: name, value: 精神场地不阻止对非接地对手的先制技能 }
        - column: { name: category, value: TERRAIN }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证精神场地只保护接地成员，非接地目标仍按普通先制技能流程结算。 }
        - column: { name: input_summary, value: 精神场地存在时，使用者对非接地对手使用先制攻击。 }
        - column: { name: expected_summary, value: 场地不阻挡该目标，技能按普通伤害流程结算。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 540 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 55 }
        - column: { name: code, value: status-skill-starts-terrain-for-five-turns }
        - column: { name: name, value: 变化技能设置五回合场地 }
        - column: { name: category, value: TERRAIN }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证设置场地类变化技能成功后会写入全场场地、持续回合，并产生场地开始事件。 }
        - column: { name: input_summary, value: 使用者成功使用设置场地的变化技能，当前全场没有场地。 }
        - column: { name: expected_summary, value: 全场场地变为目标场地，剩余回合为 5，并产生场地开始事件。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 550 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 56 }
        - column: { name: code, value: terrain-duration-ends-at-turn-end }
        - column: { name: name, value: 场地持续回合耗尽后结束 }
        - column: { name: category, value: TERRAIN }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证有持续回合的场地在回合末递减，归零时恢复为无场地并产生结束事件。 }
        - column: { name: input_summary, value: 初始电气场地剩余 1 回合，结算一个空回合。 }
        - column: { name: expected_summary, value: 回合末场地恢复为无并产生场地结束事件。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 560 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 57 }
        - column: { name: code, value: terrain-speed-ability-changes-skill-action-order }
        - column: { name: name, value: 场地速度特性改变行动顺序 }
        - column: { name: category, value: TERRAIN }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证指定场地下的速度倍率特性参与有效速度排序，并可让低速成员先行动。 }
        - column: { name: input_summary, value: 电气场地环境下，低速成员拥有场地速度翻倍特性，高速成员没有场地速度特性。 }
        - column: { name: expected_summary, value: 低速成员的有效速度翻倍后先行动，事件流中的技能使用顺序随之改变。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 570 }
    - insert:
