databaseChangeLog:
- changeSet:
    id: 110-battle-skill-effect-boundary-fixtures
    author: backend
    comment: 新增技能效果边界公开对照 fixture 数据。
    changes:
    - sql:
        splitStatements: true
        stripComments: true
        sql: |
          insert into battle_rule_fixture
            (id, code, name, category, fixture_type, description, input_summary, expected_summary, enabled, sort_order)
          values
            (340, 'drain-healing-clamps-to-missing-hp', '吸取回复夹取到缺失 HP', 'SKILL', 'STATE_MACHINE', '验证吸取类技能的回复量不会超过使用者缺失 HP。', '使用者只缺失 5 HP，吸取类伤害技能造成 28 点实际伤害。', '理论吸取回复为 14，但实际技能回复事件夹取为缺失的 5 HP。', true, 3400),
            (341, 'drain-healing-minimum-one-after-one-damage', '吸取回复低额伤害至少 1 点', 'SKILL', 'STATE_MACHINE', '验证吸取类技能造成正伤害时回复量向下取整后仍至少为 1 点。', '吸取类伤害技能只让目标实际损失 1 HP。', '1/2 吸取比例向下取整会低于 1，但正伤害吸取回复仍至少产生 1 点回复。', true, 3410),
            (342, 'drain-healing-skips-full-hp-user', '满 HP 使用者不产生吸取回复', 'SKILL', 'STATE_MACHINE', '验证满 HP 使用者命中吸取类技能时不会追加无意义回复事件。', '满 HP 使用者用吸取类伤害技能命中目标。', '技能仍造成伤害，但使用者没有缺失 HP，因此不产生技能回复事件。', true, 3420),
            (343, 'recoil-damage-clamps-to-user-current-hp', '反作用伤害夹取到当前 HP', 'SKILL', 'STATE_MACHINE', '验证技能反作用伤害不会扣到使用者当前 HP 以下。', '使用者只剩 5 HP，带 1/3 反作用伤害的技能造成 28 点实际伤害。', '理论反作用伤害四舍五入为 9，但实际扣减被夹取到使用者剩余 5 HP。', true, 3430),
            (344, 'recoil-damage-immunity-skips-skill-recoil', '反作用伤害免疫跳过技能反伤', 'ABILITY', 'STATE_MACHINE', '验证技能反作用伤害免疫只跳过使用者的反伤，不影响目标正常受伤。', '使用者拥有技能反作用伤害免疫效果，并用带 1/3 反作用伤害的技能命中目标。', '目标正常受到伤害，使用者不会承受技能反作用伤害，也不产生反作用事件。', true, 3440),
            (345, 'self-healing-clamps-to-missing-hp', '自我回复夹取到缺失 HP', 'SKILL', 'STATE_MACHINE', '验证自我回复类变化技能不会超过使用者最大 HP。', '使用者只缺失 20 HP，使用回复最大 HP 1/2 的变化技能。', '理论回复为 50，但实际技能回复事件夹取为缺失的 20 HP。', true, 3450),
            (346, 'self-healing-skips-full-hp-user', '满 HP 使用者不产生自我回复', 'SKILL', 'STATE_MACHINE', '验证满 HP 使用者使用回复技能时不会追加无意义回复事件。', '满 HP 使用者使用回复最大 HP 1/2 的变化技能。', '技能成功使用但 HP 没有变化，因此不产生技能回复事件。', true, 3460),
            (347, 'weather-sensitive-self-healing-uses-default-fraction-without-weather', '天气变量回复无天气使用默认比例', 'SKILL', 'STATE_MACHINE', '验证天气变量回复技能在没有匹配天气时使用默认回复比例。', '无天气下使用天气变量回复技能，默认比例为最大 HP 的 1/2。', '当前天气没有命中任何特殊比例，因此使用默认 1/2 回复。', true, 3470),
            (348, 'forced-switch-single-bench-consumes-no-random', '强制替换唯一后备不消费随机', 'SKILL', 'STATE_MACHINE', '验证强制替换在只有一个可用后备时直接选择该成员。', '强制替换变化技能命中目标，目标侧只有一个可战斗后备成员。', '唯一后备成员直接换入，不消费强制替换随机数。', true, 3480),
            (349, 'forced-switch-skips-when-target-side-has-no-bench', '无后备时强制替换短路', 'SKILL', 'STATE_MACHINE', '验证目标侧没有可战斗后备成员时强制替换不会改变状态。', '强制替换变化技能命中目标，但目标侧没有任何可战斗后备成员。', '强制替换效果保持状态不变，不消费随机数，也不产生强制替换选择事件。', true, 3490),
            (350, 'forced-switch-skips-target-fainted-by-damage', '目标倒下后强制替换短路', 'SKILL', 'STATE_MACHINE', '验证伤害已经让目标倒下时不会继续执行强制替换后效。', '伤害类强制替换技能命中只剩 1 HP 的目标，目标侧仍有可战斗后备成员。', '目标已经因伤害倒下，强制替换效果短路，不再选择后备成员。', true, 3500),
            (351, 'substitute-blocks-forced-switch-effect', '替身阻挡强制替换效果', 'STATUS', 'STATE_MACHINE', '验证替身会阻挡对手强制替换类技能后效。', '目标拥有替身，强制替换变化技能成功使用并指向该目标。', '对手技能效果被替身阻挡，目标侧上场席位保持不变，不消费强制替换随机数。', true, 3510),
            (352, 'forced-switch-triggers-entry-hazard-on-replacement', '强制替换触发入场陷阱', 'FIELD', 'STATE_MACHINE', '验证强制替换换入成员时复用普通入场陷阱结算流程。', '目标侧已有一层入场伤害陷阱，强制替换变化技能让唯一后备成员换入。', '强制替换事件后继续复用普通换入流程，新上场成员立刻承受入场陷阱伤害。', true, 3520),
            (353, 'stat-stage-effect-chance-failure-consumes-random-without-change', '能力阶级效果概率失败只消费随机', 'SKILL', 'STATE_MACHINE', '验证能力阶级附加效果概率失败时只消费随机数，不改变阶级。', '技能声明 50% 概率降低目标攻击阶级，但概率随机掷出失败值。', '概率随机被消费，目标能力阶级保持不变，不产生能力阶级变化事件。', true, 3530),
            (354, 'stat-stage-effect-at-upper-bound-produces-no-event', '能力阶级达到上限不产生事件', 'SKILL', 'STATE_MACHINE', '验证能力阶级变化被边界夹取后没有实际变化时不产生变化事件。', '使用者攻击阶级已经为 +6，又使用提升自身攻击 1 级的变化技能。', '能力阶级被边界夹取后没有实际变化，因此不产生能力阶级变化事件。', true, 3540),
            (355, 'stat-stage-operation-chance-failure-consumes-random-without-change', '能力阶级操作概率失败只消费随机', 'SKILL', 'STATE_MACHINE', '验证能力阶级特殊操作概率失败时只消费随机数，不改变阶级。', '技能声明 50% 概率清除目标攻击阶级，但概率随机掷出失败值。', '概率随机被消费，目标能力阶级保持原值，不产生清除事件。', true, 3550),
            (356, 'clear-operation-at-zero-produces-no-event', '清除零阶级不产生事件', 'SKILL', 'STATE_MACHINE', '验证清除能力阶级操作没有实际变化时不产生清除事件。', '目标攻击阶级已经为 0，技能成功执行清除目标攻击阶级的特殊操作。', '清除操作没有改变状态，因此不产生能力阶级清除事件。', true, 3560),
            (357, 'copy-operation-with-same-stage-produces-no-event', '复制相同阶级不产生事件', 'SKILL', 'STATE_MACHINE', '验证复制能力阶级结果与当前值一致时不产生复制事件。', '使用者和目标攻击阶级都为 +2，使用者成功执行复制目标攻击阶级的特殊操作。', '复制结果与使用者当前阶级一致，状态不变，也不产生复制事件。', true, 3570),
            (358, 'swap-operation-with-same-stage-produces-no-event', '交换相同阶级不产生事件', 'SKILL', 'STATE_MACHINE', '验证交换双方相同能力阶级时不产生交换事件。', '使用者和目标攻击阶级都为 +2，使用者成功执行交换双方攻击阶级的特殊操作。', '交换前后双方阶级一致，状态不变，也不产生交换事件。', true, 3580),
            (359, 'invert-operation-at-zero-produces-no-event', '取反零阶级不产生事件', 'SKILL', 'STATE_MACHINE', '验证取反 0 阶级没有实际变化时不产生取反事件。', '目标攻击阶级为 0，使用者成功执行取反目标攻击阶级的特殊操作。', '0 阶级取反后仍为 0，状态不变，也不产生取反事件。', true, 3590);
