databaseChangeLog:
- changeSet:
    id: 128-sa-token-security
    author: backend
    comment: 使用 Sa-Token 状态表替代 OAuth2 授权、客户端和密钥持久化。
    changes:
    - dropTable:
        tableName: oauth_refresh_token_replay
        cascadeConstraints: true
    - dropTable:
        tableName: oauth2_authorization_consent
        cascadeConstraints: true
    - dropTable:
        tableName: oauth2_authorization
        cascadeConstraints: true
    - dropTable:
        tableName: oauth2_jwk
        cascadeConstraints: true
    - dropTable:
        tableName: oauth2_client
        cascadeConstraints: true
    - createTable:
        tableName: security_token_state
        remarks: Sa-Token 运行状态表，保存 token 映射、登录会话和框架内部索引。
        columns:
        - column:
            name: id
            type: bigint
            remarks: 运行状态主键。
            constraints:
              primaryKey: true
              primaryKeyName: pk_security_token_state
              nullable: false
        - column:
            name: state_key
            type: varchar(512)
            remarks: Sa-Token 状态键。
            constraints:
              unique: true
              uniqueConstraintName: uk_security_token_state__state_key
              nullable: false
        - column:
            name: state_value
            type: text
            remarks: 字符串值或序列化后的会话数据。
            constraints:
              nullable: false
        - column:
            name: expires_at
            type: timestamptz
            remarks: 过期时间，为空表示永久有效。
    - createIndex:
        tableName: security_token_state
        indexName: idx_security_token_state__expires_at
        columns:
        - column:
            name: expires_at
    - sql:
        sql: |
          delete from security_role_access_node
          where access_node_id in (
            select id from security_access_node where code = 'system.oauth' or code like 'system.oauth.%'
          );
          delete from security_access_node where code = 'system.oauth' or code like 'system.oauth.%';
