databaseChangeLog:
- changeSet:
    id: 094-battle-taunt-rules
    author: backend
    comment: 新增挑衅临时状态、技能规则与公开对照 fixture 数据。
    changes:
    - insert:
        tableName: battle_status_rule
        columns:
        - column: { name: id, valueNumeric: 10 }
        - column: { name: code, value: taunt }
        - column: { name: name, value: 挑衅 }
        - column: { name: status_kind, value: VOLATILE }
        - column: { name: effect_policy, value: volatile-taunt }
        - column: { name: min_turns, valueNumeric: 3 }
        - column: { name: max_turns, valueNumeric: 3 }
        - column: { name: description, value: 临时状态，持续期间阻止成员使用变化分类技能，但不阻止物理或特殊分类技能。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 100 }
    - insert:
        tableName: battle_skill_rule
        columns:
        - column: { name: id, valueNumeric: 97 }
        - column: { name: skill_id, valueNumeric: 269 }
        - column: { name: effect_policy, value: apply-taunt }
        - column: { name: target_policy, value: selected-target }
        - column: { name: hit_policy, value: standard-hit }
        - column: { name: damage_policy, value: status-effect }
        - column: { name: min_hits, valueNumeric: 1 }
        - column: { name: max_hits, valueNumeric: 1 }
        - column: { name: critical_hit_stage, valueNumeric: 0 }
        - column: { name: makes_contact, valueBoolean: false }
        - column: { name: affected_by_protect, valueBoolean: true }
        - column: { name: protects_user, valueBoolean: false }
        - column: { name: thaws_user_before_move, valueBoolean: false }
        - column: { name: weakened_by_grassy_terrain, valueBoolean: false }
        - column: { name: sound_based, valueBoolean: false }
        - column: { name: powder_based, valueBoolean: false }
        - column: { name: punch_based, valueBoolean: false }
        - column: { name: slicing_based, valueBoolean: false }
        - column: { name: lock_move_turns_min, valueNumeric: 1 }
        - column: { name: lock_move_turns_max, valueNumeric: 1 }
        - column: { name: confuses_user_after_lock, valueBoolean: false }
        - column: { name: force_target_switch, valueBoolean: false }
        - column: { name: description, value: 命中目标后附加挑衅临时状态；被替身、保护或临时状态免疫阻止时不写入状态。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 970 }
    - insert:
        tableName: battle_skill_status_effect
        columns:
        - column: { name: id, valueNumeric: 10 }
        - column: { name: skill_rule_id, valueNumeric: 97 }
        - column: { name: status_rule_id, valueNumeric: 10 }
        - column: { name: target_scope, value: TARGET }
        - column: { name: effect_timing, value: AFTER_HIT }
        - column: { name: chance_percent, valueNumeric: 100 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 100 }
    - sql:
        splitStatements: true
        stripComments: true
        sql: |
          insert into battle_rule_fixture
            (id, code, name, category, fixture_type, description, input_summary, expected_summary, enabled, sort_order)
          values
            (200, 'status-skill-applies-taunt-to-target', '挑衅技能附加目标临时状态', 'VOLATILE_STATUS', 'STATE_MACHINE', '验证挑衅类变化技能命中后写入目标临时状态并按回合末递减。', '使用者用挑衅类变化技能命中目标。', '目标获得挑衅临时状态；当前回合结束后剩余 2 回合。', true, 2000),
            (201, 'taunted-participant-cannot-use-status-skill', '挑衅阻止变化技能', 'VOLATILE_STATUS', 'STATE_MACHINE', '验证处于挑衅的成员不能使用变化分类技能。', '处于挑衅的成员尝试使用变化分类技能。', '变化技能在 PP 消耗前失败，成员不会产生技能使用事件。', true, 2010),
            (202, 'taunted-participant-can-use-damaging-skill', '挑衅不阻止攻击技能', 'VOLATILE_STATUS', 'STATE_MACHINE', '验证处于挑衅的成员仍可使用物理或特殊分类技能。', '处于挑衅的成员使用物理或特殊分类伤害技能。', '挑衅不阻止攻击分类技能，技能正常消耗 PP 并造成伤害。', true, 2020),
            (203, 'taunt-clears-when-end-turn-duration-reaches-zero', '挑衅持续时间归零解除', 'VOLATILE_STATUS', 'STATE_MACHINE', '验证挑衅在回合末持续时间递减到 0 时自然解除。', '成员的挑衅只剩 1 回合，双方本回合没有行动。', '回合末持续时间递减到 0，成员的挑衅被清除并产生临时状态解除事件。', true, 2030),
            (204, 'existing-taunt-blocks-new-taunt-without-refreshing-duration', '已有挑衅不会被再次附加刷新', 'VOLATILE_STATUS', 'STATE_MACHINE', '验证已有挑衅阻止重复附加且不会刷新剩余持续回合。', '目标已经处于挑衅且剩余 2 回合，再次被挑衅类技能命中。', '新挑衅不会刷新旧持续时间；当前回合结束后目标剩余 1 回合挑衅。', true, 2040);
          insert into battle_rule_fixture_source
            (id, fixture_id, source_url, source_label, source_note, sort_order)
          values
            (400, 200, 'https://github.com/smogon/pokemon-showdown/blob/master/data/moves.ts', '公开引擎技能资料', '用于对照挑衅技能附加临时状态。', 10),
            (401, 200, 'https://wiki.52poke.com/wiki/挑衅（招式）', '挑衅公开规则说明', '用于验证挑衅持续时间和命中后附加目标。', 20),
            (402, 201, 'https://github.com/smogon/pokemon-showdown/blob/master/data/conditions.ts', '公开引擎状态条件', '用于对照挑衅阻止变化技能。', 10),
            (403, 201, 'https://wiki.52poke.com/wiki/挑衅（状态变化）', '挑衅状态公开说明', '用于验证变化技能在挑衅下无法使用。', 20),
            (404, 202, 'https://github.com/smogon/pokemon-showdown/blob/master/data/conditions.ts', '公开引擎状态条件', '用于对照挑衅不阻止攻击分类技能。', 10),
            (405, 202, 'https://wiki.52poke.com/wiki/挑衅（状态变化）', '挑衅状态公开说明', '用于验证物理和特殊分类技能仍可使用。', 20),
            (406, 203, 'https://github.com/smogon/pokemon-showdown/blob/master/data/conditions.ts', '公开引擎状态条件', '用于对照挑衅持续时间解除。', 10),
            (407, 203, 'https://wiki.52poke.com/wiki/挑衅（状态变化）', '挑衅状态公开说明', '用于验证挑衅归零解除。', 20),
            (408, 204, 'https://github.com/smogon/pokemon-showdown/blob/master/data/moves.ts', '公开引擎技能资料', '用于对照已有挑衅不刷新。', 10),
            (409, 204, 'https://github.com/smogon/pokemon-showdown/blob/master/data/conditions.ts', '公开引擎状态条件', '用于对照已有挑衅阻止重复附加。', 20);
          insert into battle_rule_test_run
            (id, run_code, fixture_id, run_status, executor, command, started_at, sort_order)
          values
            (200, 'taunt-coverage-20260629-1', 200, 'PASSED', 'gradle', './gradlew :battle-engine:test --tests io.github.lishangbu.battleengine.BattleTauntTests', '2026-06-29T18:00:00+08:00', 2000),
            (201, 'taunt-coverage-20260629-2', 201, 'PASSED', 'gradle', './gradlew :battle-engine:test --tests io.github.lishangbu.battleengine.BattleTauntTests', '2026-06-29T18:00:00+08:00', 2010),
            (202, 'taunt-coverage-20260629-3', 202, 'PASSED', 'gradle', './gradlew :battle-engine:test --tests io.github.lishangbu.battleengine.BattleTauntTests', '2026-06-29T18:00:00+08:00', 2020),
            (203, 'taunt-coverage-20260629-4', 203, 'PASSED', 'gradle', './gradlew :battle-engine:test --tests io.github.lishangbu.battleengine.BattleTauntTests', '2026-06-29T18:00:00+08:00', 2030),
            (204, 'taunt-coverage-20260629-5', 204, 'PASSED', 'gradle', './gradlew :battle-engine:test --tests io.github.lishangbu.battleengine.BattleTauntTests', '2026-06-29T18:00:00+08:00', 2040);
