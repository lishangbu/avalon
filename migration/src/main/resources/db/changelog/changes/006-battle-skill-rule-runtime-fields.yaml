databaseChangeLog:
- changeSet:
    id: 006-battle-skill-rule-runtime-fields
    author: backend
    changes:
    - addColumn:
        tableName: battle_skill_rule
        columns:
        - column:
            name: min_hits
            type: int
            defaultValueNumeric: 1
            remarks: 技能单次使用的最小连续命中段数，单段技能为 1。
            constraints:
              nullable: false
        - column:
            name: max_hits
            type: int
            defaultValueNumeric: 1
            remarks: 技能单次使用的最大连续命中段数，单段技能为 1。
            constraints:
              nullable: false
        - column:
            name: critical_hit_stage
            type: int
            defaultValueNumeric: 0
            remarks: 技能基础击中要害等级，0 为普通技能，3 及以上按现代规则视为必定要害。
            constraints:
              nullable: false
        - column:
            name: protects_user
            type: boolean
            defaultValueBoolean: false
            remarks: 技能是否在本回合为使用者建立保护屏障。
            constraints:
              nullable: false
        - column:
            name: thaws_user_before_move
            type: boolean
            defaultValueBoolean: false
            remarks: 技能是否允许冰冻中的使用者发动并在行动前解除自身冰冻。
            constraints:
              nullable: false
        - column:
            name: weakened_by_grassy_terrain
            type: boolean
            defaultValueBoolean: false
            remarks: 技能是否属于会被青草场地削弱的地面震动类技能。
            constraints:
              nullable: false
        - column:
            name: lock_move_turns_min
            type: int
            defaultValueNumeric: 1
            remarks: 锁定连续使用该技能的最小总回合数，包含首次使用回合。
            constraints:
              nullable: false
        - column:
            name: lock_move_turns_max
            type: int
            defaultValueNumeric: 1
            remarks: 锁定连续使用该技能的最大总回合数，包含首次使用回合。
            constraints:
              nullable: false
        - column:
            name: confuses_user_after_lock
            type: boolean
            defaultValueBoolean: false
            remarks: 锁招结束后使用者是否进入混乱状态。
            constraints:
              nullable: false
