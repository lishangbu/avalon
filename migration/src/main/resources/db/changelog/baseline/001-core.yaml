- changeSet:
    id: 075-battle-skill-weather-element-overrides
    author: backend
    comment: 新增技能天气属性覆盖资料表、气象球属性覆盖种子数据和管理菜单。
    changes:
    - createTable:
        tableName: battle_skill_weather_element_override
        remarks: 战斗技能天气属性覆盖表，保存技能在指定天气下改用的结算属性。
        columns:
        - column:
            name: id
            type: bigint
            remarks: 技能天气属性覆盖主键。
            constraints:
              primaryKey: true
              primaryKeyName: pk_battle_skill_weather_element_override
              nullable: false
        - column:
            name: skill_rule_id
            type: bigint
            remarks: 技能规则 ID，引用 battle_skill_rule。
            constraints:
              nullable: false
        - column:
            name: weather_rule_id
            type: bigint
            remarks: 天气规则 ID，引用 battle_weather_rule，不能引用无天气。
            constraints:
              nullable: false
        - column:
            name: target_element_id
            type: bigint
            remarks: 目标属性 ID，引用 game_element，表示该天气下技能本次结算使用的属性。
            constraints:
              nullable: false
        - column:
            name: enabled
            type: boolean
            defaultValueBoolean: true
            remarks: 是否启用该属性覆盖规则。
            constraints:
              nullable: false
        - column:
            name: sort_order
            type: int
            remarks: 属性覆盖规则展示排序。
            constraints:
              nullable: false
    - addUniqueConstraint:
        tableName: battle_skill_weather_element_override
        columnNames: skill_rule_id, weather_rule_id
        constraintName: uk_battle_skill_weather_element_override__skill_weather
    - addForeignKeyConstraint:
        baseTableName: battle_skill_weather_element_override
        baseColumnNames: skill_rule_id
        referencedTableName: battle_skill_rule
        referencedColumnNames: id
        constraintName: fk_battle_skill_weather_element_override__skill_rule_id
        onDelete: CASCADE
    - addForeignKeyConstraint:
        baseTableName: battle_skill_weather_element_override
        baseColumnNames: weather_rule_id
        referencedTableName: battle_weather_rule
        referencedColumnNames: id
        constraintName: fk_battle_skill_weather_element_override__weather_rule_id
    - addForeignKeyConstraint:
        baseTableName: battle_skill_weather_element_override
        baseColumnNames: target_element_id
        referencedTableName: game_element
        referencedColumnNames: id
        constraintName: fk_battle_skill_weather_element_override__target_element_id
    - createIndex:
        tableName: battle_skill_weather_element_override
        indexName: idx_battle_skill_weather_element_override__weather_rule_id
        columns:
        - column:
            name: weather_rule_id
    - createIndex:
        tableName: battle_skill_weather_element_override
        indexName: idx_battle_skill_weather_element_override__target_element_id
        columns:
        - column:
            name: target_element_id
    - insert:
        tableName: battle_skill_weather_element_override
        columns:
        - column: { name: id, valueNumeric: 1 }
        - column: { name: skill_rule_id, valueNumeric: 13 }
        - column: { name: weather_rule_id, valueNumeric: 2 }
        - column: { name: target_element_id, valueNumeric: 10 }
