databaseChangeLog:
- changeSet:
    id: 042-battle-rule-skill-effect-fixtures
    author: backend
    comment: 新增技能能力阶级、HP 回复和天气设置公开对照 fixture 数据。
    changes:
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 79 }
        - column: { name: code, value: stat-stage-effect-changes-later-action-damage-in-the-same-turn }
        - column: { name: name, value: 能力阶级变化影响同回合后续伤害 }
        - column: { name: category, value: SKILL }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证技能造成的能力阶级变化会立即写入状态，并影响同一回合后续行动的伤害计算。 }
        - column: { name: input_summary, value: 高速成员先用变化技能降低对手攻击，随后对手在同一回合使用物理攻击。 }
        - column: { name: expected_summary, value: 对手攻击阶级立即降低，本回合后续物理伤害按降低后的攻击阶级计算。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 790 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 80 }
        - column: { name: code, value: status-skill-applies-multiple-user-stat-stage-changes }
        - column: { name: name, value: 变化技能可提升使用者多项能力阶级 }
        - column: { name: category, value: SKILL }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证同一个变化技能可以携带多条使用者能力阶级变化，并按实际变化逐项产生事件。 }
        - column: { name: input_summary, value: 使用者成功使用会提升自身多项能力阶级的变化技能。 }
        - column: { name: expected_summary, value: 使用者自身对应能力阶级逐项改变，并为每一项实际变化产生能力阶级事件。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 800 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 81 }
        - column: { name: code, value: all-opponents-status-skill-applies-stat-stage-change-to-each-active-opponent }
