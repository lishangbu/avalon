name: Publish Javadoc

on:
  workflow_run:
    workflows:
      - Deploy Snapshot With Gradle
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: true

jobs:
  publish-javadoc:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: 设置 Java 环境 - 使用Oracle JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'oracle'
          architecture: x64
          cache: 'gradle'
          cache-dependency-path: |
            **/*.gradle*
            gradle.properties
            settings.gradle.kts

      - name: 生成聚合 API 文档站点（Dokka Official）
        run: bash ./gradlew --no-daemon dokkaGeneratePublicationHtml -x test

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAT }}
          publish_dir: build/dokka/html
          external_repository: lishangbu/avalon-site
          publish_branch: main
          destination_dir: javadoc-api
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
