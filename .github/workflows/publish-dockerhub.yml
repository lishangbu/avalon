name: Publish DockerHub

on:
  workflow_run:
    workflows:
      - Deploy Snapshot
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: true

jobs:
  publish-dockerhub:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # 使用矩阵策略并行构建多个服务,避免重复代码,提高构建效率
    strategy:
      fail-fast: false
      matrix:
        service: [ avalon-admin-server, avalon-standalone-server ]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: 设置 Java 环境 - 使用Oracle JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'oracle'
          architecture: x64
      - name: 设置 Gradle 环境
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '9.4.1'
      - name: 计算 IP 数据缓存周期
        id: ip-db-cache-epoch
        shell: bash
        run: echo "value=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"
      - name: 恢复 IP2Location 数据缓存
        id: ip-db-cache
        uses: actions/cache@v4
        with:
          path: avalon-platform/avalon-ip2location-spring-boot-starter/src/main/resources/IP2LOCATION-LITE-DB11.IPV6.BIN
          key: ${{ runner.os }}-ip2location-db11ipv6-${{ steps.ip-db-cache-epoch.outputs.value }}
          restore-keys: |
            ${{ runner.os }}-ip2location-db11ipv6-
      - name: 下载或刷新 IP2Location 数据
        if: steps.ip-db-cache.outputs.cache-hit != 'true' && secrets.IP2LOCATION_DOWNLOAD_TOKEN != ''
        env:
          IP2LOCATION_DOWNLOAD_TOKEN: ${{ secrets.IP2LOCATION_DOWNLOAD_TOKEN }}
        run: gradle downloadIpData -PrefreshIpDb=true
      - name: 校验 IP2Location 数据已就绪
        shell: bash
        run: |
          test -f avalon-platform/avalon-ip2location-spring-boot-starter/src/main/resources/IP2LOCATION-LITE-DB11.IPV6.BIN || {
            echo "IP2Location database is missing. Restore the Actions cache or configure the IP2LOCATION_DOWNLOAD_TOKEN secret."
            exit 1
          }

      - name: 提取项目版本
        id: projectVersion
        shell: bash
        run: |
          set -euo pipefail

          version="$(gradle -q printVersion)"

          if [[ -z "$version" ]]; then
            echo "无法从 Gradle 构建中解析版本号"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Detected version: $version"

      - name: Docker 登录
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 准备 IP 数据与 RSA 密钥
        run: gradle generateRsaKeys -Pforce=true -x test

      - name: 编译依赖与应用
        run: gradle :avalon-application:${{ matrix.service }}:classes -x test

      - name: 构建镜像
        run: gradle :avalon-application:${{ matrix.service }}:bootBuildImage -x test -PdockerImagePrefix=${{ secrets.DOCKER_USERNAME }}

      - name: 推送 latest 镜像
        run: |
          docker push docker.io/${{secrets.DOCKER_USERNAME}}/${{ matrix.service }}:latest

      - name: 推送版本镜像
        run: |
          docker tag docker.io/${{secrets.DOCKER_USERNAME}}/${{ matrix.service }}:latest docker.io/${{secrets.DOCKER_USERNAME}}/${{ matrix.service }}:${{ steps.projectVersion.outputs.version }}
          docker push docker.io/${{secrets.DOCKER_USERNAME}}/${{ matrix.service }}:${{ steps.projectVersion.outputs.version }}
          echo "✅ 镜像构建并推送完成: ${{ matrix.service }}"
