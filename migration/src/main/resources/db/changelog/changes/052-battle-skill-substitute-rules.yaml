databaseChangeLog:
- changeSet:
    id: 052-battle-skill-substitute-rules
    author: backend
    comment: 新增替身技能规则与公开对照 fixture 数据。
    changes:
    - insert:
        tableName: battle_skill_rule
        columns:
        - column: { name: id, valueNumeric: 69 }
        - column: { name: skill_id, valueNumeric: 164 }
        - column: { name: effect_policy, value: create-substitute-quarter-max-hp }
        - column: { name: target_policy, value: self }
        - column: { name: hit_policy, value: always-hit }
        - column: { name: damage_policy, value: no-damage }
        - column: { name: min_hits, valueNumeric: 1 }
        - column: { name: max_hits, valueNumeric: 1 }
        - column: { name: critical_hit_stage, valueNumeric: 0 }
        - column: { name: makes_contact, valueBoolean: false }
        - column: { name: affected_by_protect, valueBoolean: false }
        - column: { name: protects_user, valueBoolean: false }
        - column: { name: thaws_user_before_move, valueBoolean: false }
        - column: { name: weakened_by_grassy_terrain, valueBoolean: false }
        - column: { name: recharges_after_use, valueBoolean: false }
        - column: { name: charges_before_use, valueBoolean: false }
        - column: { name: sound_based, valueBoolean: false }
        - column: { name: powder_based, valueBoolean: false }
        - column: { name: punch_based, valueBoolean: false }
        - column: { name: slicing_based, valueBoolean: false }
        - column: { name: lock_move_turns_min, valueNumeric: 1 }
        - column: { name: lock_move_turns_max, valueNumeric: 1 }
        - column: { name: confuses_user_after_lock, valueBoolean: false }
        - column: { name: description, value: 使用者支付最大 HP 的 1/4 建立替身；替身吸收对手普通伤害并阻止多数状态效果。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 690 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 103 }
        - column: { name: code, value: substitute-pays-quarter-max-hp-and-absorbs-damage-until-broken }
        - column: { name: name, value: 替身支付四分之一最大 HP 并吸收伤害直到破裂 }
        - column: { name: category, value: SKILL }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证替身技能成功后扣除使用者最大 HP 的 1/4，并由替身优先吸收对手普通伤害。 }
        - column: { name: input_summary, value: 较快成员使用替身，较慢对手同回合使用普通攻击命中该成员。 }
        - column: { name: expected_summary, value: 使用者支付最大 HP 的 1/4 建立替身；对手伤害先扣替身，替身破裂，本体 HP 保持为扣费后的数值。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 1030 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 104 }
        - column: { name: code, value: substitute-keeps-remaining-hp-after-partial-damage }
        - column: { name: name, value: 替身承受较低伤害后保留剩余 HP }
        - column: { name: category, value: SKILL }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证对手伤害低于替身剩余 HP 时，替身保留剩余 HP 且本体不受伤。 }
        - column: { name: input_summary, value: 使用者建立替身后，对手使用低威力普通攻击命中。 }
        - column: { name: expected_summary, value: 替身扣除本次实际伤害后继续存在，本体 HP 不变，事件记录替身剩余 HP。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 1040 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 105 }
        - column: { name: code, value: substitute-blocks-opponent-major-status }
        - column: { name: name, value: 替身阻止对手主要异常状态 }
        - column: { name: category, value: STATUS }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证目标已有替身时，对手技能造成的主要异常状态不会写入目标运行态。 }
        - column: { name: input_summary, value: 目标已经拥有替身，对手使用必定造成睡眠的变化技能。 }
        - column: { name: expected_summary, value: 睡眠被替身阻止，目标不获得主要异常状态，也不消费睡眠持续时间随机数。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 1050 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 106 }
        - column: { name: code, value: substitute-blocks-opponent-volatile-status }
        - column: { name: name, value: 替身阻止对手临时状态 }
        - column: { name: category, value: STATUS }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证目标已有替身时，对手技能造成的混乱等临时状态不会写入目标运行态。 }
        - column: { name: input_summary, value: 目标已经拥有替身，对手使用必定造成混乱的变化技能。 }
        - column: { name: expected_summary, value: 混乱被替身阻止，目标不写入混乱计数，也不消费混乱持续时间随机数。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 1060 }
    - insert:
        tableName: battle_rule_fixture_source
        columns:
        - column: { name: id, valueNumeric: 221 }
        - column: { name: fixture_id, valueNumeric: 103 }
        - column: { name: source_url, value: https://github.com/smogon/pokemon-showdown/blob/master/data/moves.ts }
        - column: { name: source_label, value: 公开引擎技能资料 }
        - column: { name: source_note, value: 用于对照替身技能的 HP 费用和建立规则。 }
        - column: { name: sort_order, valueNumeric: 10 }
    - insert:
