        - column: { name: name, value: 天气属性覆盖为火属性可解除冰冻 }
        - column: { name: category, value: WEATHER }
        - column: { name: fixture_type, value: STATUS_FLOW }
        - column: { name: description, value: 验证天气改变技能属性后，火属性伤害命中仍可触发目标冰冻解除。 }
        - column: { name: input_summary, value: 目标处于冰冻，攻击方在晴天使用基础一般属性但晴天覆盖为火属性的技能并造成伤害。 }
        - column: { name: expected_summary, value: 技能按火属性伤害命中，目标在伤害后仍可战斗，因此冰冻状态被解除。 }
        - column: { name: enabled, valueBoolean: true }
