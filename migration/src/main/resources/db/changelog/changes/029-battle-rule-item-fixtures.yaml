databaseChangeLog:
- changeSet:
    id: 029-battle-rule-item-fixtures
    author: backend
    comment: 新增携带道具核心效果公开对照 fixture 数据。
    changes:
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 5 }
        - column: { name: code, value: low-hp-berry-heals-once-after-damage }
        - column: { name: name, value: 低体力树果受伤后回复并消费 }
        - column: { name: category, value: ITEM }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证低体力一次性回复类携带道具在持有者受伤后达到触发线时立即回复并被消费。 }
        - column: { name: input_summary, value: 持有者最大 HP 100，当前 HP 60，受到 28 点普通伤害后降到 32，达到半血触发线。 }
        - column: { name: expected_summary, value: 携带道具立即回复 10 点并被消费，成员最终 HP 为 42，后续不再保留携带道具效果。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 50 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 6 }
        - column: { name: code, value: choice-speed-item-modifies-action-order }
        - column: { name: name, value: 讲究速度道具改变行动顺序 }
        - column: { name: category, value: ITEM }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证讲究类速度道具会按结构化倍率修正行动排序速度，并记录首次成功宣告的技能。 }
        - column: { name: input_summary, value: 速度 60 的成员携带速度 1.5 倍道具，速度 80 的对手在同优先度下使用普通技能。 }
        - column: { name: expected_summary, value: 持有者有效速度变为 90，因此先于速度 80 的对手行动，并锁定首次宣告技能。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 60 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 7 }
        - column: { name: code, value: damage-boost-item-uses-max-hp-recoil-after-damage }
        - column: { name: name, value: 伤害增幅道具按最大 HP 反伤 }
        - column: { name: category, value: ITEM }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证生命宝珠类道具造成伤害后按使用者最大 HP 固定比例反伤，而不是按造成伤害反伤。 }
        - column: { name: input_summary, value: 使用者最大 HP 100，携带伤害 1.3 倍且反伤分母为 10 的道具，使用普通物理技能造成伤害。 }
        - column: { name: expected_summary, value: 目标受到增幅后的伤害；使用者按最大 HP 的 1/10 失去 10 HP。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 70 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 8 }
        - column: { name: code, value: end-turn-healing-item-restores-one-sixteenth-max-hp }
        - column: { name: name, value: 回合末回复道具回复十六分之一最大 HP }
        - column: { name: category, value: ITEM }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证剩饭类携带道具在完整回合末按最大 HP 固定分母回复当前上场成员。 }
        - column: { name: input_summary, value: 持有者最大 HP 100，当前 HP 80，携带回合末回复分母为 16 的道具，本回合没有其它行动。 }
        - column: { name: expected_summary, value: 完整回合末回复 floor(100 / 16) = 6 点 HP，成员最终 HP 为 86。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 80 }
    - insert:
        tableName: battle_rule_fixture_source
        columns:
        - column: { name: id, valueNumeric: 9 }
        - column: { name: fixture_id, valueNumeric: 5 }
        - column: { name: source_url, value: https://bulbapedia.bulbagarden.net/wiki/Oran_Berry }
        - column: { name: source_label, value: 树果固定回复说明 }
        - column: { name: source_note, value: 用于验证固定回复类低体力树果的触发线和消费行为。 }
        - column: { name: sort_order, valueNumeric: 10 }
