databaseChangeLog:
- changeSet:
    id: 274-power-construct-ability-rule
    author: codex
    comment: 为群聚变形补充半血完全体切换与体力差额规则。
    changes:
    - sql:
        splitStatements: false
        sql: |
          insert into battle_ability_rule (id, ability_id, trigger_timing, effect_policy, trigger_order, description, enabled, sort_order)
          select coalesce((select max(id) from battle_ability_rule), 0) + 1, id, 'END_TURN',
            'end-turn-hp-form-change-zygarde-complete', 100, '半血及以下时单向切换为完全体，并增加形态最大体力差额。', true, 7720
          from game_ability where code = 'power-construct'
          on conflict (ability_id, trigger_timing, effect_policy) do update set enabled = true, description = excluded.description;
          update game_ability set enabled = true where code = 'power-construct';
