databaseChangeLog:
- changeSet:
    id: 083-battle-damage-class-ability-reduction-rules
    author: backend
    comment: 新增按技能伤害分类降低受到直接技能伤害的特性规则。
    changes:
    - insert:
        tableName: battle_ability_rule
        columns:
        - column: { name: id, valueNumeric: 60 }
        - column: { name: ability_id, valueNumeric: 246 }
        - column: { name: trigger_timing, value: BEFORE_DAMAGE }
        - column: { name: effect_policy, value: special-damage-reduction }
        - column: { name: trigger_order, valueNumeric: 110 }
        - column: { name: description, value: 受到特殊分类直接技能伤害时，最终伤害降低 50%。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 600 }
