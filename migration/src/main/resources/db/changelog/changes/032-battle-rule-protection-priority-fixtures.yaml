databaseChangeLog:
- changeSet:
    id: 032-battle-rule-protection-priority-fixtures
    author: backend
    comment: 新增保护失败和精神场地同侧先制公开对照 fixture 数据。
    changes:
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 13 }
        - column: { name: code, value: consecutive-protection-second-use-can-fail-and-leave-user-unprotected }
        - column: { name: name, value: 连续保护失败后不会阻挡攻击 }
        - column: { name: category, value: TURN_FLOW }
        - column: { name: fixture_type, value: STATE_MACHINE }
