        - column: { name: description, value: 验证使用者命中 +1 时，基础 75 命中的技能提升到稳定命中。 }
        - column: { name: input_summary, value: 使用者命中阶级为 +1，使用基础命中 75 的技能攻击无闪避修正目标。 }
        - column: { name: expected_summary, value: 命中阶级 +1 把有效命中提升到 100；引擎不消耗命中随机数，技能直接命中并正常造成伤害。 }
        - column: { name: enabled, valueBoolean: true }
