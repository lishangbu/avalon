name: Deploy Snapshot With Gradle

on:
  push:
    branches:
      - main
    paths: &ci_paths
      - '**/*.kt'
      - '**/*.kts'
      - '**/*.yml'
      - '**/*.yaml'
      - 'gradle.properties'
      - 'db/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths: *ci_paths

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: 设置 Java 环境 - 使用Oracle JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'oracle'
          architecture: x64
          cache: 'gradle'
          cache-dependency-path: |
            **/*.gradle*
            gradle.properties
            settings.gradle.kts
      - name: 编译并执行测试
        run: bash ./gradlew --no-daemon ktlintCheck test

  deploy-snapshot:
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: 设置 Java 环境 - 使用Oracle JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'oracle'
          architecture: x64
          cache: 'gradle'
          cache-dependency-path: |
            **/*.gradle*
            gradle.properties
            settings.gradle.kts
      - name: 提取项目版本
        id: projectVersion
        shell: bash
        run: |
          set -euo pipefail

          version="$(bash ./gradlew -q printVersion)"

          if [[ -z "$version" ]]; then
            echo "无法从 Gradle 构建中解析版本号"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Detected version: $version"

      - name: 使用 Gradle 发布快照到 Maven Central
        if: endsWith(steps.projectVersion.outputs.version, '-SNAPSHOT')
        run: bash ./gradlew --no-daemon downloadIpData generateRsaKeys -Pforce=true publish -x test
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
