databaseChangeLog:
- changeSet:
    id: 060-battle-indirect-damage-immunity-rules
    author: backend
    comment: 补齐间接伤害免疫特性规则与公开对照 fixture 数据。
    changes:
    - insert:
        tableName: battle_ability_rule
        columns:
        - column: { name: id, valueNumeric: 34 }
        - column: { name: ability_id, valueNumeric: 98 }
        - column: { name: trigger_timing, value: BEFORE_DAMAGE }
        - column: { name: effect_policy, value: indirect-damage-immunity }
        - column: { name: trigger_order, valueNumeric: 100 }
        - column: { name: description, value: 阻止异常状态、天气、入场陷阱、反作用等非技能直接伤害。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 340 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 125 }
        - column: { name: code, value: indirect-damage-immunity-blocks-residual-status-and-weather-damage }
        - column: { name: name, value: 间接伤害免疫阻止异常和天气伤害 }
        - column: { name: category, value: ABILITY }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证拥有间接伤害免疫特性的成员不会承受灼伤回合末伤害和沙暴回合末伤害。 }
        - column: { name: input_summary, value: 普通属性成员拥有间接伤害免疫特性并处于灼伤状态，全场天气为沙暴。 }
        - column: { name: expected_summary, value: 完整回合末不产生异常状态或天气伤害事件，成员 HP 保持不变，已有灼伤状态仍保留。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 1250 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 126 }
        - column: { name: code, value: indirect-damage-immunity-keeps-direct-damage-boost-but-blocks-item-recoil }
        - column: { name: name, value: 间接伤害免疫保留伤害增幅但阻止道具反伤 }
        - column: { name: category, value: ABILITY }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证间接伤害免疫不会移除伤害增幅道具倍率，但会阻止该道具造成的反伤。 }
        - column: { name: input_summary, value: 使用者拥有间接伤害免疫特性，并携带造成伤害提升 1.3 倍且按最大 HP 1/10 反伤的道具。 }
        - column: { name: expected_summary, value: 目标受到 1.3 倍后的直接技能伤害，使用者不承受道具反伤。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 1260 }
    - insert:
        tableName: battle_rule_fixture
        columns:
        - column: { name: id, valueNumeric: 127 }
        - column: { name: code, value: indirect-damage-immunity-blocks-move-recoil-and-entry-hazard-damage }
        - column: { name: name, value: 间接伤害免疫阻止技能反作用和入场陷阱伤害 }
        - column: { name: category, value: ABILITY }
        - column: { name: fixture_type, value: STATE_MACHINE }
        - column: { name: description, value: 验证间接伤害免疫阻止技能反作用伤害和换入时的入场陷阱伤害。 }
        - column: { name: input_summary, value: 使用者拥有间接伤害免疫特性，使用带反作用伤害的技能；同类特性后备成员换入已有隐形岩的一侧。 }
        - column: { name: expected_summary, value: 直接攻击仍扣减目标 HP，但使用者不受技能反作用伤害；后备成员换入时不受隐形岩伤害。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 1270 }
