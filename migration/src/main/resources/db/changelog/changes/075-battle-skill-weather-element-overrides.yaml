        - column: { name: description, value: 验证天气改变技能属性后，命中前属性吸收特性读取覆盖后的属性并阻止技能继续结算。 }
        - column: { name: input_summary, value: 目标拥有吸收水属性技能并回复的特性，攻击方在雨天使用基础一般属性但雨天覆盖为水属性的技能。 }
        - column: { name: expected_summary, value: 技能视为水属性并被目标特性吸收，目标满 HP 时回复量为 0 且不会受到伤害。 }
        - column: { name: enabled, valueBoolean: true }
