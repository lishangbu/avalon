databaseChangeLog:
- changeSet:
    id: 109-battle-environment-field-boundary-fixtures
    author: backend
    comment: 新增天气、场地和场上状态边界公开对照 fixture 数据。
    changes:
    - sql:
        splitStatements: true
        stripComments: true
        sql: |
          insert into battle_rule_fixture
            (id, code, name, category, fixture_type, description, input_summary, expected_summary, enabled, sort_order)
          values
            (320, 'weather-setting-skill-replaces-existing-weather-and-starts-new-duration', '天气设置技能覆盖既有天气', 'FIELD', 'STATE_MACHINE', '验证技能成功设置天气时会覆盖既有普通天气并写入新的持续回合。', '场上已有晴天剩余 3 回合，使用者成功使用设置下雨的变化技能。', '天气被下雨覆盖，天气开始事件记录完整 5 回合；同一回合末统一递减后剩余 4 回合。', true, 3200),
            (321, 'terrain-setting-skill-replaces-existing-terrain-and-starts-new-duration', '场地设置技能覆盖既有场地', 'FIELD', 'STATE_MACHINE', '验证技能成功设置场地时会覆盖既有普通场地并写入新的持续回合。', '场上已有电气场地剩余 3 回合，使用者成功使用设置青草场地的变化技能。', '场地被青草场地覆盖，场地开始事件记录完整 5 回合；同一回合末统一递减后剩余 4 回合。', true, 3210),
            (322, 'non-matching-weather-extension-item-does-not-extend-weather-skill', '天气延长道具不匹配时不延长', 'ITEM', 'STATE_MACHINE', '验证天气延长道具只影响声明匹配的目标天气。', '使用者携带只延长沙暴的道具效果，却成功使用设置下雨的变化技能。', '道具目标天气不匹配，天气按普通 5 回合建立；同一回合末递减后剩余 4 回合。', true, 3220),
            (323, 'non-matching-terrain-extension-item-does-not-extend-terrain-skill', '场地延长道具不匹配时不延长', 'ITEM', 'STATE_MACHINE', '验证场地延长道具只影响声明匹配的目标场地。', '使用者携带只延长电气场地的道具效果，却成功使用设置青草场地的变化技能。', '道具目标场地不匹配，场地按普通 5 回合建立；同一回合末递减后剩余 4 回合。', true, 3230),
            (324, 'missed-weather-setting-skill-does-not-change-weather', '天气设置技能未命中不改写天气', 'SKILL', 'STATE_MACHINE', '验证技能未命中会在环境效果写入前短路。', '带命中判定的变化技能尝试设置下雨，但命中随机超过有效命中率。', '技能未命中后不写入天气，也不产生天气开始事件。', true, 3240),
            (325, 'field-speed-order-duration-decrements-without-ending', '全场速度顺序持续回合递减', 'FIELD', 'STATE_MACHINE', '验证全场速度顺序效果剩余回合大于 1 时只递减不结束。', '全场速度顺序效果剩余 2 回合，结算一个没有行动的完整回合。', '回合末持续时间递减为 1，不产生全场速度顺序结束事件。', true, 3250),
            (326, 'field-speed-order-duration-ends-before-turn-end', '全场速度顺序耗尽后在回合结束前结束', 'FIELD', 'STATE_MACHINE', '验证全场速度顺序效果剩余 1 回合时在回合末清除并记录事件。', '全场速度顺序效果剩余 1 回合，结算一个没有行动的完整回合。', '回合末效果被清除，结束事件出现在回合结束事件之前。', true, 3260),
            (327, 'side-damage-reduction-duration-decrements-without-ending', '一侧伤害减免持续回合递减', 'FIELD', 'STATE_MACHINE', '验证一侧防守屏障剩余回合大于 1 时只递减不移除。', '目标侧已有物理伤害减免屏障剩余 2 回合，结算一个没有行动的完整回合。', '回合末屏障剩余回合递减为 1，屏障仍保留在该侧场上状态中。', true, 3270),
            (328, 'side-damage-reduction-duration-ends-silently', '一侧伤害减免耗尽后移除', 'FIELD', 'STATE_MACHINE', '验证一侧防守屏障剩余 1 回合时在回合末移除。', '目标侧已有物理伤害减免屏障剩余 1 回合，结算一个没有行动的完整回合。', '回合末屏障从该侧场上状态中移除；当前模型不为自然移除追加额外事件。', true, 3280),
            (329, 'side-speed-modifier-duration-decrements-without-ending', '一侧速度修正持续回合递减', 'FIELD', 'STATE_MACHINE', '验证一侧速度修正剩余回合大于 1 时只递减不移除。', '己方侧已有顺风速度修正剩余 2 回合，结算一个没有行动的完整回合。', '回合末速度修正剩余回合递减为 1，修正仍保留在该侧场上状态中。', true, 3290),
            (330, 'side-speed-modifier-duration-ends-silently', '一侧速度修正耗尽后移除', 'FIELD', 'STATE_MACHINE', '验证一侧速度修正剩余 1 回合时在回合末移除。', '己方侧已有顺风速度修正剩余 1 回合，结算一个没有行动的完整回合。', '回合末速度修正从该侧场上状态中移除；当前模型不为自然移除追加额外事件。', true, 3300),
            (331, 'duplicate-side-damage-reduction-does-not-refresh-duration', '重复一侧伤害减免不刷新持续回合', 'FIELD', 'STATE_MACHINE', '验证同种防守屏障已经存在时再次使用不会刷新持续时间。', '己方侧已有物理屏障剩余 3 回合，使用者再次成功使用同类物理屏障技能。', '重复屏障不会刷新或追加新状态；回合末原有屏障只按自然流程递减为 2 回合。', true, 3310),
            (332, 'duplicate-side-speed-modifier-does-not-refresh-duration', '重复一侧速度修正不刷新持续回合', 'FIELD', 'STATE_MACHINE', '验证同种速度修正已经存在时再次使用不会刷新持续时间。', '己方侧已有顺风剩余 3 回合，使用者再次成功使用建立顺风的变化技能。', '重复速度修正不会刷新或追加新状态；回合末原有顺风只按自然流程递减为 2 回合。', true, 3320),
            (333, 'required-weather-side-condition-fails-without-weather', '天气前置一侧状态在天气不符时失败', 'FIELD', 'STATE_MACHINE', '验证带天气前置条件的一侧状态不会在条件不满足时写入。', '技能声明只有雪天才能建立全伤害屏障，但当前天气为无天气。', '天气前置条件不满足时不写入一侧场上状态，也不产生屏障开始事件。', true, 3330),
            (334, 'non-matching-screen-extension-item-does-not-extend-side-damage-reduction', '屏障延长道具不匹配时不延长', 'ITEM', 'STATE_MACHINE', '验证屏障延长道具只影响声明匹配的屏障类型。', '使用者携带只延长特殊屏障的道具效果，却成功建立物理屏障。', '道具目标屏障类型不匹配，物理屏障按普通 5 回合建立；同一回合末递减后剩余 4 回合。', true, 3340),
            (335, 'sandstorm-damage-resolves-before-weather-healing', '沙暴伤害先于天气回复结算', 'WEATHER', 'STATE_MACHINE', '验证同一天气阶段中固定伤害和天气回复的事件顺序。', '沙暴下普通属性成员拥有匹配天气回复特性，当前 HP 为 80。', '回合末先承受 1/16 沙暴伤害，再按 1/16 天气回复，事件顺序保持天气伤害在天气回复之前。', true, 3350),
            (336, 'weather-damage-uses-minimum-one-hp', '天气伤害至少 1 点', 'WEATHER', 'STATE_MACHINE', '验证天气固定比例伤害向下取整后仍保留最小 1 点。', '最大 HP 只有 10 的普通属性成员处于沙暴中。', '沙暴按最大 HP 1/16 计算时向下取整不足 1，但固定伤害至少为 1 点。', true, 3360),
            (337, 'weather-healing-clamps-to-missing-hp', '天气回复夹取到缺失 HP', 'WEATHER', 'STATE_MACHINE', '验证天气回复不会超过成员最大 HP。', '下雨下天气回复特性成员当前 HP 为 98，最大 HP 为 100。', '天气回复理论值为 6，但实际回复被夹取到缺失的 2 点 HP。', true, 3370),
            (338, 'grassy-terrain-healing-clamps-to-missing-hp', '青草场地回复夹取到缺失 HP', 'TERRAIN', 'STATE_MACHINE', '验证场地回复不会超过成员最大 HP。', '青草场地中接地成员当前 HP 为 98，最大 HP 为 100。', '青草场地回复理论值为 6，但实际回复被夹取到缺失的 2 点 HP。', true, 3380),
            (339, 'heal-block-suppresses-weather-and-terrain-healing', '回复封锁抑制天气和场地回复', 'STATUS', 'STATE_MACHINE', '验证回复封锁会抑制环境阶段的天气回复和场地回复。', '一个成员在下雨中拥有天气回复特性，另一个成员在青草场地中接地；两者都处于回复封锁。', '回复封锁会分别抑制天气回复和场地回复，不产生对应回复事件，也不改变 HP。', true, 3390);
