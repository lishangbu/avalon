databaseChangeLog:
- changeSet:
    id: 170-rusted-item-rules
    author: codex
    comment: 为腐朽的剑与腐朽的盾补充对应传说宝可梦的加冕形态覆盖规则。
    changes:
    - sql:
        splitStatements: false
        stripComments: false
        sql: |
          insert into battle_item_rule (
            id, item_id, trigger_timing, effect_policy, consumable,
            trigger_order, description, enabled, sort_order
          )
          select coalesce((select max(id) from battle_item_rule), 0) + source.row_no,
            item.id, 'BATTLE_START', source.effect_policy, false,
            100, source.description, true, 1920 + source.row_no
          from (
            values
              (1, 'rusted-sword', 'creature-form-override-zacian-crowned', '苍响携带时以苍响（加冕）的完整战斗资料参战；其它宝可梦携带不改变形态。'),
              (2, 'rusted-shield', 'creature-form-override-zamazenta-crowned', '藏玛然特携带时以藏玛然特（加冕）的完整战斗资料参战；其它宝可梦携带不改变形态。')
          ) as source(row_no, item_code, effect_policy, description)
          join game_item item on item.code = source.item_code
          on conflict (item_id, trigger_timing, effect_policy) do update set
            consumable = excluded.consumable,
            trigger_order = excluded.trigger_order,
            description = excluded.description,
            enabled = excluded.enabled,
            sort_order = excluded.sort_order;
