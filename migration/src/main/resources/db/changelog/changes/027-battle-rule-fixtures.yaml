        - column: { name: category, value: STATUS }
        - column: { name: fixture_type, value: FORMULA }
        - column: { name: description, value: 验证灼伤成员使用物理技能时，攻击侧数值先减半再进入普通伤害公式。 }
        - column: { name: input_summary, value: 灼伤状态的使用者以 100 攻击使用物理技能攻击无特殊防御修正目标。 }
        - column: { name: expected_summary, value: 物理攻击数值先按灼伤减半参与普通伤害公式，最终伤害低于同条件未灼伤物理攻击。 }
        - column: { name: enabled, valueBoolean: true }
        - column: { name: sort_order, valueNumeric: 30 }
    - insert:
